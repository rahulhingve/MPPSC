const DATA = [{"index":1,"qNo":"Question No. 1","languages":{"English":{"qNo":1,"language":"English","questionHTML":"Ghazi Malik was the founder of which dynasty?","questionText":"Ghazi Malik was the founder of which dynasty?","options":[{"label":"A","html":"Tughlaq","text":"Tughlaq"},{"label":"B","html":"Khilji","text":"Khilji"},{"label":"C","html":"Sayyid","text":"Sayyid"},{"label":"D","html":"Lodi","text":"Lodi"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003eTughlaq\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eHe was the\u003cstrong\u003e founder of the Tughluq dynasty\u003c/strong\u003e in India.\u0026nbsp;\u003c/li\u003e\n\t\u003cli\u003eAfter assuming power, \u003cstrong\u003eGhazi Malik renamed\u003c/strong\u003e himself \u003cstrong\u003eGhiyasuddin Tughlaq\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eAfter him, the dynasty was\u0026nbsp;succeeded by his son \u003cstrong\u003eMuhammad bin Tughluq\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eRule of Tughlaq dynasty \u003c/strong\u003e(1320–1414).\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eWord \u003cstrong\u003eGhazi means\u003c/strong\u003e fighter for Islam.\u003c/li\u003e\n\t\u003cli\u003eFounded the city of \u003cstrong\u003eTughluqabad\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eThe \u003cstrong\u003ecause of death \u003c/strong\u003eis the structural collapse of plank on running elephants.\u003c/li\u003e\n\t\u003cli\u003eThe\u003cstrong\u003e sequence\u003c/strong\u003e of Delhi sultanate \u003cstrong\u003eSlave-Khilji-Tughlaq Sayyid-Lodhi\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eThe first Sayyid ruler of Delhi was \u003cstrong\u003eKhizr Khan\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eThe \u003cstrong\u003eLodi dynasty\u003c/strong\u003e was founded by \u003cstrong\u003eBahlul Khan Lodi\u003c/strong\u003e when he replaced the Sayyid dynasty.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Tughlaq. Important Points He was the founder of the Tughluq dynasty in India. After assuming power, Ghazi Malik renamed himself Ghiyasuddin Tughlaq. After him, the dynasty was succeeded by his son Muhammad bin Tughluq. Rule of Tughlaq dynasty (1320–1414). Additional Information Word Ghazi means fighter for Islam. Founded the city of Tughluqabad. The cause of death is the structural collapse of plank on running elephants. The sequence of Delhi sultanate Slave-Khilji-Tughlaq Sayyid-Lodhi. The first Sayyid ruler of Delhi was Khizr Khan. The Lodi dynasty was founded by Bahlul Khan Lodi when he replaced the Sayyid dynasty.","markdown":"## Q1.\n\nGhazi Malik was the founder of which dynasty?\n\n### Options\n\nA. Tughlaq\n\nB. Khilji\n\nC. Sayyid\n\nD. Lodi\n\n**Correct Answer:** A\n\n### Solution\n\nThe correct answer is **Tughlaq**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* He was the**founder of the Tughluq dynasty** in India.\n* After assuming power, **Ghazi Malik renamed** himself **Ghiyasuddin Tughlaq**.\n* After him, the dynasty was succeeded by his son **Muhammad bin Tughluq**.\n* **Rule of Tughlaq dynasty**(1320–1414).\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* Word **Ghazi means** fighter for Islam.\n* Founded the city of **Tughluqabad**.\n* The **cause of death**is the structural collapse of plank on running elephants.\n* The**sequence** of Delhi sultanate **Slave-Khilji-Tughlaq Sayyid-Lodhi**.\n* The first Sayyid ruler of Delhi was **Khizr Khan**.\n* The **Lodi dynasty** was founded by **Bahlul Khan Lodi** when he replaced the Sayyid dynasty.\n\n---\n"},"Hindi":{"qNo":1,"language":"Hindi","questionHTML":"गाज़ी मलिक किस वंश का संस्थापक था?","questionText":"गाज़ी मलिक किस वंश का संस्थापक था?","options":[{"label":"A","html":"तुगलक","text":"तुगलक"},{"label":"B","html":"खिलजी","text":"खिलजी"},{"label":"C","html":"सैय्यद","text":"सैय्यद"},{"label":"D","html":"लोदी","text":"लोदी"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eसही उत्तर \u003cu\u003e\u003cstrong\u003eतुगलक\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eवह भारत में \u003cstrong\u003eतुगलक वंश का संस्थापक\u003c/strong\u003e था।\u003c/li\u003e\n\t\u003cli\u003eसत्ता संभालने के बाद \u003cstrong\u003eगाजी मलिक ने\u003c/strong\u003e खुद का \u003cstrong\u003eनाम\u003c/strong\u003e \u003cstrong\u003eगियासुद्दीन तुगलक रख\u003c/strong\u003e लिया।\u003c/li\u003e\n\t\u003cli\u003eउसके बाद, राजवंश की बागडोर उसके बेटे \u003cstrong\u003eमुहम्मद बिन तुगलक\u003c/strong\u003e ने सम्भाली।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eतुगलक वंश का शासन\u003c/strong\u003e (1320-1414)।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eशब्द \u003cstrong\u003eगाजी का अर्थ\u003c/strong\u003e इस्लाम के लिए लड़ने वाला है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eतुगलकाबाद\u003c/strong\u003e शहर की स्थापना की।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eमौत का कारण\u003c/strong\u003e भागते हाथियों पर रखी गई तख्ती का टूटना है\u003c/li\u003e\n\t\u003cli\u003eदिल्ली सल्तनत का \u003cstrong\u003eक्रम\u003c/strong\u003e \u003cstrong\u003eगुलाम-खिलजी-तुगलक सैय्यद-लोधी\u003c/strong\u003e है।\u003c/li\u003e\n\t\u003cli\u003eदिल्ली का पहला सैय्यद शासक \u003cstrong\u003eखिज्र खान\u003c/strong\u003e था।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eलोदी राजवंश\u003c/strong\u003e की स्थापना \u003cstrong\u003eबाहुल खान लोदी\u003c/strong\u003e ने की थी जब उन्होंने सैय्यद वंश का स्थान लिया था।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर तुगलक है। Important Points वह भारत में तुगलक वंश का संस्थापक था। सत्ता संभालने के बाद गाजी मलिक ने खुद का नाम गियासुद्दीन तुगलक रख लिया। उसके बाद, राजवंश की बागडोर उसके बेटे मुहम्मद बिन तुगलक ने सम्भाली। तुगलक वंश का शासन (1320-1414)। Additional Information शब्द गाजी का अर्थ इस्लाम के लिए लड़ने वाला है। तुगलकाबाद शहर की स्थापना की। मौत का कारण भागते हाथियों पर रखी गई तख्ती का टूटना है दिल्ली सल्तनत का क्रम गुलाम-खिलजी-तुगलक सैय्यद-लोधी है। दिल्ली का पहला सैय्यद शासक खिज्र खान था। लोदी राजवंश की स्थापना बाहुल खान लोदी ने की थी जब उन्होंने सैय्यद वंश का स्थान लिया था।","markdown":"## Q1.\n\nगाज़ी मलिक किस वंश का संस्थापक था?\n\n### Options\n\nA. तुगलक\n\nB. खिलजी\n\nC. सैय्यद\n\nD. लोदी\n\n**Correct Answer:** A\n\n### Solution\n\nसही उत्तर **तुगलक** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* वह भारत में **तुगलक वंश का संस्थापक** था।\n* सत्ता संभालने के बाद **गाजी मलिक ने** खुद का **नाम** **गियासुद्दीन तुगलक रख** लिया।\n* उसके बाद, राजवंश की बागडोर उसके बेटे **मुहम्मद बिन तुगलक** ने सम्भाली।\n* **तुगलक वंश का शासन** (1320-1414)।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* शब्द **गाजी का अर्थ** इस्लाम के लिए लड़ने वाला है।\n* **तुगलकाबाद** शहर की स्थापना की।\n* **मौत का कारण** भागते हाथियों पर रखी गई तख्ती का टूटना है\n* दिल्ली सल्तनत का **क्रम** **गुलाम-खिलजी-तुगलक सैय्यद-लोधी** है।\n* दिल्ली का पहला सैय्यद शासक **खिज्र खान** था।\n* **लोदी राजवंश** की स्थापना **बाहुल खान लोदी** ने की थी जब उन्होंने सैय्यद वंश का स्थान लिया था।\n\n---\n"}}},{"index":2,"qNo":"Question No. 2","languages":{"English":{"qNo":2,"language":"English","questionHTML":"Who is called the 'Father of Indian Archeology'?","questionText":"Who is called the 'Father of Indian Archeology'?","options":[{"label":"A","html":"Alexander Cunningham","text":"Alexander Cunningham"},{"label":"B","html":"John Marshall","text":"John Marshall"},{"label":"C","html":"Mortimer Wheeler","text":"Mortimer Wheeler"},{"label":"D","html":"James Prinsep","text":"James Prinsep"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cu\u003e\u003cstrong\u003eAlexander Cunningham\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eAlexander Cunningham\u003c/strong\u003e\u0026nbsp;was deployed as a \u003cstrong\u003eBritish Army officer\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eHe was appointed Colonel of the \u003cstrong\u003eRoyal Engineers\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eHe is known as the '\u003cstrong\u003eFather of Indian Archeology\u003c/strong\u003e'.\u003c/li\u003e\n\t\u003cli\u003eHe was appointed to the position of the \u003cstrong\u003earchaeological surveyor\u003c/strong\u003e to the government of India.\u003c/li\u003e\n\t\u003cli\u003eHe had \u003cstrong\u003econducted excavations at Sarnath\u003c/strong\u003e, Sankassa, and Sanchi.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cimg alt=\"\" src=\"//storage.googleapis.com/tb-img/production/20/12/220px-Alexander_Cunningham_of_the_ASI_02.png\" style=\"width: 141px; height: 180px;\"\u003e\u003c/p\u003e","solutionText":"The correct answer is Alexander Cunningham. Important Points Alexander Cunningham was deployed as a British Army officer. He was appointed Colonel of the Royal Engineers. He is known as the 'Father of Indian Archeology'. He was appointed to the position of the archaeological surveyor to the government of India. He had conducted excavations at Sarnath, Sankassa, and Sanchi.","markdown":"## Q2.\n\nWho is called the 'Father of Indian Archeology'?\n\n### Options\n\nA. Alexander Cunningham\n\nB. John Marshall\n\nC. Mortimer Wheeler\n\nD. James Prinsep\n\n**Correct Answer:** A\n\n### Solution\n\nThe correct answer is **Alexander Cunningham**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* **Alexander Cunningham** was deployed as a **British Army officer**.\n* He was appointed Colonel of the **Royal Engineers**.\n* He is known as the '**Father of Indian Archeology**'.\n* He was appointed to the position of the **archaeological surveyor** to the government of India.\n* He had **conducted excavations at Sarnath**, Sankassa, and Sanchi.\n \n\n![](//storage.googleapis.com/tb-img/production/20/12/220px-Alexander_Cunningham_of_the_ASI_02.png)\n\n---\n"},"Hindi":{"qNo":2,"language":"Hindi","questionHTML":"'भारतीय पुरातत्व का जनक' किसे कहा जाता है?","questionText":"'भारतीय पुरातत्व का जनक' किसे कहा जाता है?","options":[{"label":"A","html":"अलेक्जेंडर कनिंघम","text":"अलेक्जेंडर कनिंघम"},{"label":"B","html":"जॉन मार्शल","text":"जॉन मार्शल"},{"label":"C","html":"मॉर्टिमर व्हीलर","text":"मॉर्टिमर व्हीलर"},{"label":"D","html":"जेम्स प्रिंसेप\u0026nbsp;","text":"जेम्स प्रिंसेप"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eसही उत्तर \u003cu\u003e\u003cstrong\u003eअलेक्जेंडर कनिंघम\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eअलेक्जेंडर कनिंघम\u003c/strong\u003e को एक \u003cstrong\u003eब्रिटिश सेना अधिकारी \u003c/strong\u003eके रूप में तैनात किया गया था।\u003c/li\u003e\n\t\u003cli\u003eउन्हें \u003cstrong\u003eरॉयल इंजीनियर्स\u003c/strong\u003e का कर्नल नियुक्त किया गया।\u003c/li\u003e\n\t\u003cli\u003eउन्हें\u003cstrong\u003e 'भारतीय पुरातत्व के जनक' \u003c/strong\u003eके रूप में जाना जाता है।\u003c/li\u003e\n\t\u003cli\u003eउन्हें भारत सरकार के \u003cstrong\u003eपुरातात्विक सर्वेक्षणकर्ता\u003c/strong\u003e के पद पर नियुक्त किया गया था।\u003c/li\u003e\n\t\u003cli\u003eउन्होंने \u003cstrong\u003eसारनाथ\u003c/strong\u003e, संकिसा और सांची में \u003cstrong\u003eखुदाई करवाई थी।\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cimg alt=\"\" src=\"//storage.googleapis.com/tb-img/production/20/12/220px-Alexander_Cunningham_of_the_ASI_02.png\" style=\"width: 141px; height: 180px;\"\u003e\u003c/p\u003e","solutionText":"सही उत्तर अलेक्जेंडर कनिंघम है। Important Points अलेक्जेंडर कनिंघम को एक ब्रिटिश सेना अधिकारी के रूप में तैनात किया गया था। उन्हें रॉयल इंजीनियर्स का कर्नल नियुक्त किया गया। उन्हें 'भारतीय पुरातत्व के जनक' के रूप में जाना जाता है। उन्हें भारत सरकार के पुरातात्विक सर्वेक्षणकर्ता के पद पर नियुक्त किया गया था। उन्होंने सारनाथ, संकिसा और सांची में खुदाई करवाई थी।","markdown":"## Q2.\n\n'भारतीय पुरातत्व का जनक' किसे कहा जाता है?\n\n### Options\n\nA. अलेक्जेंडर कनिंघम\n\nB. जॉन मार्शल\n\nC. मॉर्टिमर व्हीलर\n\nD. जेम्स प्रिंसेप\n\n**Correct Answer:** A\n\n### Solution\n\nसही उत्तर **अलेक्जेंडर कनिंघम** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* **अलेक्जेंडर कनिंघम** को एक **ब्रिटिश सेना अधिकारी**के रूप में तैनात किया गया था।\n* उन्हें **रॉयल इंजीनियर्स** का कर्नल नियुक्त किया गया।\n* उन्हें**'भारतीय पुरातत्व के जनक'**के रूप में जाना जाता है।\n* उन्हें भारत सरकार के **पुरातात्विक सर्वेक्षणकर्ता** के पद पर नियुक्त किया गया था।\n* उन्होंने **सारनाथ**, संकिसा और सांची में **खुदाई करवाई थी।**\n \n\n![](//storage.googleapis.com/tb-img/production/20/12/220px-Alexander_Cunningham_of_the_ASI_02.png)\n\n---\n"}}},{"index":3,"qNo":"Question No. 3","languages":{"English":{"qNo":3,"language":"English","questionHTML":"Who conferred Ram Mohan Roy with the title of 'Raja'?","questionText":"Who conferred Ram Mohan Roy with the title of 'Raja'?","options":[{"label":"A","html":"Aurangzeb","text":"Aurangzeb"},{"label":"B","html":"Robert Clive","text":"Robert Clive"},{"label":"C","html":"Mahatma Gandhi","text":"Mahatma Gandhi"},{"label":"D","html":"Mughal Emperor Akbar II","text":"Mughal Emperor Akbar II"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cu\u003e\u003cstrong\u003eMughal Emperor Akbar II\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eMughal Emperor Akbar II\u003c/strong\u003e \u003cstrong\u003egave Ram Mohan Roy the title of 'Raja'\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eHe sent \u003cstrong\u003eRam Mohan Roy as an ambassador to Britain.\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003eHe was\u0026nbsp;also known as \u003cstrong\u003eAkbar Shah II\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eHe was the \u003cstrong\u003eson of Shah Alam II\u003c/strong\u003e and the \u003cstrong\u003efather of Bahadur Shah II\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eHe is credited for starting the\u0026nbsp;\u003cstrong\u003eHindu-Muslim unity\u003c/strong\u003e festival \u003cstrong\u003ePhool Walon Ki Sair'\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eAurangzeb\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eHe was the\u0026nbsp;\u003cstrong\u003eSixth Mughal Emperor\u003c/strong\u003e.\u003c/li\u003e\n\t\t\u003cli\u003eHe was also known for his\u003cstrong\u003e famous title\u0026nbsp;Alamgir\u003c/strong\u003e.\u003c/li\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eAurangzeb ruled for 49\u0026nbsp;years\u003c/strong\u003e similar to Akbar's reign.\u003c/li\u003e\n\t\t\u003cli\u003eHe \u003cstrong\u003edied in 1707\u003c/strong\u003e, Bhingar, Ahmednagar.\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eRobert Clive\u003c/strong\u003e\n\t\u003cul\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eFirst\u003c/strong\u003e British \u003cstrong\u003eGovernor of the Bengal\u003c/strong\u003e.\u003c/li\u003e\n\t\t\u003cli\u003eHe established the \u003cstrong\u003emilitary and political supremacy of the Company\u003c/strong\u003e.\u003c/li\u003e\n\t\t\u003cli\u003eHe is also known as \u003cstrong\u003e“Clive of India”\u003c/strong\u003e.\u003c/li\u003e\n\t\t\u003cli\u003eStarted the \u003cstrong\u003edual system of Government\u003c/strong\u003e in Bengal.\u0026nbsp;\u0026nbsp;\n\t\t\u003cul\u003e\n\t\t\t\u003cli\u003e\u003cstrong\u003eDiwani system\u0026nbsp;\u003c/strong\u003emeans the right to collect revenue was given to the company.\u0026nbsp;\u003c/li\u003e\n\t\t\t\u003cli\u003e\u003cstrong\u003eNizamat system\u003c/strong\u003e means administrative rights were given to nawab.\u003c/li\u003e\n\t\t\u003c/ul\u003e\n\t\t\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eMahatma Gandhi\u003c/strong\u003e\n\t\u003cul\u003e\n\t\t\u003cli\u003e\u003cstrong\u003e​Gandhiji full name\u0026nbsp;Mohandas Karamchand Gandhi.\u003c/strong\u003e\u003c/li\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eBorn\u003c/strong\u003e on\u0026nbsp;2 October 1869\u003cstrong\u003e in Porbandar\u003c/strong\u003e.\u003c/li\u003e\n\t\t\u003cli\u003eIndia is celebrating '\u003cstrong\u003e150 years of the Mahatma\u003c/strong\u003e'.\u003c/li\u003e\n\t\t\u003cli\u003eMahatma Gandhi is called the\u0026nbsp;\u003cstrong\u003eFather Of Nation\u003c/strong\u003e.\u003c/li\u003e\n\t\t\u003cli\u003eHe played important role in the\u003cstrong\u003e freedom struggle of India\u003c/strong\u003e.\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Mughal Emperor Akbar II. Important Points Mughal Emperor Akbar II gave Ram Mohan Roy the title of 'Raja'. He sent Ram Mohan Roy as an ambassador to Britain. He was also known as Akbar Shah II. He was the son of Shah Alam II and the father of Bahadur Shah II. He is credited for starting the Hindu-Muslim unity festival Phool Walon Ki Sair'. Additional Information Aurangzeb He was the Sixth Mughal Emperor. He was also known for his famous title Alamgir. Aurangzeb ruled for 49 years similar to Akbar's reign. He died in 1707, Bhingar, Ahmednagar. Robert Clive First British Governor of the Bengal. He established the military and political supremacy of the Company. He is also known as “Clive of India”. Started the dual system of Government in Bengal. Diwani system means the right to collect revenue was given to the company. Nizamat system means administrative rights were given to nawab. Mahatma Gandhi ​Gandhiji full name Mohandas Karamchand Gandhi. Born on 2 October 1869 in Porbandar. India is celebrating '150 years of the Mahatma'. Mahatma Gandhi is called the Father Of Nation. He played important role in the freedom struggle of India.","markdown":"## Q3.\n\nWho conferred Ram Mohan Roy with the title of 'Raja'?\n\n### Options\n\nA. Aurangzeb\n\nB. Robert Clive\n\nC. Mahatma Gandhi\n\nD. Mughal Emperor Akbar II\n\n**Correct Answer:** D\n\n### Solution\n\nThe correct answer is **Mughal Emperor Akbar II**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* **Mughal Emperor Akbar II** **gave Ram Mohan Roy the title of 'Raja'**.\n* He sent **Ram Mohan Roy as an ambassador to Britain.**\n* He was also known as **Akbar Shah II**.\n* He was the **son of Shah Alam II** and the **father of Bahadur Shah II**.\n* He is credited for starting the **Hindu-Muslim unity** festival **Phool Walon Ki Sair'**.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **Aurangzeb** \n* He was the **Sixth Mughal Emperor**.\n* He was also known for his**famous title Alamgir**.\n* **Aurangzeb ruled for 49 years** similar to Akbar's reign.\n* He **died in 1707**, Bhingar, Ahmednagar.\n* **Robert Clive** \n* **First** British **Governor of the Bengal**.\n* He established the **military and political supremacy of the Company**.\n* He is also known as **“Clive of India”**.\n* Started the **dual system of Government** in Bengal. \n* **Diwani system**means the right to collect revenue was given to the company.\n* **Nizamat system** means administrative rights were given to nawab.\n* **Mahatma Gandhi** \n* **​Gandhiji full name Mohandas Karamchand Gandhi.**\n* **Born** on 2 October 1869**in Porbandar**.\n* India is celebrating '**150 years of the Mahatma**'.\n* Mahatma Gandhi is called the **Father Of Nation**.\n* He played important role in the**freedom struggle of India**.\n\n---\n"},"Hindi":{"qNo":3,"language":"Hindi","questionHTML":"\u003cp\u003eराम मोहन राय को 'राजा' की उपाधि से किसने सम्मानित\u0026nbsp;किया था?\u003c/p\u003e","questionText":"राम मोहन राय को 'राजा' की उपाधि से किसने सम्मानित किया था?","options":[{"label":"A","html":"औरंगजेब","text":"औरंगजेब"},{"label":"B","html":"रॉबर्ट क्लाइव\u0026nbsp;","text":"रॉबर्ट क्लाइव"},{"label":"C","html":"महात्मा गाँधी","text":"महात्मा गाँधी"},{"label":"D","html":"मुगल सम्राट अकबर द्वितीय","text":"मुगल सम्राट अकबर द्वितीय"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eसही उत्तर \u003cu\u003e\u003cstrong\u003eमुगल सम्राट अकबर द्वितीय\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eमुगल सम्राट अकबर द्वितीय ने \u003cstrong\u003eराम मोहन राय को 'राजा' की उपाधि दी।\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003eउन्होंने राम मोहन राय को ब्रिटेन में राजदूत के रूप में भेजा।\u003c/li\u003e\n\t\u003cli\u003eउसे\u0026nbsp;\u003cstrong\u003eअकबर शाह द्वितीय \u003c/strong\u003eके रूप में भी जाना जाता था।\u003c/li\u003e\n\t\u003cli\u003eवह\u003cstrong\u003e शाह आलम द्वितीय का पुत्र \u003c/strong\u003eऔर\u003cstrong\u003e बहादुर शाह द्वितीय का पिता \u003c/strong\u003eथा।\u003c/li\u003e\n\t\u003cli\u003eउसे \u003cstrong\u003eहिंदू-मुस्लिम एकता\u003c/strong\u003e उत्सव \u003cstrong\u003eफूल वालों की सैर\u003c/strong\u003e शुरू करने का श्रेय दिया जाता है।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eऔरंगजेब\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eवह \u003cstrong\u003eछठा मुगल सम्राट \u003c/strong\u003eथा।\u003c/li\u003e\n\t\t\u003cli\u003eउसे उसके \u003cstrong\u003eप्रसिद्ध उपाधि आलमगीर\u003c/strong\u003e के लिए भी जाना जाता था।\u003c/li\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eऔरंगजेब ने \u003c/strong\u003eअकबर के शासनकाल के समान \u003cstrong\u003e49 वर्षों तक शासन किया।\u003c/strong\u003e\u003c/li\u003e\n\t\t\u003cli\u003e\u003cstrong\u003e1707 में\u003c/strong\u003e, अहमदनगर के भिंगार में उसकी \u003cstrong\u003eमृत्यु हो गई।\u003c/strong\u003e\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eरॉबर्ट क्लाइव\u003c/strong\u003e\n\t\u003cul\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eबंगाल\u003c/strong\u003e \u003cstrong\u003eके\u003c/strong\u003e \u003cstrong\u003eपहले ब्रिटिश गवर्नर।\u003c/strong\u003e\u003c/li\u003e\n\t\t\u003cli\u003eउन्होंने \u003cstrong\u003eकंपनी के सैन्य और राजनीतिक वर्चस्व \u003c/strong\u003eकी स्थापना की।\u003c/li\u003e\n\t\t\u003cli\u003eउन्हें\u003cstrong\u003e \"क्लाइव ऑफ इंडिया\" \u003c/strong\u003eके रूप में भी जाना जाता है।\u003c/li\u003e\n\t\t\u003cli\u003eबंगाल में \u003cstrong\u003eसरकार की दोहरी प्रणाली\u003c/strong\u003e शुरू की।\n\t\t\u003cul\u003e\n\t\t\t\u003cli\u003e\u003cstrong\u003eदीवानी प्रणाली\u003c/strong\u003e का अर्थ है कि राजस्व एकत्र करने का अधिकार कंपनी को दिया गया था।\u003c/li\u003e\n\t\t\t\u003cli\u003e\u003cstrong\u003eनिजामत प्रणाली\u003c/strong\u003e का अर्थ है कि नवाब को प्रशासनिक अधिकार दिए गए थे।\u003c/li\u003e\n\t\t\u003c/ul\u003e\n\t\t\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eमहात्मा गांधी\u003c/strong\u003e\n\t\u003cul\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eगांधीजी का पूरा नाम \u003c/strong\u003eमोहनदास करमचंद गांधी था।\u003c/li\u003e\n\t\t\u003cli\u003e2 अक्टूबर 1869 को\u003cstrong\u003e पोरबंदर में जन्म \u003c/strong\u003eहुआ।\u003c/li\u003e\n\t\t\u003cli\u003eभारत\u003cstrong\u003e 'महात्मा के 150 वर्ष'\u003c/strong\u003e मना रहा है।\u003c/li\u003e\n\t\t\u003cli\u003eमहात्मा गांधी को \u003cstrong\u003eराष्ट्रपिता\u003c/strong\u003e कहा जाता है।\u003c/li\u003e\n\t\t\u003cli\u003eउन्होंने \u003cstrong\u003eभारत के स्वतंत्रता संग्राम \u003c/strong\u003eमें महत्वपूर्ण भूमिका निभाई।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर मुगल सम्राट अकबर द्वितीय है। Important Points मुगल सम्राट अकबर द्वितीय ने राम मोहन राय को 'राजा' की उपाधि दी। उन्होंने राम मोहन राय को ब्रिटेन में राजदूत के रूप में भेजा। उसे अकबर शाह द्वितीय के रूप में भी जाना जाता था। वह शाह आलम द्वितीय का पुत्र और बहादुर शाह द्वितीय का पिता था। उसे हिंदू-मुस्लिम एकता उत्सव फूल वालों की सैर शुरू करने का श्रेय दिया जाता है। Additional Information औरंगजेब वह छठा मुगल सम्राट था। उसे उसके प्रसिद्ध उपाधि आलमगीर के लिए भी जाना जाता था। औरंगजेब ने अकबर के शासनकाल के समान 49 वर्षों तक शासन किया। 1707 में, अहमदनगर के भिंगार में उसकी मृत्यु हो गई। रॉबर्ट क्लाइव बंगाल के पहले ब्रिटिश गवर्नर। उन्होंने कंपनी के सैन्य और राजनीतिक वर्चस्व की स्थापना की। उन्हें \"क्लाइव ऑफ इंडिया\" के रूप में भी जाना जाता है। बंगाल में सरकार की दोहरी प्रणाली शुरू की। दीवानी प्रणाली का अर्थ है कि राजस्व एकत्र करने का अधिकार कंपनी को दिया गया था। निजामत प्रणाली का अर्थ है कि नवाब को प्रशासनिक अधिकार दिए गए थे। महात्मा गांधी गांधीजी का पूरा नाम मोहनदास करमचंद गांधी था। 2 अक्टूबर 1869 को पोरबंदर में जन्म हुआ। भारत 'महात्मा के 150 वर्ष' मना रहा है। महात्मा गांधी को राष्ट्रपिता कहा जाता है। उन्होंने भारत के स्वतंत्रता संग्राम में महत्वपूर्ण भूमिका निभाई।","markdown":"## Q3.\n\nराम मोहन राय को 'राजा' की उपाधि से किसने सम्मानित किया था?\n\n### Options\n\nA. औरंगजेब\n\nB. रॉबर्ट क्लाइव\n\nC. महात्मा गाँधी\n\nD. मुगल सम्राट अकबर द्वितीय\n\n**Correct Answer:** D\n\n### Solution\n\nसही उत्तर **मुगल सम्राट अकबर द्वितीय** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* मुगल सम्राट अकबर द्वितीय ने **राम मोहन राय को 'राजा' की उपाधि दी।**\n* उन्होंने राम मोहन राय को ब्रिटेन में राजदूत के रूप में भेजा।\n* उसे **अकबर शाह द्वितीय**के रूप में भी जाना जाता था।\n* वह**शाह आलम द्वितीय का पुत्र**और**बहादुर शाह द्वितीय का पिता**था।\n* उसे **हिंदू-मुस्लिम एकता** उत्सव **फूल वालों की सैर** शुरू करने का श्रेय दिया जाता है।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **औरंगजेब** \n* वह **छठा मुगल सम्राट**था।\n* उसे उसके **प्रसिद्ध उपाधि आलमगीर** के लिए भी जाना जाता था।\n* **औरंगजेब ने**अकबर के शासनकाल के समान **49 वर्षों तक शासन किया।**\n* **1707 में**, अहमदनगर के भिंगार में उसकी **मृत्यु हो गई।**\n* **रॉबर्ट क्लाइव** \n* **बंगाल** **के** **पहले ब्रिटिश गवर्नर।**\n* उन्होंने **कंपनी के सैन्य और राजनीतिक वर्चस्व**की स्थापना की।\n* उन्हें**\"क्लाइव ऑफ इंडिया\"**के रूप में भी जाना जाता है।\n* बंगाल में **सरकार की दोहरी प्रणाली** शुरू की। \n* **दीवानी प्रणाली** का अर्थ है कि राजस्व एकत्र करने का अधिकार कंपनी को दिया गया था।\n* **निजामत प्रणाली** का अर्थ है कि नवाब को प्रशासनिक अधिकार दिए गए थे।\n* **महात्मा गांधी** \n* **गांधीजी का पूरा नाम**मोहनदास करमचंद गांधी था।\n* 2 अक्टूबर 1869 को**पोरबंदर में जन्म**हुआ।\n* भारत**'महात्मा के 150 वर्ष'** मना रहा है।\n* महात्मा गांधी को **राष्ट्रपिता** कहा जाता है।\n* उन्होंने **भारत के स्वतंत्रता संग्राम**में महत्वपूर्ण भूमिका निभाई।\n\n---\n"}}},{"index":4,"qNo":"Question No. 4","languages":{"English":{"qNo":4,"language":"English","questionHTML":"\u003cp\u003eThe 1909 Act was related to?\u003c/p\u003e","questionText":"The 1909 Act was related to?","options":[{"label":"A","html":"The introduction of separate electorate","text":"The introduction of separate electorate"},{"label":"B","html":"Decentralization","text":"Decentralization"},{"label":"C","html":"Diarchy","text":"Diarchy"},{"label":"D","html":"Legislative Council","text":"Legislative Council"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cu\u003e\u003cstrong\u003eThe introduction of separate electorate\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003ePopularly known as \u003cstrong\u003eMorley-Minto Reforms\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eThe \u003cstrong\u003esize of legislative councils\u003c/strong\u003e at the Centre and the provinces increased.\u003c/li\u003e\n\t\u003cli\u003eThis introduced a \u003cstrong\u003eseparate electorate for Muslims\u003c/strong\u003e and elections for the provincial legislative council.\u003c/li\u003e\n\t\u003cli\u003eIntroduced the practice of \u003cstrong\u003ediscussing Budget\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eSatyendra\u0026nbsp;Sinha\u003c/strong\u003e in 1909 became the first member of the Executive council.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eImportant events during Lord Minto\n\t\u003cul\u003e\n\t\t\u003cli\u003e1906: \u003cstrong\u003eEstablishment of Muslim League\u003c/strong\u003e.\u003c/li\u003e\n\t\t\u003cli\u003e1907: \u003cstrong\u003eSurat split\u003c/strong\u003e of Congress.\u003c/li\u003e\n\t\t\u003cli\u003e1909: Grant of \u003cstrong\u003eseparate electorates\u003c/strong\u003e to Muslims.\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is The introduction of separate electorate. Key Points Popularly known as Morley-Minto Reforms. The size of legislative councils at the Centre and the provinces increased. This introduced a separate electorate for Muslims and elections for the provincial legislative council. Introduced the practice of discussing Budget. Satyendra Sinha in 1909 became the first member of the Executive council. Important Points Important events during Lord Minto 1906: Establishment of Muslim League. 1907: Surat split of Congress. 1909: Grant of separate electorates to Muslims.","markdown":"## Q4.\n\nThe 1909 Act was related to?\n\n### Options\n\nA. The introduction of separate electorate\n\nB. Decentralization\n\nC. Diarchy\n\nD. Legislative Council\n\n**Correct Answer:** A\n\n### Solution\n\nThe correct answer is **The introduction of separate electorate**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* Popularly known as **Morley-Minto Reforms**.\n* The **size of legislative councils** at the Centre and the provinces increased.\n* This introduced a **separate electorate for Muslims** and elections for the provincial legislative council.\n* Introduced the practice of **discussing Budget**.\n* **Satyendra Sinha** in 1909 became the first member of the Executive council.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* Important events during Lord Minto \n* 1906: **Establishment of Muslim League**.\n* 1907: **Surat split** of Congress.\n* 1909: Grant of **separate electorates** to Muslims.\n\n---\n"},"Hindi":{"qNo":4,"language":"Hindi","questionHTML":"\u003cp\u003e1909 का अधिनियम किससे\u0026nbsp;संबंधित था?\u003c/p\u003e","questionText":"1909 का अधिनियम किससे संबंधित था?","options":[{"label":"A","html":"अलग निर्वाचक मंडल की शुरूआत","text":"अलग निर्वाचक मंडल की शुरूआत"},{"label":"B","html":"विकेन्द्रीकरण","text":"विकेन्द्रीकरण"},{"label":"C","html":"द्वैध-शासन","text":"द्वैध-शासन"},{"label":"D","html":"विधान \u003cspan style=\"color: rgb(37, 37, 37);  \"\u003eपरिषद\u003c/span\u003e","text":"विधान परिषद"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eसही उत्तर \u003cu\u003e\u003cstrong\u003eअलग निर्वाचक मंडल की शुरूआत\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eइसे\u0026nbsp;लोकप्रिय रूप से \u003cstrong\u003eमॉर्ले-मिंटो सुधार\u003c/strong\u003e के रूप में जाना जाता है।\u003c/li\u003e\n\t\u003cli\u003eकेंद्र और प्रांतों में \u003cstrong\u003eविधान परिषदों का आकार \u003c/strong\u003eबढ़ा।\u003c/li\u003e\n\t\u003cli\u003eइसने \u003cstrong\u003eमुसलमानों के लिए एक अलग निर्वाचक मंडल\u003c/strong\u003e और प्रांतीय विधान परिषद के चुनावों की शुरुआत की।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eबजट पर चर्चा \u003c/strong\u003eकरने की प्रथा की शुरुआत हुई।\u003c/li\u003e\n\t\u003cli\u003e1909 में \u003cstrong\u003eसत्येंद्र सिन्हा\u003c/strong\u003e कार्यकारी परिषद के पहले सदस्य बने।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eलॉर्ड मिंटो के दौरान की महत्वपूर्ण घटनाएँ\n\t\u003cul\u003e\n\t\t\u003cli\u003e1906: \u003cstrong\u003eमुस्लिम लीग की स्थापना।\u003c/strong\u003e\u003c/li\u003e\n\t\t\u003cli\u003e1907: कांग्रेस का \u003cstrong\u003eसूरत विभाजन।\u003c/strong\u003e\u003c/li\u003e\n\t\t\u003cli\u003e1909: मुसलमानों को \u003cstrong\u003eअलग निर्वाचक मंडल\u003c/strong\u003e\u0026nbsp;का अनुदान।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर अलग निर्वाचक मंडल की शुरूआत है। Key Points इसे लोकप्रिय रूप से मॉर्ले-मिंटो सुधार के रूप में जाना जाता है। केंद्र और प्रांतों में विधान परिषदों का आकार बढ़ा। इसने मुसलमानों के लिए एक अलग निर्वाचक मंडल और प्रांतीय विधान परिषद के चुनावों की शुरुआत की। बजट पर चर्चा करने की प्रथा की शुरुआत हुई। 1909 में सत्येंद्र सिन्हा कार्यकारी परिषद के पहले सदस्य बने। Important Points लॉर्ड मिंटो के दौरान की महत्वपूर्ण घटनाएँ 1906: मुस्लिम लीग की स्थापना। 1907: कांग्रेस का सूरत विभाजन। 1909: मुसलमानों को अलग निर्वाचक मंडल का अनुदान।","markdown":"## Q4.\n\n1909 का अधिनियम किससे संबंधित था?\n\n### Options\n\nA. अलग निर्वाचक मंडल की शुरूआत\n\nB. विकेन्द्रीकरण\n\nC. द्वैध-शासन\n\nD. विधान परिषद\n\n**Correct Answer:** A\n\n### Solution\n\nसही उत्तर **अलग निर्वाचक मंडल की शुरूआत** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* इसे लोकप्रिय रूप से **मॉर्ले-मिंटो सुधार** के रूप में जाना जाता है।\n* केंद्र और प्रांतों में **विधान परिषदों का आकार**बढ़ा।\n* इसने **मुसलमानों के लिए एक अलग निर्वाचक मंडल** और प्रांतीय विधान परिषद के चुनावों की शुरुआत की।\n* **बजट पर चर्चा**करने की प्रथा की शुरुआत हुई।\n* 1909 में **सत्येंद्र सिन्हा** कार्यकारी परिषद के पहले सदस्य बने।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* लॉर्ड मिंटो के दौरान की महत्वपूर्ण घटनाएँ \n* 1906: **मुस्लिम लीग की स्थापना।**\n* 1907: कांग्रेस का **सूरत विभाजन।**\n* 1909: मुसलमानों को **अलग निर्वाचक मंडल** का अनुदान।\n\n---\n"}}},{"index":5,"qNo":"Question No. 5","languages":{"English":{"qNo":5,"language":"English","questionHTML":"\u003cp\u003eWho was defeated by Muhammad Ghori in the Battle of Chandavar in 1194?\u003c/p\u003e","questionText":"Who was defeated by Muhammad Ghori in the Battle of Chandavar in 1194?","options":[{"label":"A","html":"Kumarpal","text":"Kumarpal"},{"label":"B","html":"Jaychand","text":"Jaychand"},{"label":"C","html":"Govindaraj","text":"Govindaraj"},{"label":"D","html":"Bhima II","text":"Bhima II"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003eJaychand\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eMuhammad \u003cstrong\u003eGhori defeated the Jaychand \u003c/strong\u003ein the battle of Chandavar.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eThe Battle of Chandavar \u003c/strong\u003ewas fought in 1194, at Chandavar.\u003c/li\u003e\n\t\u003cli\u003eChandavar is \u003cstrong\u003esituated on the bank of the Yamuna River\u003c/strong\u003e\u0026nbsp;of the present-day Ferozabad district.\u0026nbsp;\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eKing Jaychandra was the \u003cstrong\u003eruler of Kannuj\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eJaychand was from the \u003cstrong\u003eGahadavala dynasty\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eDuring the war, Jaychandra \u003cstrong\u003efell off from his elephant and died\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Jaychand. Important Points Muhammad Ghori defeated the Jaychand in the battle of Chandavar. The Battle of Chandavar was fought in 1194, at Chandavar. Chandavar is situated on the bank of the Yamuna River of the present-day Ferozabad district. Additional Information King Jaychandra was the ruler of Kannuj. Jaychand was from the Gahadavala dynasty. During the war, Jaychandra fell off from his elephant and died.","markdown":"## Q5.\n\nWho was defeated by Muhammad Ghori in the Battle of Chandavar in 1194?\n\n### Options\n\nA. Kumarpal\n\nB. Jaychand\n\nC. Govindaraj\n\nD. Bhima II\n\n**Correct Answer:** B\n\n### Solution\n\nThe correct answer is **Jaychand**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* Muhammad **Ghori defeated the Jaychand**in the battle of Chandavar.\n* **The Battle of Chandavar**was fought in 1194, at Chandavar.\n* Chandavar is **situated on the bank of the Yamuna River** of the present-day Ferozabad district.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* King Jaychandra was the **ruler of Kannuj**.\n* Jaychand was from the **Gahadavala dynasty**.\n* During the war, Jaychandra **fell off from his elephant and died**.\n\n---\n"},"Hindi":{"qNo":5,"language":"Hindi","questionHTML":"\u003cp\u003e1194 के चन्दावर के युद्ध में मुहम्मद गोरी ने किसे हराया था?\u003c/p\u003e","questionText":"1194 के चन्दावर के युद्ध में मुहम्मद गोरी ने किसे हराया था?","options":[{"label":"A","html":"कुमारपाल","text":"कुमारपाल"},{"label":"B","html":"​जयचन्द","text":"​जयचन्द"},{"label":"C","html":"गोविन्दराज","text":"गोविन्दराज"},{"label":"D","html":"भीम द्वितीय","text":"भीम द्वितीय"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eसही उत्तर ​\u003cu\u003e\u003cstrong\u003eजयचन्द\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eचंदावर के युद्ध में मुहम्मद \u003cstrong\u003eगोरी ने जयचंद को हराया।\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eचंदावर का युद्ध\u003c/strong\u003e 1194 में चंदावर में लड़ा गया था।\u003c/li\u003e\n\t\u003cli\u003eचंदावर वर्तमान फ़िरोज़ाबाद जिले की\u003cstrong\u003e यमुना नदी के तट पर स्थित\u003c/strong\u003e है।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eराजा ​जयचन्द \u003cstrong\u003eकन्नौज के शासक\u003c/strong\u003e थे।\u003c/li\u003e\n\t\u003cli\u003eजयचंद \u003cstrong\u003eगढ़वाल वंश\u003c/strong\u003e से थे।\u003c/li\u003e\n\t\u003cli\u003eयुद्ध के दौरान, जयचन्द \u003cstrong\u003eअपने हाथी से गिर गये और उनकी मृत्यु हुई।\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर ​जयचन्द है। Important Points चंदावर के युद्ध में मुहम्मद गोरी ने जयचंद को हराया। चंदावर का युद्ध 1194 में चंदावर में लड़ा गया था। चंदावर वर्तमान फ़िरोज़ाबाद जिले की यमुना नदी के तट पर स्थित है। Additional Information राजा ​जयचन्द कन्नौज के शासक थे। जयचंद गढ़वाल वंश से थे। युद्ध के दौरान, जयचन्द अपने हाथी से गिर गये और उनकी मृत्यु हुई।","markdown":"## Q5.\n\n1194 के चन्दावर के युद्ध में मुहम्मद गोरी ने किसे हराया था?\n\n### Options\n\nA. कुमारपाल\n\nB. ​जयचन्द\n\nC. गोविन्दराज\n\nD. भीम द्वितीय\n\n**Correct Answer:** B\n\n### Solution\n\nसही उत्तर ​**जयचन्द** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* चंदावर के युद्ध में मुहम्मद **गोरी ने जयचंद को हराया।**\n* **चंदावर का युद्ध** 1194 में चंदावर में लड़ा गया था।\n* चंदावर वर्तमान फ़िरोज़ाबाद जिले की**यमुना नदी के तट पर स्थित** है।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* राजा ​जयचन्द **कन्नौज के शासक** थे।\n* जयचंद **गढ़वाल वंश** से थे।\n* युद्ध के दौरान, जयचन्द **अपने हाथी से गिर गये और उनकी मृत्यु हुई।**\n\n---\n"}}},{"index":6,"qNo":"Question No. 6","languages":{"English":{"qNo":6,"language":"English","questionHTML":"\u003cp\u003eWhich dynasty of Delhi Sultanate ruled for the shortest time?\u003c/p\u003e","questionText":"Which dynasty of Delhi Sultanate ruled for the shortest time?","options":[{"label":"A","html":"Khilji","text":"Khilji"},{"label":"B","html":"Tughlaq","text":"Tughlaq"},{"label":"C","html":"Sayyid","text":"Sayyid"},{"label":"D","html":"Lodi","text":"Lodi"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cu\u003e\u003cstrong\u003eKhilji\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003ctable border=\"1\" cellpadding=\"1\" cellspacing=\"1\" style=\"width: 350px;\"\u003e\n\t\u003ctbody\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003e\u003cstrong\u003eDynasty\u003c/strong\u003e\u003c/td\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003e\u003cstrong\u003eRuled\u003c/strong\u003e\u003c/td\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003e\u003cstrong\u003eYear\u003c/strong\u003e\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003eSlave Dynasty\u003c/td\u003e\n\t\t\t\u003ctd\u003e1206-1290\u003c/td\u003e\n\t\t\t\u003ctd\u003e84\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003e\u003cstrong\u003eKhilji Dynasty\u003c/strong\u003e\u003c/td\u003e\n\t\t\t\u003ctd\u003e\u003cstrong\u003e1290-1320\u003c/strong\u003e\u003c/td\u003e\n\t\t\t\u003ctd\u003e\u003cstrong\u003e30\u003c/strong\u003e\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003eTughlaq Dynasty\u003c/td\u003e\n\t\t\t\u003ctd\u003e1320-1414\u003c/td\u003e\n\t\t\t\u003ctd\u003e94\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003eSayyid Dynasty\u003c/td\u003e\n\t\t\t\u003ctd\u003e1414-1450\u003c/td\u003e\n\t\t\t\u003ctd\u003e36\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003e\u003cspan style=\"\"\u003eLodhi dynasty\u003c/span\u003e\u003c/td\u003e\n\t\t\t\u003ctd\u003e\u003cspan style=\"\"\u003e1451 to 1526\u003c/span\u003e\u003c/td\u003e\n\t\t\t\u003ctd\u003e75\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\u003c/tbody\u003e\n\u003c/table\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u0026nbsp;Hence the Khilji Dynasty ruled for the shortest.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eLodhi dynasty from 1451 to 1526 AD (75 Year).\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eLongest duration\u003c/strong\u003e-Tughlaq Dynasty.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eShortest duration\u003c/strong\u003e-Khilji Dynasty.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Khilji. Important Points Dynasty Ruled Year Slave Dynasty 1206-1290 84 Khilji Dynasty 1290-1320 30 Tughlaq Dynasty 1320-1414 94 Sayyid Dynasty 1414-1450 36 Lodhi dynasty 1451 to 1526 75 Hence the Khilji Dynasty ruled for the shortest. Additional Information Lodhi dynasty from 1451 to 1526 AD (75 Year). Longest duration-Tughlaq Dynasty. Shortest duration-Khilji Dynasty.","markdown":"## Q6.\n\nWhich dynasty of Delhi Sultanate ruled for the shortest time?\n\n### Options\n\nA. Khilji\n\nB. Tughlaq\n\nC. Sayyid\n\nD. Lodi\n\n**Correct Answer:** A\n\n### Solution\n\nThe correct answer is **Khilji**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n\n| Dynasty | Ruled | Year |\n| --- | --- | --- |\n| Slave Dynasty | 1206-1290 | 84 |\n| Khilji Dynasty | 1290-1320 | 30 |\n| Tughlaq Dynasty | 1320-1414 | 94 |\n| Sayyid Dynasty | 1414-1450 | 36 |\n| Lodhi dynasty | 1451 to 1526 | 75 |\n\n \n* Hence the Khilji Dynasty ruled for the shortest.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* Lodhi dynasty from 1451 to 1526 AD (75 Year).\n* **Longest duration**-Tughlaq Dynasty.\n* **Shortest duration**-Khilji Dynasty.\n\n---\n"},"Hindi":{"qNo":6,"language":"Hindi","questionHTML":"\u003cp\u003eदिल्ली सल्तनत के किस वंश ने सबसे कम समय तक शासन किया है?\u003c/p\u003e","questionText":"दिल्ली सल्तनत के किस वंश ने सबसे कम समय तक शासन किया है?","options":[{"label":"A","html":"खिलजी","text":"खिलजी"},{"label":"B","html":"तुगलक","text":"तुगलक"},{"label":"C","html":"सैय्यद","text":"सैय्यद"},{"label":"D","html":"लोदी","text":"लोदी"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eसही उत्तर \u003cu\u003e\u003cstrong\u003eखिल्जी\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e \u003c/span\u003e\u003c/p\u003e\n\n\u003ctable border=\"1\" cellpadding=\"1\" cellspacing=\"1\" style=\"width: 350px;\"\u003e\n\t\u003ctbody\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003e\u003cstrong\u003eवंश\u003c/strong\u003e\u003c/td\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003e\u003cstrong\u003eशासन\u003c/strong\u003e\u003c/td\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003e\u003cstrong\u003eवर्ष\u003c/strong\u003e\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003eगुलाम वंश\u003c/td\u003e\n\t\t\t\u003ctd\u003e1206-1290\u003c/td\u003e\n\t\t\t\u003ctd\u003e84\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003e\u003cstrong\u003eखिल्जी वंश\u003c/strong\u003e\u003c/td\u003e\n\t\t\t\u003ctd\u003e\u003cstrong\u003e1290-1320\u003c/strong\u003e\u003c/td\u003e\n\t\t\t\u003ctd\u003e\u003cstrong\u003e30\u003c/strong\u003e\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003eतुगलक वंश\u003c/td\u003e\n\t\t\t\u003ctd\u003e1320-1414\u003c/td\u003e\n\t\t\t\u003ctd\u003e94\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003eसैय्यद वंश\u003c/td\u003e\n\t\t\t\u003ctd\u003e1414-1450\u003c/td\u003e\n\t\t\t\u003ctd\u003e36\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\u003c/tbody\u003e\n\u003c/table\u003e\n\n\u003cp\u003eअतः खिलजी वंश ने सबसे कम समय तक शासन किया।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cp\u003e1451 से 1526 ई (75 वर्ष) तक लोधी वंश।\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eसबसे लंबी अवधि\u003c/strong\u003e-तुगलक वंश।\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eसबसे कम अवधि\u003c/strong\u003e-खिल्जी वंश।\u003c/p\u003e","solutionText":"सही उत्तर खिल्जी है। Important Points वंश शासन वर्ष गुलाम वंश 1206-1290 84 खिल्जी वंश 1290-1320 30 तुगलक वंश 1320-1414 94 सैय्यद वंश 1414-1450 36 अतः खिलजी वंश ने सबसे कम समय तक शासन किया। Additional Information 1451 से 1526 ई (75 वर्ष) तक लोधी वंश। सबसे लंबी अवधि-तुगलक वंश। सबसे कम अवधि-खिल्जी वंश।","markdown":"## Q6.\n\nदिल्ली सल्तनत के किस वंश ने सबसे कम समय तक शासन किया है?\n\n### Options\n\nA. खिलजी\n\nB. तुगलक\n\nC. सैय्यद\n\nD. लोदी\n\n**Correct Answer:** A\n\n### Solution\n\nसही उत्तर **खिल्जी** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n\n| वंश | शासन | वर्ष |\n| --- | --- | --- |\n| गुलाम वंश | 1206-1290 | 84 |\n| खिल्जी वंश | 1290-1320 | 30 |\n| तुगलक वंश | 1320-1414 | 94 |\n| सैय्यद वंश | 1414-1450 | 36 |\n\n \n\nअतः खिलजी वंश ने सबसे कम समय तक शासन किया।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n\n1451 से 1526 ई (75 वर्ष) तक लोधी वंश।\n\n \n\n**सबसे लंबी अवधि**-तुगलक वंश।\n\n \n\n**सबसे कम अवधि**-खिल्जी वंश।\n\n---\n"}}},{"index":7,"qNo":"Question No. 7","languages":{"English":{"qNo":7,"language":"English","questionHTML":"\u003cp\u003e______ was an important event in the Viceroy's era of Lord Dufferin?\u003c/p\u003e","questionText":"______ was an important event in the Viceroy's era of Lord Dufferin?","options":[{"label":"A","html":"Establishment of Ramakrishna Mission","text":"Establishment of Ramakrishna Mission"},{"label":"B","html":"Establishment of Muslim League in Dhaka","text":"Establishment of Muslim League in Dhaka"},{"label":"C","html":"Establishment of Indian National Congress","text":"Establishment of Indian National Congress"},{"label":"D","html":"Start of first census","text":"Start of first census"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cu\u003e\u003cstrong\u003eEstablishment of Indian National Congress\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eIndian National Congress\u003c/strong\u003e, a major event of the tenure of Viceroy Lord Dufferin.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eTenure of Lord Dufferin1884-1888\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eIndian National\u0026nbsp;Congress was\u0026nbsp;\u003cstrong\u003eestablished in 1885\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eDuring Lord Dufferin's tenure, following things took place -\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eBengal Tenancy Act\u003c/strong\u003e, 1885.\u003c/li\u003e\n\t\t\u003cli\u003eThird \u003cstrong\u003eBurmese War\u003c/strong\u003e and annexation of Burma (1885).\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\n\u003cp\u003e\u0026nbsp;\u003cimg alt=\"\" src=\"//storage.googleapis.com/tb-img/production/20/12/Lord_Dufferin.png\" style=\"width: 220px; height: 274px;\"\u003e\u003c/p\u003e","solutionText":"The correct answer is Establishment of Indian National Congress. Important Points Indian National Congress, a major event of the tenure of Viceroy Lord Dufferin. Tenure of Lord Dufferin1884-1888. Indian National Congress was established in 1885. Additional Information During Lord Dufferin's tenure, following things took place - Bengal Tenancy Act, 1885. Third Burmese War and annexation of Burma (1885).","markdown":"## Q7.\n\n______ was an important event in the Viceroy's era of Lord Dufferin?\n\n### Options\n\nA. Establishment of Ramakrishna Mission\n\nB. Establishment of Muslim League in Dhaka\n\nC. Establishment of Indian National Congress\n\nD. Start of first census\n\n**Correct Answer:** C\n\n### Solution\n\nThe correct answer is **Establishment of Indian National Congress**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* **Indian National Congress**, a major event of the tenure of Viceroy Lord Dufferin.\n* **Tenure of Lord Dufferin1884-1888**.\n* Indian National Congress was **established in 1885**.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **During Lord Dufferin's tenure, following things took place -** \n* **Bengal Tenancy Act**, 1885.\n* Third **Burmese War** and annexation of Burma (1885).\n  \n\n![](//storage.googleapis.com/tb-img/production/20/12/Lord_Dufferin.png)\n\n---\n"},"Hindi":{"qNo":7,"language":"Hindi","questionHTML":"\u003cdiv class=\"gtx-body\" style=\"display: inline;  margin: 5px auto; padding: 5px 0px; \"\u003e______\u0026nbsp;वायसराय लॉर्ड डफ़रिन के\u0026nbsp;युग में एक महत्वपूर्ण घटना थी।\u003c/div\u003e","questionText":"______ वायसराय लॉर्ड डफ़रिन के युग में एक महत्वपूर्ण घटना थी।","options":[{"label":"A","html":"रामकृष्ण मिशन की स्थापना","text":"रामकृष्ण मिशन की स्थापना"},{"label":"B","html":"ढाका में मुस्लिम लीग की स्थापना","text":"ढाका में मुस्लिम लीग की स्थापना"},{"label":"C","html":"भारतीय राष्ट्रीय कांग्रेस की स्थापना","text":"भारतीय राष्ट्रीय कांग्रेस की स्थापना"},{"label":"D","html":"प्रथम जनगणना की शुरुआत","text":"प्रथम जनगणना की शुरुआत"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eसही उत्तर \u003cu\u003e\u003cstrong\u003eभारतीय राष्ट्रीय कांग्रेस की स्थापना\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eभारतीय राष्ट्रीय कांग्रेस,\u003c/strong\u003e वायसराय लॉर्ड डफरिन के कार्यकाल की एक प्रमुख घटना है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eलॉर्ड डफ़रिन का कार्यकाल - 1884-1888\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003eभारतीय राष्ट्रीय कांग्रेस की \u003cstrong\u003eस्थापना 1885\u003c/strong\u003e में हुई थी।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eलॉर्ड डफरिन के कार्यकाल के दौरान, निम्नलिखित घटनाएं हुईं​ -\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eबंगाल काश्तकारी अधिनियम\u003c/strong\u003e, 1885\u003c/li\u003e\n\t\t\u003cli\u003eतीसरा \u003cstrong\u003eबर्मी युद्ध\u003c/strong\u003e और बर्मा का संयोजन (1885).\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\n\u003cp\u003e\u0026nbsp;\u003cimg alt=\"\" src=\"//storage.googleapis.com/tb-img/production/20/12/Lord_Dufferin.png\" style=\"width: 220px; height: 274px;\"\u003e\u003c/p\u003e","solutionText":"सही उत्तर भारतीय राष्ट्रीय कांग्रेस की स्थापना है। Important Points भारतीय राष्ट्रीय कांग्रेस, वायसराय लॉर्ड डफरिन के कार्यकाल की एक प्रमुख घटना है। लॉर्ड डफ़रिन का कार्यकाल - 1884-1888 भारतीय राष्ट्रीय कांग्रेस की स्थापना 1885 में हुई थी। Additional Information लॉर्ड डफरिन के कार्यकाल के दौरान, निम्नलिखित घटनाएं हुईं​ - बंगाल काश्तकारी अधिनियम, 1885 तीसरा बर्मी युद्ध और बर्मा का संयोजन (1885).","markdown":"## Q7.\n\n______ वायसराय लॉर्ड डफ़रिन के युग में एक महत्वपूर्ण घटना थी।\n\n### Options\n\nA. रामकृष्ण मिशन की स्थापना\n\nB. ढाका में मुस्लिम लीग की स्थापना\n\nC. भारतीय राष्ट्रीय कांग्रेस की स्थापना\n\nD. प्रथम जनगणना की शुरुआत\n\n**Correct Answer:** C\n\n### Solution\n\nसही उत्तर **भारतीय राष्ट्रीय कांग्रेस की स्थापना** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* **भारतीय राष्ट्रीय कांग्रेस,** वायसराय लॉर्ड डफरिन के कार्यकाल की एक प्रमुख घटना है।\n* **लॉर्ड डफ़रिन का कार्यकाल - 1884-1888**\n* भारतीय राष्ट्रीय कांग्रेस की **स्थापना 1885** में हुई थी।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **लॉर्ड डफरिन के कार्यकाल के दौरान, निम्नलिखित घटनाएं हुईं​ -** \n* **बंगाल काश्तकारी अधिनियम**, 1885\n* तीसरा **बर्मी युद्ध** और बर्मा का संयोजन (1885).\n  \n\n![](//storage.googleapis.com/tb-img/production/20/12/Lord_Dufferin.png)\n\n---\n"}}},{"index":8,"qNo":"Question No. 8","languages":{"English":{"qNo":8,"language":"English","questionHTML":"\u003cp\u003eWho was the youngest person to become the President of the Indian National Congress?\u003c/p\u003e","questionText":"Who was the youngest person to become the President of the Indian National Congress?","options":[{"label":"A","html":"Jawahar Lal Nehru","text":"Jawahar Lal Nehru"},{"label":"B","html":"Abul Kalam Azad","text":"Abul Kalam Azad"},{"label":"C","html":"Anand Mohan Bose","text":"Anand Mohan Bose"},{"label":"D","html":"Bhupendra Nath Bose","text":"Bhupendra Nath Bose"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cu\u003e\u003cstrong\u003eAbul Kalam Azad\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eMaulana Abul Kalam Azad\u003c/strong\u003e\u0026nbsp;was made president in the special session of the Indian National Congress held in \u003cstrong\u003eDelhi in 1923\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eHe was the \u003cstrong\u003eyoungest person (35\u0026nbsp;years old)\u003c/strong\u003e to hold the post of the President's post of the Indian National Congress.\u003c/li\u003e\n\t\u003cli\u003eAbul Kalam Azad was the President of the Indian National Congress for \u003cstrong\u003esix consecutive years\u003c/strong\u003e from 1940 – 1946.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u0026nbsp;\u003cspan style=\"font-weight: 700;\"\u003eMaulana Abul Kalam Azad\u003c/span\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003e\u003cspan style=\"font-weight: 700;\"\u003e​Born on 11th November\u0026nbsp;\u003c/span\u003e\u003cstrong\u003e1888\u003c/strong\u003e in Mecca, Saudi-Arabia.\u003c/li\u003e\n\t\t\u003cli\u003eWrote \u003cstrong\u003eweekly journals\u0026nbsp;Al-Hilal and Al-Balagh\u003c/strong\u003e.\u003c/li\u003e\n\t\t\u003cli\u003eFamously called\u0026nbsp;\u003cstrong\u003eCongress Showboy\u003c/strong\u003e.\u003c/li\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eParticipated\u003c/strong\u003e in the Non-Cooperation Movement, the Quit India movement, etc.\u003c/li\u003e\n\t\t\u003cli\u003eHe was \u003cstrong\u003eFirst Education Minister\u003c/strong\u003e.\u003c/li\u003e\n\t\t\u003cli\u003eHis birth anniversary is celebrated as \u003cstrong\u003eNational Education Day(11th November)\u003c/strong\u003e.\u003c/li\u003e\n\t\t\u003cli\u003e\u003cspan style=\"color: rgb(71, 71, 71);   background-color: rgb(245, 245, 245);\"\u003eP\u003c/span\u003eosthumously awarded\u0026nbsp;\u003cstrong\u003eBharat Ratna in 1992\u003c/strong\u003e.\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Abul Kalam Azad. Important Points Maulana Abul Kalam Azad was made president in the special session of the Indian National Congress held in Delhi in 1923. He was the youngest person (35 years old) to hold the post of the President's post of the Indian National Congress. Abul Kalam Azad was the President of the Indian National Congress for six consecutive years from 1940 – 1946. Additional Information Maulana Abul Kalam Azad ​Born on 11th November 1888 in Mecca, Saudi-Arabia. Wrote weekly journals Al-Hilal and Al-Balagh. Famously called Congress Showboy. Participated in the Non-Cooperation Movement, the Quit India movement, etc. He was First Education Minister. His birth anniversary is celebrated as National Education Day(11th November). Posthumously awarded Bharat Ratna in 1992.","markdown":"## Q8.\n\nWho was the youngest person to become the President of the Indian National Congress?\n\n### Options\n\nA. Jawahar Lal Nehru\n\nB. Abul Kalam Azad\n\nC. Anand Mohan Bose\n\nD. Bhupendra Nath Bose\n\n**Correct Answer:** B\n\n### Solution\n\nThe correct answer is **Abul Kalam Azad**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* **Maulana Abul Kalam Azad** was made president in the special session of the Indian National Congress held in **Delhi in 1923**.\n* He was the **youngest person (35 years old)** to hold the post of the President's post of the Indian National Congress.\n* Abul Kalam Azad was the President of the Indian National Congress for **six consecutive years** from 1940 – 1946.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* Maulana Abul Kalam Azad \n* ​Born on 11th November **1888** in Mecca, Saudi-Arabia.\n* Wrote **weekly journals Al-Hilal and Al-Balagh**.\n* Famously called **Congress Showboy**.\n* **Participated** in the Non-Cooperation Movement, the Quit India movement, etc.\n* He was **First Education Minister**.\n* His birth anniversary is celebrated as **National Education Day(11th November)**.\n* Posthumously awarded **Bharat Ratna in 1992**.\n\n---\n"},"Hindi":{"qNo":8,"language":"Hindi","questionHTML":"\u003cp\u003e\u0026nbsp;भारतीय राष्ट्रीय कांग्रेस के अध्यक्ष बनने वाले सबसे कम आयु के व्यक्ति कौन थे?\u003c/p\u003e","questionText":"भारतीय राष्ट्रीय कांग्रेस के अध्यक्ष बनने वाले सबसे कम आयु के व्यक्ति कौन थे?","options":[{"label":"A","html":"जवाहरलाल नेहरू","text":"जवाहरलाल नेहरू"},{"label":"B","html":"अबुल कलाम आज़ाद","text":"अबुल कलाम आज़ाद"},{"label":"C","html":"आनन्द मोहन बोस","text":"आनन्द मोहन बोस"},{"label":"D","html":"भूपेन्द्र नाथ बोस\u0026nbsp;","text":"भूपेन्द्र नाथ बोस"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eअबुल कलाम आज़ाद\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003e1923 में दिल्ली \u003c/strong\u003eमें आयोजित भारतीय राष्ट्रीय कांग्रेस के विशेष अधिवेशन में \u003cstrong\u003eमौलाना अबुल कलाम आज़ाद\u003c/strong\u003e को अध्यक्ष बनाया गया था।\u003c/li\u003e\n\t\u003cli\u003eवह भारतीय राष्ट्रीय कांग्रेस के अध्यक्ष पद को संभालने वाले\u003cstrong\u003e सबसे कम आयु (35 वर्ष) \u003c/strong\u003eके व्यक्ति थे।\u003c/li\u003e\n\t\u003cli\u003eअबुल कलाम आज़ाद 1940 - 1946 से\u003cstrong\u003e लगातार छह वर्षों\u003c/strong\u003e तक भारतीय राष्ट्रीय कांग्रेस के अध्यक्ष रहे।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eमौलाना अबुल कलाम आज़ाद\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003e\u003cstrong\u003e11 नवंबर 1888 \u003c/strong\u003eको सऊदी अरब के मक्का में उनका\u003cstrong\u003e जन्म\u003c/strong\u003e हुआ।\u003c/li\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eसाप्ताहिक पत्र अल-हिलाल और अल-बालघ\u003c/strong\u003e लिखा।\u003c/li\u003e\n\t\t\u003cli\u003eउन्हें\u0026nbsp;लोकप्रिय रूप से \u003cstrong\u003eकांग्रेस का शोबॉय \u003c/strong\u003eकहा जाता था।\u003c/li\u003e\n\t\t\u003cli\u003eअसहयोग आंदोलन, भारत छोड़ो आंदोलन आदि में \u003cstrong\u003eभाग लिया।\u003c/strong\u003e\u003c/li\u003e\n\t\t\u003cli\u003eवे \u003cstrong\u003eपहले शिक्षा मंत्री \u003c/strong\u003eथे।\u003c/li\u003e\n\t\t\u003cli\u003eउनकी जयंती को \u003cstrong\u003eराष्ट्रीय शिक्षा दिवस (11 नवंबर) \u003c/strong\u003eके रूप में मनाया जाता है।\u003c/li\u003e\n\t\t\u003cli\u003e\u003cstrong\u003e1992 में \u003c/strong\u003eमरणोपरांत \u003cstrong\u003eभारत रत्न \u003c/strong\u003eसे सम्मानित किया गया।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर अबुल कलाम आज़ाद है। Important Points 1923 में दिल्ली में आयोजित भारतीय राष्ट्रीय कांग्रेस के विशेष अधिवेशन में मौलाना अबुल कलाम आज़ाद को अध्यक्ष बनाया गया था। वह भारतीय राष्ट्रीय कांग्रेस के अध्यक्ष पद को संभालने वाले सबसे कम आयु (35 वर्ष) के व्यक्ति थे। अबुल कलाम आज़ाद 1940 - 1946 से लगातार छह वर्षों तक भारतीय राष्ट्रीय कांग्रेस के अध्यक्ष रहे। Additional Information मौलाना अबुल कलाम आज़ाद 11 नवंबर 1888 को सऊदी अरब के मक्का में उनका जन्म हुआ। साप्ताहिक पत्र अल-हिलाल और अल-बालघ लिखा। उन्हें लोकप्रिय रूप से कांग्रेस का शोबॉय कहा जाता था। असहयोग आंदोलन, भारत छोड़ो आंदोलन आदि में भाग लिया। वे पहले शिक्षा मंत्री थे। उनकी जयंती को राष्ट्रीय शिक्षा दिवस (11 नवंबर) के रूप में मनाया जाता है। 1992 में मरणोपरांत भारत रत्न से सम्मानित किया गया।","markdown":"## Q8.\n\nभारतीय राष्ट्रीय कांग्रेस के अध्यक्ष बनने वाले सबसे कम आयु के व्यक्ति कौन थे?\n\n### Options\n\nA. जवाहरलाल नेहरू\n\nB. अबुल कलाम आज़ाद\n\nC. आनन्द मोहन बोस\n\nD. भूपेन्द्र नाथ बोस\n\n**Correct Answer:** B\n\n### Solution\n\nसही उत्तर **अबुल कलाम आज़ाद** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* **1923 में दिल्ली**में आयोजित भारतीय राष्ट्रीय कांग्रेस के विशेष अधिवेशन में **मौलाना अबुल कलाम आज़ाद** को अध्यक्ष बनाया गया था।\n* वह भारतीय राष्ट्रीय कांग्रेस के अध्यक्ष पद को संभालने वाले**सबसे कम आयु (35 वर्ष)**के व्यक्ति थे।\n* अबुल कलाम आज़ाद 1940 - 1946 से**लगातार छह वर्षों** तक भारतीय राष्ट्रीय कांग्रेस के अध्यक्ष रहे।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **मौलाना अबुल कलाम आज़ाद** \n* **11 नवंबर 1888**को सऊदी अरब के मक्का में उनका**जन्म** हुआ।\n* **साप्ताहिक पत्र अल-हिलाल और अल-बालघ** लिखा।\n* उन्हें लोकप्रिय रूप से **कांग्रेस का शोबॉय**कहा जाता था।\n* असहयोग आंदोलन, भारत छोड़ो आंदोलन आदि में **भाग लिया।**\n* वे **पहले शिक्षा मंत्री**थे।\n* उनकी जयंती को **राष्ट्रीय शिक्षा दिवस (11 नवंबर)**के रूप में मनाया जाता है।\n* **1992 में**मरणोपरांत **भारत रत्न**से सम्मानित किया गया।\n\n---\n"}}},{"index":9,"qNo":"Question No. 9","languages":{"English":{"qNo":9,"language":"English","questionHTML":"\u003cp\u003eIn which year did the census begin in India in a regular and scientific manner?\u003c/p\u003e","questionText":"In which year did the census begin in India in a regular and scientific manner?","options":[{"label":"A","html":"1861","text":"1861"},{"label":"B","html":"1871","text":"1871"},{"label":"C","html":"1881","text":"1881"},{"label":"D","html":"1891","text":"1891"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cstrong\u003e\u003cu\u003e1881\u003c/u\u003e\u003c/strong\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eInitially, the census \u003cstrong\u003estarted in India in 1872\u003c/strong\u003e during Governor Generalship of Lord Mayo, but it\u0026nbsp;was done in a \u003cstrong\u003enon-scientific\u0026nbsp;manner\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003e\u0026nbsp;The \u003cu\u003e\u003cstrong\u003efirst systematic census in a scientific manner\u003c/strong\u003e\u003c/u\u003e\u0026nbsp;was started in \u003cstrong\u003e1881 AD\u003c/strong\u003e during the reign of \u003cstrong\u003eLord Ripon\u003c/strong\u003e.\u0026nbsp;\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eCensus in India conducted by the \u003cstrong\u003eRegistrar General\u003c/strong\u003e and Census Commissioner of India.\u003c/li\u003e\n\t\u003cli\u003eUnder the \u003cstrong\u003eMinistry of Home Affairs\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eCensus conducted in \u003cstrong\u003egap period of 10 years\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eCensus in India has been conducted \u003cstrong\u003e15 times till 2011\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eThe 2021 Census of India, also the 16th Indian Census, has been postponed till October 2023, at least.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is 1881. Important Points Initially, the census started in India in 1872 during Governor Generalship of Lord Mayo, but it was done in a non-scientific manner. The first systematic census in a scientific manner was started in 1881 AD during the reign of Lord Ripon. Additional Information Census in India conducted by the Registrar General and Census Commissioner of India. Under the Ministry of Home Affairs. Census conducted in gap period of 10 years. Census in India has been conducted 15 times till 2011. The 2021 Census of India, also the 16th Indian Census, has been postponed till October 2023, at least.","markdown":"## Q9.\n\nIn which year did the census begin in India in a regular and scientific manner?\n\n### Options\n\nA. 1861\n\nB. 1871\n\nC. 1881\n\nD. 1891\n\n**Correct Answer:** C\n\n### Solution\n\nThe correct answer is **1881**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* Initially, the census **started in India in 1872** during Governor Generalship of Lord Mayo, but it was done in a **non-scientific manner**.\n* The **first systematic census in a scientific manner** was started in **1881 AD** during the reign of **Lord Ripon**.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* Census in India conducted by the **Registrar General** and Census Commissioner of India.\n* Under the **Ministry of Home Affairs**.\n* Census conducted in **gap period of 10 years**.\n* Census in India has been conducted **15 times till 2011**.\n* The 2021 Census of India, also the 16th Indian Census, has been postponed till October 2023, at least.\n\n---\n"},"Hindi":{"qNo":9,"language":"Hindi","questionHTML":"\u003cp\u003e\u003cspan style=\"color: rgb(37, 37, 37);  \"\u003eभारत में नियमित और वैज्ञानिक तरीके से जनगणना किस वर्ष शुरू हुई?

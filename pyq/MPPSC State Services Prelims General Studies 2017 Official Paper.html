le;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u0026nbsp;\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eCornea\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eCornea is\u0026nbsp;\u003cstrong\u003etransparent\u003c/strong\u003e.\u003c/li\u003e\n\t\t\u003cli\u003eIt is the front part of our eye that \u003cstrong\u003ecovers the pupil and the iris\u003c/strong\u003e.\u003c/li\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eThe main function \u003c/strong\u003eof the cornea\u0026nbsp;is to refract the light along with the lens.\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eIris\u003c/strong\u003e\n\t\u003cul\u003e\n\t\t\u003cli\u003eIris is a colored portion of the eye, visible externally.\u003c/li\u003e\n\t\t\u003cli\u003eThe \u003cstrong\u003emain function\u003c/strong\u003e\u0026nbsp;is to \u003cstrong\u003econtrol\u003c/strong\u003e \u003cstrong\u003ethe\u0026nbsp;pupil size\u003c/strong\u003e.\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003ePupil\u003c/strong\u003e\n\t\u003cul\u003e\n\t\t\u003cli\u003eIt is the small aperture located in the \u003cstrong\u003ecenter of the Iris\u003c/strong\u003e.\u003c/li\u003e\n\t\t\u003cli\u003eIt allows light to enter and \u003cstrong\u003efocus on the retina\u003c/strong\u003e.\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eEye Lens\u003c/strong\u003e\n\t\u003cul\u003e\n\t\t\u003cli\u003eIt is a transparent, biconvex, lens of an eye.\u003c/li\u003e\n\t\t\u003cli\u003eThe lens refracts light so that it focuses on the retina.\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eOptic Nerve\u003c/strong\u003e\n\t\u003cul\u003e\n\t\t\u003cli\u003e\u0026nbsp;The optic nerves carry all the nerve impulses from the retina to the human brain for interpretation.\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is In Retina. Key Points Retina Retina is the innermost part of the eye. Reflection of an object is formed on retina. It acts as a camera film where the image is formed inverted. It converts the image into an electrical signal for visual perception and sends it to the brain by the optic nerve. Brain rotate the image and interpret it. Important Points Only cornea is donated in eye donation. Additional Information Cornea Cornea is transparent. It is the front part of our eye that covers the pupil and the iris. The main function of the cornea is to refract the light along with the lens. Iris Iris is a colored portion of the eye, visible externally. The main function is to control the pupil size. Pupil It is the small aperture located in the center of the Iris. It allows light to enter and focus on the retina. Eye Lens It is a transparent, biconvex, lens of an eye. The lens refracts light so that it focuses on the retina. Optic Nerve The optic nerves carry all the nerve impulses from the retina to the human brain for interpretation.","markdown":"## Q26.\n\nA reflection of an object is formed in the human eye?\n\n### Options\n\nA. In Cornea\n\nB. In Iris\n\nC. In Eyeball\n\nD. In Retina\n\n**Correct Answer:** D\n\n### Solution\n\nThe correct answer is **In Retina**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **Retina** \n* Retina is the **innermost part** of the eye.\n* **Reflection of an object is formed on retina**.\n* It acts as a**camera film** where the**image is formed inverted**.\n* It **converts the image** into an **electrical signal**for visual perception and sends it **to the brain by the optic nerve**.\n* Brain rotate the image and interpret it.\n \n\n![](//storage.googleapis.com/tb-img/production/20/12/eye.png)\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* **O**nly cornea is donated in eye donation.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **Cornea** \n* Cornea is **transparent**.\n* It is the front part of our eye that **covers the pupil and the iris**.\n* **The main function**of the cornea is to refract the light along with the lens.\n* **Iris** \n* Iris is a colored portion of the eye, visible externally.\n* The **main function** is to **control** **the pupil size**.\n* **Pupil** \n* It is the small aperture located in the **center of the Iris**.\n* It allows light to enter and **focus on the retina**.\n* **Eye Lens** \n* It is a transparent, biconvex, lens of an eye.\n* The lens refracts light so that it focuses on the retina.\n* **Optic Nerve** \n* The optic nerves carry all the nerve impulses from the retina to the human brain for interpretation.\n\n---\n"},"Hindi":{"qNo":26,"language":"Hindi","questionHTML":"\u003cp\u003eमनुष्य की आँख में किसी वस्तु का प्रतिबिम्ब\u0026nbsp;बनता है\u003c/p\u003e","questionText":"मनुष्य की आँख में किसी वस्तु का प्रतिबिम्ब बनता है","options":[{"label":"A","html":"कॉर्निया में","text":"कॉर्निया में"},{"label":"B","html":"परितारिका (आइरिस) में","text":"परितारिका (आइरिस) में"},{"label":"C","html":"पुतली में","text":"पुतली में"},{"label":"D","html":"दृष्टिपटल (रेटिना) में","text":"दृष्टिपटल (रेटिना) में"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eदृष्टिपटल (रेटिना) में\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cu\u003e\u003cstrong\u003eदृष्टिपटल (रेटिना)\u003c/strong\u003e\u003c/u\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eदृष्टिपटल आंख का \u003cstrong\u003eसबसे भीतरी हिस्सा\u003c/strong\u003e है।\u003c/li\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eदृष्टिपटल पर किसी वस्तु का प्रतिबिंब बनता है।\u003c/strong\u003e\u003c/li\u003e\n\t\t\u003cli\u003eयह एक \u003cstrong\u003eकैमरा फिल्म \u003c/strong\u003eके रूप में कार्य करता है \u003cstrong\u003eजहां छवि उलटी बनती है।\u003c/strong\u003e\u003c/li\u003e\n\t\t\u003cli\u003eयह\u003cstrong\u003e छवि को\u003c/strong\u003e दृश्य संवेदन के लिए एक \u003cstrong\u003eविद्युत संकेत\u003c/strong\u003e में \u003cstrong\u003eपरिवर्तित\u003c/strong\u003e करता है और इसे \u003cstrong\u003eदृष्टि तंत्रिका द्वारा मस्तिष्क\u003c/strong\u003e में भेजता है।\u003c/li\u003e\n\t\t\u003cli\u003eमस्तिष्क छवि को घुमाता है और इसकी व्याख्या करता है।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cimg alt=\"\" src=\"//storage.googleapis.com/tb-img/production/20/12/eye.png\" style=\"width: 280px; height: 175px;\"\u003e\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eनेत्रदान में केवल कॉर्निया दान किया जाता है।\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u0026nbsp;\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cspan style=\"font-weight: 700;\"\u003eकॉर्निया\u003c/span\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eकॉर्निया\u003cstrong\u003e पारदर्शी\u003c/strong\u003e होती है।\u003c/li\u003e\n\t\t\u003cli\u003eयह हमारी आंख का अग्र भाग है जो \u003cstrong\u003eपुतली और परितारिका को ढकता\u003c/strong\u003e है।\u003c/li\u003e\n\t\t\u003cli\u003eकॉर्निया का \u003cstrong\u003eमुख्य कार्य \u003c/strong\u003eलेंस के साथ-साथ प्रकाश को अपवर्तित करना है।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eपरितारिका\u003c/strong\u003e\n\t\u003cul\u003e\n\t\t\u003cli\u003eपरितारिका आंख का एक रंगीन हिस्सा है, बाहर से दिखाई देता है।\u003c/li\u003e\n\t\t\u003cli\u003eइसका\u003cstrong\u003e मुख्य कार्य\u003c/strong\u003e \u003cstrong\u003eपुतली के आकार को नियंत्रित\u003c/strong\u003e करना है।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eपुतली\u003c/strong\u003e\n\t\u003cul\u003e\n\t\t\u003cli\u003eयह परितारिका के \u003cstrong\u003eकेंद्र में स्थित एक छोटा छिद्र \u003c/strong\u003eहै।\u003c/li\u003e\n\t\t\u003cli\u003eयह प्रकाश को प्रवेश करने और\u003cstrong\u003e रेटिना पर केंद्रित करने\u003c/strong\u003e की अनुमति देता है।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eनेत्र लेंस\u003c/strong\u003e\n\t\u003cul\u003e\n\t\t\u003cli\u003eयह एक पारदर्शी, द्विउत्तल, नेत्र का लेंस है।\u003c/li\u003e\n\t\t\u003cli\u003eलेंस प्रकाश को अपवर्तित करता है ताकि यह रेटिना पर केंद्रित हो।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\u003cspan style=\"font-weight: 700;\"\u003eदृष्टि तंत्रिका\u003c/span\u003e\n\t\u003cul\u003e\n\t\t\u003cli\u003eदृष्टि तंत्रिकाएं रेटिना से मानव मस्तिष्क तक सभी तंत्रिका आवेगों को व्याख्या के लिए ले जाती हैं।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर दृष्टिपटल (रेटिना) में है। Key Points दृष्टिपटल (रेटिना) दृष्टिपटल आंख का सबसे भीतरी हिस्सा है। दृष्टिपटल पर किसी वस्तु का प्रतिबिंब बनता है। यह एक कैमरा फिल्म के रूप में कार्य करता है जहां छवि उलटी बनती है। यह छवि को दृश्य संवेदन के लिए एक विद्युत संकेत में परिवर्तित करता है और इसे दृष्टि तंत्रिका द्वारा मस्तिष्क में भेजता है। मस्तिष्क छवि को घुमाता है और इसकी व्याख्या करता है। Important Points नेत्रदान में केवल कॉर्निया दान किया जाता है। Additional Information कॉर्निया कॉर्निया पारदर्शी होती है। यह हमारी आंख का अग्र भाग है जो पुतली और परितारिका को ढकता है। कॉर्निया का मुख्य कार्य लेंस के साथ-साथ प्रकाश को अपवर्तित करना है। परितारिका परितारिका आंख का एक रंगीन हिस्सा है, बाहर से दिखाई देता है। इसका मुख्य कार्य पुतली के आकार को नियंत्रित करना है। पुतली यह परितारिका के केंद्र में स्थित एक छोटा छिद्र है। यह प्रकाश को प्रवेश करने और रेटिना पर केंद्रित करने की अनुमति देता है। नेत्र लेंस यह एक पारदर्शी, द्विउत्तल, नेत्र का लेंस है। लेंस प्रकाश को अपवर्तित करता है ताकि यह रेटिना पर केंद्रित हो। दृष्टि तंत्रिका दृष्टि तंत्रिकाएं रेटिना से मानव मस्तिष्क तक सभी तंत्रिका आवेगों को व्याख्या के लिए ले जाती हैं।","markdown":"## Q26.\n\nमनुष्य की आँख में किसी वस्तु का प्रतिबिम्ब बनता है\n\n### Options\n\nA. कॉर्निया में\n\nB. परितारिका (आइरिस) में\n\nC. पुतली में\n\nD. दृष्टिपटल (रेटिना) में\n\n**Correct Answer:** D\n\n### Solution\n\nसही उत्तर **दृष्टिपटल (रेटिना) में** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **दृष्टिपटल (रेटिना)** \n* दृष्टिपटल आंख का **सबसे भीतरी हिस्सा** है।\n* **दृष्टिपटल पर किसी वस्तु का प्रतिबिंब बनता है।**\n* यह एक **कैमरा फिल्म**के रूप में कार्य करता है **जहां छवि उलटी बनती है।**\n* यह**छवि को** दृश्य संवेदन के लिए एक **विद्युत संकेत** में **परिवर्तित** करता है और इसे **दृष्टि तंत्रिका द्वारा मस्तिष्क** में भेजता है।\n* मस्तिष्क छवि को घुमाता है और इसकी व्याख्या करता है।\n \n\n![](//storage.googleapis.com/tb-img/production/20/12/eye.png)\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* **नेत्रदान में केवल कॉर्निया दान किया जाता है।**\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* कॉर्निया \n* कॉर्निया**पारदर्शी** होती है।\n* यह हमारी आंख का अग्र भाग है जो **पुतली और परितारिका को ढकता** है।\n* कॉर्निया का **मुख्य कार्य**लेंस के साथ-साथ प्रकाश को अपवर्तित करना है।\n* **परितारिका** \n* परितारिका आंख का एक रंगीन हिस्सा है, बाहर से दिखाई देता है।\n* इसका**मुख्य कार्य** **पुतली के आकार को नियंत्रित** करना है।\n* **पुतली** \n* यह परितारिका के **केंद्र में स्थित एक छोटा छिद्र**है।\n* यह प्रकाश को प्रवेश करने और**रेटिना पर केंद्रित करने** की अनुमति देता है।\n* **नेत्र लेंस** \n* यह एक पारदर्शी, द्विउत्तल, नेत्र का लेंस है।\n* लेंस प्रकाश को अपवर्तित करता है ताकि यह रेटिना पर केंद्रित हो।\n* दृष्टि तंत्रिका \n* दृष्टि तंत्रिकाएं रेटिना से मानव मस्तिष्क तक सभी तंत्रिका आवेगों को व्याख्या के लिए ले जाती हैं।\n\n---\n"}}},{"index":27,"qNo":"Question No. 27","languages":{"English":{"qNo":27,"language":"English","questionHTML":"In humans, kidneys are organs of which of the following systems?","questionText":"In humans, kidneys are organs of which of the following systems?","options":[{"label":"A","html":"Nutrition","text":"Nutrition"},{"label":"B","html":"Transportation","text":"Transportation"},{"label":"C","html":"Excretion","text":"Excretion"},{"label":"D","html":"Respiration","text":"Respiration"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003eExcretion\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eIn humans, the kidney is one of the \u003cstrong\u003emain organs of the excretory system\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eKidney's \u003cstrong\u003efunction\u003c/strong\u003e is the \u003cstrong\u003efiltration of the blood\u003c/strong\u003e and removing waste(toxic) products.\u003c/li\u003e\n\t\u003cli\u003eWaste products and excess fluid are\u003cstrong\u003e removed through the urine\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eIf the\u003cstrong\u003e kidney fails\u003c/strong\u003e person needs to undergo dialysis.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eDialysis\u003c/strong\u003e is a treatment that filters and purifies the blood using a machine.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eRespiration- \u003c/strong\u003eIt is the movement of oxygen from the environment and the transport of carbon dioxide back to the environment.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Excretion. Important Points In humans, the kidney is one of the main organs of the excretory system. Kidney's function is the filtration of the blood and removing waste(toxic) products. Waste products and excess fluid are removed through the urine. If the kidney fails person needs to undergo dialysis. Dialysis is a treatment that filters and purifies the blood using a machine. Additional Information Respiration- It is the movement of oxygen from the environment and the transport of carbon dioxide back to the environment.","markdown":"## Q27.\n\nIn humans, kidneys are organs of which of the following systems?\n\n### Options\n\nA. Nutrition\n\nB. Transportation\n\nC. Excretion\n\nD. Respiration\n\n**Correct Answer:** C\n\n### Solution\n\nThe correct answer is **Excretion**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* In humans, the kidney is one of the **main organs of the excretory system**.\n* Kidney's **function** is the **filtration of the blood** and removing waste(toxic) products.\n* Waste products and excess fluid are**removed through the urine**.\n* If the**kidney fails** person needs to undergo dialysis.\n* **Dialysis** is a treatment that filters and purifies the blood using a machine.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **Respiration-**It is the movement of oxygen from the environment and the transport of carbon dioxide back to the environment.\n\n---\n"},"Hindi":{"qNo":27,"language":"Hindi","questionHTML":"\u003cp\u003eमनुष्यों में गुर्दे (वृक्क) निम्नलिखित में से किस तंत्र\u0026nbsp;के\u0026nbsp;अंग हैं?\u003c/p\u003e","questionText":"मनुष्यों में गुर्दे (वृक्क) निम्नलिखित में से किस तंत्र के अंग हैं?","options":[{"label":"A","html":"पोषण","text":"पोषण"},{"label":"B","html":"निर्वासन","text":"निर्वासन"},{"label":"C","html":"उत्सर्जन","text":"उत्सर्जन"},{"label":"D","html":"श्वसन","text":"श्वसन"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eउत्सर्जन\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eमनुष्यों में, गुर्दे \u003cstrong\u003eउत्सर्जन तंत्र\u0026nbsp;के मुख्य अंगों\u003c/strong\u003e में से एक है।\u003c/li\u003e\n\t\u003cli\u003eगुर्दे का\u003cstrong\u003e कार्य रक्त का निस्पंदन\u003c/strong\u003e और अपशिष्ट (विषाक्त) उत्पादों को निकालना है।\u003c/li\u003e\n\t\u003cli\u003eअपशिष्ट उत्पादों और अतिरिक्त तरल पदार्थ को \u003cstrong\u003eमूत्र के माध्यम से हटा\u003c/strong\u003e दिया जाता है।\u003c/li\u003e\n\t\u003cli\u003eयदि \u003cstrong\u003eगुर्दे फेल \u003c/strong\u003eहो जाते\u0026nbsp;हैं तो व्यक्ति को डायलिसिस से गुजरना पड़ता है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eडायलिसिस\u003c/strong\u003e एक उपचार है जो एक मशीन का उपयोग करके रक्त को फ़िल्टर और शुद्ध करता है।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eश्वसन​- \u003c/strong\u003eयह पर्यावरण से ऑक्सीजन का आवागमन है और कार्बन डाइऑक्साइड का पर्यावरण में वापस परिवहन है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eनिर्वासन\u003c/strong\u003e\u003cstrong\u003e-\u0026nbsp;\u003c/strong\u003eरक्त मानव शरीर में हार्मोन, ऑक्सीजन, भोजन और अपशिष्ट पदार्थों को परिवहन करने के लिए उत्तरदायी है।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर उत्सर्जन है। Important Points मनुष्यों में, गुर्दे उत्सर्जन तंत्र के मुख्य अंगों में से एक है। गुर्दे का कार्य रक्त का निस्पंदन और अपशिष्ट (विषाक्त) उत्पादों को निकालना है। अपशिष्ट उत्पादों और अतिरिक्त तरल पदार्थ को मूत्र के माध्यम से हटा दिया जाता है। यदि गुर्दे फेल हो जाते हैं तो व्यक्ति को डायलिसिस से गुजरना पड़ता है। डायलिसिस एक उपचार है जो एक मशीन का उपयोग करके रक्त को फ़िल्टर और शुद्ध करता है। Additional Information श्वसन​- यह पर्यावरण से ऑक्सीजन का आवागमन है और कार्बन डाइऑक्साइड का पर्यावरण में वापस परिवहन है। निर्वासन- रक्त मानव शरीर में हार्मोन, ऑक्सीजन, भोजन और अपशिष्ट पदार्थों को परिवहन करने के लिए उत्तरदायी है।","markdown":"## Q27.\n\nमनुष्यों में गुर्दे (वृक्क) निम्नलिखित में से किस तंत्र के अंग हैं?\n\n### Options\n\nA. पोषण\n\nB. निर्वासन\n\nC. उत्सर्जन\n\nD. श्वसन\n\n**Correct Answer:** C\n\n### Solution\n\nसही उत्तर **उत्सर्जन** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* मनुष्यों में, गुर्दे **उत्सर्जन तंत्र के मुख्य अंगों** में से एक है।\n* गुर्दे का**कार्य रक्त का निस्पंदन** और अपशिष्ट (विषाक्त) उत्पादों को निकालना है।\n* अपशिष्ट उत्पादों और अतिरिक्त तरल पदार्थ को **मूत्र के माध्यम से हटा** दिया जाता है।\n* यदि **गुर्दे फेल**हो जाते हैं तो व्यक्ति को डायलिसिस से गुजरना पड़ता है।\n* **डायलिसिस** एक उपचार है जो एक मशीन का उपयोग करके रक्त को फ़िल्टर और शुद्ध करता है।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **श्वसन​-**यह पर्यावरण से ऑक्सीजन का आवागमन है और कार्बन डाइऑक्साइड का पर्यावरण में वापस परिवहन है।\n* **निर्वासन****-**रक्त मानव शरीर में हार्मोन, ऑक्सीजन, भोजन और अपशिष्ट पदार्थों को परिवहन करने के लिए उत्तरदायी है।\n\n---\n"}}},{"index":28,"qNo":"Question No. 28","languages":{"English":{"qNo":28,"language":"English","questionHTML":"Which of the following diseases is caused by protozoa?","questionText":"Which of the following diseases is caused by protozoa?","options":[{"label":"A","html":"Cholera","text":"Cholera"},{"label":"B","html":"Diphtheria","text":"Diphtheria"},{"label":"C","html":"Pneumonia","text":"Pneumonia"},{"label":"D","html":"\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003eMalaria\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","text":"Malaria"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eThe correct answer is\u003cstrong\u003e \u003c/strong\u003e\u003cu\u003e\u003cstrong\u003eMalaria\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eMalaria\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eMalaria is caused by a \u003cstrong\u003eprotozoan parasite\u003c/strong\u003e called Plasmodium.\u003c/li\u003e\n\t\t\u003cli\u003eCarrier is a \u003cu\u003e\u003cstrong\u003efemale anopheles mosquito\u003c/strong\u003e\u003c/u\u003e.\u003c/li\u003e\n\t\t\u003cli\u003eAffects the spleen organ.\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eCholera\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eCholera is caused by the \u003cstrong\u003ebacteria\u003c/strong\u003e\u0026nbsp;Vibrio cholerae.\u003c/li\u003e\n\t\t\u003cli\u003eCause of disease is contaminated water/food.\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eDiphtheria\u003c/strong\u003e\n\t\u003cul\u003e\n\t\t\u003cli\u003eDiphtheria\u0026nbsp;is caused by \u003cstrong\u003ebacteria\u003c/strong\u003e.\u003c/li\u003e\n\t\t\u003cli\u003eBacteria name\u0026nbsp;Corynebacterium diphtheriae.\u003c/li\u003e\n\t\t\u003cli\u003eSpread from person to person through sneezing and coughing.\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003ePneumonia\u003c/strong\u003e\n\t\u003cul\u003e\n\t\t\u003cli\u003ePneumonia is an \u003cstrong\u003einfection of the lungs\u003c/strong\u003e caused by germs (fungi, bacteria, or viruses).\u003c/li\u003e\n\t\t\u003cli\u003eIt causes cough, fever, chest pain, problem in respiration.\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Malaria. Important Points Malaria Malaria is caused by a protozoan parasite called Plasmodium. Carrier is a female anopheles mosquito. Affects the spleen organ. Additional Information Cholera Cholera is caused by the bacteria Vibrio cholerae. Cause of disease is contaminated water/food. Diphtheria Diphtheria is caused by bacteria. Bacteria name Corynebacterium diphtheriae. Spread from person to person through sneezing and coughing. Pneumonia Pneumonia is an infection of the lungs caused by germs (fungi, bacteria, or viruses). It causes cough, fever, chest pain, problem in respiration.","markdown":"## Q28.\n\nWhich of the following diseases is caused by protozoa?\n\n### Options\n\nA. Cholera\n\nB. Diphtheria\n\nC. Pneumonia\n\nD. Malaria\n\n**Correct Answer:** D\n\n### Solution\n\nThe correct answer is**Malaria**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* **Malaria** \n* Malaria is caused by a **protozoan parasite** called Plasmodium.\n* Carrier is a **female anopheles mosquito**.\n* Affects the spleen organ.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **Cholera** \n* Cholera is caused by the **bacteria** Vibrio cholerae.\n* Cause of disease is contaminated water/food.\n* **Diphtheria** \n* Diphtheria is caused by **bacteria**.\n* Bacteria name Corynebacterium diphtheriae.\n* Spread from person to person through sneezing and coughing.\n* **Pneumonia** \n* Pneumonia is an **infection of the lungs** caused by germs (fungi, bacteria, or viruses).\n* It causes cough, fever, chest pain, problem in respiration.\n\n---\n"},"Hindi":{"qNo":28,"language":"Hindi","questionHTML":"निम्नलिखित में से कौन-सा रोग प्रोटोजोआ द्वारा होता है ?\u0026nbsp;\u0026nbsp;","questionText":"निम्नलिखित में से कौन-सा रोग प्रोटोजोआ द्वारा होता है ?","options":[{"label":"A","html":"हैजा\u0026nbsp;","text":"हैजा"},{"label":"B","html":"डिप्थीरिया\u0026nbsp;","text":"डिप्थीरिया"},{"label":"C","html":"निमोनिया\u0026nbsp;","text":"निमोनिया"},{"label":"D","html":"मलेरिया\u0026nbsp;","text":"मलेरिया"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eमलेरिया\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eमलेरिया\u0026nbsp;\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eमलेरिया प्लाज़मोडियम नामक \u003cstrong\u003eप्रोटोजोआ परजीवी\u003c/strong\u003e के कारण होता है।\u003c/li\u003e\n\t\t\u003cli\u003eइसका वाहक \u003cu\u003e\u003cstrong\u003eमादा एनोफिलिस मच्छर\u003c/strong\u003e\u003c/u\u003e होती है।\u003c/li\u003e\n\t\t\u003cli\u003eयह\u0026nbsp;प्लीहा अंग को प्रभावित करता है।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eहैजा\u0026nbsp;\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eहैजा बैक्टीरिया विब्रियो \u003cstrong\u003eहैजे\u003c/strong\u003e के कारण होता है।\u003c/li\u003e\n\t\t\u003cli\u003eबीमारी का कारण दूषित पानी/भोजन होता है।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eडिप्थीरिया\u0026nbsp;\u003c/strong\u003e\n\t\u003cul\u003e\n\t\t\u003cli\u003eडिप्थीरिया \u003cstrong\u003eविषाणु \u003c/strong\u003eके कारण होता है।\u003c/li\u003e\n\t\t\u003cli\u003eबैक्टीरिया का नाम कॉरीनेबैक्टीरियम डिप्थिरीए है।\u003c/li\u003e\n\t\t\u003cli\u003eयह\u0026nbsp;छींकने और खांसने के माध्यम से एक व्यक्ति से दूसरे व्यक्ति में फैलता है।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eनिमोनिया\u0026nbsp;\u003c/strong\u003e\n\t\u003cul\u003e\n\t\t\u003cli\u003eनिमोनिया रोगाणु (कवक, जीवाणु, या विषाणु) के कारण \u003cstrong\u003eफेफड़ों का संक्रमण \u003c/strong\u003eहै।\u003c/li\u003e\n\t\t\u003cli\u003eइससे खांसी, बुखार, सीने में दर्द, सांस में समस्या होती है।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर मलेरिया है। Important Points मलेरिया मलेरिया प्लाज़मोडियम नामक प्रोटोजोआ परजीवी के कारण होता है। इसका वाहक मादा एनोफिलिस मच्छर होती है। यह प्लीहा अंग को प्रभावित करता है। Additional Information हैजा हैजा बैक्टीरिया विब्रियो हैजे के कारण होता है। बीमारी का कारण दूषित पानी/भोजन होता है। डिप्थीरिया डिप्थीरिया विषाणु के कारण होता है। बैक्टीरिया का नाम कॉरीनेबैक्टीरियम डिप्थिरीए है। यह छींकने और खांसने के माध्यम से एक व्यक्ति से दूसरे व्यक्ति में फैलता है। निमोनिया निमोनिया रोगाणु (कवक, जीवाणु, या विषाणु) के कारण फेफड़ों का संक्रमण है। इससे खांसी, बुखार, सीने में दर्द, सांस में समस्या होती है।","markdown":"## Q28.\n\nनिम्नलिखित में से कौन-सा रोग प्रोटोजोआ द्वारा होता है ?\n\n### Options\n\nA. हैजा\n\nB. डिप्थीरिया\n\nC. निमोनिया\n\nD. मलेरिया\n\n**Correct Answer:** D\n\n### Solution\n\nसही उत्तर **मलेरिया** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* **मलेरिया** \n* मलेरिया प्लाज़मोडियम नामक **प्रोटोजोआ परजीवी** के कारण होता है।\n* इसका वाहक **मादा एनोफिलिस मच्छर** होती है।\n* यह प्लीहा अंग को प्रभावित करता है।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **हैजा** \n* हैजा बैक्टीरिया विब्रियो **हैजे** के कारण होता है।\n* बीमारी का कारण दूषित पानी/भोजन होता है।\n* **डिप्थीरिया** \n* डिप्थीरिया **विषाणु**के कारण होता है।\n* बैक्टीरिया का नाम कॉरीनेबैक्टीरियम डिप्थिरीए है।\n* यह छींकने और खांसने के माध्यम से एक व्यक्ति से दूसरे व्यक्ति में फैलता है।\n* **निमोनिया** \n* निमोनिया रोगाणु (कवक, जीवाणु, या विषाणु) के कारण **फेफड़ों का संक्रमण**है।\n* इससे खांसी, बुखार, सीने में दर्द, सांस में समस्या होती है।\n\n---\n"}}},{"index":29,"qNo":"Question No. 29","languages":{"English":{"qNo":29,"language":"English","questionHTML":"\u003cp\u003eTransfer of heat by convection can take place in?\u003c/p\u003e","questionText":"Transfer of heat by convection can take place in?","options":[{"label":"A","html":"In solid and liquid","text":"In solid and liquid"},{"label":"B","html":"In solid and vacuum","text":"In solid and vacuum"},{"label":"C","html":"In gas and liquid","text":"In gas and liquid"},{"label":"D","html":"In vacuum and gas","text":"In vacuum and gas"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003eIn gas and liquid\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eConvection\u003c/strong\u003e is the process of \u003cstrong\u003eheat transfer\u003c/strong\u003e by the movement of molecules \u003cstrong\u003ein\u003c/strong\u003e \u003cstrong\u003efluids like gas and liquid\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eConvection \u003cstrong\u003ecan't take place in\u0026nbsp;solids and vacuum\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e​\u003cimg alt=\"\" src=\"//storage.googleapis.com/tb-img/production/20/12/convection.png\" style=\"width: 280px; height: 171px;\"\u003e​\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eThree\u003c/strong\u003e heat transfer \u003cstrong\u003emethods\u003c/strong\u003e are conduction, convection, and radiation.\n\n\t\u003cul\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eConduction\u0026nbsp;\u003c/strong\u003e- heat transfer by direct contact.\u003c/li\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eConvection\u0026nbsp;\u003c/strong\u003e- heat transfer by the movement of fluids.\u003c/li\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eRadiation\u0026nbsp;\u003c/strong\u003e- heat transfer through electromagnetic waves.\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is In gas and liquid. Important Points Convection is the process of heat transfer by the movement of molecules in fluids like gas and liquid. Convection can't take place in solids and vacuum. ​​ Additional Information Three heat transfer methods are conduction, convection, and radiation. Conduction - heat transfer by direct contact. Convection - heat transfer by the movement of fluids. Radiation - heat transfer through electromagnetic waves.","markdown":"## Q29.\n\nTransfer of heat by convection can take place in?\n\n### Options\n\nA. In solid and liquid\n\nB. In solid and vacuum\n\nC. In gas and liquid\n\nD. In vacuum and gas\n\n**Correct Answer:** C\n\n### Solution\n\nThe correct answer is **In gas and liquid**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* **Convection** is the process of **heat transfer** by the movement of molecules **in** **fluids like gas and liquid**.\n* Convection **can't take place in solids and vacuum**.\n \n\n​![](//storage.googleapis.com/tb-img/production/20/12/convection.png)​\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **Three** heat transfer **methods** are conduction, convection, and radiation. \n* **Conduction**- heat transfer by direct contact.\n* **Convection**- heat transfer by the movement of fluids.\n* **Radiation**- heat transfer through electromagnetic waves.\n\n---\n"},"Hindi":{"qNo":29,"language":"Hindi","questionHTML":"संवहन द्वारा ऊष्मा का स्थानान्तरण हो सकता है\u0026nbsp;","questionText":"संवहन द्वारा ऊष्मा का स्थानान्तरण हो सकता है","options":[{"label":"A","html":"ठोस एवं द्रव में\u0026nbsp;","text":"ठोस एवं द्रव में"},{"label":"B","html":"ठोस एवं निर्वात में\u0026nbsp;","text":"ठोस एवं निर्वात में"},{"label":"C","html":"गैस एवं द्रव में\u0026nbsp;","text":"गैस एवं द्रव में"},{"label":"D","html":"निर्वात एवं गैस में\u0026nbsp;","text":"निर्वात एवं गैस में"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eसही उत्तर \u003cu\u003e\u003cstrong\u003eगैस एवं द्रव में\u003c/strong\u003e\u003c/u\u003e\u0026nbsp;है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eसंवहन\u003c/strong\u003e \u003cstrong\u003eगैस और द्रव्य जैसे तरल पदार्थों \u003c/strong\u003eमें अणुओं की गतिविधियों द्वारा \u003cstrong\u003eउष्मा हस्तांतरण\u003c/strong\u003e की प्रक्रिया है।\u003c/li\u003e\n\t\u003cli\u003eसंवहन \u003cstrong\u003eठोस और निर्वात में नहीं हो सकता।\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e​\u003cimg alt=\"\" src=\"//storage.googleapis.com/tb-img/production/20/12/convection.png\" style=\"width: 280px; height: 171px;\"\u003e​\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eतीन \u003c/strong\u003eउष्मा संवहन \u003cstrong\u003eविधियां\u003c/strong\u003e चालन, संवहन और विकिरण हैं।\n\n\t\u003cul\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eचालन\u003c/strong\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e- सीधे संपर्क द्वारा उष्मा हस्तांतरण।\u003c/li\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eसंवहन\u003c/strong\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e- द्रव्य पदार्थ की गतिविधियों द्वारा उष्मा हस्तांतरण।\u003c/li\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eविकिरण​\u0026nbsp;\u003c/strong\u003e- विद्युत चुम्बकीय तरंगों के माध्यम से उष्मा हस्तांतरण।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर गैस एवं द्रव में है। Important Points संवहन गैस और द्रव्य जैसे तरल पदार्थों में अणुओं की गतिविधियों द्वारा उष्मा हस्तांतरण की प्रक्रिया है। संवहन ठोस और निर्वात में नहीं हो सकता। ​​ Additional Information तीन उष्मा संवहन विधियां चालन, संवहन और विकिरण हैं। चालन - सीधे संपर्क द्वारा उष्मा हस्तांतरण। संवहन - द्रव्य पदार्थ की गतिविधियों द्वारा उष्मा हस्तांतरण। विकिरण​ - विद्युत चुम्बकीय तरंगों के माध्यम से उष्मा हस्तांतरण।","markdown":"## Q29.\n\nसंवहन द्वारा ऊष्मा का स्थानान्तरण हो सकता है\n\n### Options\n\nA. ठोस एवं द्रव में\n\nB. ठोस एवं निर्वात में\n\nC. गैस एवं द्रव में\n\nD. निर्वात एवं गैस में\n\n**Correct Answer:** C\n\n### Solution\n\nसही उत्तर **गैस एवं द्रव में** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* **संवहन** **गैस और द्रव्य जैसे तरल पदार्थों**में अणुओं की गतिविधियों द्वारा **उष्मा हस्तांतरण** की प्रक्रिया है।\n* संवहन **ठोस और निर्वात में नहीं हो सकता।**\n \n\n​![](//storage.googleapis.com/tb-img/production/20/12/convection.png)​\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **तीन**उष्मा संवहन **विधियां** चालन, संवहन और विकिरण हैं। \n* **चालन**- सीधे संपर्क द्वारा उष्मा हस्तांतरण।\n* **संवहन**- द्रव्य पदार्थ की गतिविधियों द्वारा उष्मा हस्तांतरण।\n* **विकिरण​**- विद्युत चुम्बकीय तरंगों के माध्यम से उष्मा हस्तांतरण।\n\n---\n"}}},{"index":30,"qNo":"Question No. 30","languages":{"English":{"qNo":30,"language":"English","questionHTML":"Which one of the following pairs is\u003cstrong\u003e NOT\u003c/strong\u003e correctly matched?","questionText":"Which one of the following pairs is NOT correctly matched?","options":[{"label":"A","html":"Vitamin A - Maculan","text":"Vitamin A - Maculan"},{"label":"B","html":"Vitamin B - Maculan","text":"Vitamin B - Maculan"},{"label":"C","html":"Vitamin C - \u003cspan style=\"text-align: center;\"\u003eAlbert Szent-Györgyi\u0026nbsp;\u003c/span\u003e","text":"Vitamin C - Albert Szent-Györgyi"},{"label":"D","html":"\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e​Vitamin D - Paul Muller\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","text":"​Vitamin D - Paul Muller"}],"correctIndex":3,"solutionHTML":"\u003cp\u003e\u003cu\u003e\u003cstrong\u003eVitamin D-Paul Muller\u003c/strong\u003e\u003c/u\u003e\u003cstrong\u003e \u003c/strong\u003eis not correct.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003ePaul Muller is \u003cstrong\u003enot\u003c/strong\u003e related to Vitamin D.\u003c/li\u003e\n\t\u003cli\u003eHe is known for the discovery of \u003cstrong\u003eDDT\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003e\u003cu\u003e\u003cspan style=\"font-weight: 700;\"\u003eHence\u0026nbsp;​Vitamin D - Paul Muller is not correctly matched\u003c/span\u003e\u003c/u\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003ctable border=\"1\" cellpadding=\"1\" cellspacing=\"1\" style=\"width: 350px;\"\u003e\n\t\u003ctbody\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003eVitamin\u003c/td\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003eDiscovered By\u003c/td\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003eDeficiency Diseases\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003eVitamin A\u003c/td\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003e\u0026nbsp;Maculan\u003c/td\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003eNight Blindness\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003eVitamin B\u003c/td\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003e\u0026nbsp;Maculan\u003c/td\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003e\u003cspan style=\"  text-align: center;\"\u003eBeri-beri\u003c/span\u003e\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003eVitamin C\u003c/td\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003e\u0026nbsp;Albert Szent-Györgyi\u0026nbsp;\u003c/td\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003e\u003cspan style=\"  text-align: center;\"\u003eScurvy\u003c/span\u003e\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003eVitamin D\u003c/td\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003e\u0026nbsp;Elmer McCollum\u0026nbsp;\u003c/td\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003eWeak Bones\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\u003c/tbody\u003e\n\u003c/table\u003e","solutionText":"Vitamin D-Paul Muller is not correct. Important Points Paul Muller is not related to Vitamin D. He is known for the discovery of DDT. Hence ​Vitamin D - Paul Muller is not correctly matched. Additional Information Vitamin Discovered By Deficiency Diseases Vitamin A Maculan Night Blindness Vitamin B Maculan Beri-beri Vitamin C Albert Szent-Györgyi Scurvy Vitamin D Elmer McCollum Weak Bones","markdown":"## Q30.\n\nWhich one of the following pairs is**NOT** correctly matched?\n\n### Options\n\nA. Vitamin A - Maculan\n\nB. Vitamin B - Maculan\n\nC. Vitamin C - Albert Szent-Györgyi\n\nD. ​Vitamin D - Paul Muller\n\n**Correct Answer:** D\n\n### Solution\n\n**Vitamin D-Paul Muller**is not correct.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* Paul Muller is **not** related to Vitamin D.\n* He is known for the discovery of **DDT**.\n* Hence ​Vitamin D - Paul Muller is not correctly matched.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n\n| Vitamin | Discovered By | Deficiency Diseases |\n| --- | --- | --- |\n| Vitamin A | Maculan | Night Blindness |\n| Vitamin B | Maculan | Beri-beri |\n| Vitamin C | Albert Szent-Györgyi | Scurvy |\n| Vitamin D | Elmer McCollum | Weak Bones |\n\n---\n"},"Hindi":{"qNo":30,"language":"Hindi","questionHTML":"निम्नलिखित में से कौन-सा युग्म सही सुमेलित \u003cstrong\u003eनहीं\u003c/strong\u003e है?","questionText":"निम्नलिखित में से कौन-सा युग्म सही सुमेलित नहीं है?","options":[{"label":"A","html":"विटामिन A - मैकुलान","text":"विटामिन A - मैकुलान"},{"label":"B","html":"विटामिन B - मैकुलान","text":"विटामिन B - मैकुलान"},{"label":"C","html":"विटामिन C - \u003cspan style=\"text-align: center;\"\u003eअल्बर्ट सजेंट-ग्योर्गी\u003c/span\u003e","text":"विटामिन C - अल्बर्ट सजेंट-ग्योर्गी"},{"label":"D","html":"\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e विटामिन D - पॉल मुलर \u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","text":"विटामिन D - पॉल मुलर"}],"correctIndex":3,"solutionHTML":"\u003cp\u003e\u003cu\u003e\u003cstrong\u003eविटामिन D-पॉल मुलर\u003c/strong\u003e\u003c/u\u003e\u003cstrong\u003e \u003c/strong\u003eसही नहीं।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eपॉल मुलर विटामिन D से संबंधित \u003cstrong\u003eनहीं \u003c/strong\u003eहै।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eउन्हें डीडीटी\u003c/strong\u003e की खोज के लिए जाना जाता है।\u003c/li\u003e\n\t\u003cli\u003e\u003cu\u003e\u003cspan style=\"font-weight: 700;\"\u003eइसलिए विटामिन D - पॉल मुलर सही ढंग से सुमेलित नहीं है\u003c/span\u003e\u003c/u\u003e।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003ctable border=\"1\" cellpadding=\"1\" cellspacing=\"1\" style=\"width: 350px;\"\u003e\n\t\u003ctbody\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003eविटामिन\u003c/td\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003eद्वारा अविष्कृत\u003c/td\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003eकमी रोग\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003eविटामिन A\u003c/td\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003eमैकुलान\u003c/td\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003eरतौंधी\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003eविटामिन B\u003c/td\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003eमैकुलान\u003c/td\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003e\u003cspan style=\"  text-align: center;\"\u003eबेरी-बेरी\u003c/span\u003e\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003eविटामिन C\u003c/td\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003eअल्बर्ट सजेंट-ग्योर्गियिक\u003c/td\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003eस्‍कर्वी\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003eविटामिन D\u003c/td\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003eएल्मर मैक्कलम\u003c/td\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003eकमजोर हड्डियां\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\u003c/tbody\u003e\n\u003c/table\u003e","solutionText":"विटामिन D-पॉल मुलर सही नहीं। Important Points पॉल मुलर विटामिन D से संबंधित नहीं है। उन्हें डीडीटी की खोज के लिए जाना जाता है। इसलिए विटामिन D - पॉल मुलर सही ढंग से सुमेलित नहीं है। Additional Information विटामिन द्वारा अविष्कृत कमी रोग विटामिन A मैकुलान रतौंधी विटामिन B मैकुलान बेरी-बेरी विटामिन C अल्बर्ट सजेंट-ग्योर्गियिक स्‍कर्वी विटामिन D एल्मर मैक्कलम कमजोर हड्डियां","markdown":"## Q30.\n\nनिम्नलिखित में से कौन-सा युग्म सही सुमेलित **नहीं** है?\n\n### Options\n\nA. विटामिन A - मैकुलान\n\nB. विटामिन B - मैकुलान\n\nC. विटामिन C - अल्बर्ट सजेंट-ग्योर्गी\n\nD. विटामिन D - पॉल मुलर\n\n**Correct Answer:** D\n\n### Solution\n\n**विटामिन D-पॉल मुलर**सही नहीं।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* पॉल मुलर विटामिन D से संबंधित **नहीं**है।\n* **उन्हें डीडीटी** की खोज के लिए जाना जाता है।\n* इसलिए विटामिन D - पॉल मुलर सही ढंग से सुमेलित नहीं है।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n\n| विटामिन | द्वारा अविष्कृत | कमी रोग |\n| --- | --- | --- |\n| विटामिन A | मैकुलान | रतौंधी |\n| विटामिन B | मैकुलान | बेरी-बेरी |\n| विटामिन C | अल्बर्ट सजेंट-ग्योर्गियिक | स्‍कर्वी |\n| विटामिन D | एल्मर मैक्कलम | कमजोर हड्डियां |\n\n---\n"}}},{"index":31,"qNo":"Question No. 31","languages":{"English":{"qNo":31,"language":"English","questionHTML":"The power of the lens is measured in","questionText":"The power of the lens is measured in","options":[{"label":"A","html":"Diopter","text":"Diopter"},{"label":"B","html":"Ion","text":"Ion"},{"label":"C","html":"Lumen","text":"Lumen"},{"label":"D","html":"Candela","text":"Candela"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003eDiopter\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eThe power of the lens\u0026nbsp;measured is measured with \u003cstrong\u003eDiopter\u003c/strong\u003e and we represent it by\u003cstrong\u003e D\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eThe reciprocal of focal length in meters\u003c/strong\u003e is equals to the\u003cstrong\u003e power of lens\u003c/strong\u003e. \u003cstrong\u003eD=1/f\u003c/strong\u003e, where \u003cstrong\u003eD\u003c/strong\u003e stands for \u003cstrong\u003epower of lens (Diopter)\u0026nbsp;\u003c/strong\u003eand \u003cstrong\u003ef \u003c/strong\u003estands for \u003cstrong\u003efocal length of the lens in meter\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u0026nbsp; \u0026nbsp;\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eLumen\u003c/strong\u003e is the \u003cstrong\u003eSI unit\u003c/strong\u003e of\u003cstrong\u003e Luminous flux\u003c/strong\u003e. It measures \u003cstrong\u003elight energy emitted \u003c/strong\u003efrom a\u003cstrong\u003e light source\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eCandela\u003c/strong\u003e is the\u003cstrong\u003e SI unit\u003c/strong\u003e of \u003cstrong\u003eLuminous intensity\u003c/strong\u003e.\u0026nbsp;\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eThe\u003c/strong\u003e \u003cstrong\u003eamount of light that emits\u003c/strong\u003e in\u0026nbsp;\u003cstrong\u003eunit time per unit solid angle\u003c/strong\u003e is known as \u003cstrong\u003eLuminous intensity\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Diopter. Key Points The power of the lens measured is measured with Diopter and we represent it by D. The reciprocal of focal length in meters is equals to the power of lens. D=1/f, where D stands for power of lens (Diopter) and f stands for focal length of the lens in meter. Additional Information Lumen is the SI unit of Luminous flux. It measures light energy emitted from a light source. Candela is the SI unit of Luminous intensity. The amount of light that emits in unit time per unit solid angle is known as Luminous intensity.","markdown":"## Q31.\n\nThe power of the lens is measured in\n\n### Options\n\nA. Diopter\n\nB. Ion\n\nC. Lumen\n\nD. Candela\n\n**Correct Answer:** A\n\n### Solution\n\nThe correct answer is **Diopter**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* The power of the lens measured is measured with **Diopter** and we represent it by**D**.\n* **The reciprocal of focal length in meters** is equals to the**power of lens**. **D=1/f**, where **D** stands for **power of lens (Diopter)**and **f**stands for **focal length of the lens in meter**.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **Lumen** is the **SI unit** of**Luminous flux**. It measures **light energy emitted**from a**light source**.\n* **Candela** is the**SI unit** of **Luminous intensity**.\n* **The** **amount of light that emits** in **unit time per unit solid angle** is known as **Luminous intensity**.\n\n---\n"},"Hindi":{"qNo":31,"language":"Hindi","questionHTML":"लेन्स की क्षमता मापी जाती है\u0026nbsp;","questionText":"लेन्स की क्षमता मापी जाती है","options":[{"label":"A","html":"डायोप्टर","text":"डायोप्टर"},{"label":"B","html":"इअन में\u0026nbsp;","text":"इअन में"},{"label":"C","html":"ल्युमन में\u0026nbsp;","text":"ल्युमन में"},{"label":"D","html":"कैंडेला में\u0026nbsp;","text":"कैंडेला में"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eसही उत्तर \u003cu\u003e\u003cstrong\u003eडायोप्टर \u003c/strong\u003e\u003c/u\u003eहै।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eलेंस की क्षमता को\u003cstrong\u003e \u003c/strong\u003e\u003cstrong\u003eडायोप्टर \u003c/strong\u003eद्वारा मापा जाता है और हम इसे\u003cstrong\u003e D\u003c/strong\u003e द्वारा दर्शाते हैं।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eमीटर में फोकस दूरी\u0026nbsp;का व्युत्क्रम \u003c/strong\u003eलेंस की क्षमता के बराबर होता है। \u003cstrong\u003eD=1/f\u003c/strong\u003e, जहां\u0026nbsp;\u003cstrong\u003eD\u003c/strong\u003e का अर्थ\u0026nbsp;डायोप्टर\u003cstrong\u003e (डाइऑप्टर\u0026nbsp;में)\u0026nbsp;\u003c/strong\u003eऔर\u0026nbsp;\u003cstrong\u003ef \u003c/strong\u003eका अर्थ\u003cstrong\u003e\u0026nbsp;मीटर में लेंस की \u003c/strong\u003e\u003cspan style=\"font-weight: 700; \"\u003eफोकस दूरी\u003c/span\u003e है।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u0026nbsp; \u0026nbsp;\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eल्युमन\u003c/strong\u003e\u0026nbsp;\u003cstrong\u003eज्योति फ्लक्स\u003c/strong\u003e\u0026nbsp;का\u0026nbsp;\u003cspan style=\"font-weight: 700;\"\u003eSI\u0026nbsp;\u003c/span\u003e\u003cstrong\u003eमात्रक\u003c/strong\u003e है। यह \u003cstrong\u003eप्रकाश स्रोत\u003c/strong\u003e से \u003cstrong\u003eउत्सर्जित प्रकाश ऊर्जा\u003c/strong\u003e को मापता है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eकैंडेला \u003c/strong\u003e\u003cspan style=\"font-weight: 700;\"\u003eज्योति\u0026nbsp;\u003c/span\u003e\u003cstrong\u003eतीव्रता\u003c/strong\u003e\u0026nbsp;का\u0026nbsp;\u003cspan style=\"font-weight: 700;\"\u003eSI\u0026nbsp;\u003c/span\u003e\u003cspan style=\"font-weight: 700;\"\u003eमात्रक\u003c/span\u003e है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eप्रकाश की मात्रा\u003c/strong\u003e जो \u003cstrong\u003eइकाई समय प्रति इकाई ठोस कोण में निकलती है\u003c/strong\u003e, \u003cspan style=\"font-weight: 700;\"\u003eज्योति\u0026nbsp;\u003c/span\u003e\u003cstrong\u003e\u003cspan style=\"color: rgba(0, 0, 0, 0.87);  \"\u003eतीव्रता\u003c/span\u003e \u003c/strong\u003eके रूप में जानी जाती है।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर डायोप्टर है। Key Points लेंस की क्षमता को डायोप्टर द्वारा मापा जाता है और हम इसे D द्वारा दर्शाते हैं। मीटर में फोकस दूरी का व्युत्क्रम लेंस की क्षमता के बराबर होता है। D=1/f, जहां D का अर्थ डायोप्टर (डाइऑप्टर में) और f का अर्थ मीटर में लेंस की फोकस दूरी है। Additional Information ल्युमन ज्योति फ्लक्स का SI मात्रक है। यह प्रकाश स्रोत से उत्सर्जित प्रकाश ऊर्जा को मापता है। कैंडेला ज्योति तीव्रता का SI मात्रक है। प्रकाश की मात्रा जो इकाई समय प्रति इकाई ठोस कोण में निकलती है, ज्योति तीव्रता के रूप में जानी जाती है।","markdown":"## Q31.\n\nलेन्स की क्षमता मापी जाती है\n\n### Options\n\nA. डायोप्टर\n\nB. इअन में\n\nC. ल्युमन में\n\nD. कैंडेला में\n\n**Correct Answer:** A\n\n### Solution\n\nसही उत्तर **डायोप्टर**है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* लेंस की क्षमता को**डायोप्टर**द्वारा मापा जाता है और हम इसे**D** द्वारा दर्शाते हैं।\n* **मीटर में फोकस दूरी का व्युत्क्रम**लेंस की क्षमता के बराबर होता है। **D=1/f**, जहां **D** का अर्थ डायोप्टर**(डाइऑप्टर में)**और **f**का अर्थ**मीटर में लेंस की**फोकस दूरी है।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **ल्युमन** **ज्योति फ्लक्स** का SI **मात्रक** है। यह **प्रकाश स्रोत** से **उत्सर्जित प्रकाश ऊर्जा** को मापता है।\n* **कैंडेला**ज्योति **तीव्रता** का SI मात्रक है।\n* **प्रकाश की मात्रा** जो **इकाई समय प्रति इकाई ठोस कोण में निकलती है**, ज्योति **तीव्रता**के रूप में जानी जाती है।\n\n---\n"}}},{"index":32,"qNo":"Question No. 32","languages":{"English":{"qNo":32,"language":"English","questionHTML":"Which of the following is also used as a lubricant?","questionText":"Which of the following is also used as a lubricant?","options":[{"label":"A","html":"Cuprite","text":"Cuprite"},{"label":"B","html":"Graphite","text":"Graphite"},{"label":"C","html":"Hematite","text":"Hematite"},{"label":"D","html":"Cryolite\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","text":"Cryolite"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003eGraphite\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eGraphite\u003c/strong\u003e is used as a \u003cstrong\u003elubricant\u003c/strong\u003e because of its \u003cstrong\u003eslippery nature\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eIn \u003cstrong\u003eGraphite,\u003c/strong\u003e there are weak \u003cstrong\u003ewanderwall\u0026nbsp;forces between the layers of Graphite \u003c/strong\u003ewhich made it of \u003cstrong\u003eslippery nature\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eGraphite\u003c/strong\u003e also\u0026nbsp;used in \u003cstrong\u003epencil\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eGraphite\u003c/strong\u003e is a\u0026nbsp;\u003cstrong\u003egood conductor\u003c/strong\u003e of\u003cstrong\u003e heat \u003c/strong\u003eand\u003cstrong\u003e electricity\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eCuprite\u003c/strong\u003e is an ore of \u003cstrong\u003eCopper\u003c/strong\u003e. Its chemical formula is \u003cstrong\u003eCu\u003csub\u003e2\u003c/sub\u003eH\u003csub\u003e2\u003c/sub\u003eO\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eHematite \u003c/strong\u003eis an ore of\u003cstrong\u003e Iron\u003c/strong\u003e. Its chemical formula is \u003cstrong\u003eFe\u003csub\u003e2\u003c/sub\u003eO\u003csub\u003e3\u003c/sub\u003e\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eCryolite\u003c/strong\u003e is an ore of \u003cstrong\u003eAluminium\u003c/strong\u003e. Its chemical formula is\u0026nbsp;\u003cstrong\u003e\u003cspan style=\"color: rgb(32, 33, 36);  \"\u003eNa\u003csub\u003e3\u003c/sub\u003eAlF\u003csub\u003e6\u003c/sub\u003e.\u003c/span\u003e\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Graphite. Key Points Graphite is used as a lubricant because of its slippery nature. In Graphite, there are weak wanderwall forces between the layers of Graphite which made it of slippery nature. Graphite also used in pencil. Graphite is a good conductor of heat and electricity. Additional Information Cuprite is an ore of Copper. Its chemical formula is Cu2H2O. Hematite is an ore of Iron. Its chemical formula is Fe2O3. Cryolite is an ore of Aluminium. Its chemical formula is Na3AlF6.","markdown":"## Q32.\n\nWhich of the following is also used as a lubricant?\n\n### Options\n\nA. Cuprite\n\nB. Graphite\n\nC. Hematite\n\nD. Cryolite\n\n**Correct Answer:** B\n\n### Solution\n\nThe correct answer is **Graphite**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **Graphite** is used as a **lubricant** because of its **slippery nature**.\n* In **Graphite,** there are weak **wanderwall forces between the layers of Graphite**which made it of **slippery nature**.\n* **Graphite** also used in **pencil**.\n* **Graphite** is a **good conductor** of**heat**and**electricity**.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **Cuprite** is an ore of **Copper**. Its chemical formula is **Cu~2~H~2~O**.\n* **Hematite**is an ore of**Iron**. Its chemical formula is **Fe~2~O~3~**.\n* **Cryolite** is an ore of **Aluminium**. Its chemical formula is **Na~3~AlF~6~.**\n\n---\n"},"Hindi":{"qNo":32,"language":"Hindi","questionHTML":"निम्नलिखित में से किसे एक स्नेहक (लुब्रिकेन्ट) के रूप में भी प्रयोग किया जाता है ?\u0026nbsp;","questionText":"निम्नलिखित में से किसे एक स्नेहक (लुब्रिकेन्ट) के रूप में भी प्रयोग किया जाता है ?","options":[{"label":"A","html":"क्युप्राइट\u0026nbsp;\u0026nbsp;","text":"क्युप्राइट"},{"label":"B","html":"ग्रेफाइट\u0026nbsp;\u0026nbsp;","text":"ग्रेफाइट"},{"label":"C","html":"हेमाटाइट\u0026nbsp;\u0026nbsp;","text":"हेमाटाइट"},{"label":"D","html":"क्रायोलाइट\u0026nbsp;\u0026nbsp;","text":"क्रायोलाइट"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eसही उत्तर \u003cu\u003e\u003cstrong\u003eग्रेफाइट\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eग्रेफाइट\u003c/strong\u003e का उपयोग \u003cstrong\u003eस्नेहक\u003c/strong\u003e के रूप में इसकी \u003cstrong\u003eफिसलन प्रकृति \u003c/strong\u003eके कारण किया जाता है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eग्रेफाइट\u003c/strong\u003e में, \u003cstrong\u003eग्रेफाइट की परतों के बीच \u003c/strong\u003eकमजोर \u003cstrong\u003eवांडरवाल बल \u003c/strong\u003eहोता है जो इसे \u003cstrong\u003eफिसलन प्रकृति\u003c/strong\u003e का बनाता है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eपेंसिल \u003c/strong\u003eमें भी\u003cstrong\u003e ग्रेफाइट\u003c/strong\u003e का उपयोग किया जाता है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eग्रेफाइट उष्मा \u003c/strong\u003eऔर\u003cstrong\u003e विद्युत \u003c/strong\u003eका \u003cstrong\u003eअच्छा संवाहक\u003c/strong\u003e होता है।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eक्यूप्राइट\u003c/strong\u003e \u003cstrong\u003eतांबे \u003c/strong\u003eका एक अयस्क है। इसका रासायनिक सूत्र\u0026nbsp;\u003cstrong\u003eCu\u003csub\u003e2\u003c/sub\u003eH\u003csub\u003e2\u003c/sub\u003eO\u003c/strong\u003e\u0026nbsp;है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eहेमेटाइट लोहे \u003c/strong\u003eका एक अयस्क है। इसका रासायनिक सूत्र \u003cstrong\u003eFe\u003csub\u003e2\u003c/sub\u003eO\u003csub\u003e3\u003c/sub\u003e\u003c/strong\u003e\u0026nbsp;है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eक्रायोलाइट एल्युमिनियम\u003c/strong\u003e का अयस्क है।\u0026nbsp;इसका रासायनिक सूत्र\u0026nbsp;\u003cstrong\u003e\u003cspan style=\"color: rgb(32, 33, 36);  \"\u003eNa\u003csub\u003e3\u003c/sub\u003eAlF\u003csub\u003e6\u003c/sub\u003e\u003c/span\u003e\u003c/strong\u003e\u0026nbsp;है।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर ग्रेफाइट है। Key Points ग्रेफाइट का उपयोग स्नेहक के रूप में इसकी फिसलन प्रकृति के कारण किया जाता है। ग्रेफाइट में, ग्रेफाइट की परतों के बीच कमजोर वांडरवाल बल होता है जो इसे फिसलन प्रकृति का बनाता है। पेंसिल में भी ग्रेफाइट का उपयोग किया जाता है। ग्रेफाइट उष्मा और विद्युत का अच्छा संवाहक होता है। Additional Information क्यूप्राइट तांबे का एक अयस्क है। इसका रासायनिक सूत्र Cu2H2O है। हेमेटाइट लोहे का एक अयस्क है। इसका रासायनिक सूत्र Fe2O3 है। क्रायोलाइट एल्युमिनियम का अयस्क है। इसका रासायनिक सूत्र Na3AlF6 है।","markdown":"## Q32.\n\nनिम्नलिखित में से किसे एक स्नेहक (लुब्रिकेन्ट) के रूप में भी प्रयोग किया जाता है ?\n\n### Options\n\nA. क्युप्राइट\n\nB. ग्रेफाइट\n\nC. हेमाटाइट\n\nD. क्रायोलाइट\n\n**Correct Answer:** B\n\n### Solution\n\nसही उत्तर **ग्रेफाइट** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **ग्रेफाइट** का उपयोग **स्नेहक** के रूप में इसकी **फिसलन प्रकृति**के कारण किया जाता है।\n* **ग्रेफाइट** में, **ग्रेफाइट की परतों के बीच**कमजोर **वांडरवाल बल**होता है जो इसे **फिसलन प्रकृति** का बनाता है।\n* **पेंसिल**में भी**ग्रेफाइट** का उपयोग किया जाता है।\n* **ग्रेफाइट उष्मा**और**विद्युत**का **अच्छा संवाहक** होता है।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **क्यूप्राइट** **तांबे**का एक अयस्क है। इसका रासायनिक सूत्र **Cu~2~H~2~O** है।\n* **हेमेटाइट लोहे**का एक अयस्क है। इसका रासायनिक सूत्र **Fe~2~O~3~** है।\n* **क्रायोलाइट एल्युमिनियम** का अयस्क है। इसका रासायनिक सूत्र **Na~3~AlF~6~** है।\n\n---\n"}}},{"index":33,"qNo":"Question No. 33","languages":{"English":{"qNo":33,"language":"English","questionHTML":"'Laughing Gas' is:","questionText":"'Laughing Gas' is:","options":[{"label":"A","html":"Hydrogen Peroxide","text":"Hydrogen Peroxide"},{"label":"B","html":"Nitrous Oxide \u0026nbsp;","text":"Nitrous Oxide"},{"label":"C","html":"Carbon Monoxide","text":"Carbon Monoxide"},{"label":"D","html":"Sulphur Dioxide","text":"Sulphur Dioxide"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003eNitrous Oxide\u003c/strong\u003e.\u003c/u\u003e\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eNitrous oxide is a chemical compound.\u003c/li\u003e\n\t\u003cli\u003eIt is known as \u003cstrong\u003eLaughing Gas or Haas Gas\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eIts chemical formula is N\u003csub\u003e2\u003c/sub\u003eO.\u003c/li\u003e\n\t\u003cli\u003eIt is a colourless and Non-flammable gas at room temperature.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eHydrogen Peroxide\u003c/strong\u003e is a \u003cstrong\u003echemical compound\u003c/strong\u003e which formula is \u003cstrong\u003eH\u003csub\u003e2\u003c/sub\u003eO\u003csub\u003e2\u003c/sub\u003e\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eHydrogen Peroxide\u003c/strong\u003e used as a \u003cstrong\u003ebleaching agent, antiseptic, and oxidizer\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eCarbon monoxide\u003c/strong\u003e is a \u003cstrong\u003etoxic, colourless, tasteless gas\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eThe carbon monoxide\u0026nbsp;\u003c/strong\u003echemical formula is\u003cstrong\u003e CO\u003c/strong\u003e.\u0026nbsp;\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eCarbon monoxide\u003c/strong\u003e is known as \u003cstrong\u003esilent killer\u003c/strong\u003e gas.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eThe sulfur dioxide\u003c/strong\u003e chemical formula is \u003cstrong\u003eSO\u003csub\u003e2\u003c/sub\u003e\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eSulfur dioxide\u003c/strong\u003e is a \u003cstrong\u003etoxic gas\u003c/strong\u003e and it smells like \u003cstrong\u003eburnt matches\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eSulfur dioxide naturally\u003c/strong\u003e released in \u003cstrong\u003eVolcanic activity\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Nitrous Oxide. Key Points Nitrous oxide is a chemical compound. It is known as Laughing Gas or Haas Gas. Its chemical formula is N2O. It is a colourless and Non-flammable gas at room temperature. Additional Information Hydrogen Peroxide is a chemical compound which formula is H2O2. Hydrogen Peroxide used as a bleaching agent, antiseptic, and oxidizer. Carbon monoxide is a toxic, colourless, tasteless gas. The carbon monoxide chemical formula is CO. Carbon monoxide is known as silent killer gas. The sulfur dioxide chemical formula is SO2. Sulfur dioxide is a toxic gas and it smells like burnt matches. Sulfur dioxide naturally released in Volcanic activity.","markdown":"## Q33.\n\n'Laughing Gas' is:\n\n### Options\n\nA. Hydrogen Peroxide\n\nB. Nitrous Oxide\n\nC. Carbon Monoxide\n\nD. Sulphur Dioxide\n\n**Correct Answer:** B\n\n### Solution\n\nThe correct answer is **Nitrous Oxide**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* Nitrous oxide is a chemical compound.\n* It is known as **Laughing Gas or Haas Gas**.\n* Its chemical formula is N~2~O.\n* It is a colourless and Non-flammable gas at room temperature.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **Hydrogen Peroxide** is a **chemical compound** which formula is **H~2~O~2~**.\n* **Hydrogen Peroxide** used as a **bleaching agent, antiseptic, and oxidizer**.\n* **Carbon monoxide** is a **toxic, colourless, tasteless gas**.\n* **The carbon monoxide**chemical formula is**CO**.\n* **Carbon monoxide** is known as **silent killer** gas.\n* **The sulfur dioxide** chemical formula is **SO~2~**.\n* **Sulfur dioxide** is a **toxic gas** and it smells like **burnt matches**.\n* **Sulfur dioxide naturally** released in **Volcanic activity**.\n\n---\n"},"Hindi":{"qNo":33,"language":"Hindi","questionHTML":"'लाफिंग गैस' क्या होती है?","questionText":"'लाफिंग गैस' क्या होती है?","options":[{"label":"A","html":"हाइड्रोजन परऑक्साइड\u0026nbsp; \u0026nbsp; \u0026nbsp;","text":"हाइड्रोजन परऑक्साइड"},{"label":"B","html":"नाइट्रस ऑक्साइड\u0026nbsp; \u0026nbsp;","text":"नाइट्रस ऑक्साइड"},{"label":"C","html":"कार्बन मोनोक्साइड\u0026nbsp;","text":"कार्बन मोनोक्साइड"},{"label":"D","html":"सल्फर डाइऑक्साइड\u0026nbsp; \u0026nbsp;","text":"सल्फर डाइऑक्साइड"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eसही उत्तर \u003cu\u003e\u003cstrong\u003eनाइट्रस ऑक्साइड\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eनाइट्रस ऑक्साइड एक रासायनिक यौगिक है।\u003c/li\u003e\n\t\u003cli\u003eइसे \u003cstrong\u003eलाफिंग गैस या हास्य गैस\u003c/strong\u003e के रूप में जाना जाता है।\u003c/li\u003e\n\t\u003cli\u003eइसका रासायनिक सूत्र\u0026nbsp;N\u003csub\u003e2\u003c/sub\u003eO\u0026nbsp;है।\u003c/li\u003e\n\t\u003cli\u003eयह कमरे के तापमान पर एक रंगहीन और गैर-ज्वलनशील गैस है।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eहाइड्रोजन पेरोक्साइड\u003c/strong\u003e एक \u003cstrong\u003eरासायनिक यौगिक\u003c/strong\u003e है जिसका सूत्र \u003cstrong\u003eH\u003csub\u003e2\u003c/sub\u003eO\u003csub\u003e2\u003c/sub\u003e\u003c/strong\u003e है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eहाइड्रोजन पेरोक्साइड\u003c/strong\u003e एक \u003cstrong\u003eविरंजन एजेंट, एंटीसेप्टिक और ऑक्सीडाइज़र\u003c/strong\u003e के रूप में उपयोग किया जाता है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eकार्बन मोनोऑक्साइड\u003c/strong\u003e एक \u003cstrong\u003eविषाक्त, रंगहीन, स्वादहीन गैस \u003c/strong\u003eहै।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eकार्बन मोनोऑक्साइड\u003c/strong\u003e का रासायनिक सूत्र \u003cstrong\u003eCO\u003c/strong\u003e है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eकार्बन मोनोऑक्साइड\u003c/strong\u003e को \u003cstrong\u003eसाइलेंट किलर \u003c/strong\u003eगैस के रूप में जाना जाता है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eसल्फर डाइऑक्साइड\u003c/strong\u003e का रासायनिक सूत्र \u003cstrong\u003eSO\u003csub\u003e2\u003c/sub\u003e\u003c/strong\u003e है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eसल्फर डाइऑक्साइड\u003c/strong\u003e एक \u003cstrong\u003eजहरीली गैस \u003c/strong\u003eहै और इसमें\u003cstrong\u003e जले हुए माचिस \u003c/strong\u003eजैसी गंध आती है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eसल्फर डाइऑक्साइड\u003c/strong\u003e \u003cstrong\u003eप्राकृतिक\u0026nbsp;रूप से\u003c/strong\u003e \u003cstrong\u003eज्वालामुखीय गतिविधि \u003c/strong\u003eमें मुक्त होता है।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर नाइट्रस ऑक्साइड है। Key Points नाइट्रस ऑक्साइड एक रासायनिक यौगिक है। इसे लाफिंग गैस या हास्य गैस के रूप में जाना जाता है। इसका रासायनिक सूत्र N2O है। यह कमरे के तापमान पर एक रंगहीन और गैर-ज्वलनशील गैस है। Additional Information हाइड्रोजन पेरोक्साइड एक रासायनिक यौगिक है जिसका सूत्र H2O2 है। हाइड्रोजन पेरोक्साइड एक विरंजन एजेंट, एंटीसेप्टिक और ऑक्सीडाइज़र के रूप में उपयोग किया जाता है। कार्बन मोनोऑक्साइड एक विषाक्त, रंगहीन, स्वादहीन गैस है। कार्बन मोनोऑक्साइड का रासायनिक सूत्र CO है। कार्बन मोनोऑक्साइड को साइलेंट किलर गैस के रूप में जाना जाता है। सल्फर डाइऑक्साइड का रासायनिक सूत्र SO2 है। सल्फर डाइऑक्साइड एक जहरीली गैस है और इसमें जले हुए माचिस जैसी गंध आती है। सल्फर डाइऑक्साइड प्राकृतिक रूप से ज्वालामुखीय गतिविधि में मुक्त होता है।","markdown":"## Q33.\n\n'लाफिंग गैस' क्या होती है?\n\n### Options\n\nA. हाइड्रोजन परऑक्साइड\n\nB. नाइट्रस ऑक्साइड\n\nC. कार्बन मोनोक्साइड\n\nD. सल्फर डाइऑक्साइड\n\n**Correct Answer:** B\n\n### Solution\n\nसही उत्तर **नाइट्रस ऑक्साइड** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* नाइट्रस ऑक्साइड एक रासायनिक यौगिक है।\n* इसे **लाफिंग गैस या हास्य गैस** के रूप में जाना जाता है।\n* इसका रासायनिक सूत्र N~2~O है।\n* यह कमरे के तापमान पर एक रंगहीन और गैर-ज्वलनशील गैस है।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **हाइड्रोजन पेरोक्साइड** एक **रासायनिक यौगिक** है जिसका सूत्र **H~2~O~2~** है।\n* **हाइड्रोजन पेरोक्साइड** एक **विरंजन एजेंट, एंटीसे

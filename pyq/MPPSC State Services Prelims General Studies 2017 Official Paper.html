anguage":"English","questionHTML":"Manohar Aich was called 'Pocket Hercules'. He were a","questionText":"Manohar Aich was called 'Pocket Hercules'. He were a","options":[{"label":"A","html":"Boxer","text":"Boxer"},{"label":"B","html":"Athlete","text":"Athlete"},{"label":"C","html":"Swimmer","text":"Swimmer"},{"label":"D","html":"\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003eBody Builder\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","text":"Body Builder"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003eBody Builder\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eManohar Aich was an \u003cstrong\u003eIndian bodybuilder\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eHe was the first Indian to win the Mr. Universe title\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eHe did so in the 1952 NABBA Universe Championships.\u003c/li\u003e\n\t\u003cli\u003eHe had a Height of\u0026nbsp;4 feet 11 inches tall.\u003c/li\u003e\n\t\u003cli\u003eTherefore he was given the name \"\u003cstrong\u003ePocket Hercules\u003c/strong\u003e\".\u0026nbsp;\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Body Builder. Key Points Manohar Aich was an Indian bodybuilder. He was the first Indian to win the Mr. Universe title. He did so in the 1952 NABBA Universe Championships. He had a Height of 4 feet 11 inches tall. Therefore he was given the name \"Pocket Hercules\".","markdown":"## Q65.\n\nManohar Aich was called 'Pocket Hercules'. He were a\n\n### Options\n\nA. Boxer\n\nB. Athlete\n\nC. Swimmer\n\nD. Body Builder\n\n**Correct Answer:** D\n\n### Solution\n\nThe correct answer is **Body Builder**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* Manohar Aich was an **Indian bodybuilder**.\n* **He was the first Indian to win the Mr. Universe title**.\n* He did so in the 1952 NABBA Universe Championships.\n* He had a Height of 4 feet 11 inches tall.\n* Therefore he was given the name \"**Pocket Hercules**\".\n\n---\n"},"Hindi":{"qNo":65,"language":"Hindi","questionHTML":"मनोहर आइच को 'पॉकिट हर्क्यूलिस' कहा जाता था। वे क्या\u0026nbsp;थे?","questionText":"मनोहर आइच को 'पॉकिट हर्क्यूलिस' कहा जाता था। वे क्या थे?","options":[{"label":"A","html":"मुक्केबाज","text":"मुक्केबाज"},{"label":"B","html":"\u003cspan style=\"color: rgb(37, 37, 37);  \"\u003eएथलीट\u003c/span\u003e","text":"एथलीट"},{"label":"C","html":"तैराक","text":"तैराक"},{"label":"D","html":"बॉडीबिल्डर","text":"बॉडीबिल्डर"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eबॉडीबिल्डर\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eमनोहर आइच एक \u003cstrong\u003eभारतीय बॉडी बिल्डर\u003c/strong\u003e थे।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eवह मिस्टर यूनिवर्स का खिताब जीतने वाले पहले भारतीय थे।\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003eउन्होंने 1952 में एनएबीबीए यूनिवर्स चैंपियनशिप में ऐसा किया था।\u003c/li\u003e\n\t\u003cli\u003eउनकी लंबाई 4 फीट 11 इंच थी।\u003c/li\u003e\n\t\u003cli\u003eइसलिए उन्हें \u003cstrong\u003e\"पॉकेट हरक्यूलिस\"\u003c/strong\u003e नाम दिया गया था।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर बॉडीबिल्डर है। Key Points मनोहर आइच एक भारतीय बॉडी बिल्डर थे। वह मिस्टर यूनिवर्स का खिताब जीतने वाले पहले भारतीय थे। उन्होंने 1952 में एनएबीबीए यूनिवर्स चैंपियनशिप में ऐसा किया था। उनकी लंबाई 4 फीट 11 इंच थी। इसलिए उन्हें \"पॉकेट हरक्यूलिस\" नाम दिया गया था।","markdown":"## Q65.\n\nमनोहर आइच को 'पॉकिट हर्क्यूलिस' कहा जाता था। वे क्या थे?\n\n### Options\n\nA. मुक्केबाज\n\nB. एथलीट\n\nC. तैराक\n\nD. बॉडीबिल्डर\n\n**Correct Answer:** D\n\n### Solution\n\nसही उत्तर **बॉडीबिल्डर** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* मनोहर आइच एक **भारतीय बॉडी बिल्डर** थे।\n* **वह मिस्टर यूनिवर्स का खिताब जीतने वाले पहले भारतीय थे।**\n* उन्होंने 1952 में एनएबीबीए यूनिवर्स चैंपियनशिप में ऐसा किया था।\n* उनकी लंबाई 4 फीट 11 इंच थी।\n* इसलिए उन्हें **\"पॉकेट हरक्यूलिस\"** नाम दिया गया था।\n\n---\n"}}},{"index":66,"qNo":"Question No. 66","languages":{"English":{"qNo":66,"language":"English","questionHTML":"What are 'Ranjit Sub-1' and 'Bahadur Sub-1'?","questionText":"What are 'Ranjit Sub-1' and 'Bahadur Sub-1'?","options":[{"label":"A","html":"Two Fighter Jets","text":"Two Fighter Jets"},{"label":"B","html":"Two Submarines","text":"Two Submarines"},{"label":"C","html":"Two new varieties of paddy","text":"Two new varieties of paddy"},{"label":"D","html":"Two new varieties of wheat\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","text":"Two new varieties of wheat"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cu\u003e\u003cstrong\u003eTwo new varieties of paddy\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eFarmers from Assam have cultivated new flood-resistant paddy varieties.\u003c/li\u003e\n\t\u003cli\u003eThe varieties called \u003cstrong\u003eRanjit Sub1\u003c/strong\u003e, \u003cstrong\u003eSwarna Sub1\u003c/strong\u003e and \u003cstrong\u003eBahadur Sub1\u003c/strong\u003e have been used in the West Brahmaputra area.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003ePhenotypic screening during Kharif 2015 and evaluation of Sub1 introgressed lines in Ranjit and Bahadur for submergence tolerance was done with the 35 genotypes.\u003c/li\u003e\n\t\u003cli\u003eOut of 35 genotypes, 32 were Sub1 introgressed BC2F3 lines (24 BC2F3 lines of the cross -Ranjit x Swarna-Sub1and 8 BC2F3 lines of the cross -Bahadur x Swarna-Sub1) with three parents i.e. Ranjit, Bahadur, and Swarna-Sub1.\u003c/li\u003e\n\t\u003cli\u003eThe phenotypic screening of genotypes showed that all Sub1 introgressed lines had significantly higher survival rates as compared with the original recipient parents whereas less change in plant height was observed.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Two new varieties of paddy. Key Points Farmers from Assam have cultivated new flood-resistant paddy varieties. The varieties called Ranjit Sub1, Swarna Sub1 and Bahadur Sub1 have been used in the West Brahmaputra area. Additional Information Phenotypic screening during Kharif 2015 and evaluation of Sub1 introgressed lines in Ranjit and Bahadur for submergence tolerance was done with the 35 genotypes. Out of 35 genotypes, 32 were Sub1 introgressed BC2F3 lines (24 BC2F3 lines of the cross -Ranjit x Swarna-Sub1and 8 BC2F3 lines of the cross -Bahadur x Swarna-Sub1) with three parents i.e. Ranjit, Bahadur, and Swarna-Sub1. The phenotypic screening of genotypes showed that all Sub1 introgressed lines had significantly higher survival rates as compared with the original recipient parents whereas less change in plant height was observed.","markdown":"## Q66.\n\nWhat are 'Ranjit Sub-1' and 'Bahadur Sub-1'?\n\n### Options\n\nA. Two Fighter Jets\n\nB. Two Submarines\n\nC. Two new varieties of paddy\n\nD. Two new varieties of wheat\n\n**Correct Answer:** C\n\n### Solution\n\nThe correct answer is **Two new varieties of paddy**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* Farmers from Assam have cultivated new flood-resistant paddy varieties.\n* The varieties called **Ranjit Sub1**, **Swarna Sub1** and **Bahadur Sub1** have been used in the West Brahmaputra area.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* Phenotypic screening during Kharif 2015 and evaluation of Sub1 introgressed lines in Ranjit and Bahadur for submergence tolerance was done with the 35 genotypes.\n* Out of 35 genotypes, 32 were Sub1 introgressed BC2F3 lines (24 BC2F3 lines of the cross -Ranjit x Swarna-Sub1and 8 BC2F3 lines of the cross -Bahadur x Swarna-Sub1) with three parents i.e. Ranjit, Bahadur, and Swarna-Sub1.\n* The phenotypic screening of genotypes showed that all Sub1 introgressed lines had significantly higher survival rates as compared with the original recipient parents whereas less change in plant height was observed.\n\n---\n"},"Hindi":{"qNo":66,"language":"Hindi","questionHTML":"'रंजीत सब-1' एवं 'बहादुर सब-1' क्या हैं?","questionText":"'रंजीत सब-1' एवं 'बहादुर सब-1' क्या हैं?","options":[{"label":"A","html":"दो लड़ाकू विमान","text":"दो लड़ाकू विमान"},{"label":"B","html":"दो पनडुब्बियाँ","text":"दो पनडुब्बियाँ"},{"label":"C","html":"धान की दो नई किस्में","text":"धान की दो नई किस्में"},{"label":"D","html":"गेहूँ की दो नई किस्में","text":"गेहूँ की दो नई किस्में"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eधान की दो नई किस्में\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eअसम के किसानों ने नई बाढ़ प्रतिरोधी धान की किस्मों की कृषि की है।\u003c/li\u003e\n\t\u003cli\u003eपश्चिम ब्रह्मपुत्र क्षेत्र में \u003cstrong\u003eरंजीत सब-1, स्वर्ण सब-1 \u003c/strong\u003eऔर \u003cstrong\u003eबहादुर सब-1\u003c/strong\u003e नामक किस्मों का उपयोग किया गया है।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eखरीफ 2015 के दौरान फेनोटाइपिक स्क्रीनिंग और जलमग्न सहिष्णुता के लिए रंजीत और बहादुर में सब-1 अंतर्मुखी लाइनों का मूल्यांकन 35 जीनोटाइप के साथ किया गया था।\u003c/li\u003e\n\t\u003cli\u003e35 जीनोटाइप्स में से, 32 BC2F3 लाइनों (24 BC2F3 लाइनों के क्रॉस-रंजीत x स्वर्ण-सब-1 और 8 BC2F3 लाइनों के क्रॉस -बहादुर x स्वर्ण-सब-1) की तीन पेरेंट अर्थात् रंजीत, बहादुर और स्वर्ण-1 के साथ सब-1 अंतर्मुखी थे।\u003c/li\u003e\n\t\u003cli\u003eजीनोटाइप के फेनोटाइपिक स्क्रीनिंग से पता चला कि सभी सब 1 अंतर्मुखी लाइनों में मूल प्राप्तकर्ता माता-पिता की तुलना में जीवित रहने की दर काफी अधिक थी, जबकि पौधे की ऊंचाई में कम परिवर्तन देखा गया था।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर धान की दो नई किस्में है। Key Points असम के किसानों ने नई बाढ़ प्रतिरोधी धान की किस्मों की कृषि की है। पश्चिम ब्रह्मपुत्र क्षेत्र में रंजीत सब-1, स्वर्ण सब-1 और बहादुर सब-1 नामक किस्मों का उपयोग किया गया है। Additional Information खरीफ 2015 के दौरान फेनोटाइपिक स्क्रीनिंग और जलमग्न सहिष्णुता के लिए रंजीत और बहादुर में सब-1 अंतर्मुखी लाइनों का मूल्यांकन 35 जीनोटाइप के साथ किया गया था। 35 जीनोटाइप्स में से, 32 BC2F3 लाइनों (24 BC2F3 लाइनों के क्रॉस-रंजीत x स्वर्ण-सब-1 और 8 BC2F3 लाइनों के क्रॉस -बहादुर x स्वर्ण-सब-1) की तीन पेरेंट अर्थात् रंजीत, बहादुर और स्वर्ण-1 के साथ सब-1 अंतर्मुखी थे। जीनोटाइप के फेनोटाइपिक स्क्रीनिंग से पता चला कि सभी सब 1 अंतर्मुखी लाइनों में मूल प्राप्तकर्ता माता-पिता की तुलना में जीवित रहने की दर काफी अधिक थी, जबकि पौधे की ऊंचाई में कम परिवर्तन देखा गया था।","markdown":"## Q66.\n\n'रंजीत सब-1' एवं 'बहादुर सब-1' क्या हैं?\n\n### Options\n\nA. दो लड़ाकू विमान\n\nB. दो पनडुब्बियाँ\n\nC. धान की दो नई किस्में\n\nD. गेहूँ की दो नई किस्में\n\n**Correct Answer:** C\n\n### Solution\n\nसही उत्तर **धान की दो नई किस्में** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* असम के किसानों ने नई बाढ़ प्रतिरोधी धान की किस्मों की कृषि की है।\n* पश्चिम ब्रह्मपुत्र क्षेत्र में **रंजीत सब-1, स्वर्ण सब-1**और **बहादुर सब-1** नामक किस्मों का उपयोग किया गया है।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* खरीफ 2015 के दौरान फेनोटाइपिक स्क्रीनिंग और जलमग्न सहिष्णुता के लिए रंजीत औ information-image.png)**Additional Information**\n\n \n* **Philippines:** \n* Capital - Manila\n* Total Area - 300,000 km^2^\n* Asian Development Bank's HQ is in **Manila, Philippines.**\n\n---\n"},"Hindi":{"qNo":67,"language":"Hindi","questionHTML":"मई 2016 में रॉड्रिगो ड्यूटेर्ट किस देश के राष्ट्रपतिनिर्वाचित हुए?","questionText":"मई 2016 में रॉड्रिगो ड्यूटेर्ट किस देश के राष्ट्रपतिनिर्वाचित हुए?","options":[{"label":"A","html":"थाईलैंड","text":"थाईलैंड"},{"label":"B","html":"स्विट्ज़रलैंड","text":"स्विट्ज़रलैंड"},{"label":"C","html":"मेक्सिको","text":"मेक्सिको"},{"label":"D","html":"फिलिपीन्स","text":"फिलिपीन्स"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eफिलिपीन्स\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eरोड्रिगो रोआ दुतेर्ते फिलीपींस के वर्तमान राष्ट्रपति हैं।\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003eवह पद संभालने वाले मिंडानाओ से पहले थे।\u003c/li\u003e\n\t\u003cli\u003eवे पीडीपी-लाबान के अध्यक्ष हैं।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cspan style=\"font-weight: 700;\"\u003eफिलिपीन्स\u003c/span\u003e\u003cstrong\u003e:\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eराजधानी - मनीला\u003c/li\u003e\n\t\t\u003cli\u003eकुल क्षेत्रफल -\u0026nbsp;300,000 किमी\u003csup\u003e2\u003c/sup\u003e\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003eएशियाई विकास बैंक का मुख्यालय \u003cstrong\u003eफिलीपींस के\u0026nbsp;मनीला\u003c/strong\u003e में है।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर फिलिपीन्स है। Key Points रोड्रिगो रोआ दुतेर्ते फिलीपींस के वर्तमान राष्ट्रपति हैं। वह पद संभालने वाले मिंडानाओ से पहले थे। वे पीडीपी-लाबान के अध्यक्ष हैं। Additional Information फिलिपीन्स: राजधानी - मनीला कुल क्षेत्रफल - 300,000 किमी2 एशियाई विकास बैंक का मुख्यालय फिलीपींस के मनीला में है।","markdown":"## Q67.\n\nमई 2016 में रॉड्रिगो ड्यूटेर्ट किस देश के राष्ट्रपतिनिर्वाचित हुए?\n\n### Options\n\nA. थाईलैंड\n\nB. स्विट्ज़रलैंड\n\nC. मेक्सिको\n\nD. फिलिपीन्स\n\n**Correct Answer:** D\n\n### Solution\n\nसही उत्तर **फिलिपीन्स** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **रोड्रिगो रोआ दुतेर्ते फिलीपींस के वर्तमान राष्ट्रपति हैं।**\n* वह पद संभालने वाले मिंडानाओ से पहले थे।\n* वे पीडीपी-लाबान के अध्यक्ष हैं।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* फिलिपीन्स**:** \n* राजधानी - मनीला\n* कुल क्षेत्रफल - 300,000 किमी^2^\n* एशियाई विकास बैंक का मुख्यालय **फिलीपींस के मनीला** में है।\n\n---\n"}}},{"index":68,"qNo":"Question No. 68","languages":{"English":{"qNo":68,"language":"English","questionHTML":"Who administered the West Bengal Chief Minister's oath to Mamata Banerjee on May 27, 2016?","questionText":"Who administered the West Bengal Chief Minister's oath to Mamata Banerjee on May 27, 2016?","options":[{"label":"A","html":"Ram Naik","text":"Ram Naik"},{"label":"B","html":"Kesari nath Tripathi","text":"Kesari nath Tripathi"},{"label":"C","html":"T. S. Thakur","text":"T. S. Thakur"},{"label":"D","html":"\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e\u003cspan style=\" \"\u003eP.Sathasivam\u003c/span\u003e\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","text":"P.Sathasivam"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cu\u003e\u003cstrong\u003eKesarinath Tripathi\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eKesari Nath Tripathi administered the West Bengal Chief Minister's oath\u003c/strong\u003e to Mamata Banerjee on May 27, 2016.\u003c/li\u003e\n\t\u003cli\u003eKeshari Nath Tripathi was then West Bengal's Governor.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u0026nbsp;\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eHis tenure was from \u003cstrong\u003e2014 to\u0026nbsp;2019\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eHe also had an additional charge for\u0026nbsp;Governor of Bihar, Meghalaya, and Mizoram.\u003c/li\u003e\n\t\u003cli\u003eHe was a member of the Bharatiya Janata Party.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Kesarinath Tripathi. Key Points Kesari Nath Tripathi administered the West Bengal Chief Minister's oath to Mamata Banerjee on May 27, 2016. Keshari Nath Tripathi was then West Bengal's Governor. Important Points His tenure was from 2014 to 2019. He also had an additional charge for Governor of Bihar, Meghalaya, and Mizoram. He was a member of the Bharatiya Janata Party.","markdown":"## Q68.\n\nWho administered the West Bengal Chief Minister's oath to Mamata Banerjee on May 27, 2016?\n\n### Options\n\nA. Ram Naik\n\nB. Kesari nath Tripathi\n\nC. T. S. Thakur\n\nD. P.Sathasivam\n\n**Correct Answer:** B\n\n### Solution\n\nThe correct answer is **Kesarinath Tripathi**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **Kesari Nath Tripathi administered the West Bengal Chief Minister's oath** to Mamata Banerjee on May 27, 2016.\n* Keshari Nath Tripathi was then West Bengal's Governor.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* His tenure was from **2014 to 2019**.\n* He also had an additional charge for Governor of Bihar, Meghalaya, and Mizoram.\n* He was a member of the Bharatiya Janata Party.\n\n---\n"},"Hindi":{"qNo":68,"language":"Hindi","questionHTML":"27 मई, 2016 को ममता बनर्जी को पश्चिम बंगाल की मुख्यमंत्री की शपथ किसने दिलवाई?","questionText":"27 मई, 2016 को ममता बनर्जी को पश्चिम बंगाल की मुख्यमंत्री की शपथ किसने दिलवाई?","options":[{"label":"A","html":"राम नाइक","text":"राम नाइक"},{"label":"B","html":"केसरीनाथ त्रिपाठी","text":"केसरीनाथ त्रिपाठी"},{"label":"C","html":"टी. एस. ठाकुर","text":"टी. एस. ठाकुर"},{"label":"D","html":"पी. सदाशिवम","text":"पी. सदाशिवम"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eकेसरीनाथ त्रिपाठी\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eकेसरी नाथ त्रिपाठी \u003c/strong\u003eने 27 मई 2016 को \u003cstrong\u003eपश्चिम बंगाल की मुख्यमंत्री\u003c/strong\u003e ममता बनर्जी \u003cstrong\u003eको शपथ दिलाई।\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003eकेशरी नाथ त्रिपाठी उस समय पश्चिम बंगाल के राज्यपाल थे।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u0026nbsp;\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eउनका कार्यकाल \u003cstrong\u003e2014 से 2019\u003c/strong\u003e तक था।\u003c/li\u003e\n\t\u003cli\u003eउनके पास बिहार, मेघालय और मिजोरम के राज्यपाल का अतिरिक्त प्रभार भी था।\u003c/li\u003e\n\t\u003cli\u003eवह भारतीय जनता पार्टी के सदस्य थे।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर केसरीनाथ त्रिपाठी है। Key Points केसरी नाथ त्रिपाठी ने 27 मई 2016 को पश्चिम बंगाल की मुख्यमंत्री ममता बनर्जी को शपथ दिलाई। केशरी नाथ त्रिपाठी उस समय पश्चिम बंगाल के राज्यपाल थे। Important Points उनका कार्यकाल 2014 से 2019 तक था। उनके पास बिहार, मेघालय और मिजोरम के राज्यपाल का अतिरिक्त प्रभार भी था। वह भारतीय जनता पार्टी के सदस्य थे।","markdown":"## Q68.\n\n27 मई, 2016 को ममता बनर्जी को पश्चिम बंगाल की मुख्यमंत्री की शपथ किसने दिलवाई?\n\n### Options\n\nA. राम नाइक\n\nB. केसरीनाथ त्रिपाठी\n\nC. टी. एस. ठाकुर\n\nD. पी. सदाशिवम\n\n**Correct Answer:** B\n\n### Solution\n\nसही उत्तर **केसरीनाथ त्रिपाठी** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **केसरी नाथ त्रिपाठी**ने 27 मई 2016 को **पश्चिम बंगाल की मुख्यमंत्री** ममता बनर्जी **को शपथ दिलाई।**\n* केशरी नाथ त्रिपाठी उस समय पश्चिम बंगाल के राज्यपाल थे।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* उनका कार्यकाल **2014 से 2019** तक था।\n* उनके पास बिहार, मेघालय और मिजोरम के राज्यपाल का अतिरिक्त प्रभार भी था।\n* वह भारतीय जनता पार्टी के सदस्य थे।\n\n---\n"}}},{"index":69,"qNo":"Question No. 69","languages":{"English":{"qNo":69,"language":"English","questionHTML":"The first Indian state to start State Data Center (SDC), is","questionText":"The first Indian state to start State Data Center (SDC), is","options":[{"label":"A","html":"Telangana","text":"Telangana"},{"label":"B","html":"Rajasthan","text":"Rajasthan"},{"label":"C","html":"Chhattisgarh","text":"Chhattisgarh"},{"label":"D","html":"\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003eHimachal Pradesh\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","text":"Himachal Pradesh"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cu\u003e\u003cstrong\u003eHimachal Pradesh\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eState Data Centres (SDC) are multiple data centers set up in different states of India to provide basic\u0026nbsp;IT infrastructure for various e-governance\u0026nbsp;programs.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eThe first Indian state to start the State Data Center (SDC), is Himachal Pradesh\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eThe SDC is based on the green data center concept, as it minimizes the power requirement by maximizing power utilization efficiency.\u003c/li\u003e\n\t\u003cli\u003eIt will offer oriented services online through an integrated database.\u003c/li\u003e\n\t\u003cli\u003e101 people-services have been included in this.\u003c/li\u003e\n\t\u003cli\u003eThe SDC would help the departments to facilitate more government- to-citizen-services to its people.\u0026nbsp;\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Himachal Pradesh. Key Points State Data Centres (SDC) are multiple data centers set up in different states of India to provide basic IT infrastructure for various e-governance programs. The first Indian state to start the State Data Center (SDC), is Himachal Pradesh. Important Points The SDC is based on the green data center concept, as it minimizes the power requirement by maximizing power utilization efficiency. It will offer oriented services online through an integrated database. 101 people-services have been included in this. The SDC would help the departments to facilitate more government- to-citizen-services to its people.","markdown":"## Q69.\n\nThe first Indian state to start State Data Center (SDC), is\n\n### Options\n\nA. Telangana\n\nB. Rajasthan\n\nC. Chhattisgarh\n\nD. Himachal Pradesh\n\n**Correct Answer:** D\n\n### Solution\n\nThe correct answer is **Himachal Pradesh**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* State Data Centres (SDC) are multiple data centers set up in different states of India to provide basic IT infrastructure for various e-governance programs.\n* **The first Indian state to start the State Data Center (SDC), is Himachal Pradesh**.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* The SDC is based on the green data center concept, as it minimizes the power requirement by maximizing power utilization efficiency.\n* It will offer oriented services online through an integrated database.\n* 101 people-services have been included in this.\n* The SDC would help the departments to facilitate more government- to-citizen-services to its people.\n\n---\n"},"Hindi":{"qNo":69,"language":"Hindi","questionHTML":"स्टेट डाटा सेंटर (एस. डी. सी.) प्रारंभ करने वाला पहला भारतीय राज्य है","questionText":"स्टेट डाटा सेंटर (एस. डी. सी.) प्रारंभ करने वाला पहला भारतीय राज्य है","options":[{"label":"A","html":"तेलंगाना","text":"तेलंगाना"},{"label":"B","html":"राजस्थान","text":"राजस्थान"},{"label":"C","html":"छत्तीसगढ़","text":"छत्तीसगढ़"},{"label":"D","html":"हिमाचल प्रदेश","text":"हिमाचल प्रदेश"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eसही उत्तर \u003cu\u003e\u003cstrong\u003eहिमाचल प्रदेश\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eस्टेट डाटा सेंटर (एसडीसी) भारत के विभिन्न राज्यों में स्थापित विभिन्न डाटा केंद्र हैं जो विभिन्न ई-गवर्नेंस कार्यक्रमों के लिए बुनियादी आईटी अवसंरचना प्रदान करते हैं।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eस्टेट डाटा सेंटर (एसडीसी) प्रारंभ करने वाला पहला भारतीय राज्य, हिमाचल प्रदेश है।\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eएसडीसी ग्रीन डेटा सेंटर संकल्पना पर आधारित है, क्योंकि यह विद्युत उपयोग क्षमता को अधिकतम करके विद्युत की आवश्यकता को कम करता है।\u003c/li\u003e\n\t\u003cli\u003eयह एक एकीकृत डेटाबेस के माध्यम से ऑनलाइन उन्मुख सेवाएं प्रदान करेगा।\u003c/li\u003e\n\t\u003cli\u003e101 जन-सेवाओं को इसमें शामिल किया गया है।\u003c/li\u003e\n\t\u003cli\u003eएसडीसी विभागों को अपने लोगों को अधिक सरकारी-नागरिक-सेवाओं की सुविधा प्रदान करने में मदद करेगा।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर हिमाचल प्रदेश है। Key Points स्टेट डाटा सेंटर (एसडीसी) भारत के विभिन्न राज्यों में स्थापित विभिन्न डाटा केंद्र हैं जो विभिन्न ई-गवर्नेंस कार्यक्रमों के लिए बुनियादी आईटी अवसंरचना प्रदान करते हैं। स्टेट डाटा सेंटर (एसडीसी) प्रारंभ करने वाला पहला भारतीय राज्य, हिमाचल प्रदेश है। Important Points एसडीसी ग्रीन डेटा सेंटर संकल्पना पर आधारित है, क्योंकि यह विद्युत उपयोग क्षमता को अधिकतम करके विद्युत की आवश्यकता को कम करता है। यह एक एकीकृत डेटाबेस के माध्यम से ऑनलाइन उन्मुख सेवाएं प्रदान करेगा। 101 जन-सेवाओं को इसमें शामिल किया गया है। एसडीसी विभागों को अपने लोगों को अधिक सरकारी-नागरिक-सेवाओं की सुविधा प्रदान करने में मदद करेगा।","markdown":"## Q69.\n\nस्टेट डाटा सेंटर (एस. डी. सी.) प्रारंभ करने वाला पहला भारतीय राज्य है\n\n### Options\n\nA. तेलंगाना\n\nB. राजस्थान\n\nC. छत्तीसगढ़\n\nD. हिमाचल प्रदेश\n\n**Correct Answer:** D\n\n### Solution\n\nसही उत्तर **हिमाचल प्रदेश** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* स्टेट डाटा सेंटर (एसडीसी) भारत के विभिन्न राज्यों में स्थापित विभिन्न डाटा केंद्र हैं जो विभिन्न ई-गवर्नेंस कार्यक्रमों के लिए बुनियादी आईटी अवसंरचना प्रदान करते हैं।\n* **स्टेट डाटा सेंटर (एसडीसी) प्रारंभ करने वाला पहला भारतीय राज्य, हिमाचल प्रदेश है।**\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* एसडीसी ग्रीन डेटा सेंटर संकल्पना पर आधारित है, क्योंकि यह विद्युत उपयोग क्षमता को अधिकतम करके विद्युत की आवश्यकता को कम करता है।\n* यह एक एकीकृत डेटाबेस के माध्यम से ऑनलाइन उन्मुख सेवाएं प्रदान करेगा।\n* 101 जन-सेवाओं को इसमें शामिल किया गया है।\n* एसडीसी विभागों को अपने लोगों को अधिक सरकारी-नागरिक-सेवाओं की सुविधा प्रदान करने में मदद करेगा।\n\n---\n"}}},{"index":70,"qNo":"Question No. 70","languages":{"English":{"qNo":70,"language":"English","questionHTML":"\u003cp\u003eIn 2016, in which of the following states did the Bharatiya Janata Party form the government for the first time?\u003c/p\u003e","questionText":"In 2016, in which of the following states did the Bharatiya Janata Party form the government for the first time?","options":[{"label":"A","html":"Assam","text":"Assam"},{"label":"B","html":"Rajasthan","text":"Rajasthan"},{"label":"C","html":"Kerala","text":"Kerala"},{"label":"D","html":"Odisha","text":"Odisha"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003eAssam\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eIn 2016, in Assam, Bhartiya Janata Party formed the government for the first time\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eThe Assam Legislative Assembly Election of 2016 was held in two phases on 4 and 11 April 2016.\u003c/li\u003e\n\t\u003cli\u003eIt was done to elect members of the 126 constituencies.\u003c/li\u003e\n\t\u003cli\u003eThe overall voter turnout was 84.72%, which set a new record for Assam.\u003c/li\u003e\n\t\u003cli\u003eThe counting of votes \u0026amp; result was\u0026nbsp;declared\u0026nbsp;on 19 May 2016.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eIndian National Congress (INC), lost its majority to the Bharatiya Janata Party which was led by Sarbananda Sonowal\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Assam. Key Points In 2016, in Assam, Bhartiya Janata Party formed the government for the first time. The Assam Legislative Assembly Election of 2016 was held in two phases on 4 and 11 April 2016. It was done to elect members of the 126 constituencies. The overall voter turnout was 84.72%, which set a new record for Assam. The counting of votes \u0026 result was declared on 19 May 2016. Indian National Congress (INC), lost its majority to the Bharatiya Janata Party which was led by Sarbananda Sonowal.","markdown":"## Q70.\n\nIn 2016, in which of the following states did the Bharatiya Janata Party form the government for the first time?\n\n### Options\n\nA. Assam\n\nB. Rajasthan\n\nC. Kerala\n\nD. Odisha\n\n**Correct Answer:** A\n\n### Solution\n\nThe correct answer is **Assam**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **In 2016, in Assam, Bhartiya Janata Party formed the government for the first time**.\n* The Assam Legislative Assembly Election of 2016 was held in two phases on 4 and 11 April 2016.\n* It was done to elect members of the 126 constituencies.\n* The overall voter turnout was 84.72%, which set a new record for Assam.\n* The counting of votes \u0026 result was declared on 19 May 2016.\n* **Indian National Congress (INC), lost its majority to the Bharatiya Janata Party which was led by Sarbananda Sonowal**.\n\n---\n"},"Hindi":{"qNo":70,"language":"Hindi","questionHTML":"\u003cp\u003e2016 में भारतीय जनता पार्टी ने निम्नलिखित में से किस राज्य में पहली बार सरकार बनाई?\u003c/p\u003e","questionText":"2016 में भारतीय जनता पार्टी ने निम्नलिखित में से किस राज्य में पहली बार सरकार बनाई?","options":[{"label":"A","html":"असम","text":"असम"},{"label":"B","html":"राजस्थान","text":"राजस्थान"},{"label":"C","html":"केरल","text":"केरल"},{"label":"D","html":"उड़ीसा","text":"उड़ीसा"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eसही उत्तर \u003cu\u003e\u003cstrong\u003eअसम\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003e2016 में, असम में, भारतीय जनता पार्टी ने पहली बार सरकार बनाई।\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003e2016 का असम विधान सभा चुनाव 4 और 11 अप्रैल 2016 को दो चरणों में हुआ था।\u003c/li\u003e\n\t\u003cli\u003eयह 126 निर्वाचन क्षेत्रों के सदस्यों का चुनाव करने के लिए किया गया था।\u003c/li\u003e\n\t\u003cli\u003eकुल मतदान 84.72% था, जिसने असम के लिए एक नया रिकॉर्ड बनाया।\u003c/li\u003e\n\t\u003cli\u003eमतों की गिनती और परिणाम 19 मई 2016 को घोषित किया गया था।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eभारतीय राष्ट्रीय कांग्रेस (आईएनसी) ने भारतीय जनता पार्टी, जिसका नेतृत्व सर्बानंद सोनोवाल ने किया था,\u0026nbsp;के विरुद्ध अपना बहुमत खो दिया।\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर असम है। Key Points 2016 में, असम में, भारतीय जनता पार्टी ने पहली बार सरकार बनाई। 2016 का असम विधान सभा चुनाव 4 और 11 अप्रैल 2016 को दो चरणों में हुआ था। यह 126 निर्वाचन क्षेत्रों के सदस्यों का चुनाव करने के लिए किया गया था। कुल मतदान 84.72% था, जिसने असम के लिए एक नया रिकॉर्ड बनाया। मतों की गिनती और परिणाम 19 मई 2016 को घोषित किया गया था। भारतीय राष्ट्रीय कांग्रेस (आईएनसी) ने भारतीय जनता पार्टी, जिसका नेतृत्व सर्बानंद सोनोवाल ने किया था, के विरुद्ध अपना बहुमत खो दिया।","markdown":"## Q70.\n\n2016 में भारतीय जनता पार्टी ने निम्नलिखित में से किस राज्य में पहली बार सरकार बनाई?\n\n### Options\n\nA. असम\n\nB. राजस्थान\n\nC. केरल\n\nD. उड़ीसा\n\n**Correct Answer:** A\n\n### Solution\n\nसही उत्तर **असम** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **2016 में, असम में, भारतीय जनता पार्टी ने पहली बार सरकार बनाई।**\n* 2016 का असम विधान सभा चुनाव 4 और 11 अप्रैल 2016 को दो चरणों में हुआ था।\n* यह 126 निर्वाचन क्षेत्रों के सदस्यों का चुनाव करने के लिए किया गया था।\n* कुल मतदान 84.72% था, जिसने असम के लिए एक नया रिकॉर्ड बनाया।\n* मतों की गिनती और परिणाम 19 मई 2016 को घोषित किया गया था।\n* **भारतीय राष्ट्रीय कांग्रेस (आईएनसी) ने भारतीय जनता पार्टी, जिसका नेतृत्व सर्बानंद सोनोवाल ने किया था, के विरुद्ध अपना बहुमत खो दिया।**\n\n---\n"}}},{"index":71,"qNo":"Question No. 71","languages":{"English":{"qNo":71,"language":"English","questionHTML":"Bhavani Prasad Mishra's birthplace was","questionText":"Bhavani Prasad Mishra's birthplace was","options":[{"label":"A","html":"Sagar","text":"Sagar"},{"label":"B","html":"Ujjain","text":"Ujjain"},{"label":"C","html":"Indore","text":"Indore"},{"label":"D","html":"\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003eHoshangabad\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","text":"Hoshangabad"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003eHoshangabad\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eBhawani Prasad Mishra\u0026nbsp;was a \u003cstrong\u003eHindi poet\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eHe was Born on 29 March 1913 \u003cstrong\u003ein the village Tigaria of Hoshangabad district in Madhya Pradesh\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eHe died on 20 February 1985.\u003c/li\u003e\n\t\u003cli\u003eHe was honoured with \u003cstrong\u003eSahitya Akademi Award in 1972\u003c/strong\u003e for his book \u003cstrong\u003eBuni Hui Rassi\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eSome of the notable works of Bhawani Prasad Mishra are: Ye kohare mere haainn, Trikaal sandhyaaah, Tus ki aag, Kuchh neeti kuchh rajneethtti, Idaṃ na mam, Geetfahosh, Buni hui rassi, kathputli kavita, Satpuda ke ghane jungle, Pahila pain, Ghar ki yaad, Sannataa.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Hoshangabad. Key Points Bhawani Prasad Mishra was a Hindi poet. He was Born on 29 March 1913 in the village Tigaria of Hoshangabad district in Madhya Pradesh. He died on 20 February 1985. He was honoured with Sahitya Akademi Award in 1972 for his book Buni Hui Rassi. Important Points Some of the notable works of Bhawani Prasad Mishra are: Ye kohare mere haainn, Trikaal sandhyaaah, Tus ki aag, Kuchh neeti kuchh rajneethtti, Idaṃ na mam, Geetfahosh, Buni hui rassi, kathputli kavita, Satpuda ke ghane jungle, Pahila pain, Ghar ki yaad, Sannataa.","markdown":"## Q71.\n\nBhavani Prasad Mishra's birthplace was\n\n### Options\n\nA. Sagar\n\nB. Ujjain\n\nC. Indore\n\nD. Hoshangabad\n\n**Correct Answer:** D\n\n### Solution\n\nThe correct answer is **Hoshangabad**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* Bhawani Prasad Mishra was a **Hindi poet**.\n* He was Born on 29 March 1913 **in the village Tigaria of Hoshangabad district in Madhya Pradesh**.\n* He died on 20 February 1985.\n* He was honoured with **Sahitya Akademi Award in 1972** for his book **Buni Hui Rassi**.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* Some of the notable works of Bhawani Prasad Mishra are: Ye kohare mere haainn, Trikaal sandhyaaah, Tus ki aag, Kuchh neeti kuchh rajneethtti, Idaṃ na mam, Geetfahosh, Buni hui rassi, kathputli kavita, Satpuda ke ghane jungle, Pahila pain, Ghar ki yaad, Sannataa.\n\n---\n"},"Hindi":{"qNo":71,"language":"Hindi","questionHTML":"भवानी प्रसाद मिश्र का जन्म-स्थान था","questionText":"भवानी प्रसाद मिश्र का जन्म-स्थान था","options":[{"label":"A","html":"सागर","text":"सागर"},{"label":"B","html":"उज्जैन","text":"उज्जैन"},{"label":"C","html":"इन्दौर","text":"इन्दौर"},{"label":"D","html":"होशंगाबाद","text":"होशंगाबाद"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eसही उत्तर \u003cu\u003e\u003cstrong\u003eहोशंगाबाद\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eभवानी प्रसाद मिश्र एक \u003cstrong\u003eहिंदी कवि\u003c/strong\u003e थे।\u003c/li\u003e\n\t\u003cli\u003eउनका जन्म 29 मार्च 1913 को\u003cstrong\u003e मध्य प्रदेश के होशंगाबाद जिले के ग्राम टिगरिया\u003c/strong\u003e में हुआ था।\u003c/li\u003e\n\t\u003cli\u003e20 फरवरी 1985 को उनका निधन हो गया।\u003c/li\u003e\n\t\u003cli\u003eउन्हें उनकी पुस्तक \u003cstrong\u003eबुनी हुई रस्सी\u003c/strong\u003e के लिए \u003cstrong\u003e1972 में साहित्य अकादमी पुरस्कार \u003c/strong\u003eसे सम्मानित किया गया था।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eभवानी प्रसाद मिश्र की\u0026nbsp;कुछ उल्लेखनीय कृतियां\u0026nbsp;हैं: ये कोहरे मेरे हैं, त्रिकाल संध्या, तूस की आग, कुछ नीति कुछ राजनीति, इदम् ना मम्, गीतफ़होश, बुनी हुई रस्सी, कठपुतली कविता, सतपुड़ा के घने जंगल, पहिला पैन, घर की याद, सन्नाटा।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर होशंगाबाद है। Key Points भवानी प्रसाद मिश्र एक हिंदी कवि थे। उनका जन्म 29 मार्च 1913 को मध्य प्रदेश के होशंगाबाद जिले के ग्राम टिगरिया में हुआ था। 20 फरवरी 1985 को उनका निधन हो गया। उन्हें उनकी पुस्तक बुनी हुई रस्सी के लिए 1972 में साहित्य अकादमी पुरस्कार से सम्मानित किया गया था। Important Points भवानी प्रसाद मिश्र की कुछ उल्लेखनीय कृतियां हैं: ये कोहरे मेरे हैं, त्रिकाल संध्या, तूस की आग, कुछ नीति कुछ राजनीति, इदम् ना मम्, गीतफ़होश, बुनी हुई रस्सी, कठपुतली कविता, सतपुड़ा के घने जंगल, पहिला पैन, घर की याद, सन्नाटा।","markdown":"## Q71.\n\nभवानी प्रसाद मिश्र का जन्म-स्थान था\n\n### Options\n\nA. सागर\n\nB. उज्जैन\n\nC. इन्दौर\n\nD. होशंगाबाद\n\n**Correct Answer:** D\n\n### Solution\n\nसही उत्तर **होशंगाबाद** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* भवानी प्रसाद मिश्र एक **हिंदी कवि** थे।\n* उनका जन्म 29 मार्च 1913 को**मध्य प्रदेश के होशंगाबाद जिले के ग्राम टिगरिया** में हुआ था।\n* 20 फरवरी 1985 को उनका निधन हो गया।\n* उन्हें उनकी पुस्तक **बुनी हुई रस्सी** के लिए **1972 में साहित्य अकादमी पुरस्कार**से सम्मानित किया गया था।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* भवानी प्रसाद मिश्र की कुछ उल्लेखनीय कृतियां हैं: ये कोहरे मेरे हैं, त्रिकाल संध्या, तूस की आग, कुछ नीति कुछ राजनीति, इदम् ना मम्, गीतफ़होश, बुनी हुई रस्सी, कठपुतली कविता, सतपुड़ा के घने जंगल, पहिला पैन, घर की याद, सन्नाटा।\n\n---\n"}}},{"index":72,"qNo":"Question No. 72","languages":{"English":{"qNo":72,"language":"English","questionHTML":"Sunil lamba is a","questionText":"Sunil lamba is a","options":[{"label":"A","html":"Author of the Messiah novel","text":"Author of the Messiah novel"},{"label":"B","html":"A famous Hindi novelist","text":"A famous Hindi novelist"},{"label":"C","html":"23rd Naval Chief of India","text":"23rd Naval Chief of India"},{"label":"D","html":"\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003eThe Director-General of the Border Security Force\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","text":"The Director-General of the Border Security Force"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cu\u003e\u003cstrong\u003e23rd Naval Chief of India\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eAdmiral Sunil Lamba is a retired Indian naval officer who served as the\u003cstrong\u003e 23rd Chief of the Naval Staff of the Indian Navy\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eHe assumed the office on 31 May 2016, till\u0026nbsp;31 May 2019.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eAdmiral\u0026nbsp;\u003cspan style=\"font-weight: 700;\"\u003eKarambir Singh\u003c/span\u003e\u0026nbsp;is the\u0026nbsp;24th\u0026nbsp;and\u0026nbsp;\u003cspan style=\"font-weight: 700;\"\u003ecurrent Chief of the Naval Staff\u003c/span\u003e\u0026nbsp;\u003cspan style=\"font-weight: 700;\"\u003e(CNS) of the Indian Navy\u003c/span\u003e.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is 23rd Naval Chief of India. Key Points Admiral Sunil Lamba is a retired Indian naval officer who served as the 23rd Chief of the Naval Staff of the Indian Navy. He assumed the office on 31 May 2016, till 31 May 2019. Important Points Admiral Karambir Singh is the 24th and current Chief of the Naval Staff (CNS) of the Indian Navy.","markdown":"## Q72.\n\nSunil lamba is a\n\n### Options\n\nA. Author of the Messiah novel\n\nB. A famous Hindi novelist\n\nC. 23rd Naval Chief of India\n\nD. The Director-General of the Border Security Force\n\n**Correct Answer:** C\n\n### Solution\n\nThe correct answer is **23rd Naval Chief of India**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* Admiral Sunil Lamba is a retired Indian naval officer who served as the**23rd Chief of the Naval Staff of the Indian Navy**.\n* He assumed the office on 31 May 2016, till 31 May 2019.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* Admiral Karambir Singh is the 24th and current Chief of the Naval Staff (CNS) of the Indian Navy.\n\n---\n"},"Hindi":{"qNo":72,"language":"Hindi","questionHTML":"सुनील लांबा हैं","questionText":"सुनील लांबा हैं","options":[{"label":"A","html":"मसीहा उपन्यास के लेखक","text":"मसीहा उपन्यास के लेखक"},{"label":"B","html":"हिन्दी के एक प्रसिद्ध उपन्यासकार","text":"हिन्दी के एक प्रसिद्ध उपन्यासकार"},{"label":"C","html":"भारत के 23वें नौसेना प्रमुख","text":"भारत के 23वें नौसेना प्रमुख"},{"label":"D","html":"सीमा सुरक्षा बल के महानिदेशक","text":"सीमा सुरक्षा बल के महानिदेशक"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eभारत के 23वें नौसेना प्रमुख\u0026nbsp;\u003c/strong\u003e\u003c/u\u003e\u0026nbsp;है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eएडमिरल सुनील लांबा एक सेवानिवृत्त भारतीय नौसेना अधिकारी हैं, जिन्होंने भारतीय नौसेना के 23\u003csup\u003eवें\u003c/sup\u003e नौसेनाध्यक्ष के रूप में कार्य किया।\u003c/li\u003e\n\t\u003cli\u003eउन्होंने 31 मई 2016 को, 31 मई 2019 तक कार्यालय की कमान संभाली।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eएडमिरल \u003cstrong\u003eकरमबीर सिंह\u003c/strong\u003e \u003cstrong\u003eभारतीय नौसेना\u003c/strong\u003e के 24वें और \u003cstrong\u003eवर्तमान नौसेनाध्यक्ष (सीएनएस)\u0026nbsp;हैं।\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर भारत के 23वें नौसेना प्रमुख है। Key Points एडमिरल सुनील लांबा एक सेवानिवृत्त भारतीय नौसेना अधिकारी हैं, जिन्होंने भारतीय नौसेना के 23वें नौसेनाध्यक्ष के रूप में कार्य किया। उन्होंने 31 मई 2016 को, 31 मई 2019 तक कार्यालय की कमान संभाली। Important Points एडमिरल करमबीर सिंह भारतीय नौसेना के 24वें और वर्तमान नौसेनाध्यक्ष (सीएनएस) हैं।","markdown":"## Q72.\n\nसुनील लांबा हैं\n\n### Options\n\nA. मसीहा उपन्यास के लेखक\n\nB. हिन्दी के एक प्रसिद्ध उपन्यासकार\n\nC. भारत के 23वें नौसेना प्रमुख\n\nD. सीमा सुरक्षा बल के महानिदेशक\n\n**Correct Answer:** C\n\n### Solution\n\nसही उत्तर **भारत के 23वें नौसेना प्रमुख** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* एडमिरल सुनील लांबा एक सेवानिवृत्त भारतीय नौसेना अधिकारी हैं, जिन्होंने भारतीय नौसेना के 23^वें^ नौसेनाध्यक्ष के रूप में कार्य किया।\n* उन्होंने 31 मई 2016 को, 31 मई 2019 तक कार्यालय की कमान संभाली।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* एडमिरल **करमबीर सिंह** **भारतीय नौसेना** के 24वें और **वर्तमान नौसेनाध्यक्ष (सीएनएस) हैं।**\n\n---\n"}}},{"index":73,"qNo":"Question No. 73","languages":{"English":{"qNo":73,"language":"English","questionHTML":"Who among the following was elected the President of the world's largest trade organization 'International Chamber of Commerce' in June 2016?","questionText":"Who among the following was elected the President of the world's largest trade organization 'International Chamber of Commerce' in June 2016?","options":[{"label":"A","html":"Mukesh Ambani","text":"Mukesh Ambani"},{"label":"B","html":"Adi Godrej","text":"Adi Godrej"},{"label":"C","html":"Lakshmi Narayan Mittal","text":"Lakshmi Narayan Mittal"},{"label":"D","html":"\u003cspan style=\" \"\u003eSunil Bharti Mittal\u003c/span\u003e\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","text":"Sunil Bharti Mittal"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cspan style=\" \"\u003e\u003cu\u003e\u003cstrong\u003eSunil Bharti Mittal\u003c/strong\u003e\u003c/u\u003e.\u003c/span\u003e\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\" \"\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eInternational Chamber of Commerce (ICC) has elected founder and chairman of Bharti Enterprises, Sunil Bharti Mittal, as its chairman in 2016.\u003c/li\u003e\n\t\u003cli\u003eThe voting took place in Sao Paolo, Brazil.\u003c/li\u003e\n\t\u003cli\u003eHe is the third Indian business leader to hold this position in ICC's near 100 years history.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\" \"\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eICC is Founded in \u003cstrong\u003e1919\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eHeadquarters: \u003cstrong\u003eParis\u003c/strong\u003e,\u0026nbsp;France\u003c/li\u003e\n\t\u003cli\u003eICC is the \u003cstrong\u003eworld's largest business organisation\u003c/strong\u003e, which represents the private-sector's views to national governments and intergovernmental bodies around the world.\u003c/li\u003e\n\t\u003cli\u003eChairman -\u0026nbsp;\u003cstrong\u003eAjaypal Singh Banga and John W.H\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eICC's first chairman was 20th-century French Minister of Finance Etienne Clémentel.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Sunil Bharti Mittal. Key Points International Chamber of Commerce (ICC) has elected founder and chairman of Bharti Enterprises, Sunil Bharti Mittal, as its chairman in 2016. The voting took place in Sao Paolo, Brazil. He is the third Indian business leader to hold this position in ICC's near 100 years history. Additional Information ICC is Founded in 1919. Headquarters: Paris, France ICC is the world's largest business organisation, which represents the private-sector's views to national governments and intergovernmental bodies around the world. Chairman - Ajaypal Singh Banga and John W.H. ICC's first chairman was 20th-century French Minister of Finance Etienne Clémentel.","markdown":"## Q73.\n\nWho among the following was elected the President of the world's largest trade organization 'International Chamber of Commerce' in June 2016?\n\n### Options\n\nA. Mukesh Ambani\n\nB. Adi Godrej\n\nC. Lakshmi Narayan Mittal\n\nD. Sunil Bharti Mittal\n\n**Correct Answer:** D\n\n### Solution\n\nThe correct answer is **Sunil Bharti Mittal**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* International Chamber of Commerce (ICC) has elected founder and chairman of Bharti Enterprises, Sunil Bharti Mittal, as its chairman in 2016.\n* The voting took place in Sao Paolo, Brazil.\n* He is the third Indian business leader to hold this position in ICC's near 100 years history.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* ICC is Founded in **1919**.\n* Headquarters: **Paris**, France\n* ICC is the **world's largest business organisation**, which represents the private-sector's views to national governments and intergovernmental bodies around the world.\n* Chairman - **Ajaypal Singh Banga and John W.H**.\n* ICC's first chairman was 20th-century French Minister of Finance Etienne Clémentel.\n\n---\n"},"Hindi":{"qNo":73,"language":"Hindi","questionHTML":"जून 2016 में इनमें से किन्हें विश्व के सबसे बड़े व्यापारिक संगठन 'इन्टरनैशनल चेम्बर ऑफ़ कॉमर्स' का अध्यक्ष चुना गया?","questionText":"जून 2016 में इनमें से किन्हें विश्व के सबसे बड़े व्यापारिक संगठन 'इन्टरनैशनल चेम्बर ऑफ़ कॉमर्स' का अध्यक्ष चुना गया?","options":[{"label":"A","html":"मुकेश अम्बानी","text":"मुकेश अम्बानी"},{"label":"B","html":"आदि गोदरेज","text":"आदि गोदरेज"},{"label":"C","html":"लक्ष्मी नारायण मित्तल","text":"लक्ष्मी नारायण मित्तल"},{"label":"D","html":"सुनील भारती मित्तल","text":"सुनील भारती मित्तल"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eसुनील भारती मित्तल\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\" \"\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eइंटरनेशनल चैंबर ऑफ कॉमर्स (आईसीसी) ने 2016 में इसके अध्यक्ष के रूप में भारती एंटरप्राइजेज के संस्थापक और अध्यक्ष सुनील भारती मित्तल को चुना है।\u003c/li\u003e\n\t\u003cli\u003eमतदान साओ पाउलो, ब्राजील में हुआ।\u003c/li\u003e\n\t\u003cli\u003eवह आईसीसी के 100 वर्षों के इतिहास में यह पद संभालने वाले तीसरे भारतीय कारोबारी\u0026nbsp;हैं।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\" \"\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eआईसीसी \u003cstrong\u003e1919\u003c/strong\u003e में स्थापित हुआ।\u003c/li\u003e\n\t\u003cli\u003eमुख्यालय: \u003cstrong\u003eपेरिस\u003c/strong\u003e, फ्रांस\u003c/li\u003e\n\t\u003cli\u003eआईसीसी \u003cstrong\u003eदुनिया का सबसे बड़ा व्यावसायिक संगठन\u003c/strong\u003e है, जो राष्ट्रीय सरकारों और दुनिया भर में अंतर-सरकारी निकायों के निजी-क्षेत्र के विचारों का प्रतिनिधित्व करता है।\u003c/li\u003e\n\t\u003cli\u003eअध्यक्ष - \u003cstrong\u003eअजयपाल सिंह बंगा और जॉन डब्ल्यू.एच\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003eआईसीसी के पहले अध्यक्ष 20\u003csup\u003eवीं\u003c/sup\u003e सदी के फ्रांसीसी वित्त मंत्री एटीन क्लेमेंटेल थे।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर सुनील भारती मित्तल है। Key Points इंटरनेशनल चैंबर ऑफ कॉमर्स (आईसीसी) ने 2016 में इसके अध्यक्ष के रूप में भारती एंटरप्राइजेज के संस्थापक और अध्यक्ष सुनील भारती मित्तल को चुना है। मतदान साओ पाउलो, ब्राजील में हुआ। वह आईसीसी के 100 वर्षों के इतिहास में यह पद संभालने वाले तीसरे भारतीय कारोबारी हैं। Additional Information आईसीसी 1919 में स्थापित हुआ। मुख्यालय: पेरिस, फ्रांस आईसीसी दुनिया का सबसे बड़ा व्यावसायिक संगठन है, जो राष्ट्रीय सरकारों और दुनिया भर में अंतर-सरकारी निकायों के निजी-क्षेत्र के विचारों का प्रतिनिधित्व करता है। अध्यक्ष - अजयपाल सिंह बंगा और जॉन डब्ल्यू.एच आईसीसी के पहले अध्यक्ष 20वीं सदी के फ्रांसीसी वित्त मंत्री एटीन क्लेमेंटेल थे।","markdown":"## Q73.\n\nजून 2016 में इनमें से किन्हें विश्व के सबसे बड़े व्यापारिक संगठन 'इन्टरनैशनल चेम्बर ऑफ़ कॉमर्स' का अध्यक्ष चुना गया?\n\n### Options\n\nA. मुकेश अम्बानी\n\nB. आदि गोदरेज\n\nC. लक्ष्मी नारायण मित्तल\n\nD. सुनील भारती मित्तल\n\n**Correct Answer:** D\n\n### Solution\n\nसही उत्तर **सुनील भारती मित्तल** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* इंटरनेशनल चैंबर ऑफ कॉमर्स (आईसीसी) ने 2016 में इसके अध्यक्ष के रूप में भारती एंटरप्राइजेज के संस्थापक और अध्यक्ष सुनील भारती मित्तल को चुना है।\n* मतदान साओ पाउलो, ब्राजील में हुआ।\n* वह आईसीसी के 100 वर्षों के इतिहास में यह पद संभालने वाले तीसरे भारतीय कारोबारी हैं।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* आईसीसी **1919** में स्थापित हुआ।\n* मुख्यालय: **पेरिस**, फ्रांस\n* आईसीसी **दुनिया का सबसे बड़ा व्यावसायिक संगठन** है, जो राष्ट्रीय सरकारों और दुनिया भर में अंतर-सरकारी निकायों के निजी-क्षेत्र के विचारों का प्रतिनिधित्व करता है।\n* अध्यक्ष - **अजयपाल सिंह बंगा और जॉन डब्ल्यू.एच**\n* आईसीसी के पहले अध्यक्ष 20^वीं^ सदी के फ्रांसीसी वित्त मंत्री एटीन क्लेमेंटेल थे।\n\n---\n"}}},{"index":74,"qNo":"Question No. 74","languages":{"English":{"qNo":74,"language":"English","questionHTML":"\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e\u003cspan style=\" \"\u003eWhen was the State Bank of India established ?\u003c/span\u003e\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","questionText":"When was the State Bank of India established ?","options":[{"label":"A","html":"1954","text":"1954"},{"label":"B","html":"1955","text":"1955"},{"label":"C","html":"1956","text":"1956"},{"label":"D","html":"1957","text":"1957"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003e1955\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eState Bank of India is an Indian multinational, public sector banking and financial services statutory body.\u003c/li\u003e\n\t\u003cli\u003eIt is headquartered in \u003cstrong\u003eMumbai, Maharashtra\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eSBI is the \u003cstrong\u003e43rd largest bank in the world\u003c/strong\u003e and ranked 236th in the Fortune Global 500 list of the world's biggest corporations of 2019.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eChairperson: \u003cstrong\u003eDinesh Kumar Khara\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003eHeadquarters: \u003cstrong\u003eMumbai\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003eFounded: \u003cstrong\u003e1 July 1955\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003eSubsidiaries: SBI Card, SBI Life Insurance, etc.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eThe Bank is actively involved since 1973 in non-profit activity called Community Services Banking.\u003c/li\u003e\n\t\u003cli\u003eAll SBI branches and administrative offices throughout the country sponsor and participate in a large number of welfare activities and social causes.\u0026nbsp;\u003c/li\u003e\n\t\u003cli\u003eSBI is\u0026nbsp;more than banking because we touch the lives of people anywhere in many ways.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is 1955. Key Points State Bank of India is an Indian multinational, public sector banking and financial services statutory body. It is headquartered in Mumbai, Maharashtra. SBI is the 43rd largest bank in the world and ranked 236th in the Fortune Global 500 list of the world's biggest corporations of 2019. Important Points Chairperson: Dinesh Kumar Khara Headquarters: Mumbai Founded: 1 July 1955 Subsidiaries: SBI Card, SBI Life Insurance, etc. Additional Information The Bank is actively involved since 1973 in non-profit activity called Community Services Banking. All SBI branches and administrative offices throughout the country sponsor and participate in a large number of welfare activities and social causes. SBI is more than banking because we touch the lives of people anywhere in many ways.","markdown":"## Q74.\n\nWhen was the State Bank of India established ?\n\n### Options\n\nA. 1954\n\nB. 1955\n\nC. 1956\n\nD. 1957\n\n**Correct Answer:** B\n\n### Solution\n\nThe correct answer is **1955**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* State Bank of India is an Indian multinational, public sector banking and financial services statutory body.\n* It is headquartered in **Mumbai, Maharashtra**.\n* SBI is the **43rd largest bank in the world** and ranked 236th in the Fortune Global 500 list of the world's biggest corporations of 2019.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* Chairperson: **Dinesh Kumar Khara**\n* Headquarters: **Mumbai**\n* Founded: **1 July 1955**\n* Subsidiaries: SBI Card, SBI Life Insurance, etc.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* The Bank is actively involved since 1973 in non-profit activity called Community Services Banking.\n* All SBI branches and administrative offices throughout the country sponsor and participate in a large number of welfare activities and social causes.\n* SBI is more than banking because we touch the lives of people anywhere in many ways.\n\n---\n"},"Hindi":{"qNo":74,"language":"Hindi","questionHTML":"भारतीय स्टेट बैंक की स्थापना कब हुई?","questionText":"भारतीय स्टेट बैंक की स्थापना कब हुई?","options":[{"label":"A","html":"1954","text":"1954"},{"label":"B","html":"1955","text":"1955"},{"label":"C","html":"1956","text":"1956"},{"label":"D","html":"1957","text":"1957"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003e1955\u003c/strong\u003e\u003c/u\u003e\u0026nbsp;है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eभारतीय स्टेट बैंक एक भारतीय बहुराष्ट्रीय, सार्वजनिक क्षेत्र की बैंकिंग और वित्तीय सेवा वैधानिक निकाय है।\u003c/li\u003e\n\t\u003cli\u003eइसका मुख्यालय \u003cstrong\u003eमहाराष्ट्र के मुंबई\u003c/strong\u003e में है।\u003c/li\u003e\n\t\u003cli\u003eएसबीआई \u003cstrong\u003eदुनिया का 43वां सबसे बड़ा बैंक\u003c/strong\u003e है और 2019 की दुनिया के सबसे बड़े निगमों की फॉर्च्यून ग्लोबल 500 सूची में 236वें स्थान पर है।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eअध्यक्ष: \u003cstrong\u003eदिनेश कुमार खारा\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003eमुख्यालय: \u003cstrong\u003eमुंबई\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003eस्थापित:\u003cstrong\u003e 1 जुलाई 1955\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003eसहायक: एसबीआई कार्ड, एसबीआई जीवन बीमा, आदि।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eसामुदायिक सेवा बैंकिंग नामक गैर-लाभकारी गतिविधि में यह बैंक 1973 से सक्रिय रूप से शामिल है।\u003c/li\u003e\n\t\u003cli\u003eपूरे देश में एसबीआई की सभी शाखाएँ और प्रशासनिक कार्यालय प्रायोजक हैं और बड़ी संख्या में कल्याणकारी गतिविधियों और सामाजिक कारणों में भाग लेते हैं।\u003c/li\u003e\n\t\u003cli\u003eएसबीआई बैंकिंग से अधिक है क्योंकि ये कई तरीकों से लोगों के जीवन को छूते हैं।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर 1955 है। Key Points भारतीय स्टेट बैंक एक भारतीय बहुराष्ट्रीय, सार्वजनिक क्षेत्र की बैंकिंग और वित्तीय सेवा वैधानिक निकाय है। इसका मुख्यालय महाराष्ट्र के मुंबई में है। एसबीआई दुनिया का 43वां सबसे बड़ा बैंक है और 2019 की दुनिया के सबसे बड़े निगमों की फॉर्च्यून ग्लोबल 500 सूची में 236वें स्थान पर है। Important Points अध्यक्ष: दिनेश कुमार खारा मुख्यालय: मुंबई स्थापित: 1 जुलाई 1955 सहायक: एसबीआई कार्ड, एसबीआई जीवन बीमा, आदि। Additional Information सामुदायिक सेवा बैंकिंग नामक गैर-लाभकारी गतिविधि में यह बैंक 1973 से सक्रिय रूप से शामिल है। पूरे देश में एसबीआई की सभी शाखाएँ और प्रशासनिक कार्यालय प्रायोजक हैं और बड़ी संख्या में कल्याणकारी गतिविधियों और सामाजिक कारणों में भाग लेते हैं। एसबीआई बैंकिंग से अधिक है क्योंकि ये कई तरीकों से लोगों के जीवन को छूते हैं।","markdown":"## Q74.\n\nभारतीय स्टेट बैंक की स्थापना कब हुई?\n\n### Options\n\nA. 1954\n\nB. 1955\n\nC. 1956\n\nD. 1957\n\n**Correct Answer:** B\n\n### Solution\n\nसही उत्तर **1955** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* भारतीय स्टेट बैंक एक भारतीय बहुराष्ट्रीय, सार्वजनिक क्षेत्र की बैंकिंग और वित्तीय सेवा वैधानिक निकाय है।\n* इसका मुख्यालय **महाराष्ट्र के मुंबई** में है।\n* एसबीआई **दुनिया का 43वां सबसे बड़ा बैंक** है और 2019 की दुनिया के सबसे बड़े निगमों की फॉर्च्यून ग्लोबल 500 सूची में 236वें स्थान पर है।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* अध्यक्ष: **दिनेश कुमार खारा**\n* मुख्यालय: **मुंबई**\n* स्थापित:**1 जुलाई 1955**\n* सहायक: एसबीआई कार्ड, एसबीआई जीवन बीमा, आदि।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* सामुदायिक सेवा बैंकिंग नामक गैर-लाभकारी गतिविधि में यह बैंक 1973 से सक्रिय रूप से शामिल है।\n* पूरे देश में एसबीआई की सभी शाखाएँ और प्रशासनिक कार्यालय प्रायोजक हैं और बड़ी संख्या में कल्याणकारी गतिविधियों और सामाजिक कारणों में भाग लेते हैं।\n* एसबीआई बैंकिंग से अधिक है क्योंकि ये कई तरीकों से लोगों के जीवन को छूते हैं।\n\n---\n"}}},{"index":75,"qNo":"Question No. 75","languages":{"English":{"qNo":75,"language":"English","questionHTML":"Former Delhi Police Commissioner, B.S. Bassi was appointed to which post in May 2016?","questionText":"Former Delhi Police Commissioner, B.S. Bassi was appointed to which post in May 2016?","options":[{"label":"A","html":"Chairman of Union Public Service Commission","text":"Chairman of Union Public Service Commission"},{"label":"B","html":"Governor of Meghalaya","text":"Governor of Meghalaya"},{"label":"C","html":"Director General of Border Security Force","text":"Director General of Border Security Force"},{"label":"D","html":"\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e\u003cspan style=\" \"\u003eThe Member of Union Public Service Commission\u003c/span\u003e\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","text":"The Member of Union Public Service Commission"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cu\u003e\u003cstrong\u003eThe Member of Union Public Service Commission\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eBhim Sain Bassi or\u0026nbsp;B.S. Bassi is an Indian Police Service (IPS) officer.\u003c/li\u003e\n\t\u003cli\u003eHe is currently a member of the Union Public Service Commission since 31 May 2016.\u003c/li\u003e\n\t\u003cli\u003eHe served as the Commissioner of Police, Special Commissioner of Police (Administration) of Delhi Police (2012–13), Special Commissioner of Police (Traffic) of Delhi Police (2011-2012), Director General of Police of Goa Police (2009-2011) and Inspector General of Police of Chandigarh Police (2000-2002).\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eUPSC:\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eUPSC is a \u003cstrong\u003eConstitutional Body\u003c/strong\u003e under \u003cstrong\u003eArticle 315-323\u003c/strong\u003e \u003cstrong\u003ePart XIV Chapter II of the Constitution\u003c/strong\u003e of India to discharge their duties, functions, and obligations assigned under \u003cstrong\u003eArticle 320\u003c/strong\u003e.\u003c/li\u003e\n\t\t\u003cli\u003eThe UPSC\u0026nbsp; conducts various examinations in accordance with the Rules of examination as notified by the Government of India in a just, fair, and impartial manner for making a merit-based selection and recommendation of candidates for various \u003cstrong\u003eGroup A\u003c/strong\u003e and \u003cstrong\u003eGroup B\u003c/strong\u003e Services of the Govt. of India.\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is The Member of Union Public Service Commission. Key Points Bhim Sain Bassi or B.S. Bassi is an Indian Police Service (IPS) officer. He is currently a member of the Union Public Service Commission since 31 May 2016. He served as the Commissioner of Police, Special Commissioner of Police (Administration) of Delhi Police (2012–13), Special Commissioner of Police (Traffic) of Delhi Police (2011-2012), Director General of Police of Goa Police (2009-2011) and Inspector General of Police of Chandigarh Police (2000-2002). Important Points UPSC: UPSC is a Constitutional Body under Article 315-323 Part XIV Chapter II of the Constitution of India to discharge their duties, functions, and obligations assigned under Article 320. The UPSC conducts various examinations in accordance with the Rules of examination as notified by the Government of India in a just, fair, and impartial manner for making a merit-based selection and recommendation of candidates for various Group A and Group B Services of the Govt. of India.","markdown":"## Q75.\n\nFormer Delhi Police Commissioner, B.S. Bassi was appointed to which post in May 2016?\n\n### Options\n\nA. Chairman of Union Public Service Commission\n\nB. Governor of Meghalaya\n\nC. Director General of Border Security Force\n\nD. The Member of Union Public Service Commission\n\n**Correct Answer:** D\n\n### Solution\n\nThe correct answer is **The Member of Union Public Service Commission**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* Bhim Sain Bassi or B.S. Bassi is an Indian Police Service (IPS) officer.\n* He is currently a member of the Union Public Service Commission since 31 May 2016.\n* He served as the Commissioner of Police, Special Commissioner of Police (Administration) of Delhi Police (2012–13), Special Commissioner of Police (Traffic) of Delhi Police (2011-2012), Director General of Police of Goa Police (2009-2011) and Inspector General of Police of Chandigarh Police (2000-2002).\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* **UPSC:** \n* UPSC is a **Constitutional Body** under **Article 315-323** **Part XIV Chapter II of the Constitution** of India to discharge their duties, functions, and obligations assigned under **Article 320**.\n* T

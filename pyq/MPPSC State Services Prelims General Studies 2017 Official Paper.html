tive_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eनीचे दी गई तालिका सही ढंग से मिलान की गई है।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ctable border=\"1\" cellpadding=\"1\" cellspacing=\"1\" style=\"width: 350px;\"\u003e\n\t\u003ctbody\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003e\u003cu\u003e\u003cstrong\u003eराज्य\u003c/strong\u003e\u003c/u\u003e\u003c/td\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003e\u003cu\u003e\u003cstrong\u003eदर्रा\u003c/strong\u003e\u003c/u\u003e\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003eउत्तराखंड\u003c/td\u003e\n\t\t\t\u003ctd\u003eमाना\u0026nbsp; ला, नीती ला, \u003cstrong\u003eलिपुलेख\u003c/strong\u003e\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003eहिमाचल\u003c/td\u003e\n\t\t\t\u003ctd\u003e\u003cstrong\u003eरोहतांग\u003c/strong\u003e, शिपकी ला\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003eकेरल\u003c/td\u003e\n\t\t\t\u003ctd\u003e\u003cstrong\u003eपाल घाट\u003c/strong\u003e\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003eअरुणाचल प्रदेश\u003c/td\u003e\n\t\t\t\u003ctd\u003eबोमडिला, दिहांग, यांगगुआन\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\u003c/tbody\u003e\n\u003c/table\u003e","solutionText":"नाथू ला - अरुणाचल प्रदेश सही सुमेलित नहीं है Key Points सिक्किम नाथू ला दर्रा भारत के सिक्किम राज्य को जोड़ता है। इसकी ऊंचाई लगभग 14450 फीट है। सिक्किम की राजधानी गंगटोक है। सिक्किम में जेलेप ला एक और दर्रा है। Important Points नीचे दी गई तालिका सही ढंग से मिलान की गई है। राज्य दर्रा उत्तराखंड माना ला, नीती ला, लिपुलेख हिमाचल रोहतांग, शिपकी ला केरल पाल घाट अरुणाचल प्रदेश बोमडिला, दिहांग, यांगगुआन","markdown":"## Q17.\n\nनिम्नलिखित में से कौन-सा युग्म सही सुमेलित नहीं है?\n\n### Options\n\nA. लिपुलेख - उत्तराखण्ड\n\nB. नाथू ला - अरुणाचल प्रदेश\n\nC. रोहतांग - हिमाचल प्रदेश\n\nD. पालघाट - केरल\n\n**Correct Answer:** B\n\n### Solution\n\n**नाथू ला - अरुणाचल प्रदेश** **सही सुमेलित नहीं है**\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **सिक्किम** \n* **नाथू ला दर्रा भारत के सिक्किम राज्य को जोड़ता है।**\n* इसकी **ऊंचाई**लगभग 14450 फीट है।\n* सिक्किम की **राजधानी गंगटोक**है।\n* सिक्किम में**जेलेप ला** एक और दर्रा है।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* नीचे दी गई तालिका सही ढंग से मिलान की गई है।\n \n\n| राज्य | दर्रा |\n| --- | --- |\n| उत्तराखंड | माना ला, नीती ला, लिपुलेख |\n| हिमाचल | रोहतांग, शिपकी ला |\n| केरल | पाल घाट |\n| अरुणाचल प्रदेश | बोमडिला, दिहांग, यांगगुआन |\n\n---\n"}}},{"index":18,"qNo":"Question No. 18","languages":{"English":{"qNo":18,"language":"English","questionHTML":"Peneplain is related to","questionText":"Peneplain is related to","options":[{"label":"A","html":"Air","text":"Air"},{"label":"B","html":"Underground water","text":"Underground water"},{"label":"C","html":"Glaciers","text":"Glaciers"},{"label":"D","html":"Rivers","text":"Rivers"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003eRivers\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eA \u003cstrong\u003epeneplain (an almost plain)\u003c/strong\u003e is a low-relief plain which is formed as a result of \u003cstrong\u003eRiver erosion\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cimg alt=\"\" src=\"//storage.googleapis.com/tb-img/production/20/12/Peneplain.png\" style=\"width: 280px; height: 149px;\"\u003e\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003ctable border=\"1\" cellpadding=\"1\" cellspacing=\"1\" style=\"width: 350px;\"\u003e\n\t\u003ctbody\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003e\u003cu\u003e\u003cstrong\u003eLandform by\u003c/strong\u003e\u003c/u\u003e\u003c/td\u003e\n\t\t\t\u003ctd\u003e\u003cu\u003e\u003cstrong\u003eErosional Landforms\u003c/strong\u003e\u003c/u\u003e\u003c/td\u003e\n\t\t\t\u003ctd\u003e\u003cu\u003e\u003cstrong\u003eDepositional Landforms\u003c/strong\u003e\u003c/u\u003e\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003eAir\u003c/td\u003e\n\t\t\t\u003ctd\u003eMushroom rock, Yardang, etc.\u003c/td\u003e\n\t\t\t\u003ctd\u003eSand dunes, Loess, etc.\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003eUnderground Water\u003c/td\u003e\n\t\t\t\u003ctd\u003eSinkholes, Caves, etc.\u003c/td\u003e\n\t\t\t\u003ctd\u003eStalactites and stalagmites, etc.\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003eGlacier\u003c/td\u003e\n\t\t\t\u003ctd\u003eCirque, Fjords, Horns,\u0026nbsp;\u003c/td\u003e\n\t\t\t\u003ctd\u003eMoraines, Drumlins, Eskers, etc.\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003eRiver\u003c/td\u003e\n\t\t\t\u003ctd\u003e\u003cstrong\u003ePeneplain\u003c/strong\u003e, Valleys, Gorges, Canyon,\u0026nbsp;Potholes, etc.\u003c/td\u003e\n\t\t\t\u003ctd\u003eDelta,\u0026nbsp;Meanders oxbow lakes, etc.\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\u003c/tbody\u003e\n\u003c/table\u003e","solutionText":"The correct answer is Rivers. Key Points A peneplain (an almost plain) is a low-relief plain which is formed as a result of River erosion. Important Points Landform by Erosional Landforms Depositional Landforms Air Mushroom rock, Yardang, etc. Sand dunes, Loess, etc. Underground Water Sinkholes, Caves, etc. Stalactites and stalagmites, etc. Glacier Cirque, Fjords, Horns, Moraines, Drumlins, Eskers, etc. River Peneplain, Valleys, Gorges, Canyon, Potholes, etc. Delta, Meanders oxbow lakes, etc.","markdown":"## Q18.\n\nPeneplain is related to\n\n### Options\n\nA. Air\n\nB. Underground water\n\nC. Glaciers\n\nD. Rivers\n\n**Correct Answer:** D\n\n### Solution\n\nThe correct answer is **Rivers**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* A **peneplain (an almost plain)** is a low-relief plain which is formed as a result of **River erosion**.\n \n\n![](//storage.googleapis.com/tb-img/production/20/12/Peneplain.png)\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n\n| Landform by | Erosional Landforms | Depositional Landforms |\n| --- | --- | --- |\n| Air | Mushroom rock, Yardang, etc. | Sand dunes, Loess, etc. |\n| Underground Water | Sinkholes, Caves, etc. | Stalactites and stalagmites, etc. |\n| Glacier | Cirque, Fjords, Horns, | Moraines, Drumlins, Eskers, etc. |\n| River | Peneplain, Valleys, Gorges, Canyon, Potholes, etc. | Delta, Meanders oxbow lakes, etc. |\n\n---\n"},"Hindi":{"qNo":18,"language":"Hindi","questionHTML":"\u003cp\u003eसमप्राय मैदान\u0026nbsp;किससे\u0026nbsp;संबंधित है?\u003c/p\u003e","questionText":"समप्राय मैदान किससे संबंधित है?","options":[{"label":"A","html":"वायु","text":"वायु"},{"label":"B","html":"भूमिगत जल","text":"भूमिगत जल"},{"label":"C","html":"\u003cspan style=\"color: rgb(37, 37, 37);  \"\u003eग्लेशियर\u003c/span\u003e","text":"ग्लेशियर"},{"label":"D","html":"नदी","text":"नदी"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eनदी\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eएक \u003cstrong\u003eसमप्राय \u003cspan style=\"\"\u003eमैदान\u0026nbsp;\u003c/span\u003e\u003c/strong\u003e\u003cstrong\u003e(लगभग एक मैदान)\u003c/strong\u003e एक थोड़ा उभरा मैदान है जो \u003cstrong\u003eनदी के अपरदन\u003c/strong\u003e\u0026nbsp;के परिणामस्वरूप बनती\u0026nbsp;है।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cimg alt=\"\" src=\"//storage.googleapis.com/tb-img/production/20/12/Peneplain.png\" style=\"width: 280px; height: 149px;\"\u003e\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003ctable border=\"1\" cellpadding=\"1\" cellspacing=\"1\" style=\"width: 350px;\"\u003e\n\t\u003ctbody\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003e\u003cu\u003e\u003cstrong\u003eस्थालाकृति\u003c/strong\u003e\u003c/u\u003e\u003c/td\u003e\n\t\t\t\u003ctd\u003e\u003cu\u003e\u003cstrong\u003eअपरदित स्थालाकृतियां\u003c/strong\u003e\u003c/u\u003e\u003c/td\u003e\n\t\t\t\u003ctd\u003e\u003cu\u003e\u003cstrong\u003eनिक्षेपित स्थालाकृतियां\u003c/strong\u003e\u003c/u\u003e\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003eहवा\u003c/td\u003e\n\t\t\t\u003ctd\u003eमशरूम रॉक, यारडांग, आदि।\u003c/td\u003e\n\t\t\t\u003ctd\u003eरेत के टीले, ढलान आदि।\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003eभूगर्भ जल\u003c/td\u003e\n\t\t\t\u003ctd\u003eसिंकहोल, गुफाएं आदि।\u003c/td\u003e\n\t\t\t\u003ctd\u003eस्टैलेक्टाइट और स्टैलेग्माइट, आदि।\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003eहिमनद\u003c/td\u003e\n\t\t\t\u003ctd\u003eसर्क, जोर्ड्स, हॉर्न,\u003c/td\u003e\n\t\t\t\u003ctd\u003eमोरेन, ड्रम्लिन, एस्कर्स, आदि।\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003eनदी\u003c/td\u003e\n\t\t\t\u003ctd\u003e\u003cstrong\u003eसमप्राय भूमि\u003c/strong\u003e, घाटियां, दर्रे, कैनियन, गड्ढे, आदि\u003c/td\u003e\n\t\t\t\u003ctd\u003eडेल्टा, मेन्डर्स ऑक्सीबो झीलें, आदि।\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\u003c/tbody\u003e\n\u003c/table\u003e","solutionText":"सही उत्तर नदी है। Key Points एक समप्राय मैदान (लगभग एक मैदान) एक थोड़ा उभरा मैदान है जो नदी के अपरदन के परिणामस्वरूप बनती है। Important Points स्थालाकृति अपरदित स्थालाकृतियां निक्षेपित स्थालाकृतियां हवा मशरूम रॉक, यारडांग, आदि। रेत के टीले, ढलान आदि। भूगर्भ जल सिंकहोल, गुफाएं आदि। स्टैलेक्टाइट और स्टैलेग्माइट, आदि। हिमनद सर्क, जोर्ड्स, हॉर्न, मोरेन, ड्रम्लिन, एस्कर्स, आदि। नदी समप्राय भूमि, घाटियां, दर्रे, कैनियन, गड्ढे, आदि डेल्टा, मेन्डर्स ऑक्सीबो झीलें, आदि।","markdown":"## Q18.\n\nसमप्राय मैदान किससे संबंधित है?\n\n### Options\n\nA. वायु\n\nB. भूमिगत जल\n\nC. ग्लेशियर\n\nD. नदी\n\n**Correct Answer:** D\n\n### Solution\n\nसही उत्तर **नदी** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* एक **समप्राय मैदान****(लगभग एक मैदान)** एक थोड़ा उभरा मैदान है जो **नदी के अपरदन** के परिणामस्वरूप बनती है।\n \n\n![](//storage.googleapis.com/tb-img/production/20/12/Peneplain.png)\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n\n| स्थालाकृति | अपरदित स्थालाकृतियां | निक्षेपित स्थालाकृतियां |\n| --- | --- | --- |\n| हवा | मशरूम रॉक, यारडांग, आदि। | रेत के टीले, ढलान आदि। |\n| भूगर्भ जल | सिंकहोल, गुफाएं आदि। | स्टैलेक्टाइट और स्टैलेग्माइट, आदि। |\n| हिमनद | सर्क, जोर्ड्स, हॉर्न, | मोरेन, ड्रम्लिन, एस्कर्स, आदि। |\n| नदी | समप्राय भूमि, घाटियां, दर्रे, कैनियन, गड्ढे, आदि | डेल्टा, मेन्डर्स ऑक्सीबो झीलें, आदि। |\n\n---\n"}}},{"index":19,"qNo":"Question No. 19","languages":{"English":{"qNo":19,"language":"English","questionHTML":"\u003cp\u003eWhich of the following areas is the original habitat of the 'Toda tribe'?\u003c/p\u003e","questionText":"Which of the following areas is the original habitat of the 'Toda tribe'?","options":[{"label":"A","html":"Jaunsar Hills","text":"Jaunsar Hills"},{"label":"B","html":"Garo Hills","text":"Garo Hills"},{"label":"C","html":"Nilgiri Hills","text":"Nilgiri Hills"},{"label":"D","html":"Jaintia Hills","text":"Jaintia Hills"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003eNilgiri Hills\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eNilgiri Hills\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eNilgiri Hills is the native area of the \u003cstrong\u003eToda tribe\u003c/strong\u003e.\u003c/li\u003e\n\t\t\u003cli\u003eNilgiri hills are located in\u003cstrong\u003e South India\u003c/strong\u003e.\u003c/li\u003e\n\t\t\u003cli\u003ePart of \u003cstrong\u003ewestern ghats\u003c/strong\u003e, spread in \u003cstrong\u003eKarnataka\u003c/strong\u003e, \u003cstrong\u003eKerela\u003c/strong\u003e, and \u003cstrong\u003eTamilNadu\u003c/strong\u003e.\u003c/li\u003e\n\t\t\u003cli\u003eThe \u003cstrong\u003ehighest peak\u003c/strong\u003e of the Nilgiri hills is\u0026nbsp;being \u003cstrong\u003eDoddabetta\u003c/strong\u003e.\u0026nbsp;\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u0026nbsp;\u003cstrong\u003eJaunsar Hills\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eJaunsar-Bawar is a hilly region in the \u003cstrong\u003eGarhwal division\u003c/strong\u003e of \u003cstrong\u003eUttarakhand\u003c/strong\u003e.\u003c/li\u003e\n\t\t\u003cli\u003e\u0026nbsp;It is located in the north-west of \u003cstrong\u003eDehradun district.\u003c/strong\u003e\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eGaro Hills\u003c/strong\u003e\n\t\u003cul\u003e\n\t\t\u003cli\u003eGaro Hills are part of the \u003cstrong\u003eGaro-Khasi range\u003c/strong\u003e in Meghalaya, India.\u0026nbsp;\u003c/li\u003e\n\t\t\u003cli\u003eIt is inhabited mainly by \u003cstrong\u003etribal dwellers,\u003c/strong\u003e the majority of whom are Garo people.\u003c/li\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eCherrapunji one of the wettest places\u003c/strong\u003e in India\u0026nbsp;is in this range (East-Khasi).\u003c/li\u003e\n\t\t\u003cli\u003eMeghalaya's most famous\u0026nbsp;\u003cstrong\u003eLiving Root Bridges \u003c/strong\u003eis also in these\u0026nbsp;ranges.\u0026nbsp;\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eJaintia Hills\u003c/strong\u003e\n\t\u003cul\u003e\n\t\t\u003cli\u003eJaintia Hills is an administrative district in the state of \u003cstrong\u003eMeghalaya\u003c/strong\u003e in India\u003c/li\u003e\n\t\t\u003cli\u003eJaintia Hills is a \u003cstrong\u003emountainous region\u003c/strong\u003e that was mainly part of Assam and Meghalaya.\u003c/li\u003e\n\t\t\u003cli\u003eDue to heavy rainfall in the\u0026nbsp;\u003cstrong\u003eGaro-Khasi-Jaintia\u0026nbsp;range\u003c/strong\u003e, has\u003cstrong\u003e tropical moist Evergreen Forest\u003c/strong\u003e.\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Nilgiri Hills. Key Points Nilgiri Hills Nilgiri Hills is the native area of the Toda tribe. Nilgiri hills are located in South India. Part of western ghats, spread in Karnataka, Kerela, and TamilNadu. The highest peak of the Nilgiri hills is being Doddabetta. Additional Information Jaunsar Hills Jaunsar-Bawar is a hilly region in the Garhwal division of Uttarakhand. It is located in the north-west of Dehradun district. Garo Hills Garo Hills are part of the Garo-Khasi range in Meghalaya, India. It is inhabited mainly by tribal dwellers, the majority of whom are Garo people. Cherrapunji one of the wettest places in India is in this range (East-Khasi). Meghalaya's most famous Living Root Bridges is also in these ranges. Jaintia Hills Jaintia Hills is an administrative district in the state of Meghalaya in India Jaintia Hills is a mountainous region that was mainly part of Assam and Meghalaya. Due to heavy rainfall in the Garo-Khasi-Jaintia range, has tropical moist Evergreen Forest.","markdown":"## Q19.\n\nWhich of the following areas is the original habitat of the 'Toda tribe'?\n\n### Options\n\nA. Jaunsar Hills\n\nB. Garo Hills\n\nC. Nilgiri Hills\n\nD. Jaintia Hills\n\n**Correct Answer:** C\n\n### Solution\n\nThe correct answer is **Nilgiri Hills**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **Nilgiri Hills** \n* Nilgiri Hills is the native area of the **Toda tribe**.\n* Nilgiri hills are located in**South India**.\n* Part of **western ghats**, spread in **Karnataka**, **Kerela**, and **TamilNadu**.\n* The **highest peak** of the Nilgiri hills is being **Doddabetta**.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **Jaunsar Hills** \n* Jaunsar-Bawar is a hilly region in the **Garhwal division** of **Uttarakhand**.\n* It is located in the north-west of **Dehradun district.**\n* **Garo Hills** \n* Garo Hills are part of the **Garo-Khasi range** in Meghalaya, India.\n* It is inhabited mainly by **tribal dwellers,** the majority of whom are Garo people.\n* **Cherrapunji one of the wettest places** in India is in this range (East-Khasi).\n* Meghalaya's most famous **Living Root Bridges**is also in these ranges.\n* **Jaintia Hills** \n* Jaintia Hills is an administrative district in the state of **Meghalaya** in India\n* Jaintia Hills is a **mountainous region** that was mainly part of Assam and Meghalaya.\n* Due to heavy rainfall in the **Garo-Khasi-Jaintia range**, has**tropical moist Evergreen Forest**.\n\n---\n"},"Hindi":{"qNo":19,"language":"Hindi","questionHTML":"\u003cp\u003eनिम्नलिखित क्षेत्रों में से कौन सा 'टोडा जनजाति' का मूल निवास स्थान है?\u003c/p\u003e","questionText":"निम्नलिखित क्षेत्रों में से कौन सा 'टोडा जनजाति' का मूल निवास स्थान है?","options":[{"label":"A","html":"जौनसार पहाड़ियाँ","text":"जौनसार पहाड़ियाँ"},{"label":"B","html":"गारो पहाड़ियाँ","text":"गारो पहाड़ियाँ"},{"label":"C","html":"नीलगिरि पहाड़ियाँ","text":"नीलगिरि पहाड़ियाँ"},{"label":"D","html":"जयंतिया पहाड़ियाँ","text":"जयंतिया पहाड़ियाँ"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eसही उत्तर \u003cu\u003e\u003cstrong\u003eनीलगिरी पहाड़ियां\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eनीलगिरी पहाड़ियां\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eनीलगिरि पहाड़ियां\u003cstrong\u003e टोडा जनजाति\u003c/strong\u003e का मूल क्षेत्र है।\u003c/li\u003e\n\t\t\u003cli\u003eनीलगिरि पहाड़ियाँ\u003cstrong\u003e दक्षिण भारत \u003c/strong\u003eमें स्थित हैं।\u003c/li\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eपश्चिमी घाटों\u003c/strong\u003e का एक हिस्सा, \u003cstrong\u003eकर्नाटक, केरेल\u003c/strong\u003e और\u003cstrong\u003e तमिलनाडु\u003c/strong\u003e में फैला है।\u003c/li\u003e\n\t\t\u003cli\u003eनीलगिरि पहाड़ियों की \u003cstrong\u003eसबसे ऊंची चोटी\u003c/strong\u003e \u003cstrong\u003eडोड्डाबेट्टा\u003c/strong\u003e है।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eजौनसार पहाड़ियाँ\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eजौनसार-बावर \u003cstrong\u003eउत्तराखंड \u003c/strong\u003eके \u003cstrong\u003eगढ़वाल मंडल\u003c/strong\u003e में एक पहाड़ी क्षेत्र है।\u003c/li\u003e\n\t\t\u003cli\u003eयह \u003cstrong\u003eदेहरादून जिले\u003c/strong\u003e के उत्तर-पश्चिम में स्थित है।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eगारो पहाड़ियाँ\u003c/strong\u003e\n\t\u003cul\u003e\n\t\t\u003cli\u003eगारो पहाड़ियां भारत के मेघालय में \u003cstrong\u003eगारो-खासी पर्वत श्रृंखला \u003c/strong\u003eका हिस्सा हैं।\u003c/li\u003e\n\t\t\u003cli\u003eयहां मुख्य रूप से\u003cstrong\u003e आदिवासी निवासी\u003c/strong\u003e बसते हैं, जिनमें से अधिकांश गारो लोग हैं।\u003c/li\u003e\n\t\t\u003cli\u003eभारत में \u003cstrong\u003eसबसे अधिक बरसाती स्थानों में से एक चेरापूंजी\u003c/strong\u003e, इस पर्वत श्रृंखला (पूर्व-खासी) में स्थित है।\u003c/li\u003e\n\t\t\u003cli\u003eमेघालय का सबसे प्रसिद्ध \u003cstrong\u003eलिविंग रूट ब्रिज\u003c/strong\u003e भी इन्हीं पर्वत श्रृंखलाओं में स्थित है।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eजयंतिया पहाड़ियाँ\u003c/strong\u003e\n\t\u003cul\u003e\n\t\t\u003cli\u003eभारत में \u003cstrong\u003eमेघालय\u003c/strong\u003e राज्य में जयंतिया पहाड़ियाँ एक प्रशासनिक जिला है\u003c/li\u003e\n\t\t\u003cli\u003eजयंतिया पहाड़ियाँ एक \u003cstrong\u003eपहाड़ी क्षेत्र\u003c/strong\u003e है जो मुख्य रूप से असम और मेघालय का हिस्सा था।\u003c/li\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eगारो-खासी-जयंतिया पर्वत श्रृंखला\u003c/strong\u003e में भारी वर्षा के कारण \u003cstrong\u003eउष्णकटिबंधीय आर्द्र\u0026nbsp;सदाबहार वन \u003c/strong\u003eहै।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर नीलगिरी पहाड़ियां है। Key Points नीलगिरी पहाड़ियां नीलगिरि पहाड़ियां टोडा जनजाति का मूल क्षेत्र है। नीलगिरि पहाड़ियाँ दक्षिण भारत में स्थित हैं। पश्चिमी घाटों का एक हिस्सा, कर्नाटक, केरेल और तमिलनाडु में फैला है। नीलगिरि पहाड़ियों की सबसे ऊंची चोटी डोड्डाबेट्टा है। Additional Information जौनसार पहाड़ियाँ जौनसार-बावर उत्तराखंड के गढ़वाल मंडल में एक पहाड़ी क्षेत्र है। यह देहरादून जिले के उत्तर-पश्चिम में स्थित है। गारो पहाड़ियाँ गारो पहाड़ियां भारत के मेघालय में गारो-खासी पर्वत श्रृंखला का हिस्सा हैं। यहां मुख्य रूप से आदिवासी निवासी बसते हैं, जिनमें से अधिकांश गारो लोग हैं। भारत में सबसे अधिक बरसाती स्थानों में से एक चेरापूंजी, इस पर्वत श्रृंखला (पूर्व-खासी) में स्थित है। मेघालय का सबसे प्रसिद्ध लिविंग रूट ब्रिज भी इन्हीं पर्वत श्रृंखलाओं में स्थित है। जयंतिया पहाड़ियाँ भारत में मेघालय राज्य में जयंतिया पहाड़ियाँ एक प्रशासनिक जिला है जयंतिया पहाड़ियाँ एक पहाड़ी क्षेत्र है जो मुख्य रूप से असम और मेघालय का हिस्सा था। गारो-खासी-जयंतिया पर्वत श्रृंखला में भारी वर्षा के कारण उष्णकटिबंधीय आर्द्र सदाबहार वन है।","markdown":"## Q19.\n\nनिम्नलिखित क्षेत्रों में से कौन सा 'टोडा जनजाति' का मूल निवास स्थान है?\n\n### Options\n\nA. जौनसार पहाड़ियाँ\n\nB. गारो पहाड़ियाँ\n\nC. नीलगिरि पहाड़ियाँ\n\nD. जयंतिया पहाड़ियाँ\n\n**Correct Answer:** C\n\n### Solution\n\nसही उत्तर **नीलगिरी पहाड़ियां** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **नीलगिरी पहाड़ियां** \n* नीलगिरि पहाड़ियां**टोडा जनजाति** का मूल क्षेत्र है।\n* नीलगिरि पहाड़ियाँ**दक्षिण भारत**में स्थित हैं।\n* **पश्चिमी घाटों** का एक हिस्सा, **कर्नाटक, केरेल** और**तमिलनाडु** में फैला है।\n* नीलगिरि पहाड़ियों की **सबसे ऊंची चोटी** **डोड्डाबेट्टा** है।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **जौनसार पहाड़ियाँ** \n* जौनसार-बावर **उत्तराखंड**के **गढ़वाल मंडल** में एक पहाड़ी क्षेत्र है।\n* यह **देहरादून जिले** के उत्तर-पश्चिम में स्थित है।\n* **गारो पहाड़ियाँ** \n* गारो पहाड़ियां भारत के मेघालय में **गारो-खासी पर्वत श्रृंखला**का हिस्सा हैं।\n* यहां मुख्य रूप से**आदिवासी निवासी** बसते हैं, जिनमें से अधिकांश गारो लोग हैं।\n* भारत में **सबसे अधिक बरसाती स्थानों में से एक चेरापूंजी**, इस पर्वत श्रृंखला (पूर्व-खासी) में स्थित है।\n* मेघालय का सबसे प्रसिद्ध **लिविंग रूट ब्रिज** भी इन्हीं पर्वत श्रृंखलाओं में स्थित है।\n* **जयंतिया पहाड़ियाँ** \n* भारत में **मेघालय** राज्य में जयंतिया पहाड़ियाँ एक प्रशासनिक जिला है\n* tml":"सऊदी अरब","text":"सऊदी अरब"},{"label":"D","html":"इराक","text":"इराक"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eसऊदी अरब\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eरास तनुरा\u0026nbsp;तेल शोधनशाला \u003cstrong\u003eसऊदी अरब \u003c/strong\u003eमें स्थित हैं।\u003c/li\u003e\n\t\u003cli\u003eसऊदी अरामको की रास तानुरा तेल शोधनशाला इसकी \u003cstrong\u003eसबसे बड़ी तेल शोधनशालाओं\u003c/strong\u003e में से एक है।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cimg alt=\"\" src=\"//storage.googleapis.com/tb-img/production/20/12/saudi%20arabia.png\" style=\"width: 256px; height: 196px;\"\u003e\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e14 सितंबर 2019 को, पूर्वी सऊदी अरब में \u003cstrong\u003eअबकैक और खुरैस\u003c/strong\u003e में सऊदी अरामको तेल प्रसंस्करण की सुविधा है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eइस साइट पर ड्रोन द्वारा हमला किया गया था।\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर सऊदी अरब है। Key Points रास तनुरा तेल शोधनशाला सऊदी अरब में स्थित हैं। सऊदी अरामको की रास तानुरा तेल शोधनशाला इसकी सबसे बड़ी तेल शोधनशालाओं में से एक है। Additional Information 14 सितंबर 2019 को, पूर्वी सऊदी अरब में अबकैक और खुरैस में सऊदी अरामको तेल प्रसंस्करण की सुविधा है। इस साइट पर ड्रोन द्वारा हमला किया गया था।","markdown":"## Q20.\n\nरास तनुरा तेल शोधनशाला कहाँ स्थित है?\n\n### Options\n\nA. ईरान\n\nB. संयुक्त राज्य अमेरिका\n\nC. सऊदी अरब\n\nD. इराक\n\n**Correct Answer:** C\n\n### Solution\n\nसही उत्तर **सऊदी अरब** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* रास तनुरा तेल शोधनशाला **सऊदी अरब**में स्थित हैं।\n* सऊदी अरामको की रास तानुरा तेल शोधनशाला इसकी **सबसे बड़ी तेल शोधनशालाओं** में से एक है।\n \n\n![](//storage.googleapis.com/tb-img/production/20/12/saudi%20arabia.png)\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* 14 सितंबर 2019 को, पूर्वी सऊदी अरब में **अबकैक और खुरैस** में सऊदी अरामको तेल प्रसंस्करण की सुविधा है।\n* **इस साइट पर ड्रोन द्वारा हमला किया गया था।**\n\n---\n"}}},{"index":21,"qNo":"Question No. 21","languages":{"English":{"qNo":21,"language":"English","questionHTML":"\u003cp\u003eWhat is the botanical name of opium?\u003c/p\u003e","questionText":"What is the botanical name of opium?","options":[{"label":"A","html":"Emblica Officinalis","text":"Emblica Officinalis"},{"label":"B","html":"Papaver Somniferum","text":"Papaver Somniferum"},{"label":"C","html":"Rauvolfia Serpentina","text":"Rauvolfia Serpentina"},{"label":"D","html":"Cinchona Species","text":"Cinchona Species"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cu\u003e\u003cstrong\u003ePapaver Somniferum\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eOpium Poppy was obtained from \u003cstrong\u003ePapaver somniferum (Plant)\u003c/strong\u003e in form of dried latex.\u003c/li\u003e\n\t\u003cli\u003ePrimary opium is a \u003cstrong\u003emilky latex\u003c/strong\u003e extracted by scoring unripe capsules of the opium poppy.\u003c/li\u003e\n\t\u003cli\u003eOpium is then\u0026nbsp;\u003cstrong\u003eprocessed chemically \u003c/strong\u003eto produce heroin and opioids.\u003c/li\u003e\n\t\u003cli\u003eIt can be used\u0026nbsp;for \u003cstrong\u003emedicinal purposes\u003c/strong\u003e\u0026nbsp;or the \u003cstrong\u003eillegal drug\u003c/strong\u003e trade.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cimg alt=\"\" src=\"//storage.googleapis.com/tb-img/production/20/12/opium.png\" style=\"width: 150px; height: 150px;\"\u003e\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eLegal cultivation\u003c/strong\u003e for medical use is allowed\u0026nbsp;within the ambit of the Single \u003cstrong\u003eConvention on Narcotic Drugs 1961\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eIndia is the world's largest manufacturer of legal opium\u003c/strong\u003e for the pharmaceutical industry.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Papaver Somniferum. Important Points Opium Poppy was obtained from Papaver somniferum (Plant) in form of dried latex. Primary opium is a milky latex extracted by scoring unripe capsules of the opium poppy. Opium is then processed chemically to produce heroin and opioids. It can be used for medicinal purposes or the illegal drug trade. Additional Information Legal cultivation for medical use is allowed within the ambit of the Single Convention on Narcotic Drugs 1961. India is the world's largest manufacturer of legal opium for the pharmaceutical industry.","markdown":"## Q21.\n\nWhat is the botanical name of opium?\n\n### Options\n\nA. Emblica Officinalis\n\nB. Papaver Somniferum\n\nC. Rauvolfia Serpentina\n\nD. Cinchona Species\n\n**Correct Answer:** B\n\n### Solution\n\nThe correct answer is **Papaver Somniferum**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* Opium Poppy was obtained from **Papaver somniferum (Plant)** in form of dried latex.\n* Primary opium is a **milky latex** extracted by scoring unripe capsules of the opium poppy.\n* Opium is then **processed chemically**to produce heroin and opioids.\n* It can be used for **medicinal purposes** or the **illegal drug** trade.\n \n\n![](//storage.googleapis.com/tb-img/production/20/12/opium.png)\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **Legal cultivation** for medical use is allowed within the ambit of the Single **Convention on Narcotic Drugs 1961**.\n* **India is the world's largest manufacturer of legal opium** for the pharmaceutical industry.\n\n---\n"},"Hindi":{"qNo":21,"language":"Hindi","questionHTML":"\u003cp\u003eअफ़ीम का\u0026nbsp;वानस्पतिक नाम क्या है?\u003c/p\u003e","questionText":"अफ़ीम का वानस्पतिक नाम क्या है?","options":[{"label":"A","html":"एम्बलिका ऑफिसिनैलिस","text":"एम्बलिका ऑफिसिनैलिस"},{"label":"B","html":"पैपैवर सोम्नीफेरम","text":"पैपैवर सोम्नीफेरम"},{"label":"C","html":"रैवॉल्फिया सर्पेन्टाइना\u0026nbsp;","text":"रैवॉल्फिया सर्पेन्टाइना"},{"label":"D","html":"सिनकोना स्पीशीज़","text":"सिनकोना स्पीशीज़"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eसही उत्तर \u003cu\u003e\u003cstrong\u003eपैपैवर सोम्नीफेरम\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eसूखे वनस्पति-दूध के रूप में \u003cstrong\u003eपैपैवर सोम्नीफेरम (पौधे)\u003c/strong\u003e से अफीम पोस्ता प्राप्त होता है।\u003c/li\u003e\n\t\u003cli\u003eप्राथमिक अफीम एक \u003cstrong\u003eदूधिया वनस्पति-दूध \u003c/strong\u003eहै जिसे अफीम खसखस के अपरिपक्व आवरण को पकाकर निकाला जाता है।\u003c/li\u003e\n\t\u003cli\u003eफिर अफीम को हेरोइन और ओपिओइड के उत्पादन के लिए \u003cstrong\u003eरासायनिक रूप से संसाधित\u003c/strong\u003e किया जाता है।\u003c/li\u003e\n\t\u003cli\u003eइसका उपयोग \u003cstrong\u003eऔषधीय प्रयोजनों\u003c/strong\u003e या \u003cstrong\u003eअवैध दवा व्यापार\u003c/strong\u003e के लिए किया जा सकता है।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cimg alt=\"\" src=\"//storage.googleapis.com/tb-img/production/20/12/opium.png\" style=\"width: 150px; height: 150px;\"\u003e\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eनारकोटिक्स ड्रग्स पर एकल अभिसमय, 1961 \u003c/strong\u003eके दायरे में चिकित्सा उपयोग के लिए \u003cstrong\u003eकानूनी कृषि\u003c/strong\u003e की अनुमति है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eभारत\u003c/strong\u003e दवा उद्योग के लिए \u003cstrong\u003eकानूनी अफीम का दुनिया का सबसे बड़ा निर्माता \u003c/strong\u003eहै।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर पैपैवर सोम्नीफेरम है। Important Points सूखे वनस्पति-दूध के रूप में पैपैवर सोम्नीफेरम (पौधे) से अफीम पोस्ता प्राप्त होता है। प्राथमिक अफीम एक दूधिया वनस्पति-दूध है जिसे अफीम खसखस के अपरिपक्व आवरण को पकाकर निकाला जाता है। फिर अफीम को हेरोइन और ओपिओइड के उत्पादन के लिए रासायनिक रूप से संसाधित किया जाता है। इसका उपयोग औषधीय प्रयोजनों या अवैध दवा व्यापार के लिए किया जा सकता है। Additional Information नारकोटिक्स ड्रग्स पर एकल अभिसमय, 1961 के दायरे में चिकित्सा उपयोग के लिए कानूनी कृषि की अनुमति है। भारत दवा उद्योग के लिए कानूनी अफीम का दुनिया का सबसे बड़ा निर्माता है।","markdown":"## Q21.\n\nअफ़ीम का वानस्पतिक नाम क्या है?\n\n### Options\n\nA. एम्बलिका ऑफिसिनैलिस\n\nB. पैपैवर सोम्नीफेरम\n\nC. रैवॉल्फिया सर्पेन्टाइना\n\nD. सिनकोना स्पीशीज़\n\n**Correct Answer:** B\n\n### Solution\n\nसही उत्तर **पैपैवर सोम्नीफेरम** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* सूखे वनस्पति-दूध के रूप में **पैपैवर सोम्नीफेरम (पौधे)** से अफीम पोस्ता प्राप्त होता है।\n* प्राथमिक अफीम एक **दूधिया वनस्पति-दूध**है जिसे अफीम खसखस के अपरिपक्व आवरण को पकाकर निकाला जाता है।\n* फिर अफीम को हेरोइन और ओपिओइड के उत्पादन के लिए **रासायनिक रूप से संसाधित** किया जाता है।\n* इसका उपयोग **औषधीय प्रयोजनों** या **अवैध दवा व्यापार** के लिए किया जा सकता है।\n \n\n![](//storage.googleapis.com/tb-img/production/20/12/opium.png)\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **नारकोटिक्स ड्रग्स पर एकल अभिसमय, 1961**के दायरे में चिकित्सा उपयोग के लिए **कानूनी कृषि** की अनुमति है।\n* **भारत** दवा उद्योग के लिए **कानूनी अफीम का दुनिया का सबसे बड़ा निर्माता**है।\n\n---\n"}}},{"index":22,"qNo":"Question No. 22","languages":{"English":{"qNo":22,"language":"English","questionHTML":"\u003cp\u003eAnnihilation of smallpox declared from the world in?\u003c/p\u003e","questionText":"Annihilation of smallpox declared from the world in?","options":[{"label":"A","html":"1975","text":"1975"},{"label":"B","html":"1980","text":"1980"},{"label":"C","html":"1996","text":"1996"},{"label":"D","html":"2008","text":"2008"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003e1980\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eSmallpox is a \u003cstrong\u003eviral disease\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eSmallpox\u0026nbsp;is caused by a \u003cstrong\u003evirus called viriola\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eIndia \u003c/strong\u003ewas eventually declared \u003cstrong\u003efree of smallpox\u003c/strong\u003e in 1977.\u003c/li\u003e\n\t\u003cli\u003eThe \u003cstrong\u003eWorld Health Organization\u003c/strong\u003e has announced the \u003cstrong\u003eelimination of smallpox\u003c/strong\u003e from the world \u003cstrong\u003ein the year 1980\u003c/strong\u003e.\u0026nbsp;\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eHence the correct answer is 1980\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cimg alt=\"\" src=\"//storage.googleapis.com/tb-img/production/20/12/smallpox.png\" style=\"width: 280px; height: 200px;\"\u003e\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u0026nbsp;\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eSmallpox vaccine was the first vaccine.\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003eIn 1796\u0026nbsp;British doctor \u003cstrong\u003eEdward Jenner\u003c/strong\u003e pioneered the concept of vaccines.\u003c/li\u003e\n\t\u003cli\u003eEdward Jenner\u003cstrong\u003e discovered \u003c/strong\u003ethe smallpox vaccine.\u0026nbsp;\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is 1980. Key Points Smallpox is a viral disease. Smallpox is caused by a virus called viriola. India was eventually declared free of smallpox in 1977. The World Health Organization has announced the elimination of smallpox from the world in the year 1980. Hence the correct answer is 1980. Important Points Smallpox vaccine was the first vaccine. In 1796 British doctor Edward Jenner pioneered the concept of vaccines. Edward Jenner discovered the smallpox vaccine.","markdown":"## Q22.\n\nAnnihilation of smallpox declared from the world in?\n\n### Options\n\nA. 1975\n\nB. 1980\n\nC. 1996\n\nD. 2008\n\n**Correct Answer:** B\n\n### Solution\n\nThe correct answer is **1980**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* Smallpox is a **viral disease**.\n* Smallpox is caused by a **virus called viriola**.\n* **India**was eventually declared **free of smallpox** in 1977.\n* The **World Health Organization** has announced the **elimination of smallpox** from the world **in the year 1980**.\n* **Hence the correct answer is 1980**.\n \n\n![](//storage.googleapis.com/tb-img/production/20/12/smallpox.png)\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* **Smallpox vaccine was the first vaccine.**\n* In 1796 British doctor **Edward Jenner** pioneered the concept of vaccines.\n* Edward Jenner**discovered**the smallpox vaccine.\n\n---\n"},"Hindi":{"qNo":22,"language":"Hindi","questionHTML":"\u003cp\u003eविश्व से चेचक का उन्मूलन कब\u0026nbsp;घोषित हुआ?\u003c/p\u003e","questionText":"विश्व से चेचक का उन्मूलन कब घोषित हुआ?","options":[{"label":"A","html":"1975\u0026nbsp;","text":"1975"},{"label":"B","html":"1980\u0026nbsp;","text":"1980"},{"label":"C","html":"1996\u0026nbsp;","text":"1996"},{"label":"D","html":"2008\u0026nbsp;","text":"2008"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eसही उत्तर \u003cu\u003e\u003cstrong\u003e1980\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eचेचक एक \u003cu\u003e\u003cstrong\u003eवायरल बीमारी\u003c/strong\u003e\u003c/u\u003e है।\u003c/li\u003e\n\t\u003cli\u003eचेचक \u003cstrong\u003eविरियोला नामक विषाणु\u003c/strong\u003e के कारण होता है।\u003c/li\u003e\n\t\u003cli\u003eभारत को अंततः 1977 में \u003cstrong\u003eचेचक से मुक्त\u003c/strong\u003e घोषित किया गया था।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eविश्व स्वास्थ्य संगठन\u003c/strong\u003e ने \u003cstrong\u003eवर्ष 1980 में\u003c/strong\u003e दुनिया से \u003cstrong\u003eचेचक के उन्मूलन\u003c/strong\u003e की घोषणा की है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eअतः सही उत्तर 1980 है।\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cimg alt=\"\" src=\"//storage.googleapis.com/tb-img/production/20/12/smallpox.png\" style=\"width: 280px; height: 200px;\"\u003e\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u0026nbsp;\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eचेचक का टीका पहला टीका था।\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003e1796 में ब्रिटिश डॉक्टर \u003cstrong\u003eएडवर्ड जेनर\u003c/strong\u003e ने टीकों की संकल्पना का बीड़ा उठाया।\u003c/li\u003e\n\t\u003cli\u003eएडवर्ड जेनर ने चेचक के टीके की \u003cstrong\u003eखोज\u003c/strong\u003e की।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर 1980 है। Key Points चेचक एक वायरल बीमारी है। चेचक विरियोला नामक विषाणु के कारण होता है। भारत को अंततः 1977 में चेचक से मुक्त घोषित किया गया था। विश्व स्वास्थ्य संगठन ने वर्ष 1980 में दुनिया से चेचक के उन्मूलन की घोषणा की है। अतः सही उत्तर 1980 है। Important Points चेचक का टीका पहला टीका था। 1796 में ब्रिटिश डॉक्टर एडवर्ड जेनर ने टीकों की संकल्पना का बीड़ा उठाया। एडवर्ड जेनर ने चेचक के टीके की खोज की।","markdown":"## Q22.\n\nविश्व से चेचक का उन्मूलन कब घोषित हुआ?\n\n### Options\n\nA. 1975\n\nB. 1980\n\nC. 1996\n\nD. 2008\n\n**Correct Answer:** B\n\n### Solution\n\nसही उत्तर **1980** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* चेचक एक **वायरल बीमारी** है।\n* चेचक **विरियोला नामक विषाणु** के कारण होता है।\n* भारत को अंततः 1977 में **चेचक से मुक्त** घोषित किया गया था।\n* **विश्व स्वास्थ्य संगठन** ने **वर्ष 1980 में** दुनिया से **चेचक के उन्मूलन** की घोषणा की है।\n* **अतः सही उत्तर 1980 है।**\n \n\n![](//storage.googleapis.com/tb-img/production/20/12/smallpox.png)\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* **चेचक का टीका पहला टीका था।**\n* 1796 में ब्रिटिश डॉक्टर **एडवर्ड जेनर** ने टीकों की संकल्पना का बीड़ा उठाया।\n* एडवर्ड जेनर ने चेचक के टीके की **खोज** की।\n\n---\n"}}},{"index":23,"qNo":"Question No. 23","languages":{"English":{"qNo":23,"language":"English","questionHTML":"Bacteriophage is a?","questionText":"Bacteriophage is a?","options":[{"label":"A","html":"Tail Bacteria","text":"Tail Bacteria"},{"label":"B","html":"Newly Formed Bacteria","text":"Newly Formed Bacteria"},{"label":"C","html":"Bacteria\u0026nbsp;that infect\u0026nbsp;Viruses","text":"Bacteria that infect Viruses"},{"label":"D","html":"Virus that infect Bacteria","text":"Virus that infect Bacteria"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cu\u003e\u003cstrong\u003eViruses that infect Bacteria\u003c/strong\u003e\u003c/u\u003e.\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eA \u003cstrong\u003ebacteriophage is a virus\u003c/strong\u003e that infects and replicates within a bacterium.\u003c/li\u003e\n\t\u003cli\u003eThe \u003cstrong\u003eterm is derived from \"bacteria\"\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eBacteriophages are composed of \u003cstrong\u003eproteins that encapsulate a DNA or RNA genome\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eAnd may have relatively \u003cstrong\u003esimple or complex\u0026nbsp;structures\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cimg alt=\"\" src=\"//storage.googleapis.com/tb-img/production/20/12/Structure_of_a_bacteriophage.png\" style=\"width: 280px; height: 200px;\"\u003e\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eAbout Virus\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eVirus replicates only inside the living cells\u003c/strong\u003e of an organism.\u003c/li\u003e\n\t\t\u003cli\u003eThe \u003cstrong\u003estudy of viruses\u003c/strong\u003e is known as\u003cstrong\u003e virology\u003c/strong\u003e.\u003c/li\u003e\n\t\t\u003cli\u003eA virus can infect all types of life forms.\u0026nbsp;\u003c/li\u003e\n\t\t\u003cli\u003eFrom \u003cstrong\u003eanimals\u003c/strong\u003e and \u003cstrong\u003eplants\u003c/strong\u003e to \u003cstrong\u003emicroorganisms\u003c/strong\u003e, including \u003cstrong\u003ebacteria and archaea \u003c/strong\u003ecan be\u003cstrong\u003e infected by the virus\u003c/strong\u003e.\u0026nbsp;\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Viruses that infect Bacteria. Important Points A bacteriophage is a virus that infects and replicates within a bacterium. The term is derived from \"bacteria\". Bacteriophages are composed of proteins that encapsulate a DNA or RNA genome. And may have relatively simple or complex structures. Additional Information About Virus Virus replicates only inside the living cells of an organism. The study of viruses is known as virology. A virus can infect all types of life forms. From animals and plants to microorganisms, including bacteria and archaea can be infected by the virus.","markdown":"## Q23.\n\nBacteriophage is a?\n\n### Options\n\nA. Tail Bacteria\n\nB. Newly Formed Bacteria\n\nC. Bacteria that infect Viruses\n\nD. Virus that infect Bacteria\n\n**Correct Answer:** D\n\n### Solution\n\nThe correct answer is **Viruses that infect Bacteria**.![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* A **bacteriophage is a virus** that infects and replicates within a bacterium.\n* The **term is derived from \"bacteria\"**.\n* Bacteriophages are composed of **proteins that encapsulate a DNA or RNA genome**.\n* And may have relatively **simple or complex structures**.\n \n\n![](//storage.googleapis.com/tb-img/production/20/12/Structure_of_a_bacteriophage.png)\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **About Virus** \n* **Virus replicates only inside the living cells** of an organism.\n* The **study of viruses** is known as**virology**.\n* A virus can infect all types of life forms.\n* From **animals** and **plants** to **microorganisms**, including **bacteria and archaea**can be**infected by the virus**.\n\n---\n"},"Hindi":{"qNo":23,"language":"Hindi","questionHTML":"जीवाणुभोजी (बैक्टीरियोफेज) क्या है?","questionText":"जीवाणुभोजी (बैक्टीरियोफेज) क्या है?","options":[{"label":"A","html":"पूंछ जीवाणु","text":"पूंछ जीवाणु"},{"label":"B","html":"नवनिर्मित जीवाणु","text":"नवनिर्मित जीवाणु"},{"label":"C","html":"विषाणु को संक्रमित करने वाला जीवाणु","text":"विषाणु को संक्रमित करने वाला जीवाणु"},{"label":"D","html":"जीवाणु को संक्रमित करने वाला विषाणु","text":"जीवाणु को संक्रमित करने वाला विषाणु"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eसबी उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eजीवाणु को संक्रमित करने वाला विषाणु\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eएक\u003cstrong\u003e बैक्टीरियोफेज\u003c/strong\u003e एक विषाणु है जो एक जीवाणु के भीतर संक्रमित और प्रतिकृति करता है।\u003c/li\u003e\n\t\u003cli\u003eयह\u003cstrong\u003e शब्द \"बैक्टीरिया\" से लिया गया है।\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003eबैक्टीरियोफेज \u003cstrong\u003eप्रोटीन से बना होता है जो डीएनए या आरएनए जीनोम को घेरता है।\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003eऔर अपेक्षाकृत \u003cstrong\u003eसरल या जटिल संरचनाएं\u003c/strong\u003e हो सकती हैं।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cimg alt=\"\" src=\"//storage.googleapis.com/tb-img/production/20/12/Structure_of_a_bacteriophage.png\" style=\"width: 280px; height: 200px;\"\u003e\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eविषाणु के विषय में\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eविषाणु केवल \u003c/strong\u003eकिसी जीव के \u003cstrong\u003eजीवित कोशिकाओं के अंदर प्रतिकृति करता है।\u003c/strong\u003e\u003c/li\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eविषाणु के अध्ययन\u003c/strong\u003e को \u003cstrong\u003eवायरोलॉजी\u003c/strong\u003e के रूप में जाना जाता है।\u003c/li\u003e\n\t\t\u003cli\u003eएक विषाणु सभी प्रकार के जीवन रूपों को संक्रमित कर सकता है।\u003c/li\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eजानवरों\u003c/strong\u003e और \u003cstrong\u003eपौधों \u003c/strong\u003eसे लेकर \u003cstrong\u003eसूक्ष्मजीवों \u003c/strong\u003eतक, जिनमें\u003cstrong\u003e बैक्टीरिया और आर्किया\u003c/strong\u003e शामिल हैं,\u003cstrong\u003e \u003c/strong\u003e\u003cstrong\u003eविषाणु​ से संक्रमित \u003c/strong\u003eहो सकते हैं।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सबी उत्तर जीवाणु को संक्रमित करने वाला विषाणु है। Important Points एक बैक्टीरियोफेज एक विषाणु है जो एक जीवाणु के भीतर संक्रमित और प्रतिकृति करता है। यह शब्द \"बैक्टीरिया\" से लिया गया है। बैक्टीरियोफेज प्रोटीन से बना होता है जो डीएनए या आरएनए जीनोम को घेरता है। और अपेक्षाकृत सरल या जटिल संरचनाएं हो सकती हैं। Additional Information विषाणु के विषय में विषाणु केवल किसी जीव के जीवित कोशिकाओं के अंदर प्रतिकृति करता है। विषाणु के अध्ययन को वायरोलॉजी के रूप में जाना जाता है। एक विषाणु सभी प्रकार के जीवन रूपों को संक्रमित कर सकता है। जानवरों और पौधों से लेकर सूक्ष्मजीवों तक, जिनमें बैक्टीरिया और आर्किया शामिल हैं, विषाणु​ से संक्रमित हो सकते हैं।","markdown":"## Q23.\n\nजीवाणुभोजी (बैक्टीरियोफेज) क्या है?\n\n### Options\n\nA. पूंछ जीवाणु\n\nB. नवनिर्मित जीवाणु\n\nC. विषाणु को संक्रमित करने वाला जीवाणु\n\nD. जीवाणु को संक्रमित करने वाला विषाणु\n\n**Correct Answer:** D\n\n### Solution\n\nसबी उत्तर **जीवाणु को संक्रमित करने वाला विषाणु** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* एक**बैक्टीरियोफेज** एक विषाणु है जो एक जीवाणु के भीतर संक्रमित और प्रतिकृति करता है।\n* यह**शब्द \"बैक्टीरिया\" से लिया गया है।**\n* बैक्टीरियोफेज **प्रोटीन से बना होता है जो डीएनए या आरएनए जीनोम को घेरता है।**\n* और अपेक्षाकृत **सरल या जटिल संरचनाएं** हो सकती हैं।\n \n\n![](//storage.googleapis.com/tb-img/production/20/12/Structure_of_a_bacteriophage.png)\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **विषाणु के विषय में** \n* **विषाणु केवल**किसी जीव के **जीवित कोशिकाओं के अंदर प्रतिकृति करता है।**\n* **विषाणु के अध्ययन** को **वायरोलॉजी** के रूप में जाना जाता है।\n* एक विषाणु सभी प्रकार के जीवन रूपों को संक्रमित कर सकता है।\n* **जानवरों** और **पौधों**से लेकर **सूक्ष्मजीवों**तक, जिनमें**बैक्टीरिया और आर्किया** शामिल हैं,**विषाणु​ से संक्रमित**हो सकते हैं।\n\n---\n"}}},{"index":24,"qNo":"Question No. 24","languages":{"English":{"qNo":24,"language":"English","questionHTML":"\u003cp\u003eThe most appropriate part for the study of meiosis in plants would be?\u003c/p\u003e","questionText":"The most appropriate part for the study of meiosis in plants would be?","options":[{"label":"A","html":"Shoot Head","text":"Shoot Head"},{"label":"B","html":"Root Head","text":"Root Head"},{"label":"C","html":"Anther","text":"Anther"},{"label":"D","html":"Leaf Cell","text":"Leaf Cell"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003eAnther\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eThe \u003cstrong\u003emost appropriate part for the study of meiosis\u003c/strong\u003e \u003cstrong\u003eAnther\u003c/strong\u003e.\u0026nbsp;\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eStamen comprises\u003c/strong\u003e of Anther and Filament.\u003c/li\u003e\n\t\u003cli\u003eThe \u003cstrong\u003efilament is a thread\u003c/strong\u003e-like structure with a circular structure\u003cstrong\u003e Anther \u003c/strong\u003eon the top and connects it to Ovary.\u003c/li\u003e\n\t\u003cli\u003eAnther produces pollens which is part\u0026nbsp;of the \u003cstrong\u003emale reproductive process of the plant\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eImportant parts of Flower\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003e​\u003cstrong\u003eVegetative Parts of a Flower\u003c/strong\u003e\n\n\t\t\u003cul\u003e\n\t\t\t\u003cli\u003ePetals, Sepals.\u003c/li\u003e\n\t\t\u003c/ul\u003e\n\t\t\u003c/li\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eReproductive Parts of a Flower\u003c/strong\u003e\n\t\t\u003cul\u003e\n\t\t\t\u003cli\u003eStamen, Stigma, Style Ovary, Pistil.\u003c/li\u003e\n\t\t\u003c/ul\u003e\n\t\t\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cimg alt=\"\" src=\"//storage.googleapis.com/tb-img/production/20/12/flower1.png\" style=\"width: 280px; height: 186px;\"\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003ePistil comprises\u0026nbsp;stigma, style, and ovary\u003c/strong\u003e which is part of the reproductive organ of the flower.\u003c/li\u003e\n\t\u003cli\u003eThe topmost tip or receptive tip\u0026nbsp;of the carpel is \u003cstrong\u003eStigma\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eThe long tube that connects stigma and ovary is \u003cstrong\u003eStyle\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eThe ductless reproductive gland which holds the ovule is \u003cstrong\u003eOvary\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Anther. Key Points The most appropriate part for the study of meiosis Anther. Stamen comprises of Anther and Filament. The filament is a thread-like structure with a circular structure Anther on the top and connects it to Ovary. Anther produces pollens which is part of the male reproductive process of the plant. Important Points Important parts of Flower ​Vegetative Parts of a Flower Petals, Sepals. Reproductive Parts of a Flower Stamen, Stigma, Style Ovary, Pistil. Pistil comprises stigma, style, and ovary which is part of the reproductive organ of the flower. The topmost tip or receptive tip of the carpel is Stigma. The long tube that connects stigma and ovary is Style. The ductless reproductive gland which holds the ovule is Ovary.","markdown":"## Q24.\n\nThe most appropriate part for the study of meiosis in plants would be?\n\n### Options\n\nA. Shoot Head\n\nB. Root Head\n\nC. Anther\n\nD. Leaf Cell\n\n**Correct Answer:** C\n\n### Solution\n\nThe correct answer is **Anther**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* The **most appropriate part for the study of meiosis** **Anther**.\n* **Stamen comprises** of Anther and Filament.\n* The **filament is a thread**-like structure with a circular structure**Anther**on the top and connects it to Ovary.\n* Anther produces pollens which is part of the **male reproductive process of the plant**.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* **Important parts of Flower** \n* ​**Vegetative Parts of a Flower** \n* Petals, Sepals.\n* **Reproductive Parts of a Flower** \n* Stamen, Stigma, Style Ovary, Pistil.\n \n\n![](//storage.googleapis.com/tb-img/production/20/12/flower1.png)\n\n \n* **Pistil comprises stigma, style, and ovary** which is part of the reproductive organ of the flower.\n* The topmost tip or receptive tip of the carpel is **Stigma**.\n* The long tube that connects stigma and ovary is **Style**.\n* The ductless reproductive gland which holds the ovule is **Ovary**.\n\n---\n"},"Hindi":{"qNo":24,"language":"Hindi","questionHTML":"\u003cp\u003eपौधों में अर्धसूत्री विभाजन के अध्ययन के लिए\u0026nbsp;सबसे उपयुक्त भाग क्या\u0026nbsp;होगा?\u003c/p\u003e","questionText":"पौधों में अर्धसूत्री विभाजन के अध्ययन के लिए सबसे उपयुक्त भाग क्या होगा?","options":[{"label":"A","html":"प्ररोह शीर्ष","text":"प्ररोह शीर्ष"},{"label":"B","html":"मूल शीर्ष","text":"मूल शीर्ष"},{"label":"C","html":"परागकोश","text":"परागकोश"},{"label":"D","html":"पर्ण कोशिका","text":"पर्ण कोशिका"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eपरागकोश\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eयह\u0026nbsp;\u003cstrong\u003eअर्धसूत्री विभाजन के अध्ययन के लिए सबसे उपयुक्त भाग है।\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eपुंकेसर \u003c/strong\u003eमें परागकोश और सूत्र \u003cstrong\u003eशामिल होते हैं।\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eसूत्र एक धागे जैसी संरचना\u003c/strong\u003e है जो शीर्ष पर एक गोलाकार संरचना परागकोश के साथ होती है और इसे अंडाशय से जोड़ती है।\u003c/li\u003e\n\t\u003cli\u003eपरागकोश पराग उत्पन्न करता है जो \u003cstrong\u003eपौधे की नर प्रजनन प्रक्रिया\u003c/strong\u003e का हिस्सा होता है।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eपुष्प के महत्वपूर्ण भाग\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003e\u003cstrong\u003e​\u003c/strong\u003e\u003cspan style=\"font-weight: 700;\"\u003eपुष्प\u003c/span\u003e\u003cstrong\u003e के वर्धी भाग\u003c/strong\u003e\n\n\t\t\u003cul\u003e\n\t\t\t\u003cli\u003eपंखुड़ी, बाह्य दल\u003c/li\u003e\n\t\t\u003c/ul\u003e\n\t\t\u003c/li\u003e\n\t\t\u003cli\u003e\u003cspan style=\"font-weight: 700;\"\u003eपुष्प\u003c/span\u003e\u003cstrong\u003e के\u0026nbsp;प्रजनन अंग\u003c/strong\u003e\n\t\t\u003cul\u003e\n\t\t\t\u003cli\u003eपुंकेसर, वर्तिकाग्र, स्टाइल डिंबग्रंथि, पिस्टिल\u003c/li\u003e\n\t\t\u003c/ul\u003e\n\t\t\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cimg alt=\"\" src=\"//storage.googleapis.com/tb-img/production/20/12/flower1.png\" style=\"width: 280px; height: 186px;\"\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eपिस्टिल में वर्तिकाग्र, स्टाइल और डिंबग्रंथि शामिल होते हैं \u003c/strong\u003eजो फूल के प्रजनन अंग का हिस्सा होते है।\u003c/li\u003e\n\t\u003cli\u003eअंडप का सबसे ऊपरी सिरा या ग्राही सिरा \u003cstrong\u003eवर्तिकाग्र\u003c/strong\u003e होता है।\u003c/li\u003e\n\t\u003cli\u003eवर्तिकाग्र और डिंबग्रंथि को जोड़ने वाली लंबी नली \u003cstrong\u003eस्टाइल\u003c/strong\u003e होती है।\u003c/li\u003e\n\t\u003cli\u003eनलीविहीन पुनरुत्पादक ग्रंथि जो बीजांड को धारण करती है,\u003cstrong\u003e डिंबग्रंथि\u003c/strong\u003e कहलाती है।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर परागकोश है। Key Points यह अर्धसूत्री विभाजन के अध्ययन के लिए सबसे उपयुक्त भाग है। पुंकेसर में परागकोश और सूत्र शामिल होते हैं। सूत्र एक धागे जैसी संरचना है जो शीर्ष पर एक गोलाकार संरचना परागकोश के साथ होती है और इसे अंडाशय से जोड़ती है। परागकोश पराग उत्पन्न करता है जो पौधे की नर प्रजनन प्रक्रिया का हिस्सा होता है। Important Points पुष्प के महत्वपूर्ण भाग ​पुष्प के वर्धी भाग पंखुड़ी, बाह्य दल पुष्प के प्रजनन अंग पुंकेसर, वर्तिकाग्र, स्टाइल डिंबग्रंथि, पिस्टिल पिस्टिल में वर्तिकाग्र, स्टाइल और डिंबग्रंथि शामिल होते हैं जो फूल के प्रजनन अंग का हिस्सा होते है। अंडप का सबसे ऊपरी सिरा या ग्राही सिरा वर्तिकाग्र होता है। वर्तिकाग्र और डिंबग्रंथि को जोड़ने वाली लंबी नली स्टाइल होती है। नलीविहीन पुनरुत्पादक ग्रंथि जो बीजांड को धारण करती है, डिंबग्रंथि कहलाती है।","markdown":"## Q24.\n\nपौधों में अर्धसूत्री विभाजन के अध्ययन के लिए सबसे उपयुक्त भाग क्या होगा?\n\n### Options\n\nA. प्ररोह शीर्ष\n\nB. मूल शीर्ष\n\nC. परागकोश\n\nD. पर्ण कोशिका\n\n**Correct Answer:** C\n\n### Solution\n\nसही उत्तर **परागकोश** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* यह **अर्धसूत्री विभाजन के अध्ययन के लिए सबसे उपयुक्त भाग है।**\n* **पुंकेसर**में परागकोश और सूत्र **शामिल होते हैं।**\n* **सूत्र एक धागे जैसी संरचना** है जो शीर्ष पर एक गोलाकार संरचना परागकोश के साथ होती है और इसे अंडाशय से जोड़ती है।\n* परागकोश पराग उत्पन्न करता है जो **पौधे की नर प्रजनन प्रक्रिया** का हिस्सा होता है।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* **पुष्प के महत्वपूर्ण भाग** \n* **​**पुष्प**के वर्धी भाग** \n* पंखुड़ी, बाह्य दल\n* पुष्प**के प्रजनन अंग** \n* पुंकेसर, वर्तिकाग्र, स्टाइल डिंबग्रंथि, पिस्टिल\n \n\n![](//storage.googleapis.com/tb-img/production/20/12/flower1.png)\n\n \n* **पिस्टिल में वर्तिकाग्र, स्टाइल और डिंबग्रंथि शामिल होते हैं**जो फूल के प्रजनन अंग का हिस्सा होते है।\n* अंडप का सबसे ऊपरी सिरा या ग्राही सिरा **वर्तिकाग्र** होता है।\n* वर्तिकाग्र और डिंबग्रंथि को जोड़ने वाली लंबी नली **स्टाइल** होती है।\n* नलीविहीन पुनरुत्पादक ग्रंथि जो बीजांड को धारण करती है,**डिंबग्रंथि** कहलाती है।\n\n---\n"}}},{"index":25,"qNo":"Question No. 25","languages":{"English":{"qNo":25,"language":"English","questionHTML":"The most rapid movement of sound waves is?","questionText":"The most rapid movement of sound waves is?","options":[{"label":"A","html":"In solid","text":"In solid"},{"label":"B","html":"In fluid","text":"In fluid"},{"label":"C","html":"In the gas","text":"In the gas"},{"label":"D","html":"In a vacuum","text":"In a vacuum"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003eIn solid\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eThe speed of the \u003cstrong\u003esound varies in different mediums\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eThe speed of sound \u003cstrong\u003edepends on the density\u003c/strong\u003e of the material.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eTightly\u0026nbsp;packed\u003c/strong\u003e material molecules\u0026nbsp;transfer the \u003cstrong\u003esound at\u003c/strong\u003e \u003cstrong\u003ehigh speed\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eSpeed of sound is \u003cstrong\u003efastest in Solids, Liquids then Gas\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eSound is a type of\u003cstrong\u003e longitudinal wave\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eSound is \u003cstrong\u003emeasured in Decibels(Db)\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ctable border=\"1\" cellpadding=\"1\" cellspacing=\"1\" style=\"width: 350px;\"\u003e\n\t\u003ctbody\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003e\u003cu\u003e\u003cstrong\u003eMedium\u003c/strong\u003e\u003c/u\u003e\u003c/td\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003e\u003cu\u003e\u003cstrong\u003eSpeed(m/s)\u003c/strong\u003e\u003c/u\u003e\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003eSolid (Steel)\u003c/td\u003e\n\t\t\t\u003ctd\u003e6000\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003eLiquid (Water)\u003c/td\u003e\n\t\t\t\u003ctd\u003e1500\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003eGas (Air)\u003c/td\u003e\n\t\t\t\u003ctd\u003e350\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\u003c/tbody\u003e\n\u003c/table\u003e","solutionText":"The correct answer is In solid. Important Points The speed of the sound varies in different mediums. The speed of sound depends on the density of the material. Tightly packed material molecules transfer the sound at high speed. Speed of sound is fastest in Solids, Liquids then Gas. Additional Information Sound is a type of longitudinal wave. Sound is measured in Decibels(Db). Medium Speed(m/s) Solid (Steel) 6000 Liquid (Water) 1500 Gas (Air) 350","markdown":"## Q25.\n\nThe most rapid movement of sound waves is?\n\n### Options\n\nA. In solid\n\nB. In fluid\n\nC. In the gas\n\nD. In a vacuum\n\n**Correct Answer:** A\n\n### Solution\n\nThe correct answer is **In solid**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* The speed of the **sound varies in different mediums**.\n* The speed of sound **depends on the density** of the material.\n* **Tightly packed** material molecules transfer the **sound at** **high speed**.\n* Speed of sound is **fastest in Solids, Liquids then Gas**.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* Sound is a type of**longitudinal wave**.\n* Sound is **measured in Decibels(Db)**.\n \n\n| Medium | Speed(m/s) |\n| --- | --- |\n| Solid (Steel) | 6000 |\n| Liquid (Water) | 1500 |\n| Gas (Air) | 350 |\n\n---\n"},"Hindi":{"qNo":25,"language":"Hindi","questionHTML":"ध्वनि तरंगों का सबसे तीव्र \u003cspan style=\"color: rgb(37, 37, 37); \"\u003eगति कहाँ होती\u0026nbsp;\u003c/span\u003eहै?","questionText":"ध्वनि तरंगों का सबसे तीव्र गति कहाँ होती है?","options":[{"label":"A","html":"ठोस में","text":"ठोस में"},{"label":"B","html":"द्रव में","text":"द्रव में"},{"label":"C","html":"गैस में","text":"गैस में"},{"label":"D","html":"निर्वात में","text":"निर्वात में"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eठोस में\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eध्वनि की गति \u003cstrong\u003eविभिन्न माध्यमों में भिन्न \u003c/strong\u003eहोती है।\u003c/li\u003e\n\t\u003cli\u003eध्वनि की गति \u003cstrong\u003eपदार्थ के घनत्व पर निर्भर\u003c/strong\u003e करती है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eकसकर बांधे\u003c/strong\u003e\u0026nbsp;गए भौतिक अणु \u003cstrong\u003eउच्च गति पर ध्वनि\u003c/strong\u003e को स्थानांतरित करते हैं।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eठोस, द्रव्य फिर गैस\u003c/strong\u003e में ध्वनि की गति सबसे तेज होती है।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eध्वनि एक प्रकार की \u003cstrong\u003eअनुदैर्ध्य तरंग\u003c/strong\u003e है।\u003c/li\u003e\n\t\u003cli\u003eध्वनि को \u003cstrong\u003eडेसीबल (Db) में मापा\u003c/strong\u003e जाता है।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ctable border=\"1\" cellpadding=\"1\" cellspacing=\"1\" style=\"width: 350px;\"\u003e\n\t\u003ctbody\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003e\u003cu\u003e\u003cstrong\u003eमाध्यम\u003c/strong\u003e\u003c/u\u003e\u003c/td\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003e\u003cu\u003e\u003cstrong\u003eगति(m/s)\u003c/strong\u003e\u003c/u\u003e\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003eठोस (स्टील)\u003c/td\u003e\n\t\t\t\u003ctd\u003e6000\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003eद्रव्य (जल)\u003c/td\u003e\n\t\t\t\u003ctd\u003e1500\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003eगैस (हवा)\u003c/td\u003e\n\t\t\t\u003ctd\u003e350\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\u003c/tbody\u003e\n\u003c/table\u003e","solutionText":"सही उत्तर ठोस में है। Important Points ध्वनि की गति विभिन्न माध्यमों में भिन्न होती है। ध्वनि की गति पदार्थ के घनत्व पर निर्भर करती है। कसकर बांधे गए भौतिक अणु उच्च गति पर ध्वनि को स्थानांतरित करते हैं। ठोस, द्रव्य फिर गैस में ध्वनि की गति सबसे तेज होती है। Additional Information ध्वनि एक प्रकार की अनुदैर्ध्य तरंग है। ध्वनि को डेसीबल (Db) में मापा जाता है। माध्यम गति(m/s) ठोस (स्टील) 6000 द्रव्य (जल) 1500 गैस (हवा) 350","markdown":"## Q25.\n\nध्वनि तरंगों का सबसे तीव्र गति कहाँ होती है?\n\n### Options\n\nA. ठोस में\n\nB. द्रव में\n\nC. गैस में\n\nD. निर्वात में\n\n**Correct Answer:** A\n\n### Solution\n\nसही उत्तर **ठोस में** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* ध्वनि की गति **विभिन्न माध्यमों में भिन्न**होती है।\n* ध्वनि की गति **पदार्थ के घनत्व पर निर्भर** करती है।\n* **कसकर बांधे** गए भौतिक अणु **उच्च गति पर ध्वनि** को स्थानांतरित करते हैं।\n* **ठोस, द्रव्य फिर गैस** में ध्वनि की गति सबसे तेज होती है।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* ध्वनि एक प्रकार की **अनुदैर्ध्य तरंग** है।\n* ध्वनि को **डेसीबल (Db) में मापा** जाता है।\n \n\n| माध्यम | गति(m/s) |\n| --- | --- |\n| ठोस (स्टील) | 6000 |\n| द्रव्य (जल) | 1500 |\n| गैस (हवा) | 350 |\n\n---\n"}}},{"index":26,"qNo":"Question No. 26","languages":{"English":{"qNo":26,"language":"English","questionHTML":"\u003cp\u003eA reflection of an object is formed in the human eye?\u003c/p\u003e","questionText":"A reflection of an object is formed in the human eye?","options":[{"label":"A","html":"In Cornea","text":"In Cornea"},{"label":"B","html":"In Iris","text":"In Iris"},{"label":"C","html":"In\u0026nbsp;Eyeball","text":"In Eyeball"},{"label":"D","html":"In Retina","text":"In Retina"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003eIn Retina\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003e\u0026nbsp;Retina\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eRetina is the \u003cstrong\u003einnermost part\u003c/strong\u003e\u0026nbsp;of the eye.\u003c/li\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eReflection of an object is formed on retina\u003c/strong\u003e.\u003c/li\u003e\n\t\t\u003cli\u003eIt acts as a\u003cstrong\u003e camera film\u003c/strong\u003e where the\u003cstrong\u003e image is formed inverted\u003c/strong\u003e.\u003c/li\u003e\n\t\t\u003cli\u003eIt \u003cstrong\u003econverts the image\u003c/strong\u003e into an \u003cstrong\u003eelectrical signal \u003c/strong\u003efor visual perception and sends it\u0026nbsp;\u003cstrong\u003eto the brain by the optic nerve\u003c/strong\u003e.\u003c/li\u003e\n\t\t\u003cli\u003eBrain rotate the image and interpret it.\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cimg alt=\"\" src=\"//storage.googleapis.com/tb-img/production/20/12/eye.png\" style=\"width: 280px; height: 175px;\"\u003e\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eO\u003c/strong\u003e\u003cspan style=\"font-weight: 700;\"\u003enly cornea is donated in eye donation\u003c/span\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: midd

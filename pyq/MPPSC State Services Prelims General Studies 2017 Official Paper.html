ditional-information-image.png)**Additional Information**\n\n \n* First World Climate Conference - 1979\n* First Earth Summit - Agenda 21\n* Earth Summit + 5 - 1997\n\n---\n"},"Hindi":{"qNo":85,"language":"Hindi","questionHTML":"निम्नलिखित में से कौन-सा युग्म सही सुमेलित नहीं है?","questionText":"निम्नलिखित में से कौन-सा युग्म सही सुमेलित नहीं है?","options":[{"label":"A","html":"प्रथम विश्व जलवायु सम्मलेन - 1979","text":"प्रथम विश्व जलवायु सम्मलेन - 1979"},{"label":"B","html":"प्रथम पृथ्वी शिखर सम्मलेन - एजेन्डा 21","text":"प्रथम पृथ्वी शिखर सम्मलेन - एजेन्डा 21"},{"label":"C","html":"पृथ्वी शिखर सम्मलेन + 5 - 1997","text":"पृथ्वी शिखर सम्मलेन + 5 - 1997"},{"label":"D","html":"कार्बन व्यापार - मांट्रियल प्रोटोकॉल","text":"कार्बन व्यापार - मांट्रियल प्रोटोकॉल"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eकार्बन व्यापार - मांट्रियल प्रोटोकॉल\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eपदार्थों पर मॉन्ट्रियल प्रोटोकॉल जो\u003cstrong\u003e ओजोन परत \u003c/strong\u003eका क्षय करते हैं, एक बहुपक्षीय पर्यावरणीय समझौता है जो लगभग 100 मानव निर्मित रसायनों के उत्पादन और खपत को नियंत्रित करता है जिन्हें ओजोन-क्षयकारी पदार्थ (ओडीएस) कहा जाता है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003e1987 में मॉन्ट्रियल प्रोटोकॉल पर हस्ताक्षर किए गए और 1989 में लागू हुए। \u003c/strong\u003eसमझौते के सफल कार्यान्वयन को सुनिश्चित करने के उद्देश्य से निर्णय लेने के लिए प्रोटोकॉल के पक्ष वर्ष में एक बार मिलते हैं।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eपहला विश्व जलवायु सम्मेलन - 1979\u0026nbsp;\u003c/li\u003e\n\t\u003cli\u003eपहला पृथ्वी शिखर सम्मेलन - एजेंडा 21\u003c/li\u003e\n\t\u003cli\u003eपृथ्वी शिखर सम्मेलन + 5 - 1997\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर कार्बन व्यापार - मांट्रियल प्रोटोकॉल है। Key Points पदार्थों पर मॉन्ट्रियल प्रोटोकॉल जो ओजोन परत का क्षय करते हैं, एक बहुपक्षीय पर्यावरणीय समझौता है जो लगभग 100 मानव निर्मित रसायनों के उत्पादन और खपत को नियंत्रित करता है जिन्हें ओजोन-क्षयकारी पदार्थ (ओडीएस) कहा जाता है। 1987 में मॉन्ट्रियल प्रोटोकॉल पर हस्ताक्षर किए गए और 1989 में लागू हुए। समझौते के सफल कार्यान्वयन को सुनिश्चित करने के उद्देश्य से निर्णय लेने के लिए प्रोटोकॉल के पक्ष वर्ष में एक बार मिलते हैं। Additional Information पहला विश्व जलवायु सम्मेलन - 1979 पहला पृथ्वी शिखर सम्मेलन - एजेंडा 21 पृथ्वी शिखर सम्मेलन + 5 - 1997","markdown":"## Q85.\n\nनिम्नलिखित में से कौन-सा युग्म सही सुमेलित नहीं है?\n\n### Options\n\nA. प्रथम विश्व जलवायु सम्मलेन - 1979\n\nB. प्रथम पृथ्वी शिखर सम्मलेन - एजेन्डा 21\n\nC. पृथ्वी शिखर सम्मलेन + 5 - 1997\n\nD. कार्बन व्यापार - मांट्रियल प्रोटोकॉल\n\n**Correct Answer:** D\n\n### Solution\n\nसही उत्तर **कार्बन व्यापार - मांट्रियल प्रोटोकॉल** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* पदार्थों पर मॉन्ट्रियल प्रोटोकॉल जो**ओजोन परत**का क्षय करते हैं, एक बहुपक्षीय पर्यावरणीय समझौता है जो लगभग 100 मानव निर्मित रसायनों के उत्पादन और खपत को नियंत्रित करता है जिन्हें ओजोन-क्षयकारी पदार्थ (ओडीएस) कहा जाता है।\n* **1987 में मॉन्ट्रियल प्रोटोकॉल पर हस्ताक्षर किए गए और 1989 में लागू हुए।**समझौते के सफल कार्यान्वयन को सुनिश्चित करने के उद्देश्य से निर्णय लेने के लिए प्रोटोकॉल के पक्ष वर्ष में एक बार मिलते हैं।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* पहला विश्व जलवायु सम्मेलन - 1979\n* पहला पृथ्वी शिखर सम्मेलन - एजेंडा 21\n* पृथ्वी शिखर सम्मेलन + 5 - 1997\n\n---\n"}}},{"index":86,"qNo":"Question No. 86","languages":{"English":{"qNo":86,"language":"English","questionHTML":"Which of the following statements regarding 'International Monetary Fund' is correct?","questionText":"Which of the following statements regarding 'International Monetary Fund' is correct?","options":[{"label":"A","html":"It can provide loans to any country.","text":"It can provide loans to any country."},{"label":"B","html":"It can only provide loans to developed countries.","text":"It can only provide loans to developed countries."},{"label":"C","html":"It provides loans only to member countries.","text":"It provides loans only to member countries."},{"label":"D","html":"It provides loans to the central bank of a country.\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","text":"It provides loans to the central bank of a country."}],"correctIndex":2,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cu\u003e\u003cstrong\u003eIt provides loans only to member countries\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eThe International Monetary Fund (IMF) is an \u003cstrong\u003eorganization of 190 countries\u003c/strong\u003e, working to foster global monetary cooperation, secure financial stability, facilitate international trade, promote high employment and sustainable economic growth, and reduce poverty around the world.\u003c/li\u003e\n\t\u003cli\u003eCreated in \u003cstrong\u003e1945\u003c/strong\u003e, the IMF is governed by and accountable to the 190 countries that make up its near-global membership.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eThe IMF's primary purpose is \u003cstrong\u003eto ensure the stability of the international monetary system.\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003eThe system of exchange rates and international payments enables countries (and their citizens) to transact with each other.\u003c/li\u003e\n\t\u003cli\u003eThe Fund's mandate was updated in 2012 to include all macroeconomic and financial sector issues that bear on global stability.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is It provides loans only to member countries. Key Points The International Monetary Fund (IMF) is an organization of 190 countries, working to foster global monetary cooperation, secure financial stability, facilitate international trade, promote high employment and sustainable economic growth, and reduce poverty around the world. Created in 1945, the IMF is governed by and accountable to the 190 countries that make up its near-global membership. Important Points The IMF's primary purpose is to ensure the stability of the international monetary system. The system of exchange rates and international payments enables countries (and their citizens) to transact with each other. The Fund's mandate was updated in 2012 to include all macroeconomic and financial sector issues that bear on global stability.","markdown":"## Q86.\n\nWhich of the following statements regarding 'International Monetary Fund' is correct?\n\n### Options\n\nA. It can provide loans to any country.\n\nB. It can only provide loans to developed countries.\n\nC. It provides loans only to member countries.\n\nD. It provides loans to the central bank of a country.\n\n**Correct Answer:** C\n\n### Solution\n\nThe correct answer is **It provides loans only to member countries**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* The International Monetary Fund (IMF) is an **organization of 190 countries**, working to foster global monetary cooperation, secure financial stability, facilitate international trade, promote high employment and sustainable economic growth, and reduce poverty around the world.\n* Created in **1945**, the IMF is governed by and accountable to the 190 countries that make up its near-global membership.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* The IMF's primary purpose is **to ensure the stability of the international monetary system.**\n* The system of exchange rates and international payments enables countries (and their citizens) to transact with each other.\n* The Fund's mandate was updated in 2012 to include all macroeconomic and financial sector issues that bear on global stability.\n\n---\n"},"Hindi":{"qNo":86,"language":"Hindi","questionHTML":"'अन्तर्राष्ट्रीय मुद्राकोष' के संबंध में निम्नलिखित में से कौन-सा कथन सही है?","questionText":"'अन्तर्राष्ट्रीय मुद्राकोष' के संबंध में निम्नलिखित में से कौन-सा कथन सही है?","options":[{"label":"A","html":"यह किसी भी देश को ऋण प्रदान कर सकता है।","text":"यह किसी भी देश को ऋण प्रदान कर सकता है।"},{"label":"B","html":"यह केवल विकसित देशों को ही ऋण प्रदान कर सकता है।","text":"यह केवल विकसित देशों को ही ऋण प्रदान कर सकता है।"},{"label":"C","html":"यह केवल सदस्य देशों को ही ऋण प्रदान करता है।","text":"यह केवल सदस्य देशों को ही ऋण प्रदान करता है।"},{"label":"D","html":"यह किसी देश के केन्द्रीय बैंक को ऋण प्रदान करता है।","text":"यह किसी देश के केन्द्रीय बैंक को ऋण प्रदान करता है।"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cstrong\u003eयह केवल सदस्य देशों को ही ऋण प्रदान करता है।\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eअंतर्राष्ट्रीय मुद्रा कोष (आईएमएफ) \u003cstrong\u003e190 देशों का एक संगठन\u003c/strong\u003e है, जो वैश्विक मौद्रिक सहयोग को बढ़ावा देने, वित्तीय स्थिरता को सुरक्षित करने, अंतर्राष्ट्रीय व्यापार को सुविधाजनक बनाने, उच्च रोजगार और संधारणीय\u0026nbsp;आर्थिक विकास को बढ़ावा देने और दुनिया भर में गरीबी को कम करने के लिए काम कर रहा है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003e1945 \u003c/strong\u003eमें बनाया गया, आईएमएफ उन 190 देशों के लिए जिम्मेदार और जवाबदेह है जो इसकी निकट-वैश्विक सदस्यता बनाते हैं।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eआईएमएफ का प्राथमिक उद्देश्य \u003cstrong\u003eअंतर्राष्ट्रीय मौद्रिक प्रणाली की स्थिरता सुनिश्चित करना\u003c/strong\u003e है।\u003c/li\u003e\n\t\u003cli\u003eविनिमय दरों और अंतर्राष्ट्रीय भुगतान की प्रणाली देशों (और उनके नागरिकों) को एक दूसरे के साथ लेन-देन करने में सक्षम बनाती है।\u003c/li\u003e\n\t\u003cli\u003eफंड के अधिदेश को 2012 में वैश्विक स्थिरता पर आधारित सभी व्यापक आर्थिक और वित्तीय मुद्दों को शामिल करने के लिए अद्यतन किया गया था।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर यह केवल सदस्य देशों को ही ऋण प्रदान करता है। Key Points अंतर्राष्ट्रीय मुद्रा कोष (आईएमएफ) 190 देशों का एक संगठन है, जो वैश्विक मौद्रिक सहयोग को बढ़ावा देने, वित्तीय स्थिरता को सुरक्षित करने, अंतर्राष्ट्रीय व्यापार को सुविधाजनक बनाने, उच्च रोजगार और संधारणीय आर्थिक विकास को बढ़ावा देने और दुनिया भर में गरीबी को कम करने के लिए काम कर रहा है। 1945 में बनाया गया, आईएमएफ उन 190 देशों के लिए जिम्मेदार और जवाबदेह है जो इसकी निकट-वैश्विक सदस्यता बनाते हैं। Important Points आईएमएफ का प्राथमिक उद्देश्य अंतर्राष्ट्रीय मौद्रिक प्रणाली की स्थिरता सुनिश्चित करना है। विनिमय दरों और अंतर्राष्ट्रीय भुगतान की प्रणाली देशों (और उनके नागरिकों) को एक दूसरे के साथ लेन-देन करने में सक्षम बनाती है। फंड के अधिदेश को 2012 में वैश्विक स्थिरता पर आधारित सभी व्यापक आर्थिक और वित्तीय मुद्दों को शामिल करने के लिए अद्यतन किया गया था।","markdown":"## Q86.\n\n'अन्तर्राष्ट्रीय मुद्राकोष' के संबंध में निम्नलिखित में से कौन-सा कथन सही है?\n\n### Options\n\nA. यह किसी भी देश को ऋण प्रदान कर सकता है।\n\nB. यह केवल विकसित देशों को ही ऋण प्रदान कर सकता है।\n\nC. यह केवल सदस्य देशों को ही ऋण प्रदान करता है।\n\nD. यह किसी देश के केन्द्रीय बैंक को ऋण प्रदान करता है।\n\n**Correct Answer:** C\n\n### Solution\n\nसही उत्तर **यह केवल सदस्य देशों को ही ऋण प्रदान करता है।**\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* अंतर्राष्ट्रीय मुद्रा कोष (आईएमएफ) **190 देशों का एक संगठन** है, जो वैश्विक मौद्रिक सहयोग को बढ़ावा देने, वित्तीय स्थिरता को सुरक्षित करने, अंतर्राष्ट्रीय व्यापार को सुविधाजनक बनाने, उच्च रोजगार और संधारणीय आर्थिक विकास को बढ़ावा देने और दुनिया भर में गरीबी को कम करने के लिए काम कर रहा है।\n* **1945**में बनाया गया, आईएमएफ उन 190 देशों के लिए जिम्मेदार और जवाबदेह है जो इसकी निकट-वैश्विक सदस्यता बनाते हैं।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* आईएमएफ का प्राथमिक उद्देश्य **अंतर्राष्ट्रीय मौद्रिक प्रणाली की स्थिरता सुनिश्चित करना** है।\n* विनिमय दरों और अंतर्राष्ट्रीय भुगतान की प्रणाली देशों (और उनके नागरिकों) को एक दूसरे के साथ लेन-देन करने में सक्षम बनाती है।\n* फंड के अधिदेश को 2012 में वैश्विक स्थिरता पर आधारित सभी व्यापक आर्थिक और वित्तीय मुद्दों को शामिल करने के लिए अद्यतन किया गया था।\n\n---\n"}}},{"index":87,"qNo":"Question No. 87","languages":{"English":{"qNo":87,"language":"English","questionHTML":"Who was declared the 'Man of the Series' in the 2016 India-Zimbabwe one-day cricket series?","questionText":"Who was declared the 'Man of the Series' in the 2016 India-Zimbabwe one-day cricket series?","options":[{"label":"A","html":"Jaspreet Bumrah","text":"Jaspreet Bumrah"},{"label":"B","html":"Virat Kohli","text":"Virat Kohli"},{"label":"C","html":"Ajinkya Rahane","text":"Ajinkya Rahane"},{"label":"D","html":"\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003eK.L.Rahul\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","text":"K.L.Rahul"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cu\u003e\u003cstrong\u003eK.L.Rahul\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\n\t\u003cdiv\u003eIn the One Day International series Results,\u003cspan style=\"white-space:pre\"\u003e \u003c/span\u003eIndia won the 3-match series 3–0.\u003c/div\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\n\t\u003cdiv\u003ePlayer of the series\u003cspan style=\"white-space:pre\"\u003e: \u003c/span\u003e\u003cstrong\u003eK. L. Rahul\u003c/strong\u003e.\u003c/div\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cdiv\u003e\u003cstrong\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/div\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\n\t\u003cdiv\u003eIn the Twenty 20 International series Results,\u003cspan style=\"white-space:pre\"\u003e \u003c/span\u003eIndia won the 3-match series 2–1.\u003c/div\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\n\t\u003cdiv\u003ePlayer of the series\u003cspan style=\"white-space:pre\"\u003e - \u003c/span\u003eBarinder Sran\u003c/div\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cdiv\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/div\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eThe Indian cricket team toured Zimbabwe from 11 June to 22 June 2016.\u003c/li\u003e\n\t\u003cli\u003eThey played three One Day Internationals (ODIs) and three Twenty 20 Internationals.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is K.L.Rahul. Key Points In the One Day International series Results, India won the 3-match series 3–0. Player of the series: K. L. Rahul. Important Points In the Twenty 20 International series Results, India won the 3-match series 2–1. Player of the series - Barinder Sran Additional Information The Indian cricket team toured Zimbabwe from 11 June to 22 June 2016. They played three One Day Internationals (ODIs) and three Twenty 20 Internationals.","markdown":"## Q87.\n\nWho was declared the 'Man of the Series' in the 2016 India-Zimbabwe one-day cricket series?\n\n### Options\n\nA. Jaspreet Bumrah\n\nB. Virat Kohli\n\nC. Ajinkya Rahane\n\nD. K.L.Rahul\n\n**Correct Answer:** D\n\n### Solution\n\nThe correct answer is **K.L.Rahul**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* In the One Day International series Results, India won the 3-match series 3–0.\n* Player of the series: **K. L. Rahul**.\n \n\n**![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points****\n\n \n* In the Twenty 20 International series Results, India won the 3-match series 2–1.\n* Player of the series - Barinder Sran\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* The Indian cricket team toured Zimbabwe from 11 June to 22 June 2016.\n* They played three One Day Internationals (ODIs) and three Twenty 20 Internationals.\n\n---\n"},"Hindi":{"qNo":87,"language":"Hindi","questionHTML":"2016 में हुई भारत-जिम्बाब्वे एक-दिवसीय क्रिकेट शृंखला में 'मैन ऑफ़ द सीरीज़' किसे घोषित किया गया?","questionText":"2016 में हुई भारत-जिम्बाब्वे एक-दिवसीय क्रिकेट शृंखला में 'मैन ऑफ़ द सीरीज़' किसे घोषित किया गया?","options":[{"label":"A","html":"जसप्रीत बुमराह","text":"जसप्रीत बुमराह"},{"label":"B","html":"विराट कोहली","text":"विराट कोहली"},{"label":"C","html":"अजिंक्य रहाणे","text":"अजिंक्य रहाणे"},{"label":"D","html":"के. एल. राहुल","text":"के. एल. राहुल"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eके. एल. राहुल\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\n\t\u003cdiv\u003eएक दिवसीय अंतर्राष्ट्रीय श्रृंखला परिणामों में, भारत ने 3 मैचों की श्रृंखला 3-0 से जीती।\u003c/div\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\n\t\u003cdiv\u003eप्लेयर ऑफ द सीरिज\u003cspan style=\"white-space:pre\"\u003e: \u003c/span\u003e\u003cstrong\u003eके. एल. राहुल\u003c/strong\u003e\u003c/div\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cdiv\u003e\u003cstrong\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/div\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\n\t\u003cdiv\u003eट्वेंटी 20 अंतर्राष्ट्रीय श्रृंखला के परिणामों में, भारत ने 3 मैचों की श्रृंखला 2-1 से जीती।\u003c/div\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\n\t\u003cdiv\u003eप्लेयर ऑफ द सीरिज\u003cspan style=\"white-space:pre\"\u003e - \u003c/span\u003eबरिंदर सरन\u003c/div\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cdiv\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/div\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eभारतीय क्रिकेट टीम ने 11 जून से 22 जून 2016 तक जिम्बाब्वे का दौरा किया।\u003c/li\u003e\n\t\u003cli\u003eउन्होंने तीन एक दिवसीय अंतर्राष्ट्रीय (ओडीआई) और तीन ट्वेंटी 20 अंतर्राष्ट्रीय खेले।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर के. एल. राहुल है। Key Points एक दिवसीय अंतर्राष्ट्रीय श्रृंखला परिणामों में, भारत ने 3 मैचों की श्रृंखला 3-0 से जीती। प्लेयर ऑफ द सीरिज: के. एल. राहुल Important Points ट्वेंटी 20 अंतर्राष्ट्रीय श्रृंखला के परिणामों में, भारत ने 3 मैचों की श्रृंखला 2-1 से जीती। प्लेयर ऑफ द सीरिज - बरिंदर सरन Additional Information भारतीय क्रिकेट टीम ने 11 जून से 22 जून 2016 तक जिम्बाब्वे का दौरा किया। उन्होंने तीन एक दिवसीय अंतर्राष्ट्रीय (ओडीआई) और तीन ट्वेंटी 20 अंतर्राष्ट्रीय खेले।","markdown":"## Q87.\n\n2016 में हुई भारत-जिम्बाब्वे एक-दिवसीय क्रिकेट शृंखला में 'मैन ऑफ़ द सीरीज़' किसे घोषित किया गया?\n\n### Options\n\nA. जसप्रीत बुमराह\n\nB. विराट कोहली\n\nC. अजिंक्य रहाणे\n\nD. के. एल. राहुल\n\n**Correct Answer:** D\n\n### Solution\n\nसही उत्तर **के. एल. राहुल** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* एक दिवसीय अंतर्राष्ट्रीय श्रृंखला परिणामों में, भारत ने 3 मैचों की श्रृंखला 3-0 से जीती।\n* प्लेयर ऑफ द सीरिज: **के. एल. राहुल**\n \n\n**![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points****\n\n \n* ट्वेंटी 20 अंतर्राष्ट्रीय श्रृंखला के परिणामों में, भारत ने 3 मैचों की श्रृंखला 2-1 से जीती।\n* प्लेयर ऑफ द सीरिज - बरिंदर सरन\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* भारतीय क्रिकेट टीम ने 11 जून से 22 जून 2016 तक जिम्बाब्वे का दौरा किया।\n* उन्होंने तीन एक दिवसीय अंतर्राष्ट्रीय (ओडीआई) और तीन ट्वेंटी 20 अंतर्राष्ट्रीय खेले।\n\n---\n"}}},{"index":88,"qNo":"Question No. 88","languages":{"English":{"qNo":88,"language":"English","questionHTML":"In which state stadium was the final match of IPL-9 (2016) played?","questionText":"In which state stadium was the final match of IPL-9 (2016) played?","options":[{"label":"A","html":"Karnataka","text":"Karnataka"},{"label":"B","html":"Maharashtra","text":"Maharashtra"},{"label":"C","html":"Haryana","text":"Haryana"},{"label":"D","html":"West Bengal\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","text":"West Bengal"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cu\u003e\u003cstrong\u003eKarnataka\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eThe 2016 season of the Indian Premier League, also known as IPL 9,\u0026nbsp;was the ninth season of the IPL,\u0026nbsp;established by the Board of Control for Cricket in India (BCCI) in 2007.\u003c/li\u003e\n\t\u003cli\u003eThe final was played at \u003cstrong\u003eM. Chinnaswamy Stadium, Bangalore, Karnataka\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003e2016 Indian Premier League\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eDates:\u003cspan style=\"white-space:pre\"\u003e \u003c/span\u003e9 April 2016 – 29 May 2016\u003c/li\u003e\n\t\t\u003cli\u003eAdministrator(s) -\u003cspan style=\"white-space:pre\"\u003e \u003c/span\u003eBoard of Control for Cricket in India (BCCI)\u003c/li\u003e\n\t\t\u003cli\u003eChampions -\u003cspan style=\"white-space:pre\"\u003e \u003c/span\u003e\u003cstrong\u003eSunrisers Hyderabad\u003c/strong\u003e (1st title)\u003c/li\u003e\n\t\t\u003cli\u003eRunners - Royal Challengers Bangalore\u003c/li\u003e\n\t\t\u003cli\u003e\n\t\t\u003cdiv\u003ePlayer of the series -\u003cspan style=\"white-space:pre\"\u003e \u003c/span\u003eVirat Kohli\u003c/div\u003e\n\t\t\u003c/li\u003e\n\t\t\u003cli\u003e\n\t\t\u003cdiv\u003eMost runs\u003cspan style=\"white-space:pre\"\u003e - \u003c/span\u003eVirat Kohli (RCB)\u003c/div\u003e\n\t\t\u003c/li\u003e\n\t\t\u003cli\u003e\n\t\t\u003cdiv\u003eMost wickets -\u003cspan style=\"white-space:pre\"\u003e \u003c/span\u003eBhuvneshwar Kumar\u003c/div\u003e\n\t\t\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Karnataka. Key Points The 2016 season of the Indian Premier League, also known as IPL 9, was the ninth season of the IPL, established by the Board of Control for Cricket in India (BCCI) in 2007. The final was played at M. Chinnaswamy Stadium, Bangalore, Karnataka. Additional Information 2016 Indian Premier League Dates: 9 April 2016 – 29 May 2016 Administrator(s) - Board of Control for Cricket in India (BCCI) Champions - Sunrisers Hyderabad (1st title) Runners - Royal Challengers Bangalore Player of the series - Virat Kohli Most runs - Virat Kohli (RCB) Most wickets - Bhuvneshwar Kumar","markdown":"## Q88.\n\nIn which state stadium was the final match of IPL-9 (2016) played?\n\n### Options\n\nA. Karnataka\n\nB. Maharashtra\n\nC. Haryana\n\nD. West Bengal\n\n**Correct Answer:** A\n\n### Solution\n\nThe correct answer is **Karnataka**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* The 2016 season of the Indian Premier League, also known as IPL 9, was the ninth season of the IPL, established by the Board of Control for Cricket in India (BCCI) in 2007.\n* The final was played at **M. Chinnaswamy Stadium, Bangalore, Karnataka**.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **2016 Indian Premier League** \n* Dates: 9 April 2016 – 29 May 2016\n* Administrator(s) - Board of Control for Cricket in India (BCCI)\n* Champions - **Sunrisers Hyderabad** (1st title)\n* Runners - Royal Challengers Bangalore\n* Player of the series - Virat Kohli\n* Most runs - Virat Kohli (RCB)\n* Most wickets - Bhuvneshwar Kumar\n\n---\n"},"Hindi":{"qNo":88,"language":"Hindi","questionHTML":"आई. पी. एल.- 9 (2016) का फाइनल मैच किस राज्य के स्टेडियम में खेला गया था?","questionText":"आई. पी. एल.- 9 (2016) का फाइनल मैच किस राज्य के स्टेडियम में खेला गया था?","options":[{"label":"A","html":"कर्नाटक","text":"कर्नाटक"},{"label":"B","html":"महाराष्ट्र","text":"महाराष्ट्र"},{"label":"C","html":"हरियाणा","text":"हरियाणा"},{"label":"D","html":"पश्चिम बंगाल","text":"पश्चिम बंगाल"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eकर्नाटक\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eइंडियन प्रीमियर लीग का 2016 सीज़न, जिसे आईपीएल 9 के रूप में भी जाना जाता है, आईपीएल का नौवां सीज़न था, जिसे भारतीय क्रिकेट कंट्रोल बोर्ड (बीसीसीआई) द्वारा 2007 में स्थापित किया गया था।\u003c/li\u003e\n\t\u003cli\u003eफाइनल मुकाबला \u003cstrong\u003eकर्नाटक के बैंगलोर के एम. चिन्नास्वामी स्टेडियम \u003c/strong\u003eमें खेला गया।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003e2016 इंडियन प्रीमियर लीग\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eदिनांक:\u003cspan style=\"white-space:pre\"\u003e \u003c/span\u003e9 अप्रैल 2016 – 29 मई 2016\u003c/li\u003e\n\t\t\u003cli\u003eप्रशासक - भारतीय क्रिकेट कंट्रोल बोर्ड (बीसीसीआई)\u003c/li\u003e\n\t\t\u003cli\u003eचैंपियंस - \u003cstrong\u003eसनराइजर्स हैदराबाद\u003c/strong\u003e (प्रथम खिताब)\u003c/li\u003e\n\t\t\u003cli\u003eउपविजेता - रॉयल चैलेंजर्स बैंगलोर\u003c/li\u003e\n\t\t\u003cli\u003e\n\t\t\u003cdiv\u003eप्लेयर ऑफ द सीरिज - विराट कोहली\u003c/div\u003e\n\t\t\u003c/li\u003e\n\t\t\u003cli\u003e\n\t\t\u003cdiv\u003eसर्वाधिक रन\u003cspan style=\"white-space:pre\"\u003e -\u003c/span\u003e\u0026nbsp;विराट कोहली (आरसीबी)\u003c/div\u003e\n\t\t\u003c/li\u003e\n\t\t\u003cli\u003e\n\t\t\u003cdiv\u003eसर्वाधिक विकेट - भुवनेश्वर कुमार\u003c/div\u003e\n\t\t\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर कर्नाटक है। Key Points इंडियन प्रीमियर लीग का 2016 सीज़न, जिसे आईपीएल 9 के रूप में भी जाना जाता है, आईपीएल का नौवां सीज़न था, जिसे भारतीय क्रिकेट कंट्रोल बोर्ड (बीसीसीआई) द्वारा 2007 में स्थापित किया गया था। फाइनल मुकाबला कर्नाटक के बैंगलोर के एम. चिन्नास्वामी स्टेडियम में खेला गया। Additional Informat etry includes:\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eKumkum\u003c/li\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eRashmirekha\u003c/strong\u003e\u003c/li\u003e\n\t\t\u003cli\u003eApalak\u003c/li\u003e\n\t\t\u003cli\u003eKwasi\u003c/li\u003e\n\t\t\u003cli\u003eVinoba Stavan\u003c/li\u003e\n\t\t\u003cli\u003eUrmila\u003c/li\u003e\n\t\t\u003cli\u003eHum Vishpaee Janam Ke\u0026nbsp;\u0026nbsp;\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Bal Krishna Sharma 'Naveen'. Key Points Pandit Balakrishna Sharma \"Naveen\", the leading poet of progressive writing in Hindi literature. He was born on December 8, 1897, in a village named Bhayana of Shajapur state. After getting his initial education from here, he passed his tenth exam from Ujjain and Inter from Kanpur. They followed Lokmanya Bal Gangadhar Tilak after coming into contact with Mrs. Annie Besant and Mr. Gneshshankr Vidyarthi. Balkrishna Sharma came to Kanpur in Ganesh Shankar Vidyarthi's ashram and started studying at Christ Church College. Important Points Bal Krishna Sharma 'Naveen's poetry includes: Kumkum Rashmirekha Apalak Kwasi Vinoba Stavan Urmila Hum Vishpaee Janam Ke","markdown":"## Q89.\n\nWho was the author of the book named Rashmirekha?\n\n### Options\n\nA. Gajanan Madhav 'Muktibodh'\n\nB. Bal Krishna Sharma 'Naveen'\n\nC. Hari Shankar Parsai\n\nD. Bhawani Prasad Mishra\n\n**Correct Answer:** B\n\n### Solution\n\nThe correct answer is **Bal Krishna Sharma 'Naveen'**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* Pandit Balakrishna Sharma \"Naveen\", the leading poet of progressive writing in Hindi literature.\n* He was born on December 8, 1897, in a village named Bhayana of **Shajapur** state.\n* After getting his initial education from here, he passed his tenth exam from Ujjain and Inter from Kanpur.\n* They followed Lokmanya Bal Gangadhar Tilak after coming into contact with Mrs. Annie Besant and Mr. Gneshshankr Vidyarthi.\n* Balkrishna Sharma came to Kanpur in Ganesh Shankar Vidyarthi's ashram and started studying at Christ Church College.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* **Bal Krishna Sharma** 'Naveen's poetry includes: \n* Kumkum\n* **Rashmirekha**\n* Apalak\n* Kwasi\n* Vinoba Stavan\n* Urmila\n* Hum Vishpaee Janam Ke\n\n---\n"},"Hindi":{"qNo":89,"language":"Hindi","questionHTML":"रश्मिरेखा नामक पुस्तक का लेखक कौन था?","questionText":"रश्मिरेखा नामक पुस्तक का लेखक कौन था?","options":[{"label":"A","html":"गजानन माधव 'मुक्तिबोध'","text":"गजानन माधव 'मुक्तिबोध'"},{"label":"B","html":"बालकृष्ण शर्मा 'नवीन'","text":"बालकृष्ण शर्मा 'नवीन'"},{"label":"C","html":"हरिशंकर परसाई","text":"हरिशंकर परसाई"},{"label":"D","html":"भवानी प्रसाद मिश्र","text":"भवानी प्रसाद मिश्र"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eबालकृष्ण शर्मा 'नवीन'\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eपंडित बालकृष्ण शर्मा \"नवीन\", हिंदी साहित्य में प्रगतिशील लेखन के अग्रणी कवि थे।\u003c/li\u003e\n\t\u003cli\u003eउनका जन्म 8 दिसंबर, 1897 को शाजापुर राज्य के भयाना नामक गाँव में हुआ था।\u003c/li\u003e\n\t\u003cli\u003eयहां से अपनी प्रारंभिक शिक्षा प्राप्त करने के बाद, उन्होंने अपनी दसवीं की परीक्षा उज्जैन और इंटर\u0026nbsp;कानपुर से पास की।\u003c/li\u003e\n\t\u003cli\u003eश्रीमती एनी बेसेंट और श्री ज्ञानशंकर विद्यार्थी के संपर्क में आने के बाद उन्होंने लोकमान्य बाल गंगाधर तिलक का अनुसरण किया।\u003c/li\u003e\n\t\u003cli\u003eबालकृष्ण शर्मा गणेश शंकर विद्यार्थी के आश्रम में कानपुर आए और क्राइस्ट चर्च कॉलेज में पढ़ाई शुरू की।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eबाल कृष्ण शर्मा\u003c/strong\u003e 'नवीन की कविता में शामिल हैं:\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eकुमकुम\u003c/li\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eरश्मिरेखा\u003c/strong\u003e\u003c/li\u003e\n\t\t\u003cli\u003eअपलक\u003c/li\u003e\n\t\t\u003cli\u003eक्वासी\u003c/li\u003e\n\t\t\u003cli\u003eविनोबा स्टवान\u003c/li\u003e\n\t\t\u003cli\u003eउर्मिला\u003c/li\u003e\n\t\t\u003cli\u003eहम विश्पयी जनम की\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर बालकृष्ण शर्मा 'नवीन' है। Key Points पंडित बालकृष्ण शर्मा \"नवीन\", हिंदी साहित्य में प्रगतिशील लेखन के अग्रणी कवि थे। उनका जन्म 8 दिसंबर, 1897 को शाजापुर राज्य के भयाना नामक गाँव में हुआ था। यहां से अपनी प्रारंभिक शिक्षा प्राप्त करने के बाद, उन्होंने अपनी दसवीं की परीक्षा उज्जैन और इंटर कानपुर से पास की। श्रीमती एनी बेसेंट और श्री ज्ञानशंकर विद्यार्थी के संपर्क में आने के बाद उन्होंने लोकमान्य बाल गंगाधर तिलक का अनुसरण किया। बालकृष्ण शर्मा गणेश शंकर विद्यार्थी के आश्रम में कानपुर आए और क्राइस्ट चर्च कॉलेज में पढ़ाई शुरू की। Important Points बाल कृष्ण शर्मा 'नवीन की कविता में शामिल हैं: कुमकुम रश्मिरेखा अपलक क्वासी विनोबा स्टवान उर्मिला हम विश्पयी जनम की","markdown":"## Q89.\n\nरश्मिरेखा नामक पुस्तक का लेखक कौन था?\n\n### Options\n\nA. गजानन माधव 'मुक्तिबोध'\n\nB. बालकृष्ण शर्मा 'नवीन'\n\nC. हरिशंकर परसाई\n\nD. भवानी प्रसाद मिश्र\n\n**Correct Answer:** B\n\n### a small Madhya Pradesh village of Bhavra in \u003cstrong\u003eJhabua\u003c/strong\u003e district on July 23, \u003cstrong\u003e1906.\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003eYoung Azad was terribly moved by the Britishers killing thousands of innocent Indians at Jhalianwala Baug in Punjab.\u0026nbsp;\u003c/li\u003e\n\t\u003cli\u003eHe wholeheartedly plunged into the freedom struggle. He was arrested for his protests against the British rulers.\u003c/li\u003e\n\t\u003cli\u003eA fearless comrade-in-arms of Bhagat Singh, Rajguru, and Sukhdev, Azad was killed in an encounter with the Britishers at Alfred Park in Allahabad.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Jhabua. Key Points Azad was born in a small Madhya Pradesh village of Bhavra in Jhabua district on July 23, 1906. Young Azad was terribly moved by the Britishers killing thousands of innocent Indians at Jhalianwala Baug in Punjab. He wholeheartedly plunged into the freedom struggle. He was arrested for his protests against the British rulers. A fearless comrade-in-arms of Bhagat Singh, Rajguru, and Sukhdev, Azad was killed in an encounter with the Britishers at Alfred Park in Allahabad.","markdown":"## Q90.\n\nChandrashekhar Azad was born in which district of Madhya Pradesh?\n\n### Options\n\nA. Khargone\n\nB. Gwalior\n\nC. Jhabua\n\nD. Satna\n\n**Correct Answer:** C\n\n### Solution\n\nThe correct answer is **Jhabua**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* Azad was born in a small Madhya Pradesh village of Bhavra in **Jhabua** district on July 23, **1906.**\n* Young Azad was terribly moved by the Britishers killing thousands of innocent Indians at Jhalianwala Baug in Punjab.\n* He wholeheartedly plunged into the freedom struggle. He was arrested for his protests against the British rulers.\n* A fearless comrade-in-arms of Bhagat Singh, Rajguru, and Sukhdev, Azad was killed in an encounter with the Britishers at Alfred Park in Allahabad.\n\n---\n"},"Hindi":{"qNo":90,"language":"Hindi","questionHTML":"चन्द्रशेखर आज़ाद का जन्म मध्यप्रदेश के किस ज़िले में हुआ था?","questionText":"चन्द्रशेखर आज़ाद का जन्म मध्यप्रदेश के किस ज़िले में हुआ था?","options":[{"label":"A","html":"खरगौन","text":"खरगौन"},{"label":"B","html":"ग्वालियर","text":"ग्वालियर"},{"label":"C","html":"झाबुआ","text":"झाबुआ"},{"label":"D","html":"सतना","text":"सतना"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eझाबुआ\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eआज़ाद का जन्म\u003cstrong\u003e \u003c/strong\u003e23 जुलाई, 1906 को\u0026nbsp;\u003cstrong\u003eझाबुआ\u003c/strong\u003e जिले (\u003cspan style=\"color: rgb(33, 37, 41);\"\u003eमध्य प्रदेश\u0026nbsp;\u003c/span\u003e) के भावरा के एक छोटे से गाँव में हुआ था।\u003c/li\u003e\n\t\u003cli\u003e, युवा आज़ाद को अंग्रेजों ने पंजाब के झलियावाला बाग में हजारों निर्दोष भारतीयों को मार डाला।\u003c/li\u003e\n\t\u003cli\u003eउन्होंने पूरे हृदय से स्वतंत्रता संग्राम में भाग लिया। उन्हें ब्रिटिश शासकों के खिलाफ विरोध प्रदर्शन के लिए गिरफ्तार किया गया था।\u003c/li\u003e\n\t\u003cli\u003eभगत सिंह, राजगुरु, और सुखदेव के एक निडरसाथी, आजाद इलाहाबाद में अल्फ्रेड पार्क में अंग्रेजों के साथ मुठभेड़ में शहीद हुई थे।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर झाबुआ है। Key Points आज़ाद का जन्म 23 जुलाई, 1906 को झाबुआ जिले (मध्य प्रदेश ) के भावरा के एक छोटे से गाँव में हुआ था। , युवा आज़ाद को अंग्रेजों ने पंजाब के झलियावाला बाग में हजारों निर्दोष भारतीयों को मार डाला। उन्होंने पूरे हृदय से स्वतंत्रता संग्राम में भाग लिया। उन्हें ब्रिटिश शासकों के खिलाफ विरोध प्रदर्शन के लिए गिरफ्तार किया गया था। भगत सिंह, राजगुरु, और सुखदेव के एक निडरसाथी, आजाद इलाहाबाद में अल्फ्रेड पार्क में अंग्रेजों के साथ मुठभेड़ में शहीद हुई थे।","markdown":"## Q90.\n\nचन्द्रशेखर आज़ाद का जन्म मध्यप्रदेश के किस ज़िले में हुआ था?\n\n### Options\n\nA. खरगौन\n\nB. ग्वालियर\n\nC. झाबुआ\n\nD. सतना\n\n**Correct Answer:** C\n\n### Solution\n\nसही उत्तर **झाबुआ** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* आज़ाद का जन्म23 जुलाई, 1906 को **झाबुआ** जिले (मध्य प्रदेश ) के भावरा के एक छोटे से गाँव में हुआ था।\n* , युवा आज़ाद को अंग्रेजों ने पंजाब के झलियावाला बाग में हजारों निर्दोष भारतीयों को मार डाला।\n* उन्होंने पूरे हृदय से स्वतंत्रता संग्राम में भाग लिया। उन्हें ब्रिटिश शासकों के खिलाफ विरोध प्रदर्शन के लिए गिरफ्तार किया गया था।\n* भगत सिंह, राजगुरु, और सुखदेव के एक निडरसाथी, आजाद इलाहाबाद में अल्फ्रेड पार्क में अंग्रेजों के साथ मुठभेड़ में शहीद हुई थे।\n\n---\n"}}},{"index":91,"qNo":"Question No. 91","languages":{"English":{"qNo":91,"language":"English","questionHTML":"Which of the following was not the ruler of the Paramara dynasty?","questionText":"Which of the following was not the ruler of the Paramara dynasty?","options":[{"label":"A","html":"Upendra","text":"Upendra"},{"label":"B","html":"Munj","text":"Munj"},{"label":"C","html":"Gangeydev","text":"Gangeydev"},{"label":"D","html":"Udyaditya","text":"Udyaditya"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cu\u003e\u003cstrong\u003eGangeydev\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cspan style=\"color: rgb(77, 81, 86); \"\u003eGangeyadeva was a ruler of the\u003cstrong\u003e Kalachuri dynasty\u003c/strong\u003e of Tripuri in central India. \u003c/span\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003cspan style=\"color: rgb(77, 81, 86); \"\u003eHis kingdom was centered around the Chedi or Dahala region in present-day Madhya Pradesh.\u003c/span\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eThe word 'Parmar' means \u003cstrong\u003e'one who kills the enemy'\u003c/strong\u003e.\u003cbr\u003e\n\tAccording to Prithviraj Raso of Chandrabardai, the origin of the Parmar is from the fire.\u003c/li\u003e\n\t\u003cli\u003eIn Udaipur Prasasti, Pingal Sutravruti, Tejpal inscription, Parmaro has been described as Brahman Kshatrakulin.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eUpendra,\u0026nbsp;Munj,\u0026nbsp;Udyaditya were the rulers of the Paramara dynasty\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Gangeydev. Gangeyadeva was a ruler of the Kalachuri dynasty of Tripuri in central India. His kingdom was centered around the Chedi or Dahala region in present-day Madhya Pradesh. Key Points The word 'Parmar' means 'one who kills the enemy'. According to Prithviraj Raso of Chandrabardai, the origin of the Parmar is from the fire. In Udaipur Prasasti, Pingal Sutravruti, Tejpal inscription, Parmaro has been described as Brahman Kshatrakulin. Upendra, Munj, Udyaditya were the rulers of the Paramara dynasty.","markdown":"## Q91.\n\nWhich of the following was not the ruler of the Paramara dynasty?\n\n### Options\n\nA. Upendra\n\nB. Munj\n\nC. Gangeydev\n\nD. Udyaditya\n\n**Correct Answer:** C\n\n### Solution\n\nThe correct answer is **Gangeydev**.\n\n \n* Gangeyadeva was a ruler of the**Kalachuri dynasty** of Tripuri in central India.\n* His kingdom was centered around the Chedi or Dahala region in present-day Madhya Pradesh.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* The word 'Parmar' means **'one who kills the enemy'**.\n According to Prithviraj Raso of Chandrabardai, the origin of the Parmar is from the fire.\n* In Udaipur Prasasti, Pingal Sutravruti, Tejpal inscription, Parmaro has been described as Brahman Kshatrakulin.\n* **Upendra, Munj, Udyaditya were the rulers of the Paramara dynasty**.\n\n---\n"},"Hindi":{"qNo":91,"language":"Hindi","questionHTML":"इनमें से कौन परमार वंश का शासक नहीं था?","questionText":"इनमें से कौन परमार वंश का शासक नहीं था?","options":[{"label":"A","html":"उपेन्द्र","text":"उपेन्द्र"},{"label":"B","html":"मुंज","text":"मुंज"},{"label":"C","html":"गांगेयदेव","text":"गांगेयदेव"},{"label":"D","html":"उदयादित्य","text":"उदयादित्य"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eसही उत्‍तर\u0026nbsp;\u003cstrong\u003e\u003cu\u003e\u003cspan style=\"\"\u003eगांगेयदेव\u003c/span\u003e\u003c/u\u003e\u003c/strong\u003e है।\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cspan style=\"color: rgb(77, 81, 86); \"\u003eगंगेयदेव मध्य भारत में त्रिपुरी के \u003cstrong\u003eकलचुरी वंश\u003c/strong\u003e के शासक थे।\u003c/span\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003cspan style=\"color: rgb(77, 81, 86); \"\u003eउनका राज्य वर्तमान मध्य प्रदेश में चेदि या दहला क्षेत्र के आसपास केंद्रित था।\u003c/span\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cu style=\"font-weight: 700;\"\u003e\u003cspan style=\"font-size:20px;\"\u003eKey Points\u003c/span\u003e\u003c/u\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e'परमार' शब्द का अर्थ\u0026nbsp;\u003cstrong\u003e'दुश्मन को मारने वाला'\u003c/strong\u003e\u003cspan style=\"\"\u003e\u0026nbsp;है\u003c/span\u003e।\u003cbr\u003e\n\tचन्द्रबरदाई के पृथ्वीराज रासो के अनुसार परमार की उत्पत्ति अग्नि से हुई है।\u003c/li\u003e\n\t\u003cli\u003eउदयपुर प्रशस्ति, पिंगल सूत्रवृति, तेजपाल अभिलेख में परमारो को ब्राह्मण क्षत्रकुलिन बताया गया है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eउपेंद्र, मुंज, उदयादित्य परमार वंश के शासक थे।\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्‍तर गांगेयदेव है। गंगेयदेव मध्य भारत में त्रिपुरी के कलचुरी वंश के शासक थे। उनका राज्य वर्तमान मध्य प्रदेश में चेदि या दहला क्षेत्र के आसपास केंद्रित था। Key Points 'परमार' शब्द का अर्थ 'दुश्मन को मारने वाला' है। चन्द्रबरदाई के पृथ्वीराज रासो के अनुसार परमार की उत्पत्ति अग्नि से हुई है। उदयपुर प्रशस्ति, पिंगल सूत्रवृति, तेजपाल अभिलेख में परमारो को ब्राह्मण क्षत्रकुलिन बताया गया है। उपेंद्र, मुंज, उदयादित्य परमार वंश के शासक थे।","markdown":"## Q91.\n\nइनमें से कौन परमार वंश का शासक नहीं था?\n\n### Options\n\nA. उपेन्द्र\n\nB. मुंज\n\nC. गांगेयदेव\n\nD. उदयादित्य\n\n**Correct Answer:** C\n\n### Solution\n\nसही उत्‍तर **गांगेयदेव** है।\n\n \n* गंगेयदेव मध्य भारत में त्रिपुरी के **कलचुरी वंश** के शासक थे।\n* उनका राज्य वर्तमान मध्य प्रदेश में चेदि या दहला क्षेत्र के आसपास केंद्रित था।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)Key Points\n\n \n* 'परमार' शब्द का अर्थ **'दुश्मन को मारने वाला'** है।\n चन्द्रबरदाई के पृथ्वीराज रासो के अनुसार परमार की उत्पत्ति अग्नि से हुई है।\n* उदयपुर प्रशस्ति, पिंगल सूत्रवृति, तेजपाल अभिलेख में परमारो को ब्राह्मण क्षत्रकुलिन बताया गया है।\n* **उपेंद्र, मुंज, उदयादित्य परमार वंश के शासक थे।**\n\n---\n"}}},{"index":92,"qNo":"Question No. 92","languages":{"English":{"qNo":92,"language":"English","questionHTML":"Dhangadeva was the ruler of which dynasty?","questionText":"Dhangadeva was the ruler of which dynasty?","options":[{"label":"A","html":"Chandelas of Jejakabhukti","text":"Chandelas of Jejakabhukti"},{"label":"B","html":"Parmars of Malwa","text":"Parmars of Malwa"},{"label":"C","html":"Kalachuri's of mahishmati","text":"Kalachuri's of mahishmati"},{"label":"D","html":"Kalachuris of Tripuri","text":"Kalachuris of Tripuri"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eThe correct answer is the\u0026nbsp;\u003cu\u003e\u003cstrong\u003eChandelas of Jejakabhukti\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eThe Chandelas of Jejakabhukti were a royal dynasty in\u0026nbsp;India.\u003c/li\u003e\n\t\u003cli\u003eThe Bundelkhand region between the 9th and the 13th centuries was of their dominance.\u003c/li\u003e\n\t\u003cli\u003eThe Chandelas initially ruled as feudatories of the Gurjara-Pratiharas of Kanyakubja.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eThe Chandel dynasty is famous in Indian history for Maharaja Rao Vidyadhara, who repulsed the attacks of Mahmud of Ghazni and also for his temples art and sculpture.\u003c/li\u003e\n\t\u003cli\u003eThey become more popular for the artistically sculptured temples, made during their rule in Central India. These temples are unique and more talked among people, due to the introduction of eroticism as one of the subjects in sculpture work, carried out in outer-walls of temples.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is the Chandelas of Jejakabhukti. Key Points The Chandelas of Jejakabhukti were a royal dynasty in India. The Bundelkhand region between the 9th and the 13th centuries was of their dominance. The Chandelas initially ruled as feudatories of the Gurjara-Pratiharas of Kanyakubja. Important Points The Chandel dynasty is famous in Indian history for Maharaja Rao Vidyadhara, who repulsed the attacks of Mahmud of Ghazni and also for his temples art and sculpture. They become more popular for the artistically sculptured temples, made during their rule in Central India. These temples are unique and more talked among people, due to the introduction of eroticism as one of the subjects in sculpture work, carried out in outer-walls of temples.","markdown":"## Q92.\n\nDhangadeva was the ruler of which dynasty?\n\n### Options\n\nA. Chandelas of Jejakabhukti\n\nB. Parmars of Malwa\n\nC. Kalachuri's of mahishmati\n\nD. Kalachuris of Tripuri\n\n**Correct Answer:** A\n\n### Solution\n\nThe correct answer is the **Chandelas of Jejakabhukti**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* The Chandelas of Jejakabhukti were a royal dynasty in India.\n* The Bundelkhand region between the 9th and the 13th centuries was of their dominance.\n* The Chandelas initially ruled as feudatories of the Gurjara-Pratiharas of Kanyakubja.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* The Chandel dynasty is famous in Indian history for Maharaja Rao Vidyadhara, who repulsed the attacks of Mahmud of Ghazni and also for his temples art and sculpture.\n* They become more popular for the artistically sculptured temples, made during their rule in Central India. These temples are unique and more talked among people, due to the introduction of eroticism as one of the subjects in sculpture work, carried out in outer-walls of temples.\n\n---\n"},"Hindi":{"qNo":92,"language":"Hindi","questionHTML":"धंगदेव किस वंश का शासक था?","questionText":"धंगदेव किस वंश का शासक था?","options":[{"label":"A","html":"जेजाकभुक्ति के चंदेल","text":"जेजाकभुक्ति के चंदेल"},{"label":"B","html":"मालवा के परमार","text":"मालवा के परमार"},{"label":"C","html":"महिष्मति के कलचुरी","text":"महिष्मति के कलचुरी"},{"label":"D","html":"त्रिपुरी के कलचुरी","text":"त्रिपुरी के कलचुरी"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eसही उत्तर \u003cu\u003e\u003cstrong\u003eजेजाकभुक्ति के\u0026nbsp;चंदेल\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eजेजाकभुक्ति के चंदेल भारत में एक शाही राजवंश थे।\u003c/li\u003e\n\t\u003cli\u003e9वीं और 13वीं शताब्दी के बीच का बुंदेलखंड क्षेत्र उनके प्रभुत्व में था।\u003c/li\u003e\n\t\u003cli\u003eचंदेलों ने शुरू में कान्यकुब्ज के गुर्जर-प्रतिहारों के सामंतों के रूप में शासन किया।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eचंदेल वंश भारतीय इतिहास में महाराजा राव विद्याधर के लिए प्रसिद्ध है, जिन्होंने गजनी के महमूद के आक्रमणों का वीरता से उत्तर दिया, यह उनकी मंदिर कला और शिल्पकला के लिए भी प्रसिद्ध है।\u003c/li\u003e\n\t\u003cli\u003eवे मध्य भारत में अपने शासन के दौरान कलात्मक रूप से बनाए गए संगतराशी वाले मंदिरों के लिए अधिक लोकप्रिय हो गए। ये मंदिर अद्वितीय और लोगों के बीच अधिक चर्चित हैं, साथ ही मंदिरों की बाहरी दीवारों में मूर्तिकला के विषयों में से एक के रूप में कामुकता का परिचय दिया गया है।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर जेजाकभुक्ति के चंदेल है। Key Points जेजाकभुक्ति के चंदेल भारत में एक शाही राजवंश थे। 9वीं और 13वीं शताब्दी के बीच का बुंदेलखंड क्षेत्र उनके प्रभुत्व में था। चंदेलों ने शुरू में कान्यकुब्ज के गुर्जर-प्रतिहारों के सामंतों के रूप में शासन किया। Important Points चंदेल वंश भारतीय इतिहास में महाराजा राव विद्याधर के लिए प्रसिद्ध है, जिन्होंने गजनी के महमूद के आक्रमणों का वीरता से उत्तर दिया, यह उनकी मंदिर कला और शिल्पकला के लिए भी प्रसिद्ध है। वे मध्य भारत में अपने शासन के दौरान कलात्मक रूप से बनाए गए संगतराशी वाले मंदिरों के लिए अधिक लोकप्रिय हो गए। ये मंदिर अद्वितीय और लोगों के बीच अधिक चर्चित हैं, साथ ही मंदिरों की बाहरी दीवारों में मूर्तिकला के विषयों में से एक के रूप में कामुकता का परिचय दिया गया है।","markdown":"## Q92.\n\nधंगदेव किस वंश का शासक था?\n\n### Options\n\nA. जेजाकभुक्ति के चंदेल\n\nB. मालवा के परमार\n\nC. महिष्मति के कलचुरी\n\nD. त्रिपुरी के कलचुरी\n\n**Correct Answer:** A\n\n### Solution\n\nसही उत्तर **जेजाकभुक्ति के चंदेल** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* जेजाकभुक्ति के चंदेल भारत में एक शाही राजवंश थे।\n* 9वीं और 13वीं शताब्दी के बीच का बुंदेलखंड क्षेत्र उनके प्रभुत्व में था।\n* चंदेलों ने शुरू में कान्यकुब्ज के गुर्जर-प्रतिहारों के सामंतों के रूप में शासन किया।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* चंदेल वंश भारतीय इतिहास में महाराजा राव विद्याधर के लिए प्रसिद्ध है, जिन्होंने गजनी के महमूद के आक्रमणों का वीरता से उत्तर दिया, यह उनकी मंदिर कला और शिल्पकला के लिए भी प्रसिद्ध है।\n* वे मध्य भारत में अपने शासन के दौरान कलात्मक रूप से बनाए गए संगतराशी वाले मंदिरों के लिए अधिक लोकप्रिय हो गए। ये मंदिर अद्वितीय और लोगों के बीच अधिक चर्चित हैं, साथ ही मंदिरों की बाहरी दीवारों में मूर्तिकला के विषयों में से एक के रूप में कामुकता का परिचय दिया गया है।\n\n---\n"}}},{"index":93,"qNo":"Question No. 93","languages":{"English":{"qNo":93,"language":"English","questionHTML":"At which of the following places was Habib Tanvir born?","questionText":"At which of the following places was Habib Tanvir born?","options":[{"label":"A","html":"Raipur","text":"Raipur"},{"label":"B","html":"Jhabua","text":"Jhabua"},{"label":"C","html":"Indore","text":"Indore"},{"label":"D","html":"Ratlam\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","text":"Ratlam"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003eRaipur\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eHabib Tanvir was one of the most popular\u0026nbsp;a theatre director, Indian Urdu, Hindi playwrights,\u0026nbsp;poet etc.\u003c/li\u003e\n\t\u003cli\u003eHe was the writer of plays\n\t\u003cul\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eAgra Bazar\u003c/strong\u003e\u003c/li\u003e\n\t\t\u003cli\u003eCharandas Chor\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eBorn: 1 September \u003cstrong\u003e1923\u003c/strong\u003e, Raipur\u003c/li\u003e\n\t\u003cli\u003eDied: 8 June 2009, \u003cstrong\u003eBhopal\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003eMovies:\n\t\u003cul\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eCharandas Chor\u003c/strong\u003e\u003c/li\u003e\n\t\t\u003cli\u003e\u003cstrong\u003ePrahaar: The Final Attack\u003c/strong\u003e\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003eDuring his lifetime he won several national and international awards\u0026nbsp;like\u003c/li\u003e\n\t\u003cli\u003eSangeet Natak Akademi Award in 1969\u003c/li\u003e\n\t\u003cli\u003eJawarharlal Nehru Fellowship in 1979\u003c/li\u003e\n\t\u003cli\u003ePadma Shri in 1983\u003c/li\u003e\n\t\u003cli\u003eKalidas Samman 1990\u003c/li\u003e\n\t\u003cli\u003eSangeet Natak Akademi Fellowship in 1996\u003c/li\u003e\n\t\u003cli\u003ePadma Bhushan in 2002\u003c/li\u003e\n\t\u003cli\u003eSimilarly, he became nominated\u0026nbsp;member of the Rajya Sabha (1972–1978).\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Raipur. Key Points Habib Tanvir was one of the most popular a theatre director, Indian Urdu, Hindi playwrights, poet etc. He was the writer of plays Agra Bazar Charandas Chor Additional Information Born: 1 September 1923, Raipur Died: 8 June 2009, Bhopal Movies: Charandas Chor Prahaar: The Final Attack During his lifetime he won several national and international awards like Sangeet Natak Akademi Award in 1969 Jawarharlal Nehru Fellowship in 1979 Padma Shri in 1983 Kalidas Samman 1990 Sangeet Natak Akademi Fellowship in 1996 Padma Bhushan in 2002 Similarly, he became nominated member of the Rajya Sabha (1972–1978).","markdown":"## Q93.\n\nAt which of the following places was Habib Tanvir born?\n\n### Options\n\nA. Raipur\n\nB. Jhabua\n\nC. Indore\n\nD. Ratlam\n\n** आदि में से एक थे।\u003c/li\u003e\n\t\u003cli\u003eवह निम्न नाटकों के लेखक थे\n\t\u003cul\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eआगरा बाज़ार\u003c/strong\u003e\u003c/li\u003e\n\t\t\u003cli\u003eचरणदास चोर\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eजन्म: 1 सितंबर \u003cstrong\u003e1923\u003c/strong\u003e, रायपुर\u003c/li\u003e\n\t\u003cli\u003eनिधन: 8 जून 2009, \u003cstrong\u003eभोपाल\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003eफिल्में:\n\t\u003cul\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eचरणदास चोर\u003c/strong\u003e\u003c/li\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eप्रहार: द फाइनल अटैक\u003c/strong\u003e\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003eअपने जीवनकाल के दौरान उन्होंने कई राष्ट्रीय और अंतर्राष्ट्रीय पुरस्कार जीते, जैसे\u003c/li\u003e\n\t\u003cli\u003e1969 में संगीत नाटक अकादमी पुरस्कार\u003c/li\u003e\n\t\u003cli\u003e1979 में जवाहरलाल नेहरू फैलोशिप\u003c/li\u003e\n\t\u003cli\u003e1983 में पद्म श्री\u003c/li\u003e\n\t\u003cli\u003eकालिदास सम्मान 1990\u003c/li\u003e\n\t\u003cli\u003e1996 में संगीत नाटक अकादमी फैलोशिप\u003c/li\u003e\n\t\u003cli\u003e2002 में पद्म भूषण\u003c/li\u003e\n\t\u003cli\u003eइसी तरह, वे राज्यसभा (1972-1978) के मनोनीत सदस्य बने।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर रायपुर है। Key Points हबीब तनवीर सबसे लोकप्रिय थिएटर निर्देशक, भारतीय उर्दू, हिंदी नाटककार, कवि आदि में से एक थे। वह निम्न नाटकों के लेखक थे आगरा बाज़ार चरणदास चोर Additional Information जन्म: 1 सितंबर 1923, रायपुर निधन: 8 जून 2009, भोपाल फिल्में: चरणदास चोर प्रहार: द फाइनल अटैक अपने जीवनकाल के दौरान उन्होंने कई राष्ट्रीय और अंतर्राष्ट्रीय पुरस्कार जीते, जैसे 1969 में संगीत नाटक अकादमी पुरस्कार 1979 में जवाहरलाल नेहरू फैलोशिप 1983 में पद्म श्री कालिदास सम्मान 1990 1996 में संगीत नाटक अकादमी फैलोशिप 2002 में पद्म भूषण इसी तरह, वे राज्यसभा (1972-1978) के मनोनीत सदस्य बने।","markdown":"## Q93.\n\nहबीब तनवीर का जन्म निम्नलिखित में से किस स्थान पर हुआ था?\n\n### Options\n\nA. रायपुर\n\nB. झाबुआ\n\nC. इन्दौर\n\nD. रतलाम\n\n**Correct Answer:** A\n\n### Solution\n\nसही उत्तर **रायपुर** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* हबीब तनवीर सबसे लोकप्रिय थिएटर निर्देशक, भारतीय उर्दू, हिंदी नाटककार, कवि आदि में से एक थे।\n* वह निम्न नाटकों के लेखक थे \n* **आगरा बाज़ार**\n* चरणदास चोर\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* जन्म: 1 सितंबर **1923**, रायपुर\n* निधन: 8 जून 2009, **भोपाल**\n* फिल्में: \n* **चरणदास चोर**\n* **प्रहार: द फाइनल अटैक**\n* अपने जीवनकाल के दौरान उन्होंने कई राष्ट्रीय और अंतर्राष्ट्रीय पुरस्कार जीते, जैसे\n* 1969 में संगीत नाटक अकादमी पुरस्कार\n* 1979 में जवाहरलाल नेहरू फैलोशिप\n* 1983 में पद्म श्री\n* कालिदास सम्मान 1990\n* 1996 में संगीत नाटक अकादमी फैलोशिप\n* 2002 में पद्म भूषण\n* इसी तरह, वे राज्यसभा (1972-1978) के मनोनीत सदस्य बने।\n\n---\n"}}},{"index":94,"qNo":"Question No. 94","languages":{"English":{"qNo":94,"language":"English","questionHTML":"\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e\n\n\u003cp style=\"padding: 0px; line-height: 1.75;  margin-bottom: 24px;  font-stretch: normal;\"\u003eUnder the Scheduled Castes and Scheduled Tribes [Prevention of Atrocities] Act, 1989, in which Section there is a provision for the arrangement of a Special Court?\u003c/p\u003e\n\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","questionText":"Under the Scheduled Castes and Scheduled Tribes [Prevention of Atrocities] Act, 1989, in which Section there is a provision for the arrangement of a Special Court?","options":[{"label":"A","html":"14","text":"14"},{"label":"B","html":"17","text":"17"},{"label":"C","html":"21 (1)","text":"21 (1)"},{"label":"D","html":"21 (3)","text":"21 (3)"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003e14\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eSpecial Court is provided in section 14.\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eFor the purpose of providing for a speedy trial, the State Government shall, with the concurrence of the Chief Justice of the High Court, by notification in the Official Gazette, specify for each district a Court of Session to be a Special Court to try the offences under this Act.\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eSC Act to prevent the commission of offences of atrocities against the members of the scheduled castes and the Scheduled Tribes, to provide for special courts for the trial of such offences and for the relief and rehabilitation of the victims of such offences and for matters connected therewith or incidental thereto.\u0026nbsp;\u003c/li\u003e\n\t\u003cli\u003eIt was enacted by Parliament in the Fortieth Year of the Republic of India.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is 14. Key Points Special Court is provided in section 14. For the purpose of providing for a speedy trial, the State Government shall, with the concurrence of the Chief Justice of the High Court, by notification in the Official Gazette, specify for each district a Court of Session to be a Special Court to try the offences under this Act. Important Points SC Act to prevent the commission of offences of atrocities against the members of the scheduled castes and the Scheduled Tribes, to provide for special courts for the trial of such offences and for the relief and rehabilitation of the victims of such offences and for matters connected therewith or incidental thereto. It was enacted by Parliament in the Fortieth Year of the Republic of India.","markdown":"## Q94.\n\nUnder the Scheduled Castes and Scheduled Tribes [Prevention of Atrocities] Act, 1989, in which Section there is a provision for the arrangement of a Special Court?\n\n### Options\n\nA. 14\n\nB. 17\n\nC. 21 (1)\n\nD. 21 (3)\n\n**Correct Answer:** A\n\n### Solution\n\nThe correct answer is **14**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **Special Court is provided in section 14.** \n* For the purpose of providing for a speedy trial, the State Government shall, with the concurrence of the Chief Justice of the High Court, by notification in the Official Gazette, specify for each district a Court of Session to be a Special Court to try the offences under this Act.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* SC Act to prevent the commission of offences of atrocities against the 6px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eअनुसूचित जाति और अनुसूचित जनजाति के सदस्यों के विरुद्ध अत्याचार के अपराधों के अभ्यास को रोकने के लिए एससी अधिनियम, जो इस तरह के अपराधों के पीड़ितों के राहत और पुनर्वास के लिए और इस तरह से जुड़े मामलों या इसके बाद के आकस्मिक स्थिति के लिए विशेष अदालतों का प्रावधान करती है।\u003c/li\u003e\n\t\u003cli\u003eयह भारत गणराज्य के चालीसवें वर्ष में संसद द्वारा अधिनियमित किया गया था।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर 14 है। Key Points विशेष अदालत का धारा 14 में प्रावधान है। तेज़ मुकदमे का प्रावधान करने के उद्देश्य से, राज्य सरकार, उच्च न्यायालय के मुख्य न्यायाधीश की सहमति के साथ, आधिकारिक राजपत्र में अधिसूचना द्वारा, प्रत्येक जिले के लिए सत्र न्यायालय को इस अधिनियम के तहत अपराध की जाँच के लिए विशेष न्यायालय निर्दिष्ट करेगी। Important Points अनुसूचित जाति और अनुसूचित जनजाति के सदस्यों के विरुद्ध अत्याचार के अपराधों के अभ्यास को रोकने के लिए एससी अधिनियम, जो इस तरह के अपराधों के पीड़ितों के राहत और पुनर्वास के लिए और इस तरह से जुड़े मामलों या इसके बाद के आकस्मिक स्थिति के लिए विशेष अदालतों का प्रावधान करती है। यह भारत गणराज्य के चालीसवें वर्ष में संसद द्वारा अधिनियमित किया गया था।","markdown":"## Q94.\n\nअनुसूचित जाति एवं अनुसूचित जनजाति (अत्याचार निरोधक) अधिनियम, 1989 के अन्तर्गत किस धारा में विशेष न्यायालय की व्यवस्था का प्रावधान है?\n\n### Options\n\nA. 14\n\nB. 17\n\nC. 21 (1)\n\nD. 21 (3)\n\n**Correct Answer:** A\n\n### Solution\n\nसही उत्तर **14** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **विशेष अदालत का धारा 14 में प्रावधान है।** \n* तेज़ मुकदमे का प्रावधान करने के उद्देश्य से, राज्य सरकार, उच्च न्यायालय के मुख्य न्यायाधीश की सहमति के साथ, आधिकारिक राजपत्र में अधिसूचना द्वारा, प्रत्येक जिले के लिए सत्र न्यायालय को इस अधिनियम के तहत अपराध की जाँच के लिए विशेष न्यायालय निर्दिष्ट करेगी।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* अनुसूचित जाति और अनुसूचित जनजाति के सदस्यों के विरुद्ध अत्याचार के अपराधों के अभ्यास को रोकने के लिए एससी अधिनियम, जो इस तरह के अपराधों के पीड़ितों के राहत और पुनर्वास के लिए और इस तरह से जुड़े मामलों या इसके बाद के आकस्मिक स्थिति के लिए विशेष अदालतों का प्रावधान करती है।\n* यह भारत गणराज्य के चालीसवें वर्ष में संसद द्वारा अधिनियमित किया गया था।\n\n---\n"}}},{"index":95,"qNo":"Question No. 95","languages":{"English":{"qNo":95,"language":"English","questionHTML":"\u003cspan style=\" \"\u003eIn how many days will the investigating officer submit his report for the offences committed under the Scheduled Castes and Scheduled Tribes [Prevention of Atrocities] Act, 1989?\u003c/span\u003e\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","questionText":"In how many days will the investigating officer submit his report for the offences committed under the Scheduled Castes and Scheduled Tribes [Prevention of Atrocities] Act, 1989?","options":[{"label":"A","html":"15","text":"15"},{"label":"B","html":"20","text":"20"},{"label":"C","html":"25","text":"25"},{"label":"D","html":"30","text":"30"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003e30\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cspan style=\" \"\u003eIn \u00 s report for the offences committed under the Scheduled Castes and Scheduled Tribes [Prevention of Atrocities] Act, 1989?\n\n### Options\n\nA. 15\n\nB. 20\n\nC. 25\n\nD. 30\n\n**Correct Answer:** D\n\n### Solution\n\nThe correct answer is **30**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* In **30 days** investigating officer must submit his report for the offences committed under the Scheduled Castes and Scheduled Tribes [Prevention of Atrocities] Act, 1989.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* SC Act to prevent the commission of offences of atrocities against the members of the scheduled castes and the Scheduled Tribes, to provide for special courts for the trial of such offences and for the relief and rehabilitation of the victims of such offences and for matters connected therewith or incidental thereto.\n* It was enacted by Parliament in the Fortieth Year of the Republic of India.\n\n---\n"},"Hindi":{"qNo":95,"language":"Hindi","questionHTML":"अनुसूचित जाति एवं अनुसूचित जनजाति (अत्याचार निरोधक) अधिनियम, 1989 के अन्तर्गत किए गए अपराधों के लिए जाँच अधिकारी कितने दिनों में अपनी रिपोर्ट सौंपेगा?","questionText":"अनुसूचित जाति एवं अनुसूचित जनजाति (अत्याचार निरोधक) अधिनियम, 1989 के अन्तर्गत किए गए अपराधों के लिए जाँच अधिकारी कितने दिनों में अपनी रिपोर्ट सौंपेगा?","options":[{"label":"A","html":"15","text":"15"},{"label":"B","html":"20","text":"20"},{"label":"C","html":"25","text":"25"},{"label":"D","html":"30","text":"30"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003e30\u003c/strong\u003e\u003c/u\u003e\u0026nbsp;है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspa

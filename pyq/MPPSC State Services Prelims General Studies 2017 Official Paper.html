f the Christian Democratic Union.\u0026nbsp;\u003c/li\u003e\n\t\u003cli\u003eMerkel is the \u003cstrong\u003efirst female Chancellor of Germany\u003c/strong\u003e.\u0026nbsp;\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The incorrect match is President of Cote d'Ivoire - Angela Merkel. Key Points Alassane Dramane Ouattara is an Ivorian politician who has been President of Ivory Coast (Côte d'Ivoire) since 2010. President of Namibia - The Hague Gingob President of Mexico - Andrés Manuel López Obrador He was elected in 2018. President of Switzerland - Simonetta Sommaruga He was elected President of the Swiss Confederation for 2020 on 11 December 2019. It is her second presidential year. The first was in 2015.​ Confusion Points Angela Dorothea Merkel is the Chancellor of Germany. She is a member of the Christian Democratic Union. Merkel is the first female Chancellor of Germany.","markdown":"## Q56.\n\nWhich one of the following pairs is not correctly matched?\n\n### Options\n\nA. Switzerland President - Johann Schneider-Amman\n\nB. President of Mexico - Enrique Peña Nieto\n\nC. President of Namibia - The Hague Gingob\n\nD. President of Cote d'Ivoire - Angela Merkel\n\n**Correct Answer:** D\n\n### Solution\n\nThe incorrect match is **President of Cote d'Ivoire - Angela Merkel**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **Alassane Dramane Ouattara** is an Ivorian politician who has been **President of Ivory Coast** (Côte d'Ivoire) since 2010.\n* **President of Namibia** - **The Hague Gingob**\n* **President of Mexico** - **Andrés Manuel López Obrado**r \n* He was elected in 2018.\n* **President of Switzerland** - **Simonetta Sommaruga** \n* He was elected **President of the Swiss Confederation** for 2020 on 11 December 2019.\n* It is her second presidential year.\n* The first was in 2015.​\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/confusion-points-image.png)**Confusion Points**\n\n \n* **Angela Dorothea Merkel** is the **Chancellor of Germany**.\n* She is a member of the Christian Democratic Union.\n* Merkel is the **first female Chancellor of Germany**.\n\n---\n"},"Hindi":{"qNo":56,"language":"Hindi","questionHTML":"निम्नलिखित में से कौन-सा युग्म सही सुमेलित नहीं है?","questionText":"निम्नलिखित में से कौन-सा युग्म सही सुमेलित नहीं है?","options":[{"label":"A","html":"स्विट्ज़रलैंड का राष्ट्रपति - जोहान श्नाइडर-अम्मान","text":"स्विट्ज़रलैंड का राष्ट्रपति - जोहान श्नाइडर-अम्मान"},{"label":"B","html":"मेक्सिको का राष्ट्रपति - एनरिक पेना नीटो","text":"मेक्सिको का राष्ट्रपति - एनरिक पेना नीटो"},{"label":"C","html":"नामीबिया का राष्ट्रपति - हेग गीन्गोब","text":"नामीबिया का राष्ट्रपति - हेग गीन्गोब"},{"label":"D","html":"कोटे डी आइवरी का राष्ट्रपति - एंजेला मर्केल","text":"कोटे डी आइवरी का राष्ट्रपति - एंजेला मर्केल"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eगलत मिलान\u0026nbsp;\u003cu\u003e\u003cstrong\u003eकोटे डी आइवरी का राष्ट्रपति - एंजेला मर्केल\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eअलसेने ड्रामेन औटारा\u003c/strong\u003e एक इवोरियन राजनेता हैं जो 2010 से \u003cstrong\u003eआइवरी कोस्ट\u003c/strong\u003e\u0026nbsp;(कोटे डी आइवर) \u003cstrong\u003eके राष्ट्रपति\u003c/strong\u003e हैं।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eनामीबिया के\u0026nbsp;राष्ट्रपति - हेग गीन्गोब\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eमेक्सिको के\u0026nbsp;राष्ट्रपति -\u0026nbsp;एंड्रेस मैनुअल लोपेज़ ओब्रेडोर\u003c/strong\u003e\n\t\u003cul\u003e\n\t\t\u003cli\u003eवह 2018 में चुने गए थे।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eस्विट्जरलैंड के राष्ट्रपति - सिमोनिटा सोमारुगा\u003c/strong\u003e\u003cstrong\u003e \u003c/strong\u003e\n\t\u003cul\u003e\n\t\t\u003cli\u003eउन्हें 11 दिसंबर 2019 को 2020 के लिए \u003cstrong\u003eस्विस परिसंघ \u003c/strong\u003eका अध्यक्ष चुना गया।\u003c/li\u003e\n\t\t\u003cli\u003eयह उनका दूसरा राष्ट्रपति कार्यकाल है।\u003c/li\u003e\n\t\t\u003cli\u003eपहला 2015 में था।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/confusion-points-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eConfusion Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u0026nbsp;\u0026nbsp;\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eएंजेला डोरोथिया मार्केल जर्मनी की चांसलर \u003c/strong\u003eहैं।\u003c/li\u003e\n\t\u003cli\u003eवह क्रिश्चियन डेमोक्रेटिक यूनियन की सदस्य हैं।\u003c/li\u003e\n\t\u003cli\u003eमर्केल \u003cstrong\u003eजर्मनी की पहली महिला चांसलर\u003c/strong\u003e हैं।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"गलत मिलान कोटे डी आइवरी का राष्ट्रपति - एंजेला मर्केल है। Key Points अलसेने ड्रामेन औटारा एक इवोरियन राजनेता हैं जो 2010 से आइवरी कोस्ट (कोटे डी आइवर) के राष्ट्रपति हैं। नामीबिया के राष्ट्रपति - हेग गीन्गोब मेक्सिको के राष्ट्रपति - एंड्रेस मैनुअल लोपेज़ ओब्रेडोर वह 2018 में चुने गए थे। स्विट्जरलैंड के राष्ट्रपति - सिमोनिटा सोमारुगा उन्हें 11 दिसंबर 2019 को 2020 के लिए स्विस परिसंघ का अध्यक्ष चुना गया। यह उनका दूसरा राष्ट्रपति कार्यकाल है। पहला 2015 में था। Confusion Points एंजेला डोरोथिया मार्केल जर्मनी की चांसलर हैं। वह क्रिश्चियन डेमोक्रेटिक यूनियन की सदस्य हैं। मर्केल जर्मनी की पहली महिला चांसलर हैं।","markdown":"## Q56.\n\nनिम्नलिखित में से कौन-सा युग्म सही सुमेलित नहीं है?\n\n### Options\n\nA. स्विट्ज़रलैंड का राष्ट्रपति - जोहान श्नाइडर-अम्मान\n\nB. मेक्सिको का राष्ट्रपति - एनरिक पेना नीटो\n\nC. नामीबिया का राष्ट्रपति - हेग गीन्गोब\n\nD. कोटे डी आइवरी का राष्ट्रपति - एंजेला मर्केल\n\n**Correct Answer:** D\n\n### Solution\n\nगलत मिलान **कोटे डी आइवरी का राष्ट्रपति - एंजेला मर्केल** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **अलसेने ड्रामेन औटारा** एक इवोरियन राजनेता हैं जो 2010 से **आइवरी कोस्ट** (कोटे डी आइवर) **के राष्ट्रपति** हैं।\n* **नामीबिया के राष्ट्रपति - हेग गीन्गोब**\n* **मेक्सिको के राष्ट्रपति - एंड्रेस मैनुअल लोपेज़ ओब्रेडोर** \n* वह 2018 में चुने गए थे।\n* **स्विट्जरलैंड के राष्ट्रपति - सिमोनिटा सोमारुगा** \n* उन्हें 11 दिसंबर 2019 को 2020 के लिए **स्विस परिसंघ**का अध्यक्ष चुना गया।\n* यह उनका दूसरा राष्ट्रपति कार्यकाल है।\n* पहला 2015 में था।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/confusion-points-image.png)**Confusion Points**\n\n \n* **एंजेला डोरोथिया मार्केल जर्मनी की चांसलर**हैं।\n* वह क्रिश्चियन डेमोक्रेटिक यूनियन की सदस्य हैं।\n* मर्केल **जर्मनी की पहली महिला चांसलर** हैं।\n\n---\n"}}},{"index":57,"qNo":"Question No. 57","languages":{"English":{"qNo":57,"language":"English","questionHTML":"Which of the following mountain ranges is spread over only one state in India?","questionText":"Which of the following mountain ranges is spread over only one state in India?","options":[{"label":"A","html":"Aravali","text":"Aravali"},{"label":"B","html":"Satpura","text":"Satpura"},{"label":"C","html":"Ajanta","text":"Ajanta"},{"label":"D","html":"\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e\u003cspan style=\" \"\u003eSahyadri\u003c/span\u003e\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","text":"Sahyadri"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cu\u003e\u003cstrong\u003eAjanta\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eAjanta mountain range is spread over only one state in India\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eAjanta mountain range spreads within Maharashtra.\u003c/li\u003e\n\t\u003cli\u003eIt is found in the Aurangabad district of Maharastra.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eThe Satpura Range:\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eIt is a range of hills in central India.\u003c/li\u003e\n\t\t\u003cli\u003eThe range rises in eastern Gujarat.\u003c/li\u003e\n\t\t\u003cli\u003eIt runs through\u0026nbsp;Maharashtra and Madhya Pradesh and Chhattisgarh.​\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003e\u003cspan style=\"color: rgb(77, 81, 86); \"\u003eThe Aravalli Range:\u003c/span\u003e\u003c/strong\u003e\n\t\u003cul\u003e\n\t\t\u003cli\u003e\u003cspan style=\"color: rgb(77, 81, 86); \"\u003eIt is a mountain range in Northwestern India.\u003c/span\u003e\u003c/li\u003e\n\t\t\u003cli\u003e\u003cspan style=\"color: rgb(77, 81, 86); \"\u003eIt is running approximately 692 km in a south-west direction.\u003c/span\u003e\u003c/li\u003e\n\t\t\u003cli\u003e\u003cspan style=\"color: rgb(77, 81, 86); \"\u003eIt starts\u0026nbsp;near Delhi\u003c/span\u003e\u003c/li\u003e\n\t\t\u003cli\u003e\u003cspan style=\"color: rgb(77, 81, 86); \"\u003eIt passes\u0026nbsp;through\u0026nbsp;Haryana and Rajasthan\u003c/span\u003e\u003c/li\u003e\n\t\t\u003cli\u003e\u003cspan style=\"color: rgb(77, 81, 86); \"\u003eIt ends in Gujarat.\u003c/span\u003e\u003c/li\u003e\n\t\t\u003cli\u003e\u003cspan style=\"color: rgb(77, 81, 86); \"\u003eThe highest peak is Guru Shikhar at 1,722 metres.\u003c/span\u003e\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003eThe \u003cstrong\u003eWestern Ghats\u003c/strong\u003e is\u0026nbsp;also called the \"\u003cstrong\u003eSahyadri\u003c/strong\u003e\".\n\t\u003cul\u003e\n\t\t\u003cli\u003eIt is a mountain range that covers an area of 160,000 square kilometres in a stretch of 1,600 kilometres parallel to the western coast of the Indian peninsula, traversing the states of Tamil Nadu, Kerala, Karnataka, Goa, Maharashtra and Gujarat.\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Ajanta. Key Points Ajanta mountain range is spread over only one state in India. Ajanta mountain range spreads within Maharashtra. It is found in the Aurangabad district of Maharastra. Additional Information The Satpura Range: It is a range of hills in central India. The range rises in eastern Gujarat. It runs through Maharashtra and Madhya Pradesh and Chhattisgarh.​ The Aravalli Range: It is a mountain range in Northwestern India. It is running approximately 692 km in a south-west direction. It starts near Delhi It passes through Haryana and Rajasthan It ends in Gujarat. The highest peak is Guru Shikhar at 1,722 metres. The Western Ghats is also called the \"Sahyadri\". It is a mountain range that covers an area of 160,000 square kilometres in a stretch of 1,600 kilometres parallel to the western coast of the Indian peninsula, traversing the states of Tamil Nadu, Kerala, Karnataka, Goa, Maharashtra and Gujarat.","markdown":"## Q57.\n\nWhich of the following mountain ranges is spread over only one state in India?\n\n### Options\n\nA. Aravali\n\nB. Satpura\n\nC. Ajanta\n\nD. Sahyadri\n\n**Correct Answer:** C\n\n### Solution\n\nThe correct answer is **Ajanta**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **Ajanta mountain range is spread over only one state in India**.\n* Ajanta mountain range spreads within Maharashtra.\n* It is found in the Aurangabad district of Maharastra.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **The Satpura Range:** \n* It is a range of hills in central India.\n* The range rises in eastern Gujarat.\n* It runs through Maharashtra and Madhya Pradesh and Chhattisgarh.​\n* **The Aravalli Range:** \n* It is a mountain range in Northwestern India.\n* It is running approximately 692 km in a south-west direction.\n* It starts near Delhi\n* It passes through Haryana and Rajasthan\n* It ends in Gujarat.\n* The highest peak is Guru Shikhar at 1,722 metres.\n* The **Western Ghats** is also called the \"**Sahyadri**\". \n* It is a mountain range that covers an area of 160,000 square kilometres in a stretch of 1,600 kilometres parallel to the western coast of the Indian peninsula, traversing the states of Tamil Nadu, Kerala, Karnataka, Goa, Maharashtra and Gujarat.\n\n---\n"},"Hindi":{"qNo":57,"language":"Hindi","questionHTML":"निम्नलिखित में से कौन-सी पर्वत\u0026nbsp;श्रृंखला भारत में केवल एक राज्य में फैली है?","questionText":"निम्नलिखित में से कौन-सी पर्वत श्रृंखला भारत में केवल एक राज्य में फैली है?","options":[{"label":"A","html":"अरावली","text":"अरावली"},{"label":"B","html":"सतपुड़ा","text":"सतपुड़ा"},{"label":"C","html":"अजन्ता","text":"अजन्ता"},{"label":"D","html":"सहयाद्री","text":"सहयाद्री"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eअजन्ता\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eअजंता पर्वत श्रृंखला भारत में केवल एक राज्य में फैली हुई है।\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003eअजंता पर्वत श्रृंखला महाराष्ट्र के भीतर फैली हुई है।\u003c/li\u003e\n\t\u003cli\u003eयह महाराष्ट्र के औरंगाबाद जिले में पायी जाती है।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eसतपुड़ा श्रृंखला\u003c/strong\u003e\u003cstrong\u003e:\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eयह मध्य भारत की पहाड़ियों की एक श्रृंखला है।\u003c/li\u003e\n\t\t\u003cli\u003eयह श्रृंखला पूर्वी गुजरात में शुरु होती है।\u003c/li\u003e\n\t\t\u003cli\u003eयह महाराष्ट्र और मध्य प्रदेश और छत्तीसगढ़ तक फैली है।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eअरावली श्रृंखला\u003c/strong\u003e\u003cstrong\u003e\u003cspan style=\"color: rgb(77, 81, 86); \"\u003e:\u003c/span\u003e\u003c/strong\u003e\n\t\u003cul\u003e\n\t\t\u003cli\u003eयह उत्तर पश्चिमी भारत में एक पर्वत श्रृंखला है।\u003c/li\u003e\n\t\t\u003cli\u003eयह दक्षिण-पश्चिम दिशा में लगभग 692 किमी तक फैली है।\u003c/li\u003e\n\t\t\u003cli\u003eयह दिल्ली के पास शुरू होती\u0026nbsp;है।\u003c/li\u003e\n\t\t\u003cli\u003eयह हरियाणा और राजस्थान से होकर गुजरती है।\u003c/li\u003e\n\t\t\u003cli\u003eयह गुजरात में समाप्त होती\u0026nbsp;है।\u003c/li\u003e\n\t\t\u003cli\u003eसबसे ऊंची चोटी 1,722 मीटर पर गुरु शिखर है।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eपश्चिमी घाट\u003c/strong\u003e को \"\u003cstrong\u003eसह्याद्री\u003c/strong\u003e\" भी कहा जाता है।\n\t\u003cul\u003e\n\t\t\u003cli\u003eयह एक पर्वत श्रृंखला है जो तमिलनाडु, केरल, कर्नाटक, गोवा, महाराष्ट्र और गुजरात के राज्यों को पार करते हुए भारतीय प्रायद्वीप के पश्चिमी तट के समानांतर 1,600 किलोमीटर के क्षेत्र में 160,000 वर्ग किलोमीटर के क्षेत्र में फैली है।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर अजन्ता है। Key Points अजंता पर्वत श्रृंखला भारत में केवल एक राज्य में फैली हुई है। अजंता पर्वत श्रृंखला महाराष्ट्र के भीतर फैली हुई है। यह महाराष्ट्र के औरंगाबाद जिले में पायी जाती है। Additional Information सतपुड़ा श्रृंखला: यह मध्य भारत की पहाड़ियों की एक श्रृंखला है। यह श्रृंखला पूर्वी गुजरात में शुरु होती है। यह महाराष्ट्र और मध्य प्रदेश और छत्तीसगढ़ तक फैली है। अरावली श्रृंखला: यह उत्तर पश्चिमी भारत में एक पर्वत श्रृंखला है। यह दक्षिण-पश्चिम दिशा में लगभग 692 किमी तक फैली है। यह दिल्ली के पास शुरू होती है। यह हरियाणा और राजस्थान से होकर गुजरती है। यह गुजरात में समाप्त होती है। सबसे ऊंची चोटी 1,722 मीटर पर गुरु शिखर है। पश्चिमी घाट को \"सह्याद्री\" भी कहा जाता है। यह एक पर्वत श्रृंखला है जो तमिलनाडु, केरल, कर्नाटक, गोवा, महाराष्ट्र और गुजरात के राज्यों को पार करते हुए भारतीय प्रायद्वीप के पश्चिमी तट के समानांतर 1,600 किलोमीटर के क्षेत्र में 160,000 वर्ग किलोमीटर के क्षेत्र में फैली है।","markdown":"## Q57.\n\nनिम्नलिखित में से कौन-सी पर्वत श्रृंखला भारत में केवल एक राज्य में फैली है?\n\n### Options\n\nA. अरावली\n\nB. सतपुड़ा\n\nC. अजन्ता\n\nD. सहयाद्री\n\n**Correct Answer:** C\n\n### Solution\n\nसही उत्तर **अजन्ता** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **अजंता पर्वत श्रृंखला भारत में केवल एक राज्य में फैली हुई है।**\n* अजंता पर्वत श्रृंखला महाराष्ट्र के भीतर फैली हुई है।\n* यह महाराष्ट्र के औरंगाबाद जिले में पायी जाती है।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **सतपुड़ा श्रृंखला****:** \n* यह मध्य भारत की पहाड़ियों की एक श्रृंखला है।\n* यह श्रृंखला पूर्वी गुजरात में शुरु होती है।\n* यह महाराष्ट्र और मध्य प्रदेश और छत्तीसगढ़ तक फैली है।\n* **अरावली श्रृंखला****:** \n* यह उत्तर पश्चिमी भारत में एक पर्वत श्रृंखला है।\n* यह दक्षिण-पश्चिम दिशा में लगभग 692 किमी तक फैली है।\n* यह दिल्ली के पास शुरू होती है।\n* यह हरियाणा और राजस्थान से होकर गुजरती है।\n* यह गुजरात में समाप्त होती है।\n* सबसे ऊंची चोटी 1,722 मीटर पर गुरु शिखर है।\n* **पश्चिमी घाट** को \"**सह्याद्री**\" भी कहा जाता है। \n* यह एक पर्वत श्रृंखला है जो तमिलनाडु, केरल, कर्नाटक, गोवा, महाराष्ट्र और गुजरात के राज्यों को पार करते हुए भारतीय प्रायद्वीप के पश्चिमी तट के समानांतर 1,600 किलोमीटर के क्षेत्र में 160,000 वर्ग किलोमीटर के क्षेत्र में फैली है।\n\n---\n"}}},{"index":58,"qNo":"Question No. 58","languages":{"English":{"qNo":58,"language":"English","questionHTML":"The tenure of the chairman of the National Human Rights Commission is _________.","questionText":"The tenure of the chairman of the National Human Rights Commission is _________.","options":[{"label":"A","html":"3 Years","text":"3 Years"},{"label":"B","html":"4 Years","text":"4 Years"},{"label":"C","html":"5 Years","text":"5 Years"},{"label":"D","html":"6 Years","text":"6 Years"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003e3\u0026nbsp;Years\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eThe tenure of the chairman of the National Human Rights Commission is 3\u003cstrong\u003e\u0026nbsp;years\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eThe Act was amended in 2019 and the tenure of the chairman along with members has been reduced to \u003cstrong\u003e3 years\u003c/strong\u003e from 5 years.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eThe National Human Rights Commission (NHRC) of India was established on \u003cstrong\u003e12 October 1993\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eThe statute under which it is established is the \u003cstrong\u003eProtection of Human Rights Act (PHRA), 1993\u003c/strong\u003e as \u003cstrong\u003eamended\u003c/strong\u003e by the \u003cstrong\u003eProtection of Human Rights (Amendment) Act, 2006, and again in 2019.\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u0026nbsp;\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eIt conforms with the \u003cstrong\u003eParis Principles\u003c/strong\u003e, adopted at the first international workshop on national institutions for the promotion and protection of human rights held in Paris in October 1991, and endorsed by the General Assembly of the United Nations by its Regulations 48/134 of 20 December 1993.\u003c/li\u003e\n\t\u003cli\u003eThe NHRC is an embodiment of India’s concern for the promotion and protection of human rights.\u003c/li\u003e\n\t\u003cli\u003eSection 2(1)(d) of the PHRA defines Human Rights as the rights relating to life, liberty, equality, and dignity of the individual guaranteed by the Constitution or embodied in the International Covenants and enforceable by courts in India.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is 3 Years. The tenure of the chairman of the National Human Rights Commission is 3 years. The Act was amended in 2019 and the tenure of the chairman along with members has been reduced to 3 years from 5 years. Key Points The National Human Rights Commission (NHRC) of India was established on 12 October 1993. The statute under which it is established is the Protection of Human Rights Act (PHRA), 1993 as amended by the Protection of Human Rights (Amendment) Act, 2006, and again in 2019. Additional Information It conforms with the Paris Principles, adopted at the first international workshop on national institutions for the promotion and protection of human rights held in Paris in October 1991, and endorsed by the General Assembly of the United Nations by its Regulations 48/134 of 20 December 1993. The NHRC is an embodiment of India’s concern for the promotion and protection of human rights. Section 2(1)(d) of the PHRA defines Human Rights as the rights relating to life, liberty, equality, and dignity of the individual guaranteed by the Constitution or embodied in the International Covenants and enforceable by courts in India.","markdown":"## Q58.\n\nThe tenure of the chairman of the National Human Rights Commission is _________.\n\n### Options\n\nA. 3 Years\n\nB. 4 Years\n\nC. 5 Years\n\nD. 6 Years\n\n**Correct Answer:** A\n\n### Solution\n\nThe correct answer is **3 Years**.\n\n \n* The tenure of the chairman of the National Human Rights Commission is 3**years**.\n* The Act was amended in 2019 and the tenure of the chairman along with members has been reduced to **3 years** from 5 years.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* The National Human Rights Commission (NHRC) of India was established on **12 October 1993**.\n* The statute under which it is established is the **Protection of Human Rights Act (PHRA), 1993** as **amended** by the **Protection of Human Rights (Amendment) Act, 2006, and again in 2019.**\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* It conforms with the **Paris Principles**, adopted at the first international workshop on national institutions for the promotion and protection of human rights held in Paris in October 1991, and endorsed by the General Assembly of the United Nations by its Regulations 48/134 of 20 December 1993.\n* The NHRC is an embodiment of India’s concern for the promotion and protection of human rights.\n* Section 2(1)(d) of the PHRA defines Human Rights as the rights relating to life, liberty, equality, and dignity of the individual guaranteed by the Constitution or embodied in the International Covenants and enforceable by courts in India.\n\n---\n"},"Hindi":{"qNo":58,"language":"Hindi","questionHTML":"राष्ट्रीय मानवाधिकार आयोग के अध्यक्ष का कार्यकाल होता ______ है।","questionText":"राष्ट्रीय मानवाधिकार आयोग के अध्यक्ष का कार्यकाल होता ______ है।","options":[{"label":"A","html":"3 \u003cspan style=\"\"\u003eवर्ष\u003c/span\u003e","text":"3 वर्ष"},{"label":"B","html":"4 \u003cspan style=\"\"\u003eवर्ष\u003c/span\u003e","text":"4 वर्ष"},{"label":"C","html":"5 \u003cspan style=\"\"\u003eवर्ष\u003c/span\u003e","text":"5 वर्ष"},{"label":"D","html":"6 \u003cspan style=\"\"\u003eवर्ष\u003c/span\u003e","text":"6 वर्ष"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eसही उत्तर\u003cu\u003e\u003cstrong\u003e 3\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003eवर्ष\u003c/strong\u003e\u003c/u\u003e\u0026nbsp;है।\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eराष्ट्रीय मानवाधिकार आयोग के अध्यक्ष का कार्यकाल \u003cstrong\u003e3\u0026nbsp;वर्ष \u003c/strong\u003eका होता है।\u003c/li\u003e\n\t\u003cli\u003e\u003cspan lang=\"hi\"\u003eइस अधिनियम को 2019 में संशोधित किया गया था और सदस्यों के साथ अध्यक्ष का कार्यकाल 5 वर्ष से घटाकर \u003cstrong\u003e3 वर्ष \u003c/strong\u003eकर दिया गया है\u003c/span\u003e।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eभारत का राष्ट्रीय मानवाधिकार आयोग (एनआरएचसी) \u003cstrong\u003e12 अक्टूबर 1993\u003c/strong\u003e को स्थापित किया गया था।\u003c/li\u003e\n\t\u003cli\u003eजिस क़ानून के तहत इसे स्थापित किया गया है वह \u003cstrong\u003eमानवाधिकार संरक्षण अधिनियम\u003c/strong\u003e\u003cstrong\u003e (पीएचआरए), 1993 है,\u003c/strong\u003e जिसे \u003cstrong\u003eमानवाधिकार संरक्षण (संशोधन)\u0026nbsp;अधिनियम, 2006\u003c/strong\u003e द्वारा \u003cstrong\u003eसंशोधित\u003c/strong\u003e किया गया है।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eयह \u003cstrong\u003eपेरिस सिद्धांतों के\u003c/strong\u003e अनुरूप है, जिसे अक्टूबर 1991 में पेरिस में आयोजित मानवाधिकारों के संवर्धन और संरक्षण के लिए राष्ट्रीय संस्थानों पर पहली अंतर्राष्ट्रीय कार्यशाला में अपनाया गया, और 20 दिसंबर 1993 के \u003cspan style=\"\"\u003eइसके विनियमों\u0026nbsp;\u003c/span\u003e48/134 द्वारा संयुक्त राष्ट्र की महासभा द्वारा इसका समर्थन किया गया।\u003c/li\u003e\n\t\u003cli\u003eएनएचआरसी मानव अधिकारों के संवर्धन और संरक्षण के लिए भारत के\u0026nbsp;उत्तरदायित्‍व का एक प्रतीक है।\u003c/li\u003e\n\t\u003cli\u003eपीएचआरए की धारा 2 (1) (d) मानवाधिकारों को जीवन से संबंधित अधिकारों, स्वतंत्रता, समानता और संविधान द्वारा गारंटीकृत व्यक्ति की गरिमा या अंतर्राष्ट्रीय वाचाओं में सन्निहित और भारत में अदालतों के लिए लागू करने के रूप में परिभाषित करती है।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर 3 वर्ष है। राष्ट्रीय मानवाधिकार आयोग के अध्यक्ष का कार्यकाल 3 वर्ष का होता है। इस अधिनियम को 2019 में संशोधित किया गया था और सदस्यों के साथ अध्यक्ष का कार्यकाल 5 वर्ष से घटाकर 3 वर्ष कर दिया गया है। Key Points भारत का राष्ट्रीय मानवाधिकार आयोग (एनआरएचसी) 12 अक्टूबर 1993 को स्थापित किया गया था। जिस क़ानून के तहत इसे स्थापित किया गया है वह मानवाधिकार संरक्षण अधिनियम (पीएचआरए), 1993 है, जिसे मानवाधिकार संरक्षण (संशोधन) अधिनियम, 2006 द्वारा संशोधित किया गया है। Additional Information यह पेरिस सिद्धांतों के अनुरूप है, जिसे अक्टूबर 1991 में पेरिस में आयोजित मानवाधिकारों के संवर्धन और संरक्षण के लिए राष्ट्रीय संस्थानों पर पहली अंतर्राष्ट्रीय कार्यशाला में अपनाया गया, और 20 दिसंबर 1993 के इसके विनियमों 48/134 द्वारा संयुक्त राष्ट्र की महासभा द्वारा इसका समर्थन किया गया। एनएचआरसी मानव अधिकारों के संवर्धन और संरक्षण के लिए भारत के उत्तरदायित्‍व का एक प्रतीक है। पीएचआरए की धारा 2 (1) (d) मानवाधिकारों को जीवन से संबंधित अधिकारों, स्वतंत्रता, समानता और संविधान द्वारा गारंटीकृत व्यक्ति की गरिमा या अंतर्राष्ट्रीय वाचाओं में सन्निहित और भारत में अदालतों के लिए लागू करने के रूप में परिभाषित करती है।","markdown":"## Q58.\n\nराष्ट्रीय मानवाधिकार आयोग के अध्यक्ष का कार्यकाल होता ______ है।\n\n### Options\n\nA. 3 वर्ष\n\nB. 4 वर्ष\n\nC. 5 वर्ष\n\nD. 6 वर्ष\n\n**Correct Answer:** A\n\n### Solution\n\nसही उत्तर**3वर्ष** है।\n\n \n* राष्ट्रीय मानवाधिकार आयोग के अध्यक्ष का कार्यकाल **3 वर्ष**का होता है।\n* इस अधिनियम को 2019 में संशोधित किया गया था और सदस्यों के साथ अध्यक्ष का कार्यकाल 5 वर्ष से घटाकर **3 वर्ष**कर दिया गया है।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* भारत का राष्ट्रीय मानवाधिकार आयोग (एनआरएचसी) **12 अक्टूबर 1993** को स्थापित किया गया था।\n* जिस क़ानून के तहत इसे स्थापित किया गया है वह **मानवाधिकार संरक्षण अधिनियम****(पीएचआरए), 1993 है,** जिसे **मानवाधिकार संरक्षण (संशोधन) अधिनियम, 2006** द्वारा **संशोधित** किया गया है।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* यह **पेरिस सिद्धांतों के** अनुरूप है, जिसे अक्टूबर 1991 में पेरिस में आयोजित मानवाधिकारों के संवर्धन और संरक्षण के लिए राष्ट्रीय संस्थानों पर पहली अंतर्राष्ट्रीय कार्यशाला में अपनाया गया, और 20 दिसंबर 1993 के इसके विनियमों 48/134 द्वारा संयुक्त राष्ट्र की महासभा द्वारा इसका समर्थन किया गया।\n* एनएचआरसी मानव अधिकारों के संवर्धन और संरक्षण के लिए भारत के उत्तरदायित्‍व का एक प्रतीक है।\n* पीएचआरए की धारा 2 (1) (d) मानवाधिकारों को जीवन से संबंधित अधिकारों, स्वतंत्रता, समानता और संविधान द्वारा गारंटीकृत व्यक्ति की गरिमा या अंतर्राष्ट्रीय वाचाओं में सन्निहित और भारत में अदालतों के लिए लागू करने के रूप में परिभाषित करती है।\n\n---\n"}}},{"index":59,"qNo":"Question No. 59","languages":{"English":{"qNo":59,"language":"English","questionHTML":"\u003cspan style=\" \"\u003eWho among the following was the first leader to organize labour movement in India?\u003c/span\u003e","questionText":"Who among the following was the first leader to organize labour movement in India?","options":[{"label":"A","html":"\u003cspan style=\" \"\u003eB.P.Walia\u003c/span\u003e","text":"B.P.Walia"},{"label":"B","html":"\u003cspan style=\" \"\u003eLala Lajpat Rai\u003c/span\u003e","text":"Lala Lajpat Rai"},{"label":"C","html":"\u003cspan style=\" \"\u003eN.M.Lokhande\u003c/span\u003e","text":"N.M.Lokhande"},{"label":"D","html":"\u003cspan style=\" \"\u003eN.G.Ranga\u003c/span\u003e","text":"N.G.Ranga"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cu\u003e\u003cstrong\u003eN.M.Lokhande\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eN.M.Lokhande\u0026nbsp;\u003c/strong\u003ewas the first leader to organize labour movement in India.\u003c/li\u003e\n\t\u003cli\u003eHe was born in 1848 in Thane.\u003c/li\u003e\n\t\u003cli\u003eNarayan Lokhande started his career with the railways and the postal department.\u003c/li\u003e\n\t\u003cli\u003eAfterwards, he joined the Mandavi Textile Mills as Store Keeper in 1870.\u003c/li\u003e\n\t\u003cli\u003eThis mill-life experience provided him with ample first-hand exposure to the exploitative nature of factory work, and the miserable living conditions of the mill hands, prompting him to organise them for their basic rights.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u0026nbsp;\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eHe served as Editor of the first labour journal in the country,\u003cstrong\u003e Deenbandhu\u003c/strong\u003e (Friend of the Poor), in Marathi from 1880 till his death in 1897.\u003c/li\u003e\n\t\u003cli\u003eLokhande also organised different occupational groups and marginalised segments such as barbers, rickshaw pullers, women workers and so on.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is N.M.Lokhande. Key Points N.M.Lokhande was the first leader to organize labour movement in India. He was born in 1848 in Thane. Narayan Lokhande started his career with the railways and the postal department. Afterwards, he joined the Mandavi Textile Mills as Store Keeper in 1870. This mill-life experience provided him with ample first-hand exposure to the exploitative nature of factory work, and the miserable living conditions of the mill hands, prompting him to organise them for their basic rights. Important Points He served as Editor of the first labour journal in the country, Deenbandhu (Friend of the Poor), in Marathi from 1880 till his death in 1897. Lokhande also organised different occupational groups and marginalised segments such as barbers, rickshaw pullers, women workers and so on.","markdown":"## Q59.\n\nWho among the following was the first leader to organize labour movement in India?\n\n### Options\n\nA. B.P.Walia\n\nB. Lala Lajpat Rai\n\nC. N.M.Lokhande\n\nD. N.G.Ranga\n\n**Correct Answer:** C\n\n### Solution\n\nThe correct answer is **N.M.Lokhande**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **N.M.Lokhande**was the first leader to organize labour movement in India.\n* He was born in 1848 in Thane.\n* Narayan Lokhande started his career with the railways and the postal department.\n* Afterwards, he joined the Mandavi Textile Mills as Store Keeper in 1870.\n* This mill-life experience provided him with ample first-hand exposure to the exploitative nature of factory work, and the miserable living conditions of the mill hands, prompting him to organise them for their basic rights.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* He served as Editor of the first labour journal in the country,**Deenbandhu** (Friend of the Poor), in Marathi from 1880 till his death in 1897.\n* Lokhande also organised different occupational groups and marginalised segments such as barbers, rickshaw pullers, women workers and so on.\n\n---\n"},"Hindi":{"qNo":59,"language":"Hindi","questionHTML":"\u003cspan style=\" \"\u003eनिम्नलिखित में से कौन भारत में श्रमिक आंदोलन को संगठित करने वाला पहला नेता था?\u003c/span\u003e","questionText":"निम्नलिखित में से कौन भारत में श्रमिक आंदोलन को संगठित करने वाला पहला नेता था?","options":[{"label":"A","html":"\u003cspan style=\" \"\u003eबीपी वालिया\u003c/span\u003e","text":"बीपी वालिया"},{"label":"B","html":"\u003cspan style=\" \"\u003eलाला लाजपत राय\u003c/span\u003e","text":"लाला लाजपत राय"},{"label":"C","html":"\u003cspan style=\" \"\u003eएन एम लोखंडे\u003c/span\u003e","text":"एन एम लोखंडे"},{"label":"D","html":"\u003cspan style=\" \"\u003eएन जी रंगा\u003c/span\u003e","text":"एन जी रंगा"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eसही उत्तर \u003cu\u003e\u003cstrong\u003eएन एम लोखंडे\u003c/strong\u003e\u003c/u\u003e\u0026nbsp;है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eएन एम लोखंडे\u003c/strong\u003e भारत में श्रमिक आंदोलन को संगठित करने वाले\u0026nbsp;पहले\u0026nbsp;नेता थे।\u003c/li\u003e\n\t\u003cli\u003eउनका जन्म 1848 में ठाणे में हुआ था।\u003c/li\u003e\n\t\u003cli\u003eनारायण लोखंडे ने अपने करियर की शुरुआत रेलवे और डाक विभाग से की।\u003c/li\u003e\n\t\u003cli\u003eबाद में, वह 1870 में स्टोर कीपर के रूप में मांडवी टेक्सटाइल मिल्स में शामिल हो गए।\u003c/li\u003e\n\t\u003cli\u003eइस मिल-जीवन के अनुभव ने उन्हें कारखाने के काम की शोषणकारी प्रकृति, और मिल के हाथों की दयनीय जीवन स्थितियों के साथ, अपने मूल अधिकारों के लिए उन्हें व्यवस्थित करने के लिए प्रेरित किया।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eउन्होंने देश में\u0026nbsp;1880 से 1897 तक उनकी मृत्यु तक मराठी में\u0026nbsp;पहली श्रम पत्रिका,\u0026nbsp;\u003cspan style=\"font-weight: 700;\"\u003eदीनबंधु\u003c/span\u003e\u0026nbsp;(गरीबों का मित्र)\u0026nbsp;के संपादक के रूप में सेवा दी।\u003c/li\u003e\n\t\u003cli\u003eलोखंडे ने अलग-अलग व्यावसायिक समूहों और हाशिए पर स्थित क्षेत्रों जैसे कि नाइयों, रिक्शा चालक, महिला श्रमिकों और अन्य को भी संगठित किया।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर एन एम लोखंडे है। Key Points एन एम लोखंडे भारत में श्रमिक आंदोलन को संगठित करने वाले पहले नेता थे। उनका जन्म 1848 में ठाणे में हुआ था। नारायण लोखंडे ने अपने करियर की शुरुआत रेलवे और डाक विभाग से की। बाद में, वह 1870 में स्टोर कीपर के रूप में मांडवी टेक्सटाइल मिल्स में शामिल हो गए। इस मिल-जीवन के अनुभव ने उन्हें कारखाने के काम की शोषणकारी प्रकृति, और मिल के हाथों की दयनीय जीवन स्थितियों के साथ, अपने मूल अधिकारों के लिए उन्हें व्यवस्थित करने के लिए प्रेरित किया। Important Points उन्होंने देश में 1880 से 1897 तक उनकी मृत्यु तक मराठी में पहली श्रम पत्रिका, दीनबंधु (गरीबों का मित्र) के संपादक के रूप में सेवा दी। लोखंडे ने अलग-अलग व्यावसायिक समूहों और हाशिए पर स्थित क्षेत्रों जैसे कि नाइयों, रिक्शा चालक, महिला श्रमिकों और अन्य को भी संगठित किया।","markdown":"## Q59.\n\nनिम्नलिखित में से कौन भारत में श्रमिक आंदोलन को संगठित करने वाला पहला नेता था?\n\n### Options\n\nA. बीपी वालिया\n\nB. लाला लाजपत राय\n\nC. एन एम लोखंडे\n\nD. एन जी रंगा\n\n**Correct Answer:** C\n\n### Solution\n\nसही उत्तर **एन एम लोखंडे** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **एन एम लोखंडे** भारत में श्रमिक आंदोलन को संगठित करने वाले पहले नेता थे।\n* उनका जन्म 1848 में ठाणे में हुआ था।\n* नारायण लोखंडे ने अपने करियर की शुरुआत रेलवे और डाक विभाग से की।\n* बाद में, वह 1870 में स्टोर कीपर के रूप में मांडवी टेक्सटाइल मिल्स में शामिल हो गए।\n* इस मिल-जीवन के अनुभव ने उन्हें कारखाने के काम की शोषणकारी प्रकृति, और मिल के हाथों की दयनीय जीवन स्थितियों के साथ, अपने मूल अधिकारों के लिए उन्हें व्यवस्थित करने के लिए प्रेरित किया।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* उन्होंने देश में 1880 से 1897 तक उनकी मृत्यु तक मराठी में पहली श्रम पत्रिका, दीनबंधु (गरीबों का मित्र) के संपादक के रूप में सेवा दी।\n* लोखंडे ने अलग-अलग व्यावसायिक समूहों और हाशिए पर स्थित क्षेत्रों जैसे कि नाइयों, रिक्शा चालक, महिला श्रमिकों और अन्य को भी संगठित किया।\n\n---\n"}}},{"index":60,"qNo":"Question No. 60","languages":{"English":{"qNo":60,"language":"English","questionHTML":"Which game is related to Joe Root?","questionText":"Which game is related to Joe Root?","options":[{"label":"A","html":"Cricket","text":"Cricket"},{"label":"B","html":"Chess","text":"Chess"},{"label":"C","html":"Polo","text":"Polo"},{"label":"D","html":"\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003eGolf\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","text":"Golf"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003eCricket\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eJoseph Edward Root\u003c/strong\u003e is an English international \u003cstrong\u003ecricketer\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eHe is the current\u0026nbsp;Test captain of \u003cstrong\u003eEngland\u003c/strong\u003e in\u0026nbsp;cricket.\u003c/li\u003e\n\t\u003cli\u003eHe also represents Yorkshire domestically.\u003c/li\u003e\n\t\u003cli\u003eAs of August 2020, he is ranked in the top-ten in both Test and ODI batting in the ICC Player Rankings in the world.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eCricket:\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eHighest governing body\u003cspan style=\"white-space:pre\"\u003e - I\u003c/span\u003enternational Cricket Council(ICC)\u003c/li\u003e\n\t\t\u003cli\u003eTeam members\u003cspan style=\"white-space:pre\"\u003e - \u003c/span\u003e11 players per side\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003eAlso, Remember a fact,\u0026nbsp;Marylebone Cricket Club (\u003cstrong\u003eMCC\u003c/strong\u003e) is in \u003cstrong\u003eLondon\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Cricket. Key Points Joseph Edward Root is an English international cricketer. He is the current Test captain of England in cricket. He also represents Yorkshire domestically. As of August 2020, he is ranked in the top-ten in both Test and ODI batting in the ICC Player Rankings in the world. Additional Information Cricket: Highest governing body - International Cricket Council(ICC) Team members - 11 players per side Also, Remember a fact, Marylebone Cricket Club (MCC) is in London.","markdown":"## Q60.\n\nWhich game is related to Joe Root?\n\n### Options\n\nA. Cricket\n\nB. Chess\n\nC. Polo\n\nD. Golf\n\n**Correct Answer:** A\n\n### Solution\n\nThe correct answer is **Cricket**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **Joseph Edward Root** is an English international **cricketer**.\n* He is the current Test captain of **England** in cricket.\n* He also represents Yorkshire domestically.\n* As of August 2020, he is ranked in the top-ten in both Test and ODI batting in the ICC Player Rankings in the world.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **Cricket:** \n* Highest governing body - International Cricket Council(ICC)\n* Team members - 11 players per side\n* Also, Remember a fact, Marylebone Cricket Club (**MCC**) is in **London**.\n\n---\n"},"Hindi":{"qNo":60,"language":"Hindi","questionHTML":"जो रूट किस खेल से संबंधित हैं?","questionText":"जो रूट किस खेल से संबंधित हैं?","options":[{"label":"A","html":"क्रिकेट","text":"क्रिकेट"},{"label":"B","html":"शतरंज","text":"शतरंज"},{"label":"C","html":"पोलो","text":"पोलो"},{"label":"D","html":"गॉल्फ","text":"गॉल्फ"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eसही उत्तर \u003cu\u003e\u003cstrong\u003eक्रिकेट\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eजोसेफ एडवर्ड रूट\u003c/strong\u003e एक ब्रिटिश\u0026nbsp;अंतर्राष्ट्रीय \u003cstrong\u003eक्रिकेटर\u003c/strong\u003e हैं।\u003c/li\u003e\n\t\u003cli\u003eवह क्रिकेट में \u003cstrong\u003eइंग्लैंड\u003c/strong\u003e के वर्तमान टेस्ट कप्तान हैं।\u003c/li\u003e\n\t\u003cli\u003eवह घरेलू रूप से यॉर्कशायर का भी प्रतिनिधित्व करते\u0026nbsp;हैं।\u003c/li\u003e\n\t\u003cli\u003eअगस्त 2020 तक, वह दुनिया में आईसीसी प्लेयर रैंकिंग में टेस्ट और एक दिवसीय\u0026nbsp;दोनों में शीर्ष-दस\u0026nbsp;स्थान पर है।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eक्रिकेट:\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eसर्वोच्च शासी निकाय - अंतर्राष्ट्रीय क्रिकेट परिषद (आईसीसी)\u003c/li\u003e\n\t\t\u003cli\u003eटीम के सदस्य - प्रति पक्ष 11 खिलाड़ी\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003eइसके अलावा, एक तथ्य याद रखिए, मैरीलेबोन क्रिकेट क्लब (\u003cstrong\u003eएमसीसी\u003c/strong\u003e) \u003cstrong\u003eलंदन\u003c/strong\u003e में है।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर क्रिकेट है। Key Points जोसेफ एडवर्ड रूट एक ब्रिटिश अंतर्राष्ट्रीय क्रिकेटर हैं। वह क्रिकेट में इंग्लैंड के वर्तमान टेस्ट कप्तान हैं। वह घरेलू रूप से यॉर्कशायर का भी प्रतिनिधित्व करते हैं। अगस्त 2020 तक, वह दुनिया में आईसीसी प्लेयर रैंकिंग में टेस्ट और एक दिवसीय दोनों में शीर्ष-दस स्थान पर है। Additional Information क्रिकेट: सर्वोच्च शासी निकाय - अंतर्राष्ट्रीय क्रिकेट परिषद (आईसीसी) टीम के सदस्य - प्रति पक्ष 11 खिलाड़ी इसके अलावा, एक तथ्य याद रखिए, मैरीलेबोन क्रिकेट क्लब (एमसीसी) लंदन में है।","markdown":"## Q60.\n\nजो रूट किस खेल से संबंधित हैं?\n\n### Options\n\nA. क्रिकेट\n\nB. शतरंज\n\nC. पोलो\n\nD. गॉल्फ\n\n**Correct Answer:** A\n\n### Solution\n\nसही उत्तर **क्रिकेट** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **जोसेफ एडवर्ड रूट** एक ब्रिटिश अंतर्राष्ट्रीय **क्रिकेटर** हैं।\n* वह क्रिकेट में **इंग्लैंड** के वर्तमान टेस्ट कप्तान हैं।\n* वह घरेलू रूप से यॉर्कशायर का भी प्रतिनिधित्व करते हैं।\n* अगस्त 2020 तक, वह दुनिया में आईसीसी प्लेयर रैंकिंग में टेस्ट और एक दिवसीय दोनों में शीर्ष-दस स्थान पर है।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **क्रिकेट:** \n* सर्वोच्च शासी निकाय - अंतर्राष्ट्रीय क्रिकेट परिषद (आईसीसी)\n* टीम के सदस्य - प्रति पक्ष 11 खिलाड़ी\n* इसके अलावा, एक तथ्य याद रखिए, मैरीलेबोन क्रिकेट क्लब (**एमसीसी**) **लंदन** में है।\n\n---\n"}}},{"index":61,"qNo":"Question No. 61","languages":{"English":{"qNo":61,"language":"English","questionHTML":"Prime Minister Narendra Modi met Jakob Zuma in July 2016, who is","questionText":"Prime Minister Narendra Modi met Jakob Zuma in July 2016, who is","options":[{"label":"A","html":"President of\u0026nbsp;Namibia","text":"President of Namibia"},{"label":"B","html":"President of Qatar","text":"President of Qatar"},{"label":"C","html":"President of Mexico","text":"President of Mexico"},{"label":"D","html":"President of South Africa","text":"President of South Africa"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cu\u003e\u003cstrong\u003ePresident of South Africa\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003ePresident of South Africa in July 2016 was\u0026nbsp;Jakob Zuma.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eMatamela Cyril Ramaphosa\u0026nbsp;is the serving\u0026nbsp;President of South Africa since 2018.\u003c/strong\u003e\n\t\u003cul\u003e\n\t\t\u003cli\u003eHe is also the \u003cstrong\u003ePresident of the African National Congress\u003c/strong\u003e (ANC) since 2017.\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eSouth Africa:\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eSouth Africa has three cities that serve as capitals:\n\t\t\u003cul\u003e\n\t\t\t\u003cli\u003ePretoria (executive)\u003c/li\u003e\n\t\t\t\u003cli\u003eCape Town (legislative)\u003c/li\u003e\n\t\t\t\u003cli\u003eBloemfontein (judicial)\u003c/li\u003e\n\t\t\u003c/ul\u003e\n\t\t\u003c/li\u003e\n\t\t\u003cli\u003eCurrency\u003cspan style=\"white-space:pre\"\u003e - \u003c/span\u003eSouth African rand (ZAR)\u003c/li\u003e\n\t\t\u003cli\u003eIt is also a member of BRICS.\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is President of South Africa. Key Points President of South Africa in July 2016 was Jakob Zuma. Matamela Cyril Ramaphosa is the serving President of South Africa since 2018. He is also the President of the African National Congress (ANC) since 2017. Additional Information South Africa: South Africa has three cities that serve as capitals: Pretoria (executive) Cape Town (legislative) Bloemfontein (judicial) Currency - South African rand (ZAR) It is also a member of BRICS.","markdown":"## Q61.\n\nPrime Minister Narendra Modi met Jakob Zuma in July 2016, who is\n\n### Options\n\nA. President of Namibia\n\nB. President of Qatar\n\nC. President of Mexico\n\nD. President of South Africa\n\n**Correct Answer:** D\n\n### Solution\n\nThe correct answer is **President of South Africa**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* President of South Africa in July 2016 was Jakob Zuma.\n* **Matamela Cyril Ramaphosa is the serving President of South Africa since 2018.** \n* He is also the **President of the African National Congress** (ANC) since 2017.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **South Africa:** \n* South Africa has three cities that serve as capitals: \n* Pretoria (executive)\n* Cape Town (legislative)\n* Bloemfontein (judicial)\n* Currency - South African rand (ZAR)\n* It is also a member of BRICS.\n\n---\n"},"Hindi":{"qNo":61,"language":"Hindi","questionHTML":"प्रधानमंत्री नरेन्द्र मोदी जैकोब जू़मा से जुलाई 2016 में मिले, जो हैं","questionText":"प्रधानमंत्री नरेन्द्र मोदी जैकोब जू़मा से जुलाई 2016 में मिले, जो हैं","options":[{"label":"A","html":"नामीबिया के राष्ट्रपति","text":"नामीबिया के राष्ट्रपति"},{"label":"B","html":"कतर के राष्ट्रपति","text":"कतर के राष्ट्रपति"},{"label":"C","html":"मेक्सिको के राष्ट्रपति","text":"मेक्सिको के राष्ट्रपति"},{"label":"D","html":"दक्षिण अफ्रीका के राष्ट्रपति","text":"दक्षिण अफ्रीका के राष्ट्रपति"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eदक्षिण अफ्रीका के राष्ट्रपति\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eजुलाई 2016 में दक्षिण अफ्रीका के राष्ट्रपति जैकब जुमा थे।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eमाटामेला सिरिल रामफोसा 2018 से दक्षिण अफ्रीका के सेवारत राष्ट्रपति हैं।\u003c/strong\u003e\n\t\u003cul\u003e\n\t\t\u003cli\u003eवह 2017 से \u003cstrong\u003eअफ्रीकी राष्ट्रीय कांग्रेस \u003c/strong\u003e(एएनसी) के अध्यक्ष भी हैं।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eदक्षिण अफ्रीका\u003c/strong\u003e\u003cstrong\u003e:\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eदक्षिण अफ्रीका में तीन शहर हैं जो राजधानियों के रूप में कार्य करते हैं:\n\t\t\u003cul\u003e\n\t\t\t\u003cli\u003eप्रिटोरिया (कार्यकारी)\u003c/li\u003e\n\t\t\t\u003cli\u003eकेप टाउन (विधायी)\u003c/li\u003e\n\t\t\t\u003cli\u003eब्लॉमफ़ोन्टिन (न्यायिक)\u003c/li\u003e\n\t\t\u003c/ul\u003e\n\t\t\u003c/li\u003e\n\t\t\u003cli\u003eमुद्रा - दक्षिण अफ़्रीकी रैंड (जेर)\u003c/li\u003e\n\t\t\u003cli\u003eयह ब्रिक्स का भी सदस्य है।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर दक्षिण अफ्रीका के राष्ट्रपति है। Key Points जुलाई 2016 में दक्षिण अफ्रीका के राष्ट्रपति जैकब जुमा थे। माटामेला सिरिल रामफोसा 2018 से दक्षिण अफ्रीका के सेवारत राष्ट्रपति हैं। वह 2017 से अफ्रीकी राष्ट्रीय कांग्रेस (एएनसी) के अध्यक्ष भी हैं। Additional Information दक्षिण अफ्रीका: दक्षिण अफ्रीका में तीन शहर हैं जो राजधानियों के रूप में कार्य करते हैं: प्रिटोरिया (कार्यकारी) केप टाउन (विधायी) ब्लॉमफ़ोन्टिन (न्यायिक) मुद्रा - दक्षिण अफ़्रीकी रैंड (जेर) यह ब्रिक्स का भी सदस्य है।","markdown":"## Q61.\n\nप्रधानमंत्री नरेन्द्र मोदी जैकोब जू़मा से जुलाई 2016 में मिले, जो हैं\n\n### Options\n\nA. नामीबिया के राष्ट्रपति\n\nB. कतर के राष्ट्रपति\n\nC. मेक्सिको के राष्ट्रपति\n\nD. दक्षिण अफ्रीका के राष्ट्रपति\n\n**Correct Answer:** D\n\n### Solution\n\nसही उत्तर **दक्षिण अफ्रीका के राष्ट्रपति** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* जुलाई 2016 में दक्षिण अफ्रीका के राष्ट्रपति जैकब जुमा थे।\n* **माटामेला सिरिल रामफोसा 2018 से दक्षिण अफ्रीका के सेवारत राष्ट्रपति हैं।** \n* वह 2017 से **अफ्रीकी राष्ट्रीय कांग्रेस**(एएनसी) के अध्यक्ष भी हैं।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **दक्षिण अफ्रीका****:** \n* दक्षिण अफ्रीका में तीन शहर हैं जो राजधानियों के रूप में कार्य करते हैं: \n* प्रिटोरिया (कार्यकारी)\n* केप टाउन (विधायी)\n* ब्लॉमफ़ोन्टिन (न्यायिक)\n* मुद्रा - दक्षिण अफ़्रीकी रैंड (जेर)\n* यह ब्रिक्स का भी सदस्य है।\n\n---\n"}}},{"index":62,"qNo":"Question No. 62","languages":{"English":{"qNo":62,"language":"English","questionHTML":"What year was the Mohun Bagan Club of Football established?","questionText":"What year was the Mohun Bagan Club of Football established?","options":[{"label":"A","html":"1850","text":"1850"},{"label":"B","html":"1879","text":"1879"},{"label":"C","html":"1889","text":"1889"},{"label":"D","html":"1901","text":"1901"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003e1889\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eEstablished on \u003cstrong\u003e15th August 1889, Mohun Bagan Athletic Club is one of the oldest clubs in India\u003c/strong\u003e \u0026amp; \u003cstrong\u003eAsia\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eIt created history \u003cstrong\u003ein 1911\u003c/strong\u003e by becoming the \u003cstrong\u003efirst Indian team to win IFA Shield\u003c/strong\u003e, an event that has been closely linked with Indian nationalism.\u003c/li\u003e\n\t\u003cli\u003eMohun Bagan football team has won National League/I-League five times and Federation Cup a record fourteen times.\u003c/li\u003e\n\t\u003cli\u003eThe club also has a rich history in other sports like cricket and hockey.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eFootball:\n\t\u003cul\u003e\n\t\t\u003cli\u003eTeam members -\u003cspan style=\"white-space:pre\"\u003e \u003c/span\u003e\u003cstrong\u003e11 per side\u003c/strong\u003e\u003c/li\u003e\n\t\t\u003cli\u003e\n\t\t\u003cdiv\u003eHighest governing body -\u003cspan style=\"white-space:pre\"\u003e \u003c/span\u003e\u003cstrong\u003eFIFA\u003c/strong\u003e\u003c/div\u003e\n\t\t\u003c/li\u003e\n\t\t\u003cli\u003e\n\t\t\u003cdiv\u003eNicknames\u003c/div\u003e\n\n\t\t\u003cul\u003e\n\t\t\t\u003cli\u003e\n\t\t\t\u003cdiv\u003e\u003cspan style=\"white-space:pre\"\u003e​\u003c/span\u003e\u003cstrong\u003eWorld Game\u003c/strong\u003e\u003c/div\u003e\n\t\t\t\u003c/li\u003e\n\t\t\t\u003cli\u003e\u003cstrong\u003eThe Beautiful Game\u003c/strong\u003e\u003c/li\u003e\n\t\t\u003c/ul\u003e\n\t\t\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003eFirst played\u003cspan style=\"white-space:pre\"\u003e \u003c/span\u003eMid-19th century England\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is 1889. Key Points Established on 15th August 1889, Mohun Bagan Athletic Club is one of the oldest clubs in India \u0026 Asia. It created history in 1911 by becoming the first Indian team to win IFA Shield, an event that has been closely linked with Indian nationalism. Mohun Bagan football team has won National League/I-League five times and Federation Cup a record fourteen times. The club also has a rich history in other sports like cricket and hockey. Additional Information Football: Team members - 11 per side Highest governing body - FIFA Nicknames ​World Game The Beautiful Game First played Mid-19th century England","markdown":"## Q62.\n\nWhat year was the Mohun Bagan Club of Football established?\n\n### Options\n\nA. 1850\n\nB. 1879\n\nC. 1889\n\nD. 1901\n\n**Correct Answer:** C\n\n### Solution\n\nThe correct answer is **1889**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* Established on **15th August 1889, Mohun Bagan Athletic Club is one of the oldest clubs in India** \u0026 **Asia**.\n* It created history **in 1911** by becoming the **first Indian team to win IFA Shield**, an event that has been closely linked with Indian nationalism.\n* Mohun Bagan football team has won National League/I-League five times and Federation Cup a record fourteen times.\n* The club also has a rich history in other sports like cricket and hockey.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* Football: \n* Team members - **11 per side**\n* Highest governing body - **FIFA**\n* Nicknames\n\n \n* ​**World Game**\n* **The Beautiful Game**\n* First played Mid-19th century England\n\n---\n"},"Hindi":{"qNo":62,"language":"Hindi","questionHTML":"फुटबॉल के मोहन बागान क्लब की स्थापना किस वर्ष हुई थी?","questionText":"फुटबॉल के मोहन बागान क्लब की स्थापना किस वर्ष हुई थी?","options":[{"label":"A","html":"1850","text":"1850"},{"label":"B","html":"1879","text":"1879"},{"label":"C","html":"1889","text":"1889"},{"label":"D","html":"1901","text":"1901"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eसही उत्तर \u003cu\u003e\u003cstrong\u003e1889\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003e15 अगस्त 1889\u003c/strong\u003e को स्थापित,\u003cstrong\u003e मोहन बागान एथलेटिक क्लब भारत और एशिया के सबसे पुराने क्लबों में से एक है।\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003eइसने\u003cstrong\u003e 1911\u003c/strong\u003e में \u003cstrong\u003eआईएफए शील्ड जीतने वाली पहली भारतीय टीम\u003c/strong\u003e बनकर एक इतिहास रच दिया, यह एक ऐसी घटना थी जो भारतीय राष्ट्रवाद के साथ घनिष्ठ रूप से जुड़ी हुई थी।\u003c/li\u003e\n\t\u003cli\u003eमोहन बागान फुटबॉल उपनाम वर्ल्ड गेम द ब्यूटीफुल गेम पहली बार खेला गया- 19वीं सदी में इंग्लैंड में","markdown":"## Q62.\n\nफुटबॉल के मोहन बागान क्लब की स्थापना किस वर्ष हुई थी?\n\n### Options\n\nA. 1850\n\nB. 1879\n\nC. 1889\n\nD. 1901\n\n**Correct Answer:** C\n\n### Solution\n\nसही उत्तर **1889** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **15 अगस्त 1889** को स्थापित,**मोहन बागान एथलेटिक क्लब भारत और एशिया के सबसे पुराने क्लबों में से एक है।**\n* इसने**1911** में **आईएफए शील्ड जीतने वाली पहली भारतीय टीम** बनकर एक इतिहास रच दिया, यह एक ऐसी घटना थी जो भारतीय राष्ट्रवाद के साथ घनिष्ठ रूप से जुड़ी हुई थी।\n* मोहन बागान फुटबॉल टीम ने पांच बार नेशनल लीग/आई-लीग और फेडरेशन कप रिकॉर्ड चौदह बार जीता है।\n* इस क्लब का क्रिकेट और हॉकी जैसे अन्य खेलों में भी समृद्ध इतिहास रहा है।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* फुटबॉल: \n* टीम के सदस्य - **11 प्रति पक्ष**\n* उच्चतम शासी निकाय - **फीफा**\n* उपनाम\n\n \n* **वर्ल्ड गेम**\n* **द ब्यूटीफुल गेम**\n* पहली बार खेला गया- 19^वीं^ सदी में इंग्लैंड में\n\n---\n"}}},{"index":63,"qNo":"Question No. 63","languages":{"English":{"qNo":63,"language":"English","questionHTML":"In which of the following countries did a woman become the first President in May 2016?","questionText":"In which of the following countries did a woman become the first President in May 2016?","options":[{"label":"A","html":"Taiwan","text":"Taiwan"},{"label":"B","html":"Myanmar","text":"Myanmar"},{"label":"C","html":"Angola","text":"Angola"},{"label":"D","html":"\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e\u003cspan style=\" \"\u003eNamibia\u003c/span\u003e\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","text":"Namibia"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003eTaiwan\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eत्साई इंग-वेन\u0026nbsp;\u003cspan style=\"font-weight: 700;\"\u003eताइवान की पहली महिला राष्ट्रपति\u003c/span\u003e\u0026nbsp;हैं।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eत्साई इंग-वेन\u003c/strong\u003e 2016 से\u003cstrong\u003e ताइवान गणराज्य\u003c/strong\u003e के \u003cstrong\u003eसातवें राष्ट्रपति\u003c/strong\u003e के रूप में सेवा कर रही\u0026nbsp;हैं।\u003c/li\u003e\n\t\u003cli\u003eवह\u003cstrong\u003e डेमोक्रेटिक प्रोग्रेसिव पार्टी\u003c/strong\u003e की सदस्य हैं।\u003c/li\u003e\n\t\u003cli\u003eउन्होंने 2020 से डेमोक्रेटिक प्रोग्रेसिव पार्टी (डीपीपी) के अध्यक्ष के रूप में कार्य किया है।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cu\u003e\u003cspan style=\"font-weight: 700;\"\u003eताइवान\u003c/span\u003e\u003c/u\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eराजधानी -\u003cstrong\u003eताइपे\u0026nbsp;\u003c/strong\u003e\u003c/li\u003e\n\t\t\u003cli\u003eमुद्रा - \u003cstrong\u003eनया ताइवान डॉलर \u003c/strong\u003e(NT$) (टीडब्ल्यूडी)\u003c/li\u003e\n\t\t\u003cli\u003eक्षेत्रफल - 36,197 किमी\u003csup\u003e2\u003c/sup\u003e\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर ताइवान है। Key Points त्साई इंग-वेन ताइवान की पहली महिला राष्ट्रपति हैं। त्साई इंग-वेन 2016 से ताइवान गणराज्य के सातवें राष्ट्रपति के रूप में सेवा कर रही हैं। वह डेमोक्रेटिक प्रोग्रेसिव पार्टी की सदस्य हैं। उन्होंने 2020 से डेमोक्रेटिक प्रोग्रेसिव पार्टी (डीपीपी) के अध्यक्ष के रूप में कार्य किया है। Additional Information ताइवान राजधानी -ताइपे मुद्रा - नया ताइवान डॉलर (NT$) (टीडब्ल्यूडी) क्षेत्रफल - 36,197 किमी2","markdown":"## Q63.\n\nमई 2016 में निम्नलिखित में से किस देश में पहली बार महिला राष्ट्रपति बनी?\n\n### Options\n\nA. ताइवान\n\nB. म्यांमार\n\nC. अंगोला\n\nD. नामीबिया\n\n**Correct Answer:** A\n\n### Solution\n\nसही उत्तर **ताइवान** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* त्साई इंग-वेन ताइवान की पहली महिला राष्ट्रपति हैं।\n* **त्साई इंग-वेन** 2016 से**ताइवान गणराज्य** के **सातवें राष्ट्रपति** के रूप में सेवा कर रही हैं।\n* वह**डेमोक्रेटिक प्रोग्रेसिव पार्टी** की सदस्य हैं।\n* उन्होंने 2020 से डेमोक्रेटिक प्रोग्रेसिव पार्टी (डीपीपी) के अध्यक्ष के रूप में कार्य किया है।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* ताइवान \n* राजधानी -**ताइपे**\n* मुद्रा - **नया ताइवान डॉलर**(NT$) (टीडब्ल्यूडी)\n* क्षेत्रफल - 36,197 किमी^2^\n\n---\n"}}},{"index":64,"qNo":"Question No. 64","languages":{"English":{"qNo":64,"language":"English","questionHTML":"Who won the 2016 French Open men's singles title?","questionText":"Who won the 2016 French Open men's singles title?","options":[{"label":"A","html":"Ivan Dodges","text":"Ivan Dodges"},{"label":"B","html":"Novak Djokovic","text":"Novak Djokovic"},{"label":"C","html":"Andi Murray","text":"Andi Murray"},{"label":"D","html":"\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003eRoger Federer\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","text":"Roger Federer"}],"correctInd  जीता?","options":[{"label":"A","html":"इवान डोडिज","text":"इवान डोडिज"},{"label":"B","html":"नोवाक जोकोविक","text":"नोवाक जोकोविक"},{"label":"C","html":"ऐन्डी मरे","text":"ऐन्डी मरे"},{"label":"D","html":"रोजर फेडरर","text":"रोजर फेडरर"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eनोवाक जोकोविक\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e2016 का\u0026nbsp;फ्रेंच ओपन\u0026nbsp;\n\t\u003cul\u003e\n\t\t\u003cli\u003eयह 22 मई से 5 जून तक \u003cstrong\u003eस्टेड रोलैंड गैरोस\u003c/strong\u003e में आयोजित हुआ।\u003c/li\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eफ्रांस के पेरिस\u003c/strong\u003e में\u003c/li\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eनोवाक जोकोविच \u003c/strong\u003eने 2016 के संस्करण में पुरुष एकल जीता।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eचैंपियन\n\t\u003cul\u003e\n\t\t\u003cli\u003eपुरुष एकल - सर्बिया के \u003cstrong\u003eनोवाक जोकोविच\u003c/strong\u003e\u003c/li\u003e\n\t\t\u003cli\u003eमहिला एकल - स्पेन की\u003cstrong\u003e गरबनी मुगुरुज़ा\u003c/strong\u003e\u003c/li\u003e\n\t\t\

प्टिक और ऑक्सीडाइज़र** के रूप में उपयोग किया जाता है।\n* **कार्बन मोनोऑक्साइड** एक **विषाक्त, रंगहीन, स्वादहीन गैस**है।\n* **कार्बन मोनोऑक्साइड** का रासायनिक सूत्र **CO** है।\n* **कार्बन मोनोऑक्साइड** को **साइलेंट किलर**गैस के रूप में जाना जाता है।\n* **सल्फर डाइऑक्साइड** का रासायनिक सूत्र **SO~2~** है।\n* **सल्फर डाइऑक्साइड** एक **जहरीली गैस**है और इसमें**जले हुए माचिस**जैसी गंध आती है।\n* **सल्फर डाइऑक्साइड** **प्राकृतिक रूप से** **ज्वालामुखीय गतिविधि**में मुक्त होता है।\n\n---\n"}}},{"index":34,"qNo":"Question No. 34","languages":{"English":{"qNo":34,"language":"English","questionHTML":"Lightning can also cause a fire in the tree, because it contains excessive amount of","questionText":"Lightning can also cause a fire in the tree, because it contains excessive amount of","options":[{"label":"A","html":"Thermal energy","text":"Thermal energy"},{"label":"B","html":"Electrical energy","text":"Electrical energy"},{"label":"C","html":"Chemical energy","text":"Chemical energy"},{"label":"D","html":"\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003eNuclear energy\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","text":"Nuclear energy"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003eElectrical Energy\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eLightning is an electric discharge in the atmosphere between oppositely charged clouds (or between charged clouds and the earth).\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003eLightning is produced by the electric charges in the sky.\u003c/li\u003e\n\t\u003cli\u003eA flash of lightning carries a lot of electric energy.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eWhen lightning strikes a tree, it can burn up the tree and damage it with enormous electric energy\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Electrical Energy. Key Points Lightning is an electric discharge in the atmosphere between oppositely charged clouds (or between charged clouds and the earth). Lightning is produced by the electric charges in the sky. A flash of lightning carries a lot of electric energy. When lightning strikes a tree, it can burn up the tree and damage it with enormous electric energy.","markdown":"## Q34.\n\nLightning can also cause a fire in the tree, because it contains excessive amount of\n\n### Options\n\nA. Thermal energy\n\nB. Electrical energy\n\nC. Chemical energy\n\nD. Nuclear energy\n\n**Correct Answer:** B\n\n### Solution\n\nThe correct answer is **Electrical Energy**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **Lightning is an electric discharge in the atmosphere between oppositely charged clouds (or between charged clouds and the earth).**\n* Lightning is produced by the electric charges in the sky.\n* A flash of lightning carries a lot of electric energy.\n* **When lightning strikes a tree, it can burn up the tree and damage it with enormous electric energy**.\n\n---\n"},"Hindi":{"qNo":34,"language":"Hindi","questionHTML":"तड़ित (बिजली चमकना) से वृक्ष में आग भी लग सकती है, क्योंकि इसमें अत्यधिक मात्रा में होती है\u0026nbsp; \u0026nbsp;","questionText":"तड़ित (बिजली चमकना) से वृक्ष में आग भी लग सकती है, क्योंकि इसमें अत्यधिक मात्रा में होती है","options":[{"label":"A","html":"उष्मीय उर्जा\u0026nbsp;","text":"उष्मीय उर्जा"},{"label":"B","html":"विदयुत उर्जा\u0026nbsp;","text":"विदयुत उर्जा"},{"label":"C","html":"रासायनिक उर्जा\u0026nbsp;","text":"रासायनिक उर्जा"},{"label":"D","html":"नाभिकीय उर्जा\u0026nbsp;","text":"नाभिकीय उर्जा"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eसही उत्तर \u003cu\u003e\u003cstrong\u003eविद्युत ऊर्जा\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e \u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eप्रमुख बिंदु\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eबिजली विपरीत रूप से आवेशित बादलों (या आवेशित बादलों और पृथ्वी के बीच) के बीच वातावरण में एक विद्युत निर्वहन है।\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003eआकाश में विद्युत आवेशों द्वारा बिजली उत्पन्न होती है।\u003c/li\u003e\n\t\u003cli\u003eबिजली की एक फ्लैश बहुत सारी विद्युत ऊर्जा वहन करती है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eजब बिजली किसी पेड़ से टकराती है, तो वह पेड़ को जला सकती है और भारी विद्युत ऊर्जा से उसे नुकसान पहुंचा सकती है\u003c/strong\u003e ।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर विद्युत ऊर्जा है। प्रमुख बिंदु बिजली विपरीत रूप से आवेशित बादलों (या आवेशित बादलों और पृथ्वी के बीच) के बीच वातावरण में एक विद्युत निर्वहन है। आकाश में विद्युत आवेशों द्वारा बिजली उत्पन्न होती है। बिजली की एक फ्लैश बहुत सारी विद्युत ऊर्जा वहन करती है। जब बिजली किसी पेड़ से टकराती है, तो वह पेड़ को जला सकती है और भारी विद्युत ऊर्जा से उसे नुकसान पहुंचा सकती है ।","markdown":"## Q34.\n\nतड़ित (बिजली चमकना) से वृक्ष में आग भी लग सकती है, क्योंकि इसमें अत्यधिक मात्रा में होती है\n\n### Options\n\nA. उष्मीय उर्जा\n\nB. विदयुत उर्जा\n\nC. रासायनिक उर्जा\n\nD. नाभिकीय उर्जा\n\n**Correct Answer:** B\n\n### Solution\n\nसही उत्तर **विद्युत ऊर्जा** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png) **प्रमुख बिंदु**\n\n \n* **बिजली विपरीत रूप से आवेशित बादलों (या आवेशित बादलों और पृथ्वी के बीच) के बीच वातावरण में एक विद्युत निर्वहन है।**\n* आकाश में विद्युत आवेशों द्वारा बिजली उत्पन्न होती है।\n* बिजली की एक फ्लैश बहुत सारी विद्युत ऊर्जा वहन करती है।\n* **जब बिजली किसी पेड़ से टकराती है, तो वह पेड़ को जला सकती है और भारी विद्युत ऊर्जा से उसे नुकसान पहुंचा सकती है** ।\n\n---\n"}}},{"index":35,"qNo":"Question No. 35","languages":{"English":{"qNo":35,"language":"English","questionHTML":"The eight-year-old Tajamul Islam of Jammu and Kashmir is associated with which sport?","questionText":"The eight-year-old Tajamul Islam of Jammu and Kashmir is associated with which sport?","options":[{"label":"A","html":"Squash","text":"Squash"},{"label":"B","html":"Kickboxing","text":"Kickboxing"},{"label":"C","html":"Swimming","text":"Swimming"},{"label":"D","html":"\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003eFootball\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","text":"Football"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003eKickboxing\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eTajamul Islam\u003c/strong\u003e of \u003cstrong\u003eJammu Kashmir\u003c/strong\u003e won the world \u003cstrong\u003eKickboxing championship \u003c/strong\u003ein Italy.\u0026nbsp;\u003c/li\u003e\n\t\u003cli\u003eShe was \u003cstrong\u003ethe first-ever Indian who won gold in the Kickboxing championship\u003c/strong\u003e in the\u0026nbsp;\u003cstrong\u003eJunior\u0026n u003e में \u003cstrong\u003eपद्म श्री \u003c/strong\u003eद्वारा सम्मानित किया गया था।\u003c/li\u003e\n\t\u003cli\u003eसचिन तेंदुलकर को\u003cstrong\u003e 2008\u003c/strong\u003e में\u003cstrong\u003e पद्म विभूषण\u003c/strong\u003e से सम्मानित किया गया था।\u003c/li\u003e\n\t\u003cli\u003eसचिन तेंदुलकर\u003cstrong\u003e एकमात्र ऐसे व्यक्ति\u003c/strong\u003e हैं जिन्हें\u003cstrong\u003e 2014\u003c/strong\u003e\u0026nbsp;में \u003cstrong\u003eभारत रत्न\u003c/strong\u003e से सम्मानित किया गया था।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर 1994 है। Additional Information सचिन तेंदुलकर को 1997 में खेल रत्न से सम्मानित किया गया। सचिन तेंदुलकर को 1998 में पद्म श्री द्वारा सम्मानित किया गया था। सचिन तेंदुलकर को 2008 में पद्म विभूषण से सम्मानित किया गया था। सचिन तेंदुलकर एकमात्र ऐसे व्यक्ति हैं जिन्हें 2014 में भारत रत्न से सम्मानित किया गया था।","markdown":"## Q41.\n\nसचिन तेंदुलकर को अर्जुन पुरस्कार किस वर्ष प्रदान किया गया ?\n\n### Options\n\nA. 1990\n\nB. 1994\n\nC. 1997\n\nD. 1999\n\n**Correct Answer:** B\n\n### Solution\n\nसही उत्तर **1994** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* सचिन तेंदुलकर को **1997** में **खेल रत्न** से सम्मानित किया गया।\n* सचिन तेंदुलकर को **1998** में **पद्म श्री**द्वारा सम्मानित किया गया था।\n* सचिन तेंदुलकर को**2008** में**पद्म विभूषण** से सम्मानित किया गया था।\n* सचिन तेंदुलकर**एकमात्र ऐसे व्यक्ति** हैं जिन्हें**2014** में **भारत रत्न** से सम्मानित किया गया था।\n\n---\n"}}},{"index":42,"qNo":"Question No. 42","languages":{"English":{"qNo":42,"language":"English","questionHTML":"\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003eThe commonwealth games were organised first time in\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","questionText":"The commonwealth games were organised first time in","options":[{"label":"A","html":"1922\u0026nbsp;\u0026nbsp;","text":"1922"},{"label":"B","html":"1925\ ](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* The**first Commonwealt**h game organized in **1930**in**Hamilton**.\n* **Commonwealth games**are a **multinational game** event that involves **athletes from the Commonwealth Nations**.\n* The **next commonwealth games** will be organized in**Bermingham, England** in **2022**.\n\n---\n"},"Hindi":{"qNo":42,"language":"Hindi","questionHTML":"राष्ट्रमण्डल खेलों का प्रारंभ किस वर्ष हुआ ?\u0026nbsp;","questionText":"राष्ट्रमण्डल खेलों का प्रारंभ किस वर्ष हुआ ?","options":[{"label":"A","html":"1922\u0026nbsp;\u0026nbsp;","text":"1922"},{"label":"B","html":"1925\u0026nbsp;\u0026nbsp;","text":"1925"},{"label":"C","html":"1927\u0026nbsp;\u0026nbsp;","text":"1927"},{"label":"D","html":"1930\u0026nbsp;\u0026nbsp;","text":"1930"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eसही उत्तर \u003cstrong\u003e\u003cu\u003e1930 है\u003c/u\u003e\u003c/strong\u003e ।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003e1930\u003c/strong\u003e में \u003cstrong\u003eहैमिल्टन\u003c/strong\u003e में \u003cstrong\u003eपहला\u0026nbsp;राष्ट्रमण्डल\u003c/strong\u003e खेल आयोजित\u0026nbsp;हुआ।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eराष्ट्रमण्डल\u003c/strong\u003e\u0026nbsp;\u003cstrong\u003eखेल\u003c/strong\u003e एक \u003cstrong\u003eबहुराष्ट्रीय खेल\u003c/strong\u003e आयोजन है जिसमें \u003cstrong\u003eराष्ट्रमण्डल​ देशों के एथलीट\u003c/strong\u003e शामिल होते हैं।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eअगले राष्ट्रमण्डल\u0026nbsp;खेल\u003c/strong\u003e \u003cstrong\u003e2022\u003c/strong\u003e में \u003cstrong\u003eइंग्लैंड के बर्मिंघम\u003c/strong\u003e में आयोजित किए जाएंगे।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर 1930 है । Additional Information 1930 में हैमिल्टन में पहला राष्ट्रमण्डल खेल आयोजित हुआ। राष्ट्रमण्डल खेल एक बहुराष्ट्रीय खेल आयोजन है जिसमें राष्ट्रमण्डल​ देशों के एथलीट शामिल होते हैं। अगले राष्ट्रमण्डल खेल 2022 में इंग्लैंड के बर्मिंघम में आयोजित किए जाएंगे।","markdown":"## Q42.\n\nराष्ट्रमण्डल खेलों का प्रारंभ किस वर्ष हुआ ?\n\n### Options\n\nA. 1922\n\nB. 1925\n\nC. 1927\n\nD. 1930\n\n**Correct Answer:** D\n\n### Solution\n\nसही उत्तर **1930 है** ।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **1930** में **हैमिल्टन** में **पहला राष्ट्रमण्डल** खेल आयोजित हुआ।\n* **राष्ट्रमण्डल** **खेल** एक **बहुराष्ट्रीय खेल** आयोजन है जिसमें **राष्ट्रमण्डल​ देशों के एथलीट** शामिल होते हैं।\n* **अगले राष्ट्रमण्डल खेल** **2022** में **इंग्लैंड के बर्मिंघम** में आयोजित किए जाएंगे।\n\n---\n"}}},{"index":43,"qNo":"Question No. 43","languages":{"English":{"qNo":43,"language":"English","questionHTML":"Which of the following countries has never been a winner in the T20 Cricket World Cup (men)?","questionText":"Which of the following countries has never been a winner in the T20 Cricket World Cup (men)?","options":[{"label":"A","html":"India","text":"India"},{"label":"B","html":"Australia","text":"Australia"},{"label":"C","html":"England","text":"England"},{"label":"D","html":"\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003ePakistan\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","text":"Pakistan"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cstrong\u003eAustralia\u003c/strong\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eIndia\u003c/strong\u003e won the T-20 world cup(men) in \u003cstrong\u003e2007\u003c/strong\u003e.\u0026nbsp;\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eEngland \u003c/strong\u003ewon the T-20 world cup(men) in\u003cstrong\u003e 2010\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003ePakistan\u003c/strong\u003e won the T-20 world cup(men) in \u003cstrong\u003e2009\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eWest Indies\u003c/strong\u003e won two times (2012,2016) in the \u003cstrong\u003eT-20 world cup(men)\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e","solutionText":"The correct answer is Australia. Additional Information India won the T-20 world cup(men) in 2007. England won the T-20 world cup(men) in 2010. Pakistan won the T-20 world cup(men) in 2009. West Indies won two times (2012,2016) in the T-20 world cup(men).","markdown":"## Q43.\n\nWhich of the following countries has never been a winner in the T20 Cricket World Cup (men)?\n\n### Options\n\nA. India\n\nB. Australia\n\nC. England\n\nD. Pakistan\n\n**Correct Answer:** B\n\n### Solution\n\nThe correct answer is **Australia**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **India** won the T-20 world cup(men) in **2007**.\n* **England**won the T-20 world cup(men) in**2010**.\n* **Pakistan** won the T-20 world cup(men) in **2009**.\n* **West Indies** won two times (2012,2016) in the **T-20 world cup(men)**.\n\n---\n"},"Hindi":{"qNo":43,"language":"Hindi","questionHTML":"निम्नलिखित में से कौन-सा देश टी-20 क्रिकेट विश्व कप (पुरुष) में कभी भी विजेता नहीं रहा है ?\u0026nbsp; \u0026nbsp;","questionText":"निम्नलिखित में से कौन-सा देश टी-20 क्रिकेट विश्व कप (पुरुष) में कभी भी विजेता नहीं रहा है ?","options":[{"label":"A","html":"भारत\u0026nbsp;","text":"भारत"},{"label":"B","html":"ऑस्ट्रेलिया\u0026nbsp;","text":"ऑस्ट्रेलिया"},{"label":"C","html":"इंग्लैंड\u0026nbsp;","text":"इंग्लैंड"},{"label":"D","html":"पाकिस्तान\u0026nbsp;","text":"पाकिस्तान"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eसही उत्तर \u003cu\u003e\u003cstrong\u003eऑस्ट्रेलिया\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eभारत \u003c/strong\u003eने \u003cstrong\u003e2007 \u003c/strong\u003eमें टी -20 विश्व कप (पुरुष) जीता।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eइंग्लैंड\u003c/strong\u003e ने \u003cstrong\u003e2010 \u003c/strong\u003eमें टी -20 विश्व कप (पुरुष) जीता।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eपाकिस्तान\u003c/strong\u003e ने \u003cstrong\u003e2009\u003c/strong\u003e में टी -20 विश्व कप (पुरुष) जीता।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eवेस्टइंडीज\u003c/strong\u003e ने\u003cstrong\u003e टी -20 विश्व कप (पुरुष) \u003c/strong\u003eमें दो बार (2012,2016) जीते।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e","solutionText":"सही उत्तर ऑस्ट्रेलिया है। Additional Information भारत ने 2007 में टी -20 विश्व कप (पुरुष) जीता। इंग्लैंड ने 2010 में टी -20 विश्व कप (पुरुष) जीता। पाकिस्तान ने 2009 में टी -20 विश्व कप (पुरुष) जीता। वेस्टइंडीज ने टी -20 विश्व कप (पुरुष) में दो बार (2012,2016) जीते।","markdown":"## Q43.\n\nनिम्नलिखित में से कौन-सा देश टी-20 क्रिकेट विश्व कप (पुरुष) में कभी भी विजेता नहीं रहा है ?\n\n### Options\n\nA. भारत\n\nB. ऑस्ट्रेलिया\n\nC. इंग्लैंड\n\nD. पाकिस्तान\n\n**Correct Answer:** B\n\n### Solution\n\nसही उत्तर **ऑस्ट्रेलिया** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **भारत**ने **2007**में टी -20 विश्व कप (पुरुष) जीता।\n* **इंग्लैंड** ने **2010**में टी -20 विश्व कप (पुरुष) जीता।\n* **पाकिस्तान** ने **2009** में टी -20 विश्व कप (पुरुष) जीता।\n* **वेस्टइंडीज** ने**टी -20 विश्व कप (पुरुष)**में दो बार (2012,2016) जीते।\n\n---\n"}}},{"index":44,"qNo":"Question No. 44","languages":{"English":{"qNo":44,"language":"English","questionHTML":"\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003eWhich of the following Olympics was \u003cem\u003e\u003cstrong\u003enot\u003c/strong\u003e\u003c/em\u003e held in London?\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","questionText":"Which of the following Olympics was not held in London?","options":[{"label":"A","html":"2012\u0026nbsp;\u0026nbsp;","text":"2012"},{"label":"B","html":"1968\u0026nbsp;\u0026nbsp;","text":"1968"},{"label":"C","html":"1948\u0026nbsp;\u0026nbsp;","text":"1948"},{"label":"D","html":"1908\u0026nbsp;\u0026nbsp;","text":"1908"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cstrong\u003e\u003cu\u003e1968\u003c/u\u003e\u003c/strong\u003e.\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eIn \u003cstrong\u003e1968\u003c/strong\u003e, the Olympics hosted by \u003cstrong\u003eMexico\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eLondon\u003c/strong\u003e hosted the Olympics\u0026nbsp;in \u003cstrong\u003e2012, 1948, and 1908\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eThe \u003cstrong\u003efirst Olympics\u003c/strong\u003e was held in \u003cstrong\u003e1896 in Athens, Greece\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eThe \u003cstrong\u003eTokyo Olympics 2020\u003c/strong\u003e, which will be hosted by \u003cstrong\u003eTokyo, Japan \u003c/strong\u003ewill be started from\u003cstrong\u003e 23 July 2021\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is 1968. In 1968, the Olympics hosted by Mexico. London hosted the Olympics in 2012, 1948, and 1908. The first Olympics was held in 1896 in Athens, Greece. The Tokyo Olympics 2020, which will be hosted by Tokyo, Japan will be started from 23 July 2021.","markdown":"## Q44.\n\nWhich of the following Olympics was _**not**_ held in London?\n\n### Options\n\nA. 2012\n\nB. 1968\n\nC. 1948\n\nD. 1908\n\n**Correct Answer:** B\n\n### Solution\n\nThe correct answer is **1968**.\n\n \n* In **1968**, the Olympics hosted by **Mexico**.\n* **London** hosted the Olympics in **2012, 1948, and 1908**.\n* The **first Olympics** was held in **1896 in Athens, Greece**.\n* The **Tokyo Olympics 2020**, which will be hosted by **Tokyo, Japan**will be started from**23 July 2021**.\n\n---\n"},"Hindi":{"qNo":44,"language":"Hindi","questionHTML":"निम्नलिखित में से किस वर्ष का ओलम्पिक लंदन में नही हुआ था ?","questionText":"निम्नलिखित में से किस वर्ष का ओलम्पिक लंदन में नही हुआ था ?","options":[{"label":"A","html":"2012\u0026nbsp;\u0026nbsp;","text":"2012"},{"label":"B","html":"1968\u0026nbsp;\u0026nbsp;","text":"1968"},{"label":"C","html":"1948\u0026nbsp;\u0026nbsp;","text":"1948"},{"label":"D","html":"1908\u0026nbsp;\u0026nbsp;","text":"1908"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eसही उत्तर \u003cu\u003e\u003cstrong\u003e1968\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003e1968\u003c/strong\u003e में, \u003cstrong\u003eमेक्सिको\u003c/strong\u003e द्वारा ओलंपिक की मेजबानी की गई।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003e2012, 1948 और 1908\u003c/strong\u003e में \u003cstrong\u003eलंदन\u003c/strong\u003e ने ओलंपिक की मेजबानी की।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eपहला ओलंपिक 1896\u003c/strong\u003e में \u003cstrong\u003eग्रीस के एथेंस\u003c/strong\u003e में आयोजित किया गया था।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eजापान के टोक्यो\u003c/strong\u003e द्वारा आयोजित होने वाले\u0026nbsp;\u003cstrong\u003eटोक्यो ओलंपिक 2020 \u003c/strong\u003eकी शुरुआत \u003cstrong\u003e23 जुलाई 2021 \u003c/strong\u003eसे होगी।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर 1968 है। 1968 में, मेक्सिको द्वारा ओलंपिक की मेजबानी की गई। 2012, 1948 और 1908 में लंदन ने ओलंपिक की मेजबानी की। पहला ओलंपिक 1896 में ग्रीस के एथेंस में आयोजित किया गया था। जापान के टोक्यो द्वारा आयोजित होने वाले टोक्यो ओलंपिक 2020 की शुरुआत 23 जुलाई 2021 से होगी।","markdown":"## Q44.\n\nनिम्नलिखित में से किस वर्ष का ओलम्पिक लंदन में नही हुआ था ?\n\n### Options\n\nA. 2012\n\nB. 1968\n\nC. 1948\n\nD. 1908\n\n**Correct Answer:** B\n\n### Solution\n\nसही उत्तर **1968** है।\n\n \n* **1968** में, **मेक्सिको** द्वारा ओलंपिक की मेजबानी की गई।\n* **2012, 1948 और 1908** में **लंदन** ने ओलंपिक की मेजबानी की।\n* **पहला ओलंपिक 1896** में **ग्रीस के एथेंस** में आयोजित किया गया था।\n* **जापान के टोक्यो** द्वारा आयोजित होने वाले **टोक्यो ओलंपिक 2020**की शुरुआत **23 जुलाई 2021**से होगी।\n\n---\n"}}},{"index":45,"qNo":"Question No. 45","languages":{"English":{"qNo":45,"language":"English","questionHTML":"The internet service that provides 'audio' and 'video' conversations is called\u0026nbsp; \u0026nbsp;","questionText":"The internet service that provides 'audio' and 'video' conversations is called","options":[{"label":"A","html":"Chat","text":"Chat"},{"label":"B","html":"E-mail\u0026nbsp;\u0026nbsp;","text":"E-mail"},{"label":"C","html":"Video Conferencing","text":"Video Conferencing"},{"label":"D","html":"Voice Call","text":"Voice Call"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003eVideo Conferencing\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eChat \u003c/strong\u003eis a \u003cstrong\u003elive text-based conversation\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eE-mail\u003c/strong\u003e is a short form of\u003cstrong\u003e Electronic mail\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eE-mail \u003c/strong\u003eallows users to send and receive messages via the use of an \u003cstrong\u003eE-mail Id\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eRay Tomlinson \u003c/strong\u003ewas the founder of \u003cstrong\u003eE-mail\u003c/strong\u003e. It was\u0026nbsp;used\u0026nbsp;first time in \u003cstrong\u003e1971\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Video Conferencing. Additional Information Chat is a live text-based conversation. E-mail is a short form of Electronic mail. E-mail allows users to send and receive messages via the use of an E-mail Id. Ray Tomlinson was the founder of E-mail. It was used first time in 1971.","markdown":"## Q45.\n\nThe internet service that provides 'audio' and 'video' conversations is called\n\n### Options\n\nA. Chat\n\nB. E-mail\n\nC. Video Conferencing\n\nD. Voice Call\n\n**Correct Answer:** C\n\n### Solution\n\nThe correct answer is **Video Conferencing**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **Chat**is a **live text-based conversation**.\n* **E-mail** is a short form of**Electronic mail**.\n* **E-mail**allows users to send and receive messages via the use of an **E-mail Id**.\n* **Ray Tomlinson**was the founder of **E-mail**. It was used first time in **1971**.\n\n---\n"},"Hindi":{"qNo":45,"language":"Hindi","questionHTML":"इन्टरनेट की वह सेवा को, जो 'ऑडियो' एवं 'वीडियो' वार्तालाप प्रदान करती है, कहते हैं\u0026nbsp; \u0026nbsp; \u0026nbsp;","questionText":"इन्टरनेट की वह सेवा को, जो 'ऑडियो' एवं 'वीडियो' वार्तालाप प्रदान करती है, कहते हैं","options":[{"label":"A","html":"चैट\u0026nbsp;","text":"चैट"},{"label":"B","html":"ई-मेल\u0026nbsp;\u0026nbsp;","text":"ई-मेल"},{"label":"C","html":"वीडियो कॉन्फ्रेंसिंग","text":"वीडियो कॉन्फ्रेंसिंग"},{"label":"D","html":"वाय्स कॉल","text":"वाय्स कॉल"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eसही उत्तर \u003cu\u003e\u003cstrong\u003eवीडियो कॉन्फ्रेंसिंग\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eचैट\u003c/strong\u003e एक \u003cstrong\u003eलाइव टेक्स्ट-आधारित बातचीत\u003c/strong\u003e है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eई-मेल इलेक्ट्रॉनिक मेल\u003c/strong\u003e का संक्षिप्त रूप है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eई-मेल\u003c/strong\u003e, उपयोगकर्ताओं को\u003cstrong\u003e ई-मेल आईडी \u003c/strong\u003eके उपयोग के माध्यम से संदेश भेजने और प्राप्त करने की अनुमति देता है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eरे टॉमलिंसन ई-मेल\u003c/strong\u003e के संस्थापक थे। इसका इस्तेमाल पहली बार \u003cstrong\u003e1971\u003c/strong\u003e में किया गया था।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर वीडियो कॉन्फ्रेंसिंग है। Additional Information चैट एक लाइव टेक्स्ट-आधारित बातचीत है। ई-मेल इलेक्ट्रॉनिक मेल का संक्षिप्त रूप है। ई-मेल, उपयोगकर्ताओं को ई-मेल आईडी के उपयोग के माध्यम से संदेश भेजने और प्राप्त करने की अनुमति देता है। रे टॉमलिंसन ई-मेल के संस्थापक थे। इसका इस्तेमाल पहली बार 1971 में किया गया था।","markdown":"## Q45.\n\nइन्टरनेट की वह सेवा को, जो 'ऑडियो' एवं 'वीडियो' वार्तालाप प्रदान करती है, कहते हैं\n\n### Options\n\nA. चैट\n\nB. ई-मेल\n\nC. वीडियो कॉन्फ्रेंसिंग\n\nD. वाय्स कॉल\n\n**Correct Answer:** C\n\n### Solution\n\nसही उत्तर **वीडियो कॉन्फ्रेंसिंग** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **चैट** एक **लाइव टेक्स्ट-आधारित बातचीत** है।\n* **ई-मेल इलेक्ट्रॉनिक मेल** का संक्षिप्त रूप है।\n* **ई-मेल**, उपयोगकर्ताओं को**ई-मेल आईडी**के उपयोग के माध्यम से संदेश भेजने और प्राप्त करने की अनुमति देता है।\n* **रे टॉमलिंसन ई-मेल** के संस्थापक थे। इसका इस्तेमाल पहली बार **1971** में किया गया था।\n\n---\n"}}},{"index":46,"qNo":"Question No. 46","languages":{"English":{"qNo":46,"language":"English","questionHTML":"Which of the following is not a web browser?","questionText":"Which of the following is not a web browser?","options":[{"label":"A","html":"Opera","text":"Opera"},{"label":"B","html":"Google apps","text":"Google apps"},{"label":"C","html":"Vivaldi","text":"Vivaldi"},{"label":"D","html":"Mozilla Firefox","text":"Mozilla Firefox"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003eGoogle apps\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eGoogle Apps is a Web-based and collaborative Software as a Service (SaaS) solution that customizes the proprietary Google platform and brand for businesses of all sizes, including large enterprises.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eOpera, Vivaldi, Mozilla Firefox, Google Chrome, Apple Safari\u003c/strong\u003e\u0026nbsp;are the browsers.\u003c/li\u003e\n\t\u003cli\u003eA web browser is a\u0026nbsp;\u003cstrong\u003esoftware that assists you in searching for information\u003c/strong\u003e\u0026nbsp;on \u003cstrong\u003eWorld Wide Web\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Google apps. Key Points Google Apps is a Web-based and collaborative Software as a Service (SaaS) solution that customizes the proprietary Google platform and brand for businesses of all sizes, including large enterprises. Opera, Vivaldi, Mozilla Firefox, Google Chrome, Apple Safari are the browsers. A web browser is a software that assists you in searching for information on World Wide Web.","markdown":"## Q46.\n\nWhich of the following is not a web browser?\n\n### Options\n\nA. Opera\n\nB. Google apps\n\nC. Vivaldi\n\nD. Mozilla Firefox\n\n**Correct Answer:** B\n\n### Solution\n\nThe correct answer is **Google apps**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* Google Apps is a Web-based and collaborative Software as a Service (SaaS) solution that customizes the proprietary Google platform and brand for businesses of all sizes, including large enterprises.\n* **Opera, Vivaldi, Mozilla Firefox, Google Chrome, Apple Safari** are the browsers.\n* A web browser is a **software that assists you in searching for information** on **World Wide Web**.\n\n---\n"},"Hindi":{"qNo":46,"language":"Hindi","questionHTML":"निम्नलिखित में से कौन-सा वेब ब्राउजर नहीं है ?\u0026nbsp;","questionText":"निम्नलिखित में से कौन-सा वेब ब्राउजर नहीं है ?","options":[{"label":"A","html":"ओपेरा\u0026nbsp;","text":"ओपेरा"},{"label":"B","html":"गूगल ऐप्स\u0026nbsp;\u0026nbsp;","text":"गूगल ऐप्स"},{"label":"C","html":"विवाल्डी\u0026nbsp;","text":"विवाल्डी"},{"label":"D","html":"मोजिला फायरफॉक्स\u0026nbsp;\u0026nbsp;","text":"मोजिला फायरफॉक्स"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eगूगल ऐप्स\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u0026nbsp;\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eगूगल\u0026nbsp;ऐप्स\u0026nbsp;एक सर्विस\u0026nbsp;(\u003cspan style=\"\"\u003eSaaS\u003c/span\u003e) सलूशन\u0026nbsp;के रूप में एक वेब-आधारित और सहयोगी सॉफ़्टवेयर है जो बड़े उद्यमों सहित सभी आकारों के व्यवसायों के लिए स्वामित्व वाले गूगल\u0026nbsp;प्लेटफ़ॉर्म और ब्रांड को अनुकूलित करता है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eओपेरा, विवाल्डी, मोज़िला फ़ायरफ़ॉक्स, गूगल क्रोम, ऐप्पल सफारी\u003c/strong\u003e ब्राउज़र हैं।\u003c/li\u003e\n\t\u003cli\u003eवेब ब्राउज़र एक \u003cstrong\u003eसॉफ्टवेयर है जो वर्ल्ड वाइड वेब\u003c/strong\u003e पर \u003cstrong\u003eजानकारी सर्च करने आपकी सहायता करता है।\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर गूगल ऐप्स है। Key Points गूगल ऐप्स एक सर्विस (SaaS) सलूशन के रूप में एक वेब-आधारित और सहयोगी सॉफ़्टवेयर है जो बड़े उद्यमों सहित सभी आकारों के व्यवसायों के लिए स्वामित्व वाले गूगल प्लेटफ़ॉर्म और ब्रांड को अनुकूलित करता है। ओपेरा, विवाल्डी, मोज़िला फ़ायरफ़ॉक्स, गूगल क्रोम, ऐप्पल सफारी ब्राउज़र हैं। वेब ब्राउज़र एक सॉफ्टवेयर है जो वर्ल्ड वाइड वेब पर जानकारी सर्च करने आपकी सहायता करता है।","markdown":"## Q46.\n\nनिम्नलिखित में से कौन-सा वेब ब्राउजर नहीं है ?\n\n### Options\n\nA. ओपेरा\n\nB. गूगल ऐप्स\n\nC. विवाल्डी\n\nD. मोजिला फायरफॉक्स\n\n**Correct Answer:** B\n\n### Solution\n\nसही उत्तर **गूगल ऐप्स** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* गूगल ऐप्स एक सर्विस (SaaS) सलूशन के रूप में एक वेब-आधारित और सहयोगी सॉफ़्टवेयर है जो बड़े उद्यमों सहित सभी आकारों के व्यवसायों के लिए स्वामित्व वाले गूगल प्लेटफ़ॉर्म और ब्रांड को अनुकूलित करता है।\n* **ओपेरा, विवाल्डी, मोज़िला फ़ायरफ़ॉक्स, गूगल क्रोम, ऐप्पल सफारी** ब्राउज़र हैं।\n* वेब ब्राउज़र एक **सॉफ्टवेयर है जो वर्ल्ड वाइड वेब** पर **जानकारी सर्च करने आपकी सहायता करता है।**\n\n---\n"}}},{"index":47,"qNo":"Question No. 47","languages":{"English":{"qNo":47,"language":"English","questionHTML":"Who is known by the name of crackers in the context of computer security?","questionText":"Who is known by the name of crackers in the context of computer security?","options":[{"label":"A","html":"Black Hat Hackers","text":"Black Hat Hackers"},{"label":"B","html":"White Hat Hackers","text":"White Hat Hackers"},{"label":"C","html":"Elite Hackers","text":"Elite Hackers"},{"label":"D","html":"Script Kiddie","text":"Script Kiddie"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003eBlack Hat Hackers\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eA\u003cstrong\u003e Black Hat Hacker or Cracker \u003c/strong\u003eis a \u003cstrong\u003ehacker who attempts to access a computer without authorization for malicious purpose\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eA \u003cstrong\u003eWhite Hat Hacker or Hacker \u003c/strong\u003eis a person who used his \u003cstrong\u003eskill to find loopholes and \u003cspan style=\"color: rgb(51, 53, 70);  \"\u003evulnerabilities\u003c/span\u003e of a system and patch those \u003cspan style=\"color: rgb(51, 53, 70);  \"\u003evulnerabilities\u003c/span\u003e and enhance robustness and security\u003c/strong\u003e.\u0026nbsp;\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eElite hackers \u003c/strong\u003eare called to the \u003cstrong\u003emost skilled hackers\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eScript kiddies\u003c/strong\u003e are \u003cstrong\u003eunskilled persons\u003c/strong\u003e who\u003cstrong\u003e uses other's programs, scripts to attack any system or computer network\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Black Hat Hackers. Additional Information A Black Hat Hacker or Cracker is a hacker who attempts to access a computer without authorization for malicious purpose. A White Hat Hacker or Hacker is a person who used his skill to find loopholes and vulnerabilities of a system and patch those vulnerabilities and enhance robustness and security. Elite hackers are called to the most skilled hackers. Script kiddies are unskilled persons who uses other's programs, scripts to attack any system or computer network.","markdown":"## Q47.\n\nWho is known by the name of crackers in the context of computer security?\n\n### Options\n\nA. Black Hat Hackers\n\nB. White Hat Hackers\n\nC. Elite Hackers\n\nD. Script Kiddie\n\n**Correct Answer:** A\n\n### Solution\n\nThe correct answer is **Black Hat Hackers**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* A**Black Hat Hacker or Cracker**is a **hacker who attempts to access a computer without authorization for malicious purpose**.\n* A **White Hat Hacker or Hacker**is a person who used his **skill to find loopholes and vulnerabilities of a system and patch those vulnerabilities and enhance robustness and security**.\n* **Elite hackers**are called to the **most skilled hackers**.\n* **Script kiddies** are **unskilled persons** who**uses other's programs, scripts to attack any system or computer network**.\n\n---\n"},"Hindi":{"qNo":47,"language":"Hindi","questionHTML":"कंप्यूटर सुरक्षा के संदर्भ में क्रैकर्स किस नाम से जाने जाते है ?","questionText":"कंप्यूटर सुरक्षा के संदर्भ में क्रैकर्स किस नाम से जाने जाते है ?","options":[{"label":"A","html":"ब्लैक हैट हैकर्स\u0026nbsp;","text":"ब्लैक हैट हैकर्स"},{"label":"B","html":"व्हाइट हैट हैकर्स\u0026nbsp;\u0026nbsp;","text":"व्हाइट हैट हैकर्स"},{"label":"C","html":"एलीट हैकर्स\u0026nbsp;","text":"एलीट हैकर्स"},{"label":"D","html":"स्क्रिप्ट किड्डी\u0026nbsp;","text":"स्क्रिप्ट किड्डी"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eब्लैक हैट हैकर्स\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eएक ब्लैक हैट हैकर या क्रैकर\u003c/strong\u003e एक \u003cstrong\u003eहैकर \u003c/strong\u003eहै \u003cstrong\u003eजो दुर्भावनापूर्ण उद्देश्य से बिना किसी अधिकार के किसी कंप्यूटर तक पहुँचने का प्रयास करता है।\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eव्हाइट हैट हैकर या हैकर \u003c/strong\u003eएक ऐसा व्यक्ति है जो\u0026nbsp;\u003cstrong\u003eअपने कौशल का उपयोग सिस्टम की खामियों और कमजोरियों को खोजने और उन कमजोरियों को पैच करने और मजबूती और सुरक्षा को बढ़ाने \u003c/strong\u003eके लिए करता है।\u0026nbsp;\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eएलीट हैकरों\u0026nbsp;\u003c/strong\u003eको \u003cstrong\u003eसबसे कुशल हैकर \u003c/strong\u003eकहा जाता है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eस्क्रिप्ट किडीस\u003c/strong\u003e \u003cstrong\u003eअकुशल व्यक्ति\u003c/strong\u003e होते हैं जो \u003cstrong\u003eकिसी भी सिस्टम या कंप्यूटर नेटवर्क पर हमला करने के लिए अन्य प्रोग्रामों, स्क्रिप्टों का उपयोग करते हैं।\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर ब्लैक हैट हैकर्स है। Additional Information एक ब्लैक हैट हैकर या क्रैकर एक हैकर है जो दुर्भावनापूर्ण उद्देश्य से बिना किसी अधिकार के किसी कंप्यूटर तक पहुँचने का प्रयास करता है। व्हाइट हैट हैकर या हैकर एक ऐसा व्यक्ति है जो अपने कौशल का उपयोग सिस्टम की खामियों और कमजोरियों को खोजने और उन कमजोरियों को पैच करने और मजबूती और सुरक्षा को बढ़ाने के लिए करता है। एलीट हैकरों को सबसे कुशल हैकर कहा जाता है। स्क्रिप्ट किडीस अकुशल व्यक्ति होते हैं जो किसी भी सिस्टम या कंप्यूटर नेटवर्क पर हमला करने के लिए अन्य प्रोग्रामों, स्क्रिप्टों का उपयोग करते हैं।","markdown":"## Q47.\n\nकंप्यूटर सुरक्षा के संदर्भ में क्रैकर्स किस नाम से जाने जाते है ?\n\n### Options\n\nA. ब्लैक हैट हैकर्स\n\nB. व्हाइट हैट हैकर्स\n\nC. एलीट हैकर्स\n\nD. स्क्रिप्ट किड्डी\n\n**Correct Answer:** A\n\n### Solution\n\nसही उत्तर **ब्लैक हैट हैकर्स** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **एक ब्लैक हैट हैकर या क्रैकर** एक **हैकर**है **जो दुर्भावनापूर्ण उद्देश्य से बिना किसी अधिकार के किसी कंप्यूटर तक पहुँचने का प्रयास करता है।**\n* **व्हाइट हैट हैकर या हैकर**एक ऐसा व्यक्ति है जो **अपने कौशल का उपयोग सिस्टम की खामियों और कमजोरियों को खोजने और उन कमजोरियों को पैच करने और मजबूती और सुरक्षा को बढ़ाने**के लिए करता है।\n* **एलीट हैकरों**को **सबसे कुशल हैकर**कहा जाता है।\n* **स्क्रिप्ट किडीस** **अकुशल व्यक्ति** होते हैं जो **किसी भी सिस्टम या कंप्यूटर नेटवर्क पर हमला करने के लिए अन्य प्रोग्रामों, स्क्रिप्टों का उपयोग करते हैं।**\n\n---\n"}}},{"index":48,"qNo":"Question No. 48","languages":{"English":{"qNo":48,"language":"English","questionHTML":"DuckDuckGo is a","questionText":"DuckDuckGo is a","options":[{"label":"A","html":"Search Engine","text":"Search Engine"},{"label":"B","html":"Web Browser","text":"Web Browser"},{"label":"C","html":"Virus","text":"Virus"},{"label":"D","html":"News website","text":"News website"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cstrong\u003eSearch Engine\u003c/strong\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eDuckduckgo\u003c/strong\u003e is an\u003cstrong\u003e internet search engine \u003c/strong\u003ethat was\u0026nbsp;\u003cstrong\u003edeveloped with the\u0026nbsp; aim of protecting searchers privacy\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eA \u003cstrong\u003esearch engine\u003c/strong\u003e is a \u003cstrong\u003ewebsite\u003c/strong\u003e through which \u003cstrong\u003eusers can search internet contents\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Search Engine. Additional Information Duckduckgo is an internet search engine that was developed with the aim of protecting searchers privacy. A search engine is a website through which users can search internet contents.","markdown":"## Q48.\n\nDuckDuckGo is a\n\n### Options\n\nA. Search Engine\n\nB. Web Browser\n\nC. Virus\n\nD. News website\n\n**Correct Answer:** A\n\n### Solution\n\nThe correct answer is **Search Engine**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **Duckduckgo** is an**internet search engine**that was **developed with the aim of protecting searchers privacy**.\n* A **search engine** is a **website** through which **users can search internet contents**.\n\n---\n"},"Hindi":{"qNo":48,"language":"Hindi","questionHTML":"डकडकगो (DuckDuckGo) एक:\u0026nbsp; \u0026nbsp; \u0026nbsp;","questionText":"डकडकगो (DuckDuckGo) एक:","options":[{"label":"A","html":"सर्च इंजन\u0026nbsp;","text":"सर्च इंजन"},{"label":"B","html":"वेब ब्राउजर\u0026nbsp;","text":"वेब ब्राउजर"},{"label":"C","html":"वाइरस\u0026nbsp; \u0026nbsp;","text":"वाइरस"},{"label":"D","html":"न्यूज वेबसाईट\u0026nbsp;\u0026nbsp;","text":"न्यूज वेबसाईट"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eसर्च इंजन\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eडकडकगो\u003c/strong\u003e एक\u003cstrong\u003e इंटरनेट सर्च इंजन\u003c/strong\u003e है जो \u003cstrong\u003eखोजकर्ताओं की गोपनीयता की रक्षा करने के उद्देश्य से विकसित हुआ है।\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eसर्च इंजन\u003c/strong\u003e एक \u003cstrong\u003eवेबसाइट\u003c/strong\u003e है जिसके माध्यम से\u003cstrong\u003e उपयोगकर्ता इंटरनेट सामग्री खोज सकते हैं।\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर सर्च इंजन है। Additional Information डकडकगो एक इंटरनेट सर्च इंजन है जो खोजकर्ताओं की गोपनीयता की रक्षा करने के उद्देश्य से विकसित हुआ है। सर्च इंजन एक वेबसाइट है जिसके माध्यम से उपयोगकर्ता इंटरनेट सामग्री खोज सकते हैं।","markdown":"## Q48.\n\nडकडकगो (DuckDuckGo) एक:\n\n### Options\n\nA. सर्च इंजन\n\nB. वेब ब्राउजर\n\nC. वाइरस\n\nD. न्यूज वेबसाईट\n\n**Correct Answer:** A\n\n### Solution\n\nसही उत्तर **सर्च इंजन** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **डकडकगो** एक**इंटरनेट सर्च इंजन** है जो **खोजकर्ताओं की गोपनीयता की रक्षा करने के उद्देश्य से विकसित हुआ है।**\n* **सर्च इंजन** एक **वेबसाइट** है जिसके माध्यम से**उपयोगकर्ता इंटरनेट सामग्री खोज सकते हैं।**\n\n---\n"}}},{"index":49,"qNo":"Question No. 49","languages":{"English":{"qNo":49,"language":"English","questionHTML":"Ethernet is an example of","questionText":"Ethernet is an example of","options":[{"label":"A","html":"MAN","text":"MAN"},{"label":"B","html":"LAN\u0026nbsp;\u0026nbsp;","text":"LAN"},{"label":"C","html":"WAN\u0026nbsp;","text":"WAN"},{"label":"D","html":"Wi-Fi\u0026nbsp;\u0026nbsp;","text":"Wi-Fi"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003eLAN\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eLAN\u003c/strong\u003e stands for \u003cstrong\u003eLocal area Network\u003c/strong\u003e is a \u003cstrong\u003edata communication network connecting various terminals or computers within a limited geographical area or building\u003c/strong\u003e.\u0026nbsp;\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eEthernet\u003c/strong\u003e is a \u003cstrong\u003eLAN technology\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eEthernet\u003c/strong\u003e is very popular because it is \u003cstrong\u003eeasy to understand, implement, maintain\u0026nbsp;and of low cost\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eMAN\u003c/strong\u003e stands for \u003cstrong\u003eMetropolitan Area network\u003c/strong\u003e is used to\u003cstrong\u003e \u003c/strong\u003econnect computer resources \u003cstrong\u003ein a geographical area such as a Metropolitan area\u003c/strong\u003e.\u0026nbsp;\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eWAN\u003c/strong\u003e stands for\u003cstrong\u003e Wide area network\u003c/strong\u003e is used to connect the \u003cstrong\u003ecomputers of a very large geographical area\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eWi-Fi\u003c/strong\u003e is a \u003cstrong\u003ewireless network protocol \u003c/strong\u003eof \u003cstrong\u003eLocal Area Network technology\u003c/strong\u003e. The data transmission between the\u003cstrong\u003e client device and access point routers\u0026nbsp;using radio waves\u003c/strong\u003e. A \u003cstrong\u003erouter connects the other devices of a LAN network\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is LAN. Key Points LAN stands for Local area Network is a data communication network connecting various terminals or computers within a limited geographical area or building. Ethernet is a LAN technology. Ethernet is very popular because it is easy to understand, implement, maintain and of low cost. Additional Information MAN stands for Metropolitan Area network is used to connect computer resources in a geographical area such as a Metropolitan area. WAN stands for Wide area network is used to connect the computers of a very large geographical area. Wi-Fi is a wireless network protocol of Local Area Network technology. The data transmission between the client device and access point routers using radio waves. A router connects the other devices of a LAN network.","markdown":"## Q49.\n\nEthernet is an example of\n\n### Options\n\nA. MAN\n\nB. LAN\n\nC. WAN\n\nD. Wi-Fi\n\n**Correct Answer:** B\n\n### Solution\n\nThe correct answer is **LAN**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **LAN** stands for **Local area Network** is a **data communication network connecting various terminals or computers within a limited geographical area or building**.\n* **Ethernet** is a **LAN technology**.\n* **Ethernet** is very popular because it is **easy to understand, implement, maintain and of low cost**.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **MAN** stands for **Metropolitan Area network** is used toconnect computer resources **in a geographical area such as a Metropolitan area**.\n* **WAN** stands for**Wide area network** is used to connect the **computers of a very large geographical area**.\n* **Wi-Fi** is a **wireless network protocol**of **Local Area Network technology**. The data transmission between the**client device and access point routers using radio waves**. A **router connects the other devices of a LAN network**.\n\n---\n"},"Hindi":{"qNo":49,"language":"Hindi","questionHTML":"ईथरनेट (Ethernet) किसका एक उदहारण है?","questionText":"ईथरनेट (Ethernet) किसका एक उदहारण है?","options":[{"label":"A","html":"MAN","text":"MAN"},{"label":"B","html":"LAN\u0026nbsp;\u0026nbsp;","text":"LAN"},{"label":"C","html":"WAN\u0026nbsp;","text":"WAN"},{"label":"D","html":"Wi-Fi\u0026nbsp;\u0026nbsp;","text":"Wi-Fi"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eसही उत्तर \u003cspan style=\"color: rgb(37, 37, 37);\"\u003e\u003cu\u003e\u003cstrong\u003eलैन\u003c/strong\u003e\u003c/u\u003e \u003c/span\u003e\u003cu\u003e\u003cstrong\u003e(LAN)\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003e\u003cspan style=\"color: rgb(37, 37, 37);\"\u003eलैन \u003c/span\u003e(LAN) \u003c/strong\u003eका अर्थ \u003cstrong\u003eलोकल एरिया नेटवर्क\u003c/strong\u003e है, यह एक \u003cstrong\u003eडाटा संचार नेटवर्क है जो एक सीमित भौगोलिक क्षेत्र या भवन के भीतर विभिन्न टर्मिनलों या कंप्यूटरों को जोड़ता है।\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eईथरनेट\u003c/strong\u003e एक \u003cstrong\u003e\u003cspan style=\"color: rgb(37, 37, 37);\"\u003eलैन \u003c/span\u003e\u003c/strong\u003e\u003cstrong\u003eतकनीक\u003c/strong\u003e है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eईथरनेट \u003c/strong\u003eबहुत लोकप्रिय है क्योंकि यह \u003cstrong\u003eसमझने, लागू करने, अनुरक्षित रखने में आसान और कम लागत वाला होता है।\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eमैन\u003c/strong\u003e\u003cstrong\u003e (MAN)​ \u003c/strong\u003eका अर्थ \u003cstrong\u003eमेट्रोपॉलिटन एरीया नेटवर्क \u003c/strong\u003eहै, इसका उपयोग\u003cstrong\u003e किसी भौगोलिक क्षेत्र जैसे कि मेट्रोपॉलिटन क्षेत्र \u003c/strong\u003eमें कंप्यूटर संसाधनों को जोड़ने के लिए किया जाता है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eवैन (WAN)​ \u003c/strong\u003eका अर्थ \u003cstrong\u003eवाइड एरिया नेटवर्क \u003c/strong\u003eहै जिसका उपयोग\u003cstrong\u003e बहुत बड़े भौगोलिक क्षेत्र के कंप्यूटरों\u003c/strong\u003e को जोड़ने के लिए किया जाता है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eवाई-फाई\u003c/strong\u003e \u003cstrong\u003eलोकल एरिया नेटवर्क\u003c/strong\u003e तकनीक का एक \u003cstrong\u003eवायरलेस नेटवर्क प्रोटोकॉल \u003c/strong\u003eहै। \u003cstrong\u003eरेडियो तरंगों का उपयोग करके क्लाइंट डिवाइस और एक्सेस पॉइंट राउटर \u003c/strong\u003eके बीच डाटा ट्रांसमिशन होता है। \u003cstrong\u003eएक राउटर \u003cspan style=\"color: rgb(37, 37, 37);\"\u003eलैन \u003c/span\u003e\u003c/strong\u003e\u003cstrong\u003e(LAN) नेटवर्क के अन्य उपकरणों को जोड़ता है।\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर लैन (LAN) है। Key Points लैन (LAN) का अर्थ लोकल एरिया नेटवर्क है, यह एक डाटा संचार नेटवर्क है जो एक सीमित भौगोलिक क्षेत्र या भवन के भीतर विभिन्न टर्मिनलों या कंप्यूटरों को जोड़ता है। ईथरनेट एक लैन तकनीक है। ईथरनेट बहुत लोकप्रिय है क्योंकि यह समझने, लागू करने, अनुरक्षित रखने में आसान और कम लागत वाला होता है। Additional Information मैन (MAN)​ का अर्थ मेट्रोपॉलिटन एरीया नेटवर्क है, इसका उपयोग किसी भौगोलिक क्षेत्र जैसे कि मेट्रोपॉलिटन क्षेत्र में कंप्यूटर संसाधनों को जोड़ने के लिए किया जाता है। वैन (WAN)​ का अर्थ वाइड एरिया नेटवर्क है जिसका उपयोग बहुत बड़े भौगोलिक क्षेत्र के कंप्यूटरों को जोड़ने के लिए किया जाता है। वाई-फाई लोकल एरिया नेटवर्क तकनीक का एक वायरलेस नेटवर्क प्रोटोकॉल है। रेडियो तरंगों का उपयोग करके क्लाइंट डिवाइस और एक्सेस पॉइंट राउटर के बीच डाटा ट्रांसमिशन होता है। एक राउटर लैन (LAN) नेटवर्क के अन्य उपकरणों को जोड़ता है।","markdown":"## Q49.\n\nईथरनेट (Ethernet) किसका एक उदहारण है?\n\n### Options\n\nA. MAN\n\nB. LAN\n\nC. WAN\n\nD. Wi-Fi\n\n**Correct Answer:** B\n\n### Solution\n\nसही उत्तर **लैन** **(LAN)** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **लैन (LAN)**का अर्थ **लोकल एरिया नेटवर्क** है, यह एक **डाटा संचार नेटवर्क है जो एक सीमित भौगोलिक क्षेत्र या भवन के भीतर विभिन्न टर्मिनलों या कंप्यूटरों को जोड़ता है।**\n* **ईथरनेट** एक **लैन****तकनीक** है।\n* **ईथरनेट**बहुत लोकप्रिय है क्योंकि यह **समझने, लागू करने, अनुरक्षित रखने में आसान और कम लागत वाला होता है।**\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **मैन****(MAN)​**का अर्थ **मेट्रोपॉलिटन एरीया नेटवर्क**है, इसका उपयोग**किसी भौगोलिक क्षेत्र जैसे कि मेट्रोपॉलिटन क्षेत्र**में कंप्यूटर संसाधनों को जोड़ने के लिए किया जाता है।\n* **वैन (WAN)​**का अर्थ **वाइड एरिया नेटवर्क**है जिसका उपयोग**बहुत बड़े भौगोलिक क्षेत्र के कंप्यूटरों** को जोड़ने के लिए किया जाता है।\n* **वाई-फाई** **लोकल एरिया नेटवर्क** तकनीक का एक **वायरलेस नेटवर्क प्रोटोकॉल**है। **रेडियो तरंगों का उपयोग करके क्लाइंट डिवाइस और एक्सेस पॉइंट राउटर**के बीच डाटा ट्रांसमिशन होता है। **एक राउटर लैन****(LAN) नेटवर्क के अन्य उपकरणों को जोड़ता है।**\n\n---\n"}}},{"index":50,"qNo":"Question No. 50","languages":{"English":{"qNo":50,"language":"English","questionHTML":"Modem conve

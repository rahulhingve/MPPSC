to access, connect internet. Modem takes analog signal from a telephone lines are cable wire and converts it in the form of digital form (0s and 1s) and vice-versa.","markdown":"## Q50.\n\nModem converts\n\n### Options\n\nA. Analog signals to digital signals\n\nB. Digital signals to analog signals\n\nC. Both (A) and (B)\n\nD. None of these\n\n**Correct Answer:** C\n\n### Solution\n\nThe correct answer is **Both (A) and (B)** .\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* Full name of Modem is **Modulator-Demodulator**.\n* **Modem**converts **analog signals into digital and vice-versa**.\n* **Modem**allows a **computer, router or switch to connect to access, connect internet**.\n* **Modem** takes **analog signal from a telephone lines are cable wire and converts it in the form of digital form (0s and 1s) and vice-versa**.\n\n---\n"},"Hindi":{"qNo":50,"language":"Hindi","questionHTML":"मॉडेम (Modem) परिवर्तित करता है\u0026nbsp;\u0026nbsp;","questionText":"मॉडेम (Modem) परिवर्तित करता है","options":[{"label":"A","html":"ऐनालॉग सिग्नलों को डिजिटल सिग्नलों में\u0026nbsp;\u0026nbsp;","text":"ऐनालॉग सिग्नलों को डिजिटल सिग्नलों में"},{"label":"B","html":"डिजिटल सिग्नलों को ऐनालॉग सिग्नलों में\u0026nbsp; \u0026nbsp;","text":"डिजिटल सिग्नलों को ऐनालॉग सिग्नलों में"},{"label":"C","html":"दोनों (A) तथा (B)\u0026nbsp;\u0026nbsp;","text":"दोनों (A) तथा (B)"},{"label":"D","html":"उपर्युक्त में से कोई नहीं\u0026nbsp;","text":"उपर्युक्त में से कोई नहीं"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eदोनों (A) तथा (B)\u003c/strong\u003e\u003c/u\u003e\u0026nbsp;है।\u0026nbsp;\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eमोडेम का पूरा नाम \u003cstrong\u003eमॉड्यूलेटर-डेमोडुलेटर\u003c/strong\u003e है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eमॉडेम एनालॉग संकेतों को डिजिटल\u003c/strong\u003e में परिवर्तित करता है\u0026nbsp;\u003cstrong\u003eऔर इसके विपरीत\u003c/strong\u003e।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eमॉडेम\u003c/strong\u003e एक\u003cstrong\u003e कंप्यूटर, राउटर या स्विच को, इंटरनेट एक्सेस करने और कनेक्ट करने की अनुमति देता है।\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eमॉडेम\u003c/strong\u003e एक \u003cstrong\u003eटेलीफोन लाइनों, जो केबल तार होते हैं, से एनालॉग सिग्नल लेता है और इसे डिजिटल रूप (0s और 1s) के रूप में में परिवर्तित करता है और इसके विपरीत।\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर दोनों (A) तथा (B) है। Additional Information मोडेम का पूरा नाम मॉड्यूलेटर-डेमोडुलेटर है। मॉडेम एनालॉग संकेतों को डिजिटल में परिवर्तित करता है और इसके विपरीत। मॉडेम एक कंप्यूटर, राउटर या स्विच को, इंटरनेट एक्सेस करने और कनेक्ट करने की अनुमति देता है। मॉडेम एक टेलीफोन लाइनों, जो केबल तार होते हैं, से एनालॉग सिग्नल लेता है और इसे डिजिटल रूप (0s और 1s) के रूप में में परिवर्तित करता है और इसके विपरीत।","markdown":"## Q50.\n\nमॉडेम (Modem) परिवर्तित करता है\n\n### Options\n\nA. ऐनालॉग सिग्नलों को डिजिटल सिग्नलों में\n\nB. डिजिटल सिग्नलों को ऐनालॉग सिग्नलों में\n\nC. दोनों (A) तथा (B)\n\nD. उपर्युक्त में से कोई नहीं\n\n**Correct Answer:** C\n\n### Solution\n\nसही उत्तर **दोनों (A) तथा (B)** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* मोडेम का पूरा नाम **मॉड्यूलेटर-डेमोडुलेटर** है।\n* **मॉडेम एनालॉग संकेतों को डिजिटल** में परिवर्तित करता है **और इसके विपरीत**।\n* **मॉडेम** एक**कंप्यूटर, राउटर या स्विच को, इंटरनेट एक्सेस करने और कनेक्ट करने की अनुमति देता है।**\n* **मॉडेम** एक **टेलीफोन लाइनों, जो केबल तार होते हैं, से एनालॉग सिग्नल लेता है और इसे डिजिटल रूप (0s और 1s) के रूप में में परिवर्तित करता है और इसके विपरीत।**\n\n---\n"}}},{"index":51,"qNo":"Question No. 51","languages":{"English":{"qNo":51,"language":"English","questionHTML":"Which of the following Acts introduced the 'Principle of Constitutional Autocracy'?","questionText":"Which of the following Acts introduced the 'Principle of Constitutional Autocracy'?","options":[{"label":"A","html":"Indian Council Act of 1909","text":"Indian Council Act of 1909"},{"label":"B","html":"Government of India Act of 1919","text":"Government of India Act of 1919"},{"label":"C","html":"Government of India Act of 1935","text":"Government of India Act of 1935"},{"label":"D","html":"Indian Independence Act of 1947","text":"Indian Independence Act of 1947"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cu\u003e\u003cstrong\u003eGovernment of India Act of 1935\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eThe principle of constitutional autocracy was introduced by the Government of India Act, 1935\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eIt vested the executive authority of \u003cstrong\u003eprovinces\u003c/strong\u003e in the \u003cstrong\u003eGovernors\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eSimilarly,\u0026nbsp;of the \u003cstrong\u003ecenter\u003c/strong\u003e, in the \u003cstrong\u003eGovernor-General\u003c/strong\u003e on the behalf of the British\u0026nbsp;Crown.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u0026nbsp;\u0026nbsp;\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eSalient Features of the \u003cstrong\u003eGovernment of India Act 1935\u003c/strong\u003e were as follows:\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eAbolition of provincial dyarchy.\u003c/li\u003e\n\t\t\u003cli\u003eIntroduction of dyarchy at the center.\u003c/li\u003e\n\t\t\u003cli\u003eAbolition of Indian Council and introduction of an advisory body in its place.\u003c/li\u003e\n\t\t\u003cli\u003eProvision for an All India Federation with British India territories and princely states.\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Government of India Act of 1935. Key Points The principle of constitutional autocracy was introduced by the Government of India Act, 1935. It vested the executive authority of provinces in the Governors. Similarly, of the center, in the Governor-General on the behalf of the British Crown. Important Points Salient Features of the Government of India Act 1935 were as follows: Abolition of provincial dyarchy. Introduction of dyarchy at the center. Abolition of Indian Council and introduction of an advisory body in its place. Provision for an All India Federation with British India territories and princely states.","markdown":"## Q51.\n\nWhich of the following Acts introduced the 'Principle of Constitutional Autocracy'?\n\n### Options\n\nA. Indian Council Act of 1909\n\nB. Government of India Act of 1919\n\nC. Government of India Act of 1935\n\nD. Indian Independence Act of 1947\n\n**Correct Answer:** C\n\n### Solution\n\nThe correct answer is **Government of India Act of 1935**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **The principle of constitutional autocracy was introduced by the Government of India Act, 1935**.\n* It vested the executive authority of **provinces** in the **Governors**.\n* Similarly, of the **center**, in the **Governor-General** on the behalf of the British Crown.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* Salient Features of the **Government of India Act 1935** were as follows: \n* Abolition of provincial dyarchy.\n* Introduction of dyarchy at the center.\n* Abolition of Indian Council and introduction of an advisory body in its place.\n* Provision for an All India Federation with British India territories and princely states.\n\n---\n"},"Hindi":{"qNo":51,"language":"Hindi","questionHTML":"निम्नलिखित में से किस अधिनियम द्वारा 'संवैधानिक निरंकुशता का सिद्धान्त' प्रस्तुत किया गया?","questionText":"निम्नलिखित में से किस अधिनियम द्वारा 'संवैधानिक निरंकुशता का सिद्धान्त' प्रस्तुत किया गया?","options":[{"label":"A","html":"1909 का भारतीय काउन्सिल अधिनियम","text":"1909 का भारतीय काउन्सिल अधिनियम"},{"label":"B","html":"1919 का भारत सरकार अधिनियम","text":"1919 का भारत सरकार अधिनियम"},{"label":"C","html":"1935 का भारत सरकार अधिनियम","text":"1935 का भारत सरकार अधिनियम"},{"label":"D","html":"1947 का भारतीय स्वतंत्रता अधिनियम","text":"1947 का भारतीय स्वतंत्रता अधिनियम"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003e1935 का भारत सरकार अधिनियम\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eसंवैधानिक निरंकुशता का सिद्धांत भारत सरकार अधिनियम, 1935 द्वारा पेश किया गया था।\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003eइसने\u003cstrong\u003e राज्यपालों\u003c/strong\u003e में\u0026nbsp;\u003cstrong\u003eप्रांतों\u003c/strong\u003e के\u0026nbsp;कार्यकारी अधिकार को निहित किया।\u003c/li\u003e\n\t\u003cli\u003eइसी तरह, ब्रिटिश क्राउन की ओर से\u003cstrong\u003e केंद्र \u003c/strong\u003eकी शक्तियां \u003cstrong\u003eगवर्नर-जनरल\u003c/strong\u003e में निहित होती हैं।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u0026nbsp;\u0026nbsp;\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eभारत सरकार अधिनियम 1935\u003c/strong\u003e की मुख्य विशेषताएं इस प्रकार थीं:\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eप्रांतीय द्विशासन का उन्मूलन।\u003c/li\u003e\n\t\t\u003cli\u003eकेंद्र में द्विशासन की शुरुआत।\u003c/li\u003e\n\t\t\u003cli\u003eभारतीय परिषद का उन्मूलन और उसके स्थान पर एक सलाहकार निकाय का गठन।\u003c/li\u003e\n\t\t\u003cli\u003eब्रिटिश भारत के प्रदेशों और रियासतों के साथ एक अखिल भारतीय महासंघ का प्रावधान।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर 1935 का भारत सरकार अधिनियम है। Key Points संवैधानिक निरंकुशता का सिद्धांत भारत सरकार अधिनियम, 1935 द्वारा पेश किया गया था। इसने राज्यपालों में प्रांतों के कार्यकारी अधिकार को निहित किया। इसी तरह, ब्रिटिश क्राउन की ओर से केंद्र की शक्तियां गवर्नर-जनरल में निहित होती हैं। Important Points भारत सरकार अधिनियम 1935 की मुख्य विशेषताएं इस प्रकार थीं: प्रांतीय द्विशासन का उन्मूलन। केंद्र में द्विशासन की शुरुआत। भारतीय परिषद का उन्मूलन और उसके स्थान पर एक सलाहकार निकाय का गठन। ब्रिटिश भारत के प्रदेशों और रियासतों के साथ एक अखिल भारतीय महासंघ का प्रावधान।","markdown":"## Q51.\n\nनिम्नलिखित में से किस अधिनियम द्वारा 'संवैधानिक निरंकुशता का सिद्धान्त' प्रस्तुत किया गया?\n\n### Options\n\nA. 1909 का भारतीय काउन्सिल अधिनियम\n\nB. 1919 का भारत सरकार अधिनियम\n\nC. 1935 का भारत सरकार अधिनियम\n\nD. 1947 का भारतीय स्वतंत्रता अधिनियम\n\n**Correct Answer:** C\n\n### Solution\n\nसही उत्तर **1935 का भारत सरकार अधिनियम** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **संवैधानिक निरंकुशता का सिद्धांत भारत सरकार अधिनियम, 1935 द्वारा पेश किया गया था।**\n* इसने**राज्यपालों** में **प्रांतों** के कार्यकारी अधिकार को निहित किया।\n* इसी तरह, ब्रिटिश क्राउन की ओर से**केंद्र**की शक्तियां **गवर्नर-जनरल** में निहित होती हैं।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* **भारत सरकार अधिनियम 1935** की मुख्य विशेषताएं इस प्रकार थीं: \n* प्रांतीय द्विशासन का उन्मूलन।\n* केंद्र में द्विशासन की शुरुआत।\n* भारतीय परिषद का उन्मूलन और उसके स्थान पर एक सलाहकार निकाय का गठन।\n* ब्रिटिश भारत के प्रदेशों और रियासतों के साथ एक अखिल भारतीय महासंघ का प्रावधान।\n\n---\n"}}},{"index":52,"qNo":"Question No. 52","languages":{"English":{"qNo":52,"language":"English","questionHTML":"Who is the inventor of www?","questionText":"Who is the inventor of www?","options":[{"label":"A","html":"Bill Gates","text":"Bill Gates"},{"label":"B","html":"Tim Berners-Lee","text":"Tim Berners-Lee"},{"label":"C","html":"Timothy Bill","text":"Timothy Bill"},{"label":"D","html":"Ray Tomlinson","text":"Ray Tomlinson"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cu\u003e\u003cstrong\u003eTim Berners-Lee\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eThe World Wide Web, commonly known as the \u003cstrong\u003eWeb\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eInventors:\u0026nbsp;\n\t\u003cul\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eTim Berners-Lee\u003c/strong\u003e\u003c/li\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eRobert Cailliau\u003c/strong\u003e\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u0026nbsp;\u0026nbsp;\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eIt is an information system where documents and other web resources are identified by Uniform Resource Locators, which may be interlinked by hypertext, and are accessible over the Internet.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Tim Berners-Lee. Key Points The World Wide Web, commonly known as the Web. Inventors: Tim Berners-Lee Robert Cailliau Important Points It is an information system where documents and other web resources are identified by Uniform Resource Locators, which may be interlinked by hypertext, and are accessible over the Internet.","markdown":"## Q52.\n\nWho is the inventor of www?\n\n### Options\n\nA. Bill Gates\n\nB. Tim Berners-Lee\n\nC. Timothy Bill\n\nD. Ray Tomlinson\n\n**Correct Answer:** B\n\n### Solution\n\nThe correct answer is **Tim Berners-Lee**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* The World Wide Web, commonly known as the **Web**.\n* Inventors: \n* **Tim Berners-Lee**\n* **Robert Cailliau**\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* It is an information system where documents and other web resources are identified by Uniform Resource Locators, which may be interlinked by hypertext, and are accessible over the Internet.\n\n---\n"},"Hindi":{"qNo":52,"language":"Hindi","questionHTML":"www का आविष्कारक कौन है?","questionText":"www का आविष्कारक कौन है?","options":[{"label":"A","html":"बिल गेट्स","text":"बिल गेट्स"},{"label":"B","html":"टिम बर्नर्स-ली","text":"टिम बर्नर्स-ली"},{"label":"C","html":"टिमोथी बिल","text":"टिमोथी बिल"},{"label":"D","html":"रे टोमलिंसन","text":"रे टोमलिंसन"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eसही उत्तर \u003cu\u003e\u003cstrong\u003eटिम बर्नर्स-ली\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eवर्ल्ड वाइड वेब, को आमतौर पर \u003cstrong\u003eवेब \u003c/strong\u003eके रूप में जाना जाता है।\u003c/li\u003e\n\t\u003cli\u003eआविष्कारक:\n\t\u003cul\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eटिक बैरनर्स - ली\u003c/strong\u003e\u003c/li\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eरॉबर्ट कैइलियु\u003c/strong\u003e\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eयह एक सूचना प्रणाली है जहां दस्तावेजों और अन्य वेब संसाधनों की पहचान यूनिफ़ॉर्म रिसोर्स लोकेटर द्वारा की जाती है, जो हाइपरटेक्स्ट द्वारा इंटरलिंक किया जा सकता है, और इंटरनेट पर पहुंच योग्य है।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर टिम बर्नर्स-ली है। Key Points वर्ल्ड वाइड वेब, को आमतौर पर वेब के रूप में जाना जाता है। आविष्कारक: टिक बैरनर्स - ली रॉबर्ट कैइलियु Important Points यह एक सूचना प्रणाली है जहां दस्तावेजों और अन्य वेब संसाधनों की पहचान यूनिफ़ॉर्म रिसोर्स लोकेटर द्वारा की जाती है, जो हाइपरटेक्स्ट द्वारा इंटरलिंक किया जा सकता है, और इंटरनेट पर पहुंच योग्य है।","markdown":"## Q52.\n\nwww का आविष्कारक कौन है?\n\n### Options\n\nA. बिल गेट्स\n\nB. टिम बर्नर्स-ली\n\nC. टिमोथी बिल\n\nD. रे टोमलिंसन\n\n**Correct Answer:** B\n\n### Solution\n\nसही उत्तर **टिम बर्नर्स-ली** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* वर्ल्ड वाइड वेब, को आमतौर पर **वेब**के रूप में जाना जाता है।\n* आविष्कारक: \n* **टिक बैरनर्स - ली**\n* **रॉबर्ट कैइलियु**\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* यह एक सूचना प्रणाली है जहां दस्तावेजों और अन्य वेब संसाधनों की पहचान यूनिफ़ॉर्म रिसोर्स लोकेटर द्वारा की जाती है, जो हाइपरटेक्स्ट द्वारा इंटरलिंक किया जा सकता है, और इंटरनेट पर पहुंच योग्य है।\n\n---\n"}}},{"index":53,"qNo":"Question No. 53","languages":{"English":{"qNo":53,"language":"English","questionHTML":"When a batsman hits a cricket ball, the ball rolls over the ground. The ball stops after rolling away. The ball is slow to stop because","questionText":"When a batsman hits a cricket ball, the ball rolls over the ground. The ball stops after rolling away. The ball is slow to stop because","options":[{"label":"A","html":"The batsman did not hit the ball with enough effort","text":"The batsman did not hit the ball with enough effort"},{"label":"B","html":"Velocity is proportional to the force exerted on the ball","text":"Velocity is proportional to the force exerted on the ball"},{"label":"C","html":"A force acting opposite to the direction of motion on the ball","text":"A force acting opposite to the direction of motion on the ball"},{"label":"D","html":"There is no unbalanced force acting on the ball, so the ball is trying to stop.","text":"There is no unbalanced force acting on the ball, so the ball is trying to stop."}],"correctIndex":2,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cu\u003e\u003cstrong\u003eA force acting opposite to the direction of motion on the ball\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eWhen a batsman hits a cricket ball, the ball rolls over the ground. The ball stops after rolling away. The ball is slow to stop because a force is\u0026nbsp;acting opposite to the direction of motion on the ball and that force is known as friction force.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u0026nbsp;\u0026nbsp;\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eFriction is a force between two surfaces that are sliding, or trying to slide, across each other.\u003c/li\u003e\n\t\u003cli\u003eFor example, when you try to push a block\u0026nbsp;along the floor, friction makes this difficult.\u003c/li\u003e\n\t\u003cli\u003eFriction always works in the \u003cstrong\u003edirection opposite to the direction in which the object is moving or trying to move\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is A force acting opposite to the direction of motion on the ball. Key Points When a batsman hits a cricket ball, the ball rolls over the ground. The ball stops after rolling away. The ball is slow to stop because a force is acting opposite to the direction of motion on the ball and that force is known as friction force. Important Points Friction is a force between two surfaces that are sliding, or trying to slide, across each other. For example, when you try to push a block along the floor, friction makes this difficult. Friction always works in the direction opposite to the direction in which the object is moving or trying to move.","markdown":"## Q53.\n\nWhen a batsman hits a cricket ball, the ball rolls over the ground. The ball stops after rolling away. The ball is slow to stop because\n\n### Options\n\nA. The batsman did not hit the ball with enough effort\n\nB. Velocity is proportional to the force exerted on the ball\n\nC. A force acting opposite to the direction of motion on the ball\n\nD. There is no unbalanced force acting on the ball, so the ball is trying to stop.\n\n**Correct Answer:** C\n\n### Solution\n\nThe correct answer is **A force acting opposite to the direction of motion on the ball**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* When a batsman hits a cricket ball, the ball rolls over the ground. The ball stops after rolling away. The ball is slow to stop because a force is acting opposite to the direction of motion on the ball and that force is known as friction force.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* Friction is a force between two surfaces that are sliding, or trying to slide, across each other.\n* For example, when you try to push a block along the floor, friction makes this difficult.\n* Friction always works in the **direction opposite to the direction in which the object is moving or trying to move**.\n\n---\n"},"Hindi":{"qNo":53,"language":"Hindi","questionHTML":"किसी बल्लेबाज द्वारा क्रिकेट की गेंद को मारने पर गेंद समतल ज़मीन पर लुढ़कती है। कुछ दूर लुढ़कने के पश्चात् गेंद रुक जाती है। गेंद रुकने के लिए धीमी होती है, क्योंकि","questionText":"किसी बल्लेबाज द्वारा क्रिकेट की गेंद को मारने पर गेंद समतल ज़मीन पर लुढ़कती है। कुछ दूर लुढ़कने के पश्चात् गेंद रुक जाती है। गेंद रुकने के लिए धीमी होती है, क्योंकि","options":[{"label":"A","html":"बल्लेबाज ने गेंद को पर्याय प्रयास से हिट नहीं किया","text":"बल्लेबाज ने गेंद को पर्याय प्रयास से हिट नहीं किया"},{"label":"B","html":"वेग, गेंद पर लगाए गए बल के समानुपाती है","text":"वेग, गेंद पर लगाए गए बल के समानुपाती है"},{"label":"C","html":"गेंद पर गति की दिशा के विपरीत एक बल कार्य कर रहा है","text":"गेंद पर गति की दिशा के विपरीत एक बल कार्य कर रहा है"},{"label":"D","html":"गेंद पर कोई असंतुलित बल कार्यरत नहीं है, अत: गेंद विरामावस्था में आने के लिए प्रयासरत है","text":"गेंद पर कोई असंतुलित बल कार्यरत नहीं है, अत: गेंद विरामावस्था में आने के लिए प्रयासरत है"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eगेंद पर गति की दिशा के विपरीत एक बल कार्य कर रहा है।\u003c/strong\u003e\u003c/u\u003e\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eकिसी बल्लेबाज द्वारा क्रिकेट की गेंद को मारने पर गेंद समतल ज़मीन पर लुढ़कती है। कुछ दूर लुढ़कने के पश्चात् गेंद रुक जाती है। गेंद रुकने के लिए धीमी होती है, क्योंकि गेंद पर गति की दिशा के विपरीत एक बल कार्य कर रहा है और उस बल को घर्षण बल के रूप में जाना जाता है।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u0026nbsp;\u0026nbsp;\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eघर्षण दो सतहों के बीच एक बल है जो फिसल रहे हैं, या एक दूसरे से परे फिसलने की कोशिश कर रहे हैं।\u003c/li\u003e\n\t\u003cli\u003eउदाहरण के लिए, जब आप फर्श के साथ एक ब्लॉक को धक्का देने की कोशिश करते हैं, तो घर्षण यह मुश्किल बना देता है।\u003c/li\u003e\n\t\u003cli\u003eघर्षण हमेशा \u003cstrong\u003eउस दिशा के विपरीत दिशा में कार्य करता है जिसमें वस्तु चलती है या स्थानांतरित करने की कोशिश कर रही है।\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर गेंद पर गति की दिशा के विपरीत एक बल कार्य कर रहा है। Key Points किसी बल्लेबाज द्वारा क्रिकेट की गेंद को मारने पर गेंद समतल ज़मीन पर लुढ़कती है। कुछ दूर लुढ़कने के पश्चात् गेंद रुक जाती है। गेंद रुकने के लिए धीमी होती है, क्योंकि गेंद पर गति की दिशा के विपरीत एक बल कार्य कर रहा है और उस बल को घर्षण बल के रूप में जाना जाता है। Important Points घर्षण दो सतहों के बीच एक बल है जो फिसल रहे हैं, या एक दूसरे से परे फिसलने की कोशिश कर रहे हैं। उदाहरण के लिए, जब आप फर्श के साथ एक ब्लॉक को धक्का देने की कोशिश करते हैं, तो घर्षण यह मुश्किल बना देता है। घर्षण हमेशा उस दिशा के विपरीत दिशा में कार्य करता है जिसमें वस्तु चलती है या स्थानांतरित करने की कोशिश कर रही है।","markdown":"## Q53.\n\nकिसी बल्लेबाज द्वारा क्रिकेट की गेंद को मारने पर गेंद समतल ज़मीन पर लुढ़कती है। कुछ दूर लुढ़कने के पश्चात् गेंद रुक जाती है। गेंद रुकने के लिए धीमी होती है, क्योंकि\n\n### Options\n\nA. बल्लेबाज ने गेंद को पर्याय प्रयास से हिट नहीं किया\n\nB. वेग, गेंद पर लगाए गए बल के समानुपाती है\n\nC. गेंद पर गति की दिशा के विपरीत एक बल कार्य कर रहा है\n\nD. गेंद पर कोई असंतुलित बल कार्यरत नहीं है, अत: गेंद विरामावस्था में आने के लिए प्रयासरत है\n\n**Correct Answer:** C\n\n### Solution\n\nसही उत्तर **गेंद पर गति की दिशा के विपरीत एक बल कार्य कर रहा है।**\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* किसी बल्लेबाज द्वारा क्रिकेट की गेंद को मारने पर गेंद समतल ज़मीन पर लुढ़कती है। कुछ दूर लुढ़कने के पश्चात् गेंद रुक जाती है। गेंद रुकने के लिए धीमी होती है, क्योंकि गेंद पर गति की दिशा के विपरीत एक बल कार्य कर रहा है और उस बल को घर्षण बल के रूप में जाना जाता है।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* घर्षण दो सतहों के बीच एक बल है जो फिसल रहे हैं, या एक दूसरे से परे फिसलने की कोशिश कर रहे हैं।\n* उदाहरण के लिए, जब आप फर्श के साथ एक ब्लॉक को धक्का देने की कोशिश करते हैं, तो घर्षण यह मुश्किल बना देता है।\n* घर्षण हमेशा **उस दिशा के विपरीत दिशा में कार्य करता है जिसमें वस्तु चलती है या स्थानांतरित करने की कोशिश कर रही है।**\n\n---\n"}}},{"index":54,"qNo":"Question No. 54","languages":{"English":{"qNo":54,"language":"English","questionHTML":"Which of these rulers built the Jahaj Palace\u0026nbsp;in Mandu?","questionText":"Which of these rulers built the Jahaj Palace in Mandu?","options":[{"label":"A","html":"Gyasuddin Khilji\u0026nbsp;","text":"Gyasuddin Khilji"},{"label":"B","html":"Alauddin Khilji","text":"Alauddin Khilji"},{"label":"C","html":"Bhoja Parmar","text":"Bhoja Parmar"},{"label":"D","html":"Hoshang Shah","text":"Hoshang Shah"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003eGyasuddin Khilji\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eJahaj Palace\u003c/strong\u003e in \u003cstrong\u003eMandu\u003c/strong\u003e.\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eIt is\u0026nbsp;constructed\u0026nbsp;under the rule of \u003cstrong\u003eGyasuddin Khilji \u003c/strong\u003ebetween 1469 and 1500 AD.\u003c/li\u003e\n\t\t\u003cli\u003eThis is The Water Palace shown in Fisher's Drawing Room Scrap Book, 1832 together with a poetical illustration by Letitia Elizabeth Landon.\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cimg height=\"38px\" src=\"//storage.googleapis.com/tb-img/production/21/12/5fac175d1ca2c99d04400636_16383601700041.png\" width=\"160px\"\u003e\u0026nbsp;\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eThe Orignal Question:\u0026nbsp;\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eWhich of these rulers built the Jantar Mahal in Mandu?\u003c/li\u003e\n\t\t\u003cli\u003eThere is\u0026nbsp;no Jantar Mahal in Mandu.\u003c/li\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eAs this was the wrong question MPPSC deleted this question.\u003c/strong\u003e\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Gyasuddin Khilji. Jahaj Palace in Mandu. It is constructed under the rule of Gyasuddin Khilji between 1469 and 1500 AD. This is The Water Palace shown in Fisher's Drawing Room Scrap Book, 1832 together with a poetical illustration by Letitia Elizabeth Landon. The Orignal Question: Which of these rulers built the Jantar Mahal in Mandu? There is no Jantar Mahal in Mandu. As this was the wrong question MPPSC deleted this question.","markdown":"## Q54.\n\nWhich of these rulers built the Jahaj Palace in Mandu?\n\n### Options\n\nA. Gyasuddin Khilji\n\nB. Alauddin Khilji\n\nC. Bhoja Parmar\n\nD. Hoshang Shah\n\n**Correct Answer:** A\n\n### Solution\n\nThe correct answer is **Gyasuddin Khilji**.\n\n \n* **Jahaj Palace** in **Mandu**. \n* It is constructed under the rule of **Gyasuddin Khilji**between 1469 and 1500 AD.\n* This is The Water Palace shown in Fisher's Drawing Room Scrap Book, 1832 together with a poetical illustration by Letitia Elizabeth Landon.\n \n\n![](//storage.googleapis.com/tb-img/production/21/12/5fac175d1ca2c99d04400636_16383601700041.png)\n\n \n* **The Orignal Question:** \n* Which of these rulers built the Jantar Mahal in Mandu?\n* There is no Jantar Mahal in Mandu.\n* **As this was the wrong question MPPSC deleted this question.**\n\n---\n"},"Hindi":{"qNo":54,"language":"Hindi","questionHTML":"\u003cspan style=\"color: rgb(37, 37, 37);  \"\u003eइनमें से किस शासक ने मांडू में जाहज पैलेस का निर्माण कराया था?\u003c/span\u003e","questionText":"इनमें से किस शासक ने मांडू में जाहज पैलेस का निर्माण कराया था?","options":[{"label":"A","html":"गयासुद्दीन खिल्जी","text":"गयासुद्दीन खिल्जी"},{"label":"B","html":"अलाउद्दीन खिल्जी","text":"अलाउद्दीन खिल्जी"},{"label":"C","html":"भोज परमार","text":"भोज परमार"},{"label":"D","html":"होशंग शाह","text":"होशंग शाह"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eगयासुद्दीन खिल्जी\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eमांडू \u003c/strong\u003eमें\u003cstrong\u003e जहाज पैलेस।\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eइसका निर्माण 1469 से 1500 ईस्वी के बीच \u003cstrong\u003eगयासुद्दीन खिलजी\u003c/strong\u003e के शासन में हुआ है।\u003c/li\u003e\n\t\t\u003cli\u003eयह वह वाटर पैलेस है जिसे फिशर ड्रॉइंग रूम स्क्रैप बुक में, 1832 में लेटिटिया एलिजाबेथ लैंडन द्वारा एक काव्य चित्रण के साथ दिखाया गया है।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cimg height=\"38px\" src=\"//cdn.testbook.com/images/production/quesImages/quesImage45.png\" width=\"160px\"\u003e\u0026nbsp;\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eमूल प्रश्न:\u0026nbsp;\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eमांडू में जंतर महल का निर्माण किस शासक ने किया था?\u003c/li\u003e\n\t\t\u003cli\u003eमांडू में कोई जंतर महल नहीं है।\u003c/li\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eचूंकि यह गलत प्रश्न था एमपीएसएससी ने इस प्रश्न को हटा दिया।\u003c/strong\u003e\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर गयासुद्दीन खिल्जी है। मांडू में जहाज पैलेस। इसका निर्माण 1469 से 1500 ईस्वी के बीच गयासुद्दीन खिलजी के शासन में हुआ है। यह वह वाटर पैलेस है जिसे फिशर ड्रॉइंग रूम स्क्रैप बुक में, 1832 में लेटिटिया एलिजाबेथ लैंडन द्वारा एक काव्य चित्रण के साथ दिखाया गया है। मूल प्रश्न: मांडू में जंतर महल का निर्माण किस शासक ने किया था? मांडू में कोई जंतर महल नहीं है। चूंकि यह गलत प्रश्न था एमपीएसएससी ने इस प्रश्न को हटा दिया।","markdown":"## Q54.\n\nइनमें से किस शासक ने मांडू में जाहज पैलेस का निर्माण कराया था?\n\n### Options\n\nA. गयासुद्दीन खिल्जी\n\nB. अलाउद्दीन खिल्जी\n\nC. भोज परमार\n\nD. होशंग शाह\n\n**Correct Answer:** A\n\n### Solution\n\nसही उत्तर **गयासुद्दीन खिल्जी** है।\n\n \n* **मांडू**में**जहाज पैलेस।** \n* इसका निर्माण 1469 से 1500 ईस्वी के बीच **गयासुद्दीन खिलजी** के शासन में हुआ है।\n* यह वह वाटर पैलेस है जिसे फिशर ड्रॉइंग रूम स्क्रैप बुक में, 1832 में लेटिटिया एलिजाबेथ लैंडन द्वारा एक काव्य चित्रण के साथ दिखाया गया है।\n \n\n![](//cdn.testbook.com/images/production/quesImages/quesImage45.png)\n\n \n* **मूल प्रश्न:** \n* मांडू में जंतर महल का निर्माण किस शासक ने किया था?\n* मांडू में कोई जंतर महल नहीं है।\n* **चूंकि यह गलत प्रश्न था एमपीएसएससी ने इस प्रश्न को हटा दिया।**\n\n---\n"}}},{"index":55,"qNo":"Question No. 55","languages":{"English":{"qNo":55,"language":"English","questionHTML":"Ain-ul-Mulk Multani did not serve under which of these rulers?","questionText":"Ain-ul-Mulk Multani did not serve under which of these rulers?","options":[{"label":"A","html":"Alauddin Khilji","text":"Alauddin Khilji"},{"label":"B","html":"Muhammad Bin Tughluq","text":"Muhammad Bin Tughluq"},{"label":"C","html":"Firoz Tughlaq","text":"Firoz Tughlaq"},{"label":"D","html":"Iltutmish","text":"Iltutmish"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cu\u003e\u003cstrong\u003eIltutmish\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eAyn al-Mulk Multani \u003c/strong\u003ewas a military commander who served the Khalji and Tughluq dynasties of North India.\u003c/li\u003e\n\t\u003cli\u003eHe served as Alauddin Khalji's governor of Malwa and Devagiri, and after Alauddin's death, he suppressed a revolt in Gujarat.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eAyn al-Mulk Multani\u0026nbsp;served the following Kings:\n\t\u003cul\u003e\n\t\t\u003cli\u003eAlauddin\u003c/li\u003e\n\t\t\u003cli\u003eMubarak Shah\u003c/li\u003e\n\t\t\u003cli\u003eKhusrau Khan\u003c/li\u003e\n\t\t\u003cli\u003eTughluq\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Iltutmish. Key Points Ayn al-Mulk Multani was a military commander who served the Khalji and Tughluq dynasties of North India. He served as Alauddin Khalji's governor of Malwa and Devagiri, and after Alauddin's death, he suppressed a revolt in Gujarat. Important Points Ayn al-Mulk Multani served the following Kings: Alauddin Mubarak Shah Khusrau Khan Tughluq","markdown":"## Q55.\n\nAin-ul-Mulk Multani did not serve under which of these rulers?\n\n### Options\n\nA. Alauddin Khilji\n\nB. Muhammad Bin Tughluq\n\nC. Firoz Tughlaq\n\nD. Iltutmish\n\n**Correct Answer:** D\n\n### Solution\n\nThe correct answer is **Iltutmish**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **Ayn al-Mulk Multani**was a military commander who served the Khalji and Tughluq dynasties of North India.\n* He served as Alauddin Khalji's governor of Malwa and Devagiri, and after Alauddin's death, he suppressed a revolt in Gujarat.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* Ayn al-Mulk Multani served the following Kings: \n* Alauddin\n* Mubarak Shah\n* Khusrau Khan\n* Tughluq\n\n---\n"},"Hindi":{"qNo":55,"language":"Hindi","questionHTML":"आइन-उल-मुल्क मुल्तानी ने इनमें से किस शासक के अधीन सेवा नहीं की थी?","questionText":"आइन-उल-मुल्क मुल्तानी ने इनमें से किस शासक के अधीन सेवा नहीं की थी?","options":[{"label":"A","html":"अलाउद्दीन खिल्जी","text":"अलाउद्दीन खिल्जी"},{"label":"B","html":"मुहम्मद बिन तुगलक","text":"मुहम्मद बिन तुगलक"},{"label":"C","html":"फिरोज़ तुगलक","text":"फिरोज़ तुगलक"},{"label":"D","html":"इल्तुतमिश","text":"इल्तुतमिश"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eइल्तुतमिश\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eआइन-उल-मुल्क मुल्तानी\u003c/strong\u003e एक सैन्य कमांडर था जिसने उत्तर भारत के खिलजी और तुगलक राजवंशों की सेवा की थी।\u003c/li\u003e\n\t\u003cli\u003eउसने अलाउद्दीन खिलजी के मालवा और देवगिरी के राज्यपाल के रूप में कार्य किया, और अलाउद्दीन की मृत्यु के बाद, उसने गुजरात में विद्रोह को दबा दिया।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eआइन-उल-मुल्क मुल्तानी ने निम्नलिखित शासकों की सेवा की:\n\t\u003cul\u003e\n\t\t\u003cli\u003eअलाउद्दीन\u003c/li\u003e\n\t\t\u003cli\u003eमुबारक शाह\u003c/li\u003e\n\t\t\u003cli\u003eख़ुसरो ख़ान\u003c/li\u003e\n\t\t\u003cli\u003eतुगलक\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर इल्तुतमिश है। Key Points आइन-उल-मुल्क मुल्तानी एक सैन्य कमांडर था जिसने उत्तर भारत के खिलजी और तुगलक राजवंशों की सेवा की थी। उसने अलाउद्दीन खिलजी के मालवा और देवगिरी के राज्यपाल के रूप में कार्य किया, और अलाउद्दीन की मृत्यु के बाद, उसने गुजरात में विद्रोह को दबा दिया। Important Points आइन-उल-मुल्क मुल्तानी ने निम्नलिखित शासकों की सेवा की: अलाउद्दीन मुबारक शाह ख़ुसरो ख़ान तुगलक","markdown":"## Q55.\n\nआइन-उल-मुल्क मुल्तानी ने इनमें से किस शासक के अधीन सेवा नहीं की थी?\n\n### Options\n\nA. अलाउद्दीन खिल्जी\n\nB. मुहम्मद बिन तुगलक\n\nC. फिरोज़ तुगलक\n\nD. इल्तुतमिश\n\n**Correct Answer:** D\n\n### Solution\n\nसही उत्तर **इल्तुतमिश** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **आइन-उल-मुल्क मुल्तानी** एक सैन्य कमांडर था जिसने उत्तर भारत के खिलजी और तुगलक राजवंशों की सेवा की थी।\n* उसने अलाउद्दीन खिलजी के मालवा और देवगिरी के राज्यपाल के रूप में कार्य किया, और अलाउद्दीन की मृत्यु के बाद, उसने गुजरात में विद्रोह को दबा दिया।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* आइन-उल-मुल्क मुल्तानी ने निम्नलिखित शासकों की सेवा की: \n* अलाउद्दीन\n* मुबारक शाह\n* ख़ुसरो ख़ान\n* तुगलक\n\n---\n"}}},{"index":56,"qNo":"Question No. 56","languages":{"English":{"qNo":56,"language":"English","questionHTML":"Which one of the following pairs is not correctly matched?","questionText":"Which one of the following pairs is not correctly matched?","options":[{"label":"A","html":"Switzerland President - Johann Schneider-Amman","text":"Switzerland President - Johann Schneider-Amman"},{"label":"B","html":"President of Mexico - Enrique Peña Nieto","text":"President of Mexico - Enrique Peña Nieto"},{"label":"C","html":"President of Namibia - The Hague Gingob","text":"President of Namibia - The Hague Gingob"},{"label":"D","html":"President of Cote d'Ivoire - Angela Merkel","text":"President of Cote d'Ivoire - Angela Merkel"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eThe incorrect match\u0026nbsp;is\u0026nbsp;\u003cu\u003e\u003cstrong\u003ePresident of Cote d'Ivoire - Angela Merkel\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\

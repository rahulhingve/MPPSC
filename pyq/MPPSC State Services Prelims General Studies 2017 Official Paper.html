he UPSC conducts various examinations in accordance with the Rules of examination as notified by the Government of India in a just, fair, and impartial manner for making a merit-based selection and recommendation of candidates for various **Group A** and **Group B** Services of the Govt. of India.\n\n---\n"},"Hindi":{"qNo":75,"language":"Hindi","questionHTML":"दिल्ली के पूर्व पुलिस आयुक्त, बी. एस. बस्सी को मई 2016 में किस पद पर नियुक्त किया गया?","questionText":"दिल्ली के पूर्व पुलिस आयुक्त, बी. एस. बस्सी को मई 2016 में किस पद पर नियुक्त किया गया?","options":[{"label":"A","html":"संघ लोक सेवा आयोग का अध्यक्ष","text":"संघ लोक सेवा आयोग का अध्यक्ष"},{"label":"B","html":"मेघालय का गवर्नर","text":"मेघालय का गवर्नर"},{"label":"C","html":"सीमा सुरक्षा बल का महानिदेशक","text":"सीमा सुरक्षा बल का महानिदेशक"},{"label":"D","html":"संघ लोक सेवा आयोग का सदस्य","text":"संघ लोक सेवा आयोग का सदस्य"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eसंघ लोक सेवा आयोग का सदस्य\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eभीम साईं बस्सी या बी.एस. बस्सी एक भारतीय पुलिस सेवा (आईपीएस) अधिकारी हैं।\u003c/li\u003e\n\t\u003cli\u003eवह वर्तमान में 31 मई 2016 से संघ लोक सेवा आयोग के सदस्य हैं।\u003c/li\u003e\n\t\u003cli\u003eउन्होंने पुलिस आयुक्त, दिल्ली पुलिस के विशेष पुलिस आयुक्त (प्रशासन) (2012–13), दिल्ली पुलिस के विशेष पुलिस आयुक्त (यातायात) (2011-2012), गोवा पुलिस के महानिदेशक (2009- 2011) और चंडीगढ़ पुलिस के महानिरीक्षक (2000-2002) के रुप में कार्य किया।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eयूपीएससी:\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eयूपीएससी भारतीय\u0026nbsp;\u003cstrong\u003eसंविधान के अनुच्छेद 315-323 भाग XIV अध्याय II \u003c/strong\u003eके तहत एक संवैधानिक निकाय है जो \u003cstrong\u003eअनुच्छेद 320\u003c/strong\u003e के तहत सौंपे गए अपने कर्तव्यों, कार्यों और दायित्वों का निर्वहन करने के लिए है।\u003c/li\u003e\n\t\t\u003cli\u003eयूपीएससी भारत सरकार द्वारा अधिसूचित परीक्षा के नियमों के अनुसार विभिन्न परीक्षाओं का आयोजन, मेरिट-आधारित चयन और भारत सरकार की विभिन्न \u003cstrong\u003eग्रुप ए\u003c/strong\u003e और \u003cstrong\u003eग्रुप बी\u003c/strong\u003e सेवाओं के लिए उम्मीदवारों की सिफारिश करने के लिए उचित, निष्पक्ष और निष्पक्ष तरीके से करता है।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर संघ लोक सेवा आयोग का सदस्य है। Key Points भीम साईं बस्सी या बी.एस. बस्सी एक भारतीय पुलिस सेवा (आईपीएस) अधिकारी हैं। वह वर्तमान में 31 मई 2016 से संघ लोक सेवा आयोग के सदस्य हैं। उन्होंने पुलिस आयुक्त, दिल्ली पुलिस के विशेष पुलिस आयुक्त (प्रशासन) (2012–13), दिल्ली पुलिस के विशेष पुलिस आयुक्त (यातायात) (2011-2012), गोवा पुलिस के महानिदेशक (2009- 2011) और चंडीगढ़ पुलिस के महानिरीक्षक (2000-2002) के रुप में कार्य किया। Important Points यूपीएससी: यूपीएससी भारतीय संविधान के अनुच्छेद 315-323 भाग XIV अध्याय II के तहत एक संवैधानिक निकाय है जो अनुच्छेद 320 के तहत सौंपे गए अपने कर्तव्यों, कार्यों और दायित्वों का निर्वहन करने के लिए है। यूपीएससी भारत सरकार द्वारा अधिसूचित परीक्षा के नियमों के अनुसार विभिन्न परीक्षाओं का आयोजन, मेरिट-आधारित चयन और भारत सरकार की विभिन्न ग्रुप ए और ग्रुप बी सेवाओं के लिए उम्मीदवारों की सिफारिश करने के लिए उचित, निष्पक्ष और निष्पक्ष तरीके से करता है।","markdown":"## Q75.\n\nदिल्ली के पूर्व पुलिस आयुक्त, बी. एस. बस्सी को मई 2016 में किस पद पर नियुक्त किया गया?\n\n### Options\n\nA. संघ लोक सेवा आयोग का अध्यक्ष\n\nB. मेघालय का गवर्नर\n\nC. सीमा सुरक्षा बल का महानिदेशक\n\nD. संघ लोक सेवा आयोग का सदस्य\n\n**Correct Answer:** D\n\n### Solution\n\nसही उत्तर **संघ लोक सेवा आयोग का सदस्य** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* भीम साईं बस्सी या बी.एस. बस्सी एक भारतीय पुलिस सेवा (आईपीएस) अधिकारी हैं।\n* वह वर्तमान में 31 मई 2016 से संघ लोक सेवा आयोग के सदस्य हैं।\n* उन्होंने पुलिस आयुक्त, दिल्ली पुलिस के विशेष पुलिस आयुक्त (प्रशासन) (2012–13), दिल्ली पुलिस के विशेष पुलिस आयुक्त (यातायात) (2011-2012), गोवा पुलिस के महानिदेशक (2009- 2011) और चंडीगढ़ पुलिस के महानिरीक्षक (2000-2002) के रुप में कार्य किया।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* **यूपीएससी:** \n* यूपीएससी भारतीय **संविधान के अनुच्छेद 315-323 भाग XIV अध्याय II**के तहत एक संवैधानिक निकाय है जो **अनुच्छेद 320** के तहत सौंपे गए अपने कर्तव्यों, कार्यों और दायित्वों का निर्वहन करने के लिए है।\n* यूपीएससी भारत सरकार द्वारा अधिसूचित परीक्षा के नियमों के अनुसार विभिन्न परीक्षाओं का आयोजन, मेरिट-आधारित चयन और भारत सरकार की विभिन्न **ग्रुप ए** और **ग्रुप बी** सेवाओं के लिए उम्मीदवारों की सिफारिश करने के लिए उचित, निष्पक्ष और निष्पक्ष तरीके से करता है।\n\n---\n"}}},{"index":76,"qNo":"Question No. 76","languages":{"English":{"qNo":76,"language":"English","questionHTML":"President Pranab Mukherjee visited which of the following countries in May 2016?","questionText":"President Pranab Mukherjee visited which of the following countries in May 2016?","options":[{"label":"A","html":"Japan","text":"Japan"},{"label":"B","html":"Myanmar","text":"Myanmar"},{"label":"C","html":"China","text":"China"},{"label":"D","html":"France","text":"France"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003eChina\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003ePresident Pranav Mukherjee visited\u0026nbsp;the People’s Republic of China from May 24 -27, 2016\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eHis delegation included Shri Santosh Kumar Gangwar, Minister of State (IC) of the Ministry of Textiles, four Members of Parliament representing major political parties and different regions of India, namely, Dr. Bhushan Lal Jangde, Sh. K. C. Venugopal, Sh. Sudheer Gupta and Smt. Ranjanben Dhananjay Bhatt as well as senior officials of Rashtrapati Bhavan and MEA.\u003c/li\u003e\n\t\u003cli\u003eAn 8-member academic delegation comprising Vice Chancellors and heads of institutions of higher learning as well as a representative of MHRD also accompanied him.\u003c/li\u003e\n\t\u003cli\u003eThe visit started with Guangzhou, capital of Guangdong Province which has played a key role in China’s economic development, accounting for around 10% of China’s GDP. Guangzhou was chosen as a destination because of its historical connection with India as well as its important role in economic as well as people-to-people exchanges with India. Guangdong province accounts for 20 percent of bilateral trade and 40 percent of Indian nationals in China. The large Indian community serves as an important bridge between India and China.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is China. Key Points President Pranav Mukherjee visited the People’s Republic of China from May 24 -27, 2016. His delegation included Shri Santosh Kumar Gangwar, Minister of State (IC) of the Ministry of Textiles, four Members of Parliament representing major political parties and different regions of India, namely, Dr. Bhushan Lal Jangde, Sh. K. C. Venugopal, Sh. Sudheer Gupta and Smt. Ranjanben Dhananjay Bhatt as well as senior officials of Rashtrapati Bhavan and MEA. An 8-member academic delegation comprising Vice Chancellors and heads of institutions of higher learning as well as a representative of MHRD also accompanied him. The visit started with Guangzhou, capital of Guangdong Province which has played a key role in China’s economic development, accounting for around 10% of China’s GDP. Guangzhou was chosen as a destination because of its historical connection with India as well as its important role in economic as well as people-to-people exchanges with India. Guangdong province accounts for 20 percent of bilateral trade and 40 percent of Indian nationals in China. The large Indian community serves as an important bridge between India and China.","markdown":"## Q76.\n\nPresident Pranab Mukherjee visited which of the following countries in May 2016?\n\n### Options\n\nA. Japan\n\nB. Myanmar\n\nC. China\n\nD. France\n\n**Correct Answer:** C\n\n### Solution\n\nThe correct answer is **China**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **President Pranav Mukherjee visited the People’s Republic of China from May 24 -27, 2016**.\n* His delegation included Shri Santosh Kumar Gangwar, Minister of State (IC) of the Ministry of Textiles, four Members of Parliament representing major political parties and different regions of India, namely, Dr. Bhushan Lal Jangde, Sh. K. C. Venugopal, Sh. Sudheer Gupta and Smt. Ranjanben Dhananjay Bhatt as well as senior officials of Rashtrapati Bhavan and MEA.\n* An 8-member academic delegation comprising Vice Chancellors and heads of institutions of higher learning as well as a representative of MHRD also accompanied him.\n* The visit started with Guangzhou, capital of Guangdong Province which has played a key role in China’s economic development, accounting for around 10% of China’s GDP. Guangzhou was chosen as a destination because of its historical connection with India as well as its important role in economic as well as people-to-people exchanges with India. Guangdong province accounts for 20 percent of bilateral trade and 40 percent of Indian nationals in China. The large Indian community serves as an important bridge between India and China.\n\n---\n"},"Hindi":{"qNo":76,"language":"Hindi","questionHTML":"राष्ट्रपति प्रणब मुखर्जी ने मई 2016 में निम्नलिखित में से किस देश की यात्रा की?","questionText":"राष्ट्रपति प्रणब मुखर्जी ने मई 2016 में निम्नलिखित में से किस देश की यात्रा की?","options":[{"label":"A","html":"जापान","text":"जापान"},{"label":"B","html":"म्यांमार","text":"म्यांमार"},{"label":"C","html":"चीन","text":"चीन"},{"label":"D","html":"फ्रांस","text":"फ्रांस"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eचीन\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eराष्ट्रपति प्रणब मुखर्जी ने 24 -27 मई, 2016 को पीपुल्स रिपब्लिक ऑफ चाइना का दौरा किया।\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003eउनके प्रतिनिधिमंडल में कपड़ा मंत्रालय के राज्य मंत्री (आईसी) श्री संतोष कुमार गंगवार, प्रमुख राजनीतिक दलों और भारत के विभिन्न क्षेत्रों का प्रतिनिधित्व करने वाले संसद के चार सदस्य, अर्थात् डॉ. भूषण लाल जांगड़े, श्री के सी वेणुगोपाल, श्री सुधीर गुप्ता और श्रीमति रंजनबेन धनंजय भट्ट के साथ-साथ राष्ट्रपति भवन और विदेश मंत्रालय के वरिष्ठ अधिकारी थे।\u003c/li\u003e\n\t\u003cli\u003e8-सदस्यीय अकादमिक प्रतिनिधिमंडल जिसमें कुलपति और उच्च शिक्षा संस्थानों के प्रमुखों के साथ-साथ एमएचआरडी के प्रतिनिधि भी शामिल थे।\u003c/li\u003e\n\t\u003cli\u003eइस यात्रा की शुरुआत ग्वांगडोंग प्रांत की राजधानी गुआंगझू से हुई, जिसने चीन के आर्थिक विकास में चीन की जीडीपी का लगभग 10% हिस्सा होने में महत्वपूर्ण भूमिका निभाई है। भारत के साथ इसके ऐतिहासिक संबंध और आर्थिक के साथ-साथ व्यक्तियों के आदान-प्रदान में महत्वपूर्ण भूमिका के कारण गुआंगझू को एक गंतव्य के रूप में चुना गया था। ग्वांगडोंग प्रांत में 20 प्रतिशत द्विपक्षीय व्यापार और चीन में 40 प्रतिशत भारतीय नागरिक हैं। यह विशाल भारतीय समुदाय भारत और चीन के बीच एक महत्वपूर्ण सेतु का काम करता है।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर चीन है। Key Points राष्ट्रपति प्रणब मुखर्जी ने 24 -27 मई, 2016 को पीपुल्स रिपब्लिक ऑफ चाइना का दौरा किया। उनके प्रतिनिधिमंडल में कपड़ा मंत्रालय के राज्य मंत्री (आईसी) श्री संतोष कुमार गंगवार, प्रमुख राजनीतिक दलों और भारत के विभिन्न क्षेत्रों का प्रतिनिधित्व करने वाले संसद के चार सदस्य, अर्थात् डॉ. भूषण लाल जांगड़े, श्री के सी वेणुगोपाल, श्री सुधीर गुप्ता और श्रीमति रंजनबेन धनंजय भट्ट के साथ-साथ राष्ट्रपति भवन और विदेश मंत्रालय के वरिष्ठ अधिकारी थे। 8-सदस्यीय अकादमिक प्रतिनिधिमंडल जिसमें कुलपति और उच्च शिक्षा संस्थानों के प्रमुखों के साथ-साथ एमएचआरडी के प्रतिनिधि भी शामिल थे। इस यात्रा की शुरुआत ग्वांगडोंग प्रांत की राजधानी गुआंगझू से हुई, जिसने चीन के आर्थिक विकास में चीन की जीडीपी का लगभग 10% हिस्सा होने में महत्वपूर्ण भूमिका निभाई है। भारत के साथ इसके ऐतिहासिक संबंध और आर्थिक के साथ-साथ व्यक्तियों के आदान-प्रदान में महत्वपूर्ण भूमिका के कारण गुआंगझू को एक गंतव्य के रूप में चुना गया था। ग्वांगडोंग प्रांत में 20 प्रतिशत द्विपक्षीय व्यापार और चीन में 40 प्रतिशत भारतीय नागरिक हैं। यह विशाल भारतीय समुदाय भारत और चीन के बीच एक महत्वपूर्ण सेतु का काम करता है।","markdown":"## Q76.\n\nराष्ट्रपति प्रणब मुखर्जी ने मई 2016 में निम्नलिखित में से किस देश की यात्रा की?\n\n### Options\n\nA. जापान\n\nB. म्यांमार\n\nC. चीन\n\nD. फ्रांस\n\n**Correct Answer:** C\n\n### Solution\n\nसही उत्तर **चीन** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **राष्ट्रपति प्रणब मुखर्जी ने 24 -27 मई, 2016 को पीपुल्स रिपब्लिक ऑफ चाइना का दौरा किया।**\n* उनके प्रतिनिधिमंडल में कपड़ा मंत्रालय के राज्य मंत्री (आईसी) श्री संतोष कुमार गंगवार, प्रमुख राजनीतिक दलों और भारत के विभिन्न क्षेत्रों का प्रतिनिधित्व करने वाले संसद के चार सदस्य, अर्थात् डॉ. भूषण लाल जांगड़े, श्री के सी वेणुगोपाल, श्री सुधीर गुप्ता और श्रीमति रंजनबेन धनंजय भट्ट के साथ-साथ राष्ट्रपति भवन और विदेश मंत्रालय के वरिष्ठ अधिकारी थे।\n* 8-सदस्यीय अकादमिक प्रतिनिधिमंडल जिसमें कुलपति और उच्च शिक्षा संस्थानों के प्रमुखों के साथ-साथ एमएचआरडी के प्रतिनिधि भी शामिल थे।\n* इस यात्रा की शुरुआत ग्वांगडोंग प्रांत की राजधानी गुआंगझू से हुई, जिसने चीन के आर्थिक विकास में चीन की जीडीपी का लगभग 10% हिस्सा होने में महत्वपूर्ण भूमिका निभाई है। भारत के साथ इसके ऐतिहासिक संबंध और आर्थिक के साथ-साथ व्यक्तियों के आदान-प्रदान में महत्वपूर्ण भूमिका के कारण गुआंगझू को एक गंतव्य के रूप में चुना गया था। ग्वांगडोंग प्रांत में 20 प्रतिशत द्विपक्षीय व्यापार और चीन में 40 प्रतिशत भारतीय नागरिक हैं। यह विशाल भारतीय समुदाय भारत और चीन के बीच एक महत्वपूर्ण सेतु का काम करता है।\n\n---\n"}}},{"index":77,"qNo":"Question No. 77","languages":{"English":{"qNo":77,"language":"English","questionHTML":"Ivan Dodig, a partner of Sania Mirza's Mixed Doubles, is from which country?","questionText":"Ivan Dodig, a partner of Sania Mirza's Mixed Doubles, is from which country?","options":[{"label":"A","html":"Sweden","text":"Sweden"},{"label":"B","html":"Switzerland","text":"Switzerland"},{"label":"C","html":"Russia","text":"Russia"},{"label":"D","html":"Croatia","text":"Croatia"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003eCroatia\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eIvan Dodig\u0026nbsp;is a \u003cstrong\u003etennis\u003c/strong\u003e player.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eHe is from Croatia\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eHis career-high ATP rankings are world No. 29 in singles and world No. 4 in doubles.\u003c/li\u003e\n\t\u003cli\u003eIvan\u0026nbsp;is a Grand Slam champion after winning the 2015 French Open men's doubles title with Marcelo Melo, adding the mixed-doubles titles at Roland-Garros in 2018 and 2019 with Latisha Chan.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eIvan Dodig was a partner of Sania Mirza's Mixed Doubles\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Croatia. Key Points Ivan Dodig is a tennis player. He is from Croatia. His career-high ATP rankings are world No. 29 in singles and world No. 4 in doubles. Ivan is a Grand Slam champion after winning the 2015 French Open men's doubles title with Marcelo Melo, adding the mixed-doubles titles at Roland-Garros in 2018 and 2019 with Latisha Chan. Ivan Dodig was a partner of Sania Mirza's Mixed Doubles.","markdown":"## Q77.\n\nIvan Dodig, a partner of Sania Mirza's Mixed Doubles, is from which country?\n\n### Options\n\nA. Sweden\n\nB. Switzerland\n\nC. Russia\n\nD. Croatia\n\n**Correct Answer:** D\n\n### Solution\n\nThe correct answer is **Croatia**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* Ivan Dodig is a **tennis** player.\n* **He is from Croatia**.\n* His career-high ATP rankings are world No. 29 in singles and world No. 4 in doubles.\n* Ivan is a Grand Slam champion after winning the 2015 French Open men's doubles title with Marcelo Melo, adding the mixed-doubles titles at Roland-Garros in 2018 and 2019 with Latisha Chan.\n* **Ivan Dodig was a partner of Sania Mirza's Mixed Doubles**.\n\n---\n"},"Hindi":{"qNo":77,"language":"Hindi","questionHTML":"सानिया मिर्जा के मिक्स्ड डबल्स के पार्टनर इवान डोडिज किस देश से है?","questionText":"सानिया मिर्जा के मिक्स्ड डबल्स के पार्टनर इवान डोडिज किस देश से है?","options":[{"label":"A","html":"स्वीडन","text":"स्वीडन"},{"label":"B","html":"स्विट्ज़रलैंड","text":"स्विट्ज़रलैंड"},{"label":"C","html":"रूस","text":"रूस"},{"label":"D","html":"क्रोएशिया","text":"क्रोएशिया"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eक्रोएशिया\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eइवान डोडिज एक\u003cstrong\u003e टेनिस\u003c/strong\u003e खिलाड़ी है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eवह क्रोएशिया से है।\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003eउनकी कैरियर की उच्च एटीपी रैंकिंग एकल में विश्व नंबर 29 और युगल में दुनिया की नंबर 4 है।\u003c/li\u003e\n\t\u003cli\u003eइवान एक ग्रैंड स्लैम चैंपियन है, जिन्होंने मार्सेलो मेलो के साथ 2015 फ्रेंच ओपन पुरुष युगल खिताब जीतने के बाद, 2018 और 2019 में रोलैंड-गैरोस में लतीशा चान के साथ मिश्रित युगल का खिताब जीता है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eइवान डोडिज सानिया मिर्ज़ा के मिक्स्ड डबल्स के\u0026nbsp;पार्टनर थे।\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर क्रोएशिया है। Key Points इवान डोडिज एक टेनिस खिलाड़ी है। वह क्रोएशिया से है। उनकी कैरियर की उच्च एटीपी रैंकिंग एकल में विश्व नंबर 29 और युगल में दुनिया की नंबर 4 है। इवान एक ग्रैंड स्लैम चैंपियन है, जिन्होंने मार्सेलो मेलो के साथ 2015 फ्रेंच ओपन पुरुष युगल खिताब जीतने के बाद, 2018 और 2019 में रोलैंड-गैरोस में लतीशा चान के साथ मिश्रित युगल का खिताब जीता है। इवान डोडिज सानिया मिर्ज़ा के मिक्स्ड डबल्स के पार्टनर थे।","markdown":"## Q77.\n\nसानिया मिर्जा के मिक्स्ड डबल्स के पार्टनर इवान डोडिज किस देश से है?\n\n### Options\n\nA. स्वीडन\n\nB. स्विट्ज़रलैंड\n\nC. रूस\n\nD. क्रोएशिया\n\n**Correct Answer:** D\n\n### Solution\n\nसही उत्तर **क्रोएशिया** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* इवान डोडिज एक**टेनिस** खिलाड़ी है।\n* **वह क्रोएशिया से है।**\n* उनकी कैरियर की उच्च एटीपी रैंकिंग एकल में विश्व नंबर 29 और युगल में दुनिया की नंबर 4 है।\n* इवान एक ग्रैंड स्लैम चैंपियन है, जिन्होंने मार्सेलो मेलो के साथ 2015 फ्रेंच ओपन पुरुष युगल खिताब जीतने के बाद, 2018 और 2019 में रोलैंड-गैरोस में लतीशा चान के साथ मिश्रित युगल का खिताब जीता है।\n* **इवान डोडिज सानिया मिर्ज़ा के मिक्स्ड डबल्स के पार्टनर थे।**\n\n---\n"}}},{"index":78,"qNo":"Question No. 78","languages":{"English":{"qNo":78,"language":"English","questionHTML":"What is the name of the book by Suhail Seth which was released in London in June 2016?","questionText":"What is the name of the book by Suhail Seth which was released in London in June 2016?","options":[{"label":"A","html":"Mantra for Success","text":"Mantra for Success"},{"label":"B","html":"Dark Horse","text":"Dark Horse"},{"label":"C","html":"Wings of fire","text":"Wings of fire"},{"label":"D","html":"\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003eMessiah\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","text":"Messiah"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cu\u003e\u003cstrong\u003eMantra for Success\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eBritain's universities and science minister Jo Johnson released the new book by Suhel Seth at the London School of Economics.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eWritten by Suhel Seth and Sunny Sen\u003c/strong\u003e,\u003c/li\u003e\n\t\u003cli\u003e“Mantras for Success: India’s Greatest CEOs Tell You How to Win” is a chronicle of what the author described as the “personal and professional eco-systems” of 21 Indian CEOs.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Mantra for Success. Key Points Britain's universities and science minister Jo Johnson released the new book by Suhel Seth at the London School of Economics. Written by Suhel Seth and Sunny Sen, “Mantras for Success: India’s Greatest CEOs Tell You How to Win” is a chronicle of what the author described as the “personal and professional eco-systems” of 21 Indian CEOs.","markdown":"## Q78.\n\nWhat is the name of the book by Suhail Seth which was released in London in June 2016?\n\n### Options\n\nA. Mantra for Success\n\nB. Dark Horse\n\nC. Wings of fire\n\nD. Messiah\n\n**Correct Answer:** A\n\n### Solution\n\nThe correct answer is **Mantra for Success**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* Britain's universities and science minister Jo Johnson released the new book by Suhel Seth at the London School of Economics.\n* **Written by Suhel Seth and Sunny Sen**,\n* “Mantras for Success: India’s Greatest CEOs Tell You How to Win” is a chronicle of what the author described as the “personal and professional eco-systems” of 21 Indian CEOs.\n\n---\n"},"Hindi":{"qNo":78,"language":"Hindi","questionHTML":"सुहेल सेठ की उस पुस्तक का नाम क्या है, जिसका विमोचन जून 2016 में लंदन में हुआ?","questionText":"सुहेल सेठ की उस पुस्तक का नाम क्या है, जिसका विमोचन जून 2016 में लंदन में हुआ?","options":[{"label":"A","html":"मंत्राज़ फॉर सक्सेस","text":"मंत्राज़ फॉर सक्सेस"},{"label":"B","html":"डार्क हॉर्स","text":"डार्क हॉर्स"},{"label":"C","html":"विंग्स ऑफ़ फायर","text":"विंग्स ऑफ़ फायर"},{"label":"D","html":"मसीहा","text":"मसीहा"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eमंत्राज़ फॉर सक्सेस\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eब्रिटेन के विश्वविद्यालयों और विज्ञान मंत्री जो जॉनसन ने लंदन स्कूल ऑफ इकोनॉमिक्स में सुहेल सेठ की नई पुस्तक का विमोचन किया।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eयह सुहेल सेठ और सनी सेन द्वारा लिखित है।\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003e\"मंत्राज़ फॉर सक्सेस: इंडियाज् ग्रेटेस्ट सीइओज् टेल यू हाउ टू विन\" एक इतिवृत्त है जिसे लेखक ने 21 भारतीय सीईओ के \"व्यक्तिगत और व्यावसायिक इको-सिस्टम\" के रूप में वर्णित किया है।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर मंत्राज़ फॉर सक्सेस है। Key Points ब्रिटेन के विश्वविद्यालयों और विज्ञान मंत्री जो जॉनसन ने लंदन स्कूल ऑफ इकोनॉमिक्स में सुहेल सेठ की नई पुस्तक का विमोचन किया। यह सुहेल सेठ और सनी सेन द्वारा लिखित है। \"मंत्राज़ फॉर सक्सेस: इंडियाज् ग्रेटेस्ट सीइओज् टेल यू हाउ टू विन\" एक इतिवृत्त है जिसे लेखक ने 21 भारतीय सीईओ के \"व्यक्तिगत और व्यावसायिक इको-सिस्टम\" के रूप में वर्णित किया है।","markdown":"## Q78.\n\nसुहेल सेठ की उस पुस्तक का नाम क्या है, जिसका विमोचन जून 2016 में लंदन में हुआ?\n\n### Options\n\nA. मंत्राज़ फॉर सक्सेस\n\nB. डार्क हॉर्स\n\nC. विंग्स ऑफ़ फायर\n\nD. मसीहा\n\n**Correct Answer:** A\n\n### Solution\n\nसही उत्तर **मंत्राज़ फॉर सक्सेस** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* ब्रिटेन के विश्वविद्यालयों और विज्ञान मंत्री जो जॉनसन ने लंदन स्कूल ऑफ इकोनॉमिक्स में सुहेल सेठ की नई पुस्तक का विमोचन किया।\n* **यह सुहेल सेठ और सनी सेन द्वारा लिखित है।**\n* \"मंत्राज़ फॉर सक्सेस: इंडियाज् ग्रेटेस्ट सीइओज् टेल यू हाउ टू विन\" एक इतिवृत्त है जिसे लेखक ने 21 भारतीय सीईओ के \"व्यक्तिगत और व्यावसायिक इको-सिस्टम\" के रूप में वर्णित किया है।\n\n---\n"}}},{"index":79,"qNo":"Question No. 79","languages":{"English":{"qNo":79,"language":"English","questionHTML":"What was the name of the statue stolen from Khajuraho temple, which the Prime Minister of Canada handed over to the Prime Minister of India, Narendra Modi?","questionText":"What was the name of the statue stolen from Khajuraho temple, which the Prime Minister of Canada handed over to the Prime Minister of India, Narendra Modi?","options":[{"label":"A","html":"Golden Parrot","text":"Golden Parrot"},{"label":"B","html":"Singing Parrot","text":"Singing Parrot"},{"label":"C","html":"Talkative Parrot","text":"Talkative Parrot"},{"label":"D","html":"Parrot Lady","text":"Parrot Lady"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003eParrot Lady\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eIndia’s ‘Parrot Lady’ which was\u0026nbsp;stolen from Khajuraho temple, was returned\u0026nbsp;by Canadian Prime Minister Stephen Harper in 2017 to his counterpart, Narendra Modi.\u003c/li\u003e\n\t\u003cli\u003eIt is the\u0026nbsp;\u003cstrong\u003e800-year-old Indian sandstone sculpture\u003c/strong\u003e of a woman holding a parrot.\u003c/li\u003e\n\t\u003cli\u003eThe sculpture dates back to the \u003cstrong\u003e12th century\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eIt was returned following the 1\u003cstrong\u003e970 UNESCO Convention\u003c/strong\u003e, tweeted External Affairs Ministry spokesperson Syed Akbaruddin.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eThe prized Indian statue was returned at the Library of Parliament in Ottawa.\u003c/li\u003e\n\t\u003cli\u003eMr. Modi in exchange presented Mr. Harper with a miniature painting of \u003cstrong\u003eGuru Nanak Dev\u003c/strong\u003e with his disciples.\u003c/li\u003e\n\t\u003cli\u003eThe painting is by Jaipur-based artist, Virendra Bannu.\u0026nbsp;\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Parrot Lady. Key Points India’s ‘Parrot Lady’ which was stolen from Khajuraho temple, was returned by Canadian Prime Minister Stephen Harper in 2017 to his counterpart, Narendra Modi. It is the 800-year-old Indian sandstone sculpture of a woman holding a parrot. The sculpture dates back to the 12th century. It was returned following the 1970 UNESCO Convention, tweeted External Affairs Ministry spokesperson Syed Akbaruddin. Additional Information The prized Indian statue was returned at the Library of Parliament in Ottawa. Mr. Modi in exchange presented Mr. Harper with a miniature painting of Guru Nanak Dev with his disciples. The painting is by Jaipur-based artist, Virendra Bannu.","markdown":"## Q79.\n\nWhat was the name of the statue stolen from Khajuraho temple, which the Prime Minister of Canada handed over to the Prime Minister of India, Narendra Modi?\n\n### Options\n\nA. Golden Parrot\n\nB. Singing Parrot\n\nC. Talkative Parrot\n\nD. Parrot Lady\n\n**Correct Answer:** D\n\n### Solution\n\nThe correct answer is **Parrot Lady**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* India’s ‘Parrot Lady’ which was stolen from Khajuraho temple, was returned by Canadian Prime Minister Stephen Harper in 2017 to his counterpart, Narendra Modi.\n* It is the **800-year-old Indian sandstone sculpture** of a woman holding a parrot.\n* The sculpture dates back to the **12th century**.\n* It was returned following the 1**970 UNESCO Convention**, tweeted External Affairs Ministry spokesperson Syed Akbaruddin.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* The prized Indian statue was returned at the Library of Parliament in Ottawa.\n* Mr. Modi in exchange presented Mr. Harper with a miniature painting of **Guru Nanak Dev** with his disciples.\n* The painting is by Jaipur-based artist, Virendra Bannu.\n\n---\n"},"Hindi":{"qNo":79,"language":"Hindi","questionHTML":"खजुराहो मंदिर से चोरी हुई उस प्रतिमा का क्या नाम था, जिसे कनाडा के प्रधानमंत्री ने भारत के प्रधानमंत्री नरेन्द्र मोदी को सौंपा?","questionText":"खजुराहो मंदिर से चोरी हुई उस प्रतिमा का क्या नाम था, जिसे कनाडा के प्रधानमंत्री ने भारत के प्रधानमंत्री नरेन्द्र मोदी को सौंपा?","options":[{"label":"A","html":"गोल्डन पैरट","text":"गोल्डन पैरट"},{"label":"B","html":"सिंगिंग पैरट","text":"सिंगिंग पैरट"},{"label":"C","html":"टॉकेटिव पैरट","text":"टॉकेटिव पैरट"},{"label":"D","html":"पैरट लेडी","text":"पैरट लेडी"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eपैरट लेडी\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eभारत की 'पैरट लेडी' जो खजुराहो मंदिर से चुराई गई थी, 2017 में कनाडा के प्रधान मंत्री स्टीफन हार्पर ने अपने समकक्ष नरेंद्र मोदी को वापस कर दी थी।\u003c/li\u003e\n\t\u003cli\u003eयह तोता पकड़े हुए एक महिला की\u003cstrong\u003e 800 वर्ष पुरानी भारतीय बलुआ पत्थर की मूर्ति\u003c/strong\u003e है।\u003c/li\u003e\n\t\u003cli\u003eयह\u0026nbsp;मूर्तिकला \u003cstrong\u003e12वीं शताब्दी\u003c/strong\u003e की है।\u003c/li\u003e\n\t\u003cli\u003eयह \u003cstrong\u003e1970 के यूनेस्को सम्मेलन\u003c/strong\u003e के फलस्वरुप लौटाया गया था, जिसके विषय में विदेश मंत्रालय के प्रवक्ता सैयद अकबरुद्दीन ने ट्वीट किया था।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eबेशकीमती भारतीय मूर्ति को ओटावा में संसद की लाइब्रेरी में लौटाया गया।\u003c/li\u003e\n\t\u003cli\u003eबदले में श्री मोदी ने श्री हार्पर को \u003cstrong\u003eगुरु नानक देव\u003c/strong\u003e की उनके शिष्यों के साथ वाली एक लघु पेंटिंग भेंट की।\u003c/li\u003e\n\t\u003cli\u003eयह पेंटिंग जयपुर के कलाकार, वीरेंद्र बन्नू द्वारा बनाई गई है।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर पैरट लेडी है। Key Points भारत की 'पैरट लेडी' जो खजुराहो मंदिर से चुराई गई थी, 2017 में कनाडा के प्रधान मंत्री स्टीफन हार्पर ने अपने समकक्ष नरेंद्र मोदी को वापस कर दी थी। यह तोता पकड़े हुए एक महिला की 800 वर्ष पुरानी भारतीय बलुआ पत्थर की मूर्ति है। यह मूर्तिकला 12वीं शताब्दी की है। यह 1970 के यूनेस्को सम्मेलन के फलस्वरुप लौटाया गया था, जिसके विषय में विदेश मंत्रालय के प्रवक्ता सैयद अकबरुद्दीन ने ट्वीट किया था। Additional Information बेशकीमती भारतीय मूर्ति को ओटावा में संसद की लाइब्रेरी में लौटाया गया। बदले में श्री मोदी ने श्री हार्पर को गुरु नानक देव की उनके शिष्यों के साथ वाली एक लघु पेंटिंग भेंट की। यह पेंटिंग जयपुर के कलाकार, वीरेंद्र बन्नू द्वारा बनाई गई है।","markdown":"## Q79.\n\nखजुराहो मंदिर से चोरी हुई उस प्रतिमा का क्या नाम था, जिसे कनाडा के प्रधानमंत्री ने भारत के प्रधानमंत्री नरेन्द्र मोदी को सौंपा?\n\n### Options\n\nA. गोल्डन पैरट\n\nB. सिंगिंग पैरट\n\nC. टॉकेटिव पैरट\n\nD. पैरट लेडी\n\n**Correct Answer:** D\n\n### Solution\n\nसही उत्तर **पैरट लेडी** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* भारत की 'पैरट लेडी' जो खजुराहो मंदिर से चुराई गई थी, 2017 में कनाडा के प्रधान मंत्री स्टीफन हार्पर ने अपने समकक्ष नरेंद्र मोदी को वापस कर दी थी।\n* यह तोता पकड़े हुए एक महिला की**800 वर्ष पुरानी भारतीय बलुआ पत्थर की मूर्ति** है।\n* यह मूर्तिकला **12वीं शताब्दी** की है।\n* यह **1970 के यूनेस्को सम्मेलन** के फलस्वरुप लौटाया गया था, जिसके विषय में विदेश मंत्रालय के प्रवक्ता सैयद अकबरुद्दीन ने ट्वीट किया था।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* बेशकीमती भारतीय मूर्ति को ओटावा में संसद की लाइब्रेरी में लौटाया गया।\n* बदले में श्री मोदी ने श्री हार्पर को **गुरु नानक देव** की उनके शिष्यों के साथ वाली एक लघु पेंटिंग भेंट की।\n* यह पेंटिंग जयपुर के कलाकार, वीरेंद्र बन्नू द्वारा बनाई गई है।\n\n---\n"}}},{"index":80,"qNo":"Question No. 80","languages":{"English":{"qNo":80,"language":"English","questionHTML":"Which of the following books is \u003cem\u003e\u003cstrong\u003enot\u003c/strong\u003e\u003c/em\u003e written by Kalidas?","questionText":"Which of the following books is not written by Kalidas?","options":[{"label":"A","html":"Meghdootam","text":"Meghdootam"},{"label":"B","html":"Kumarasambhava","text":"Kumarasambhava"},{"label":"C","html":"Uttararamacharitam","text":"Uttararamacharitam"},{"label":"D","html":"Ritusanharam","text":"Ritusanharam"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cu\u003e\u003cstrong\u003eUttararamacharitam\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eKalidasa\u003c/strong\u003e is known to be the greatest repository of our national heritage. The serenity of his artistic accomplishment has earned him a high place in the galaxy of world poets.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eWorks of Kalidasa:\u003c/strong\u003e\n\t\u003cul\u003e\n\t\t\u003cli\u003eRitusanharam\u003c/li\u003e\n\t\t\u003cli\u003eMeghadutam\u003c/li\u003e\n\t\t\u003cli\u003eKumarasambhavam\u003c/li\u003e\n\t\t\u003cli\u003eRaghuvansham\u003c/li\u003e\n\t\t\u003cli\u003eMalavikagnimitram\u003c/li\u003e\n\t\t\u003cli\u003eVikramorvashiyam\u003c/li\u003e\n\t\t\u003cli\u003eAbhijnanashakuntalam\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eUttararamacharitam\u003c/strong\u003e is a Sanskrit play in 7 acts in the Nataka style.\u003c/li\u003e\n\t\u003cli\u003eIt is written by \u003cstrong\u003eBhavabhuti\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eIt covers the events of the Uttara Kanda of the Valmiki Ramayana\u0026nbsp;i.e. the final years of Rama\u0026nbsp;up to his ascension.\u0026nbsp;\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Uttararamacharitam. Key Points Kalidasa is known to be the greatest repository of our national heritage. The serenity of his artistic accomplishment has earned him a high place in the galaxy of world poets. Works of Kalidasa: Ritusanharam Meghadutam Kumarasambhavam Raghuvansham Malavikagnimitram Vikramorvashiyam Abhijnanashakuntalam Additional Information Uttararamacharitam is a Sanskrit play in 7 acts in the Nataka style. It is written by Bhavabhuti. It covers the events of the Uttara Kanda of the Valmiki Ramayana i.e. the final years of Rama up to his ascension.","markdown":"## Q80.\n\nWhich of the following books is _**not**_ written by Kalidas?\n\n### Options\n\nA. Meghdootam\n\nB. Kumarasambhava\n\nC. Uttararamacharitam\n\nD. Ritusanharam\n\n**Correct Answer:** C\n\n### Solution\n\nThe correct answer is **Uttararamacharitam**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **Kalidasa** is known to be the greatest repository of our national heritage. The serenity of his artistic accomplishment has earned him a high place in the galaxy of world poets.\n* **Works of Kalidasa:** \n* Ritusanharam\n* Meghadutam\n* Kumarasambhavam\n* Raghuvansham\n* Malavikagnimitram\n* Vikramorvashiyam\n* Abhijnanashakuntalam\n \n\n**![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information****\n\n \n* **Uttararamacharitam** is a Sanskrit play in 7 acts in the Nataka style.\n* It is written by **Bhavabhuti**.\n* It covers the events of the Uttara Kanda of the Valmiki Ramayana i.e. the final years of Rama up to his ascension.\n\n---\n"},"Hindi":{"qNo":80,"language":"Hindi","questionHTML":"निम्नलिखित में से कौन-सी पुस्तक कालिदास द्वारा लिखित नहीं है?","questionText":"निम्नलिखित में से कौन-सी पुस्तक कालिदास द्वारा लिखित नहीं है?","options":[{"label":"A","html":"मेघदूतम्","text":"मेघदूतम्"},{"label":"B","html":"कुमारसम्भवम्","text":"कुमारसम्भवम्"},{"label":"C","html":"उत्तररामचरितम्","text":"उत्तररामचरितम्"},{"label":"D","html":"ऋतुसंहारम्","text":"ऋतुसंहारम्"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eउत्तररामचरितम्\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eकालीदास\u003c/strong\u003e को हमारी राष्ट्रीय विरासत का सबसे बड़ा भंडार माना जाता है। उनकी कलात्मक उपलब्धि की ख्याति के फलस्वरुप उन्होंमे विश्व कवियों की आकाशगंगा में एक उच्च स्थान प्राप्त किया है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eकालीदास की कृतियां:\u003c/strong\u003e\n\t\u003cul\u003e\n\t\t\u003cli\u003eऋतुसंहारम्\u003c/li\u003e\n\t\t\u003cli\u003eमेघदूतम्\u003c/li\u003e\n\t\t\u003cli\u003eकुमारसम्भवम्\u003c/li\u003e\n\t\t\u003cli\u003eरघुवंशम्\u003c/li\u003e\n\t\t\u003cli\u003eमालविकाग्निमित्रम्\u003c/li\u003e\n\t\t\u003cli\u003eविक्रमोरवाशियाम्\u003c/li\u003e\n\t\t\u003cli\u003eअभिज्ञानशाकुंतलम्\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eउत्तररामचरितम \u003c/strong\u003eनाटक\u0026nbsp;शैली में 7 अंकों में एक संस्कृत नाटक है।\u003c/li\u003e\n\t\u003cli\u003eइसे \u003cstrong\u003eभवभूति \u003c/strong\u003eने लिखा है।\u003c/li\u003e\n\t\u003cli\u003eइसमें वाल्मीकि रामायण के उत्तर कांड अर्थात् राम के अंतिम वर्षों में उनके स्वर्गारोहण तक की घटनाओं को शामिल किया गया है।\u0026nbsp;\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर उत्तररामचरितम् है। Key Points कालीदास को हमारी राष्ट्रीय विरासत का सबसे बड़ा भंडार माना जाता है। उनकी कलात्मक उपलब्धि की ख्याति के फलस्वरुप उन्होंमे विश्व कवियों की आकाशगंगा में एक उच्च स्थान प्राप्त किया है। कालीदास की कृतियां: ऋतुसंहारम् मेघदूतम् कुमारसम्भवम् रघुवंशम् मालविकाग्निमित्रम् विक्रमोरवाशियाम् अभिज्ञानशाकुंतलम् Additional Information उत्तररामचरितम नाटक शैली में 7 अंकों में एक संस्कृत नाटक है। इसे भवभूति ने लिखा है। इसमें वाल्मीकि रामायण के उत्तर कांड अर्थात् राम के अंतिम वर्षों में उनके स्वर्गारोहण तक की घटनाओं को शामिल किया गया है।","markdown":"## Q80.\n\nनिम्नलिखित में से कौन-सी पुस्तक कालिदास द्वारा लिखित नहीं है?\n\n### Options\n\nA. मेघदूतम्\n\nB. कुमारसम्भवम्\n\nC. उत्तररामचरितम्\n\nD. ऋतुसंहारम्\n\n**Correct Answer:** C\n\n### Solution\n\nसही उत्तर **उत्तररामचरितम्** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **कालीदास** को हमारी राष्ट्रीय विरासत का सबसे बड़ा भंडार माना जाता है। उनकी कलात्मक उपलब्धि की ख्याति के फलस्वरुप उन्होंमे विश्व कवियों की आकाशगंगा में एक उच्च स्थान प्राप्त किया है।\n* **कालीदास की कृतियां:** \n* ऋतुसंहारम्\n* मेघदूतम्\n* कुमारसम्भवम्\n* रघुवंशम्\n* मालविकाग्निमित्रम्\n* विक्रमोरवाशियाम्\n* अभिज्ञानशाकुंतलम्\n \n\n**![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information****\n\n \n* **उत्तररामचरितम**नाटक शैली में 7 अंकों में एक संस्कृत नाटक है।\n* इसे **भवभूति**ने लिखा है।\n* इसमें वाल्मीकि रामायण के उत्तर कांड अर्थात् राम के अंतिम वर्षों में उनके स्वर्गारोहण तक की घटनाओं को शामिल किया गया है।\n\n---\n"}}},{"index":81,"qNo":"Question No. 81","languages":{"English":{"qNo":81,"language":"English","questionHTML":"Where is the oldest music college of Madhya Pradesh, 'Madhav Sangeet College'?","questionText":"Where is the oldest music college of Madhya Pradesh, 'Madhav Sangeet College'?","options":[{"label":"A","html":"Raipur","text":"Raipur"},{"label":"B","html":"Indore","text":"Indore"},{"label":"C","html":"Bhopal","text":"Bhopal"},{"label":"D","html":"\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003eGwalior\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","text":"Gwalior"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003eGwalior\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eThe oldest music college of Madhya Pradesh, 'Madhav Sangeet College\u0026nbsp;is in Gwalior.\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003eIt is Founded in the year 1918.\u003c/li\u003e\n\t\u003cli\u003eIt is a college affiliated with a university approved by University Grants Commission.\u003c/li\u003e\n\t\u003cli\u003eThe institute offers Diploma, Pg Diploma, Post Graduate, Under Graduate courses in various disciplines like Fine Arts, Cultural Studies.\u003c/li\u003e\n\t\u003cli\u003eIt offers 5 courses across degrees like Diploma, PG Diploma, M.A., B.Mus., B.Dance.\u0026nbsp;\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Gwalior. Key Points The oldest music college of Madhya Pradesh, 'Madhav Sangeet College is in Gwalior. It is Founded in the year 1918. It is a college affiliated with a university approved by University Grants Commission. The institute offers Diploma, Pg Diploma, Post Graduate, Under Graduate courses in various disciplines like Fine Arts, Cultural Studies. It offers 5 courses across degrees like Diploma, PG Diploma, M.A., B.Mus., B.Dance.","markdown":"## Q81.\n\nWhere is the oldest music college of Madhya Pradesh, 'Madhav Sangeet College'?\n\n### Options\n\nA. Raipur\n\nB. Indore\n\nC. Bhopal\n\nD. Gwalior\n\n**Correct Answer:** D\n\n### Solution\n\nThe correct answer is **Gwalior**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **The oldest music college of Madhya Pradesh, 'Madhav Sangeet College is in Gwalior.**\n* It is Founded in the year 1918.\n* It is a college affiliated with a university approved by University Grants Commission.\n* The institute offers Diploma, Pg Diploma, Post Graduate, Under Graduate courses in various disciplines like Fine Arts, Cultural Studies.\n* It offers 5 courses across degrees like Diploma, PG Diploma, M.A., B.Mus., B.Dance.\n\n---\n"},"Hindi":{"qNo":81,"language":"Hindi","questionHTML":"मध्यप्रदेश का सबसे पुराना संगीत महाविद्यालय, 'माधव संगीत महाविद्यालय', कहाँ स्थित है?","questionText":"मध्यप्रदेश का सबसे पुराना संगीत महाविद्यालय, 'माधव संगीत महाविद्यालय', कहाँ स्थित है?","options":[{"label":"A","html":"रायपुर","text":"रायपुर"},{"label":"B","html":"इन्दौर","text":"इन्दौर"},{"label":"C","html":"भोपाल","text":"भोपाल"},{"label":"D","html":"ग्वालियर","text":"ग्वालियर"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eग्वालियर\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eमध्य प्रदेश का सबसे पुराना संगीत महाविद्यालय, 'माधव संगीत महाविद्यालय ग्वालियर में है।\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003eइसकी स्थापना वर्ष 1918 में हुई है।\u003c/li\u003e\n\t\u003cli\u003eयह एक विश्वविद्यालय है जो विश्वविद्यालय अनुदान आयोग द्वारा अनुमोदित विश्वविद्यालय से संबद्ध है।\u003c/li\u003e\n\t\u003cli\u003eयह संस्थान ललित कला, सांस्कृतिक अध्ययन जैसे विभिन्न विषयों में डिप्लोमा, स्नातकोत्तर डिप्लोमा, स्नातकोत्तर, स्नातक पाठ्यक्रम प्रदान करता है।\u003c/li\u003e\n\t\u003cli\u003eयह डिप्लोमा, पीजी डिप्लोमा, एमए, बैचलर इन म्यूजिक, बैचलर इन डांस जैसे डिग्री प्रदान करता है।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर ग्वालियर है। Key Points मध्य प्रदेश का सबसे पुराना संगीत महाविद्यालय, 'माधव संगीत महाविद्यालय ग्वालियर में है। इसकी स्थापना वर्ष 1918 में हुई है। यह एक विश्वविद्यालय है जो विश्वविद्यालय अनुदान आयोग द्वारा अनुमोदित विश्वविद्यालय से संबद्ध है। यह संस्थान ललित कला, सांस्कृतिक अध्ययन जैसे विभिन्न विषयों में डिप्लोमा, स्नातकोत्तर डिप्लोमा, स्नातकोत्तर, स्नातक पाठ्यक्रम प्रदान करता है। यह डिप्लोमा, पीजी डिप्लोमा, एमए, बैचलर इन म्यूजिक, बैचलर इन डांस जैसे डिग्री प्रदान करता है।","markdown":"## Q81.\n\nमध्यप्रदेश का सबसे पुराना संगीत महाविद्यालय, 'माधव संगीत महाविद्यालय', कहाँ स्थित है?\n\n### Options\n\nA. रायपुर\n\nB. इन्दौर\n\nC. भोपाल\n\nD. ग्वालियर\n\n**Correct Answer:** D\n\n### Solution\n\nसही उत्तर **ग्वालियर** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **मध्य प्रदेश का सबसे पुराना संगीत महाविद्यालय, 'माधव संगीत महाविद्यालय ग्वालियर में है।**\n* इसकी स्थापना वर्ष 1918 में हुई है।\n* यह एक विश्वविद्यालय है जो विश्वविद्यालय अनुदान आयोग द्वारा अनुमोदित विश्वविद्यालय से संबद्ध है।\n* यह संस्थान ललित कला, सांस्कृतिक अध्ययन जैसे विभिन्न विषयों में डिप्लोमा, स्नातकोत्तर डिप्लोमा, स्नातकोत्तर, स्नातक पाठ्यक्रम प्रदान करता है।\n* यह डिप्लोमा, पीजी डिप्लोमा, एमए, बैचलर इन म्यूजिक, बैचलर इन डांस जैसे डिग्री प्रदान करता है।\n\n---\n"}}},{"index":82,"qNo":"Question No. 82","languages":{"English":{"qNo":82,"language":"English","questionHTML":"A 'closed economy' is an economy in which?","questionText":"A 'closed economy' is an economy in which?","options":[{"label":"A","html":"Money supply is fully controlled","text":"Money supply is fully controlled"},{"label":"B","html":"Losses are financed","text":"Losses are financed"},{"label":"C","html":"Only exports are done","text":"Only exports are done"},{"label":"D","html":"Neither exports nor imports are done","text":"Neither exports nor imports are done"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cu\u003e\u003cstrong\u003eNeither exports nor imports are done\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eA closed economy is one that has no trading activity with outside economies.\u003c/li\u003e\n\t\u003cli\u003eThe closed economy is entirely self-sufficient.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eIt means no imports come into the country and no exports leave the country\u003c/strong\u003e.\u0026nbsp;\u003c/li\u003e\n\t\u003cli\u003eIn other words,\u0026nbsp;A closed economy is \u003cstrong\u003eone that does not swap their trading with outside\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eOpen Economy:\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eAn economy in which participants are permitted to buy and sell goods and services with other countries.\u003c/li\u003e\n\t\t\u003cli\u003eThe GDP of open economies\u003cstrong\u003e includes exports\u0026nbsp;and imports.\u003c/strong\u003e\u003c/li\u003e\n\t\t\u003cli\u003eSome very open economies try to have few or no trade restrictions.\u0026nbsp;\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Neither exports nor imports are done. Key Points A closed economy is one that has no trading activity with outside economies. The closed economy is entirely self-sufficient. It means no imports come into the country and no exports leave the country. In other words, A closed economy is one that does not swap their trading with outside. Additional Information Open Economy: An economy in which participants are permitted to buy and sell goods and services with other countries. The GDP of open economies includes exports and imports. Some very open economies try to have few or no trade restrictions.","markdown":"## Q82.\n\nA 'closed economy' is an economy in which?\n\n### Options\n\nA. Money supply is fully controlled\n\nB. Losses are financed\n\nC. Only exports are done\n\nD. Neither exports nor imports are done\n\n**Correct Answer:** D\n\n### Solution\n\nThe correct answer is **Neither exports nor imports are done**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* A closed economy is one that has no trading activity with outside economies.\n* The closed economy is entirely self-sufficient.\n* **It means no imports come into the country and no exports leave the country**.\n* In other words, A closed economy is **one that does not swap their trading with outside**.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **Open Economy:** \n* An economy in which participants are permitted to buy and sell goods and services with other countries.\n* The GDP of open economies**includes exports and imports.**\n* Some very open economies try to have few or no trade restrictions.\n\n---\n"},"Hindi":{"qNo":82,"language":"Hindi","questionHTML":"एक 'बंद अर्थव्यवस्था' वह अर्थव्यवस्था है, जिसमें","questionText":"एक 'बंद अर्थव्यवस्था' वह अर्थव्यवस्था है, जिसमें","options":[{"label":"A","html":"मुद्रा-पूर्ति पूर्ण रूप से नियंत्रित होती है","text":"मुद्रा-पूर्ति पूर्ण रूप से नियंत्रित होती है"},{"label":"B","html":"घाटे का वित्तीयन होता है","text":"घाटे का वित्तीयन होता है"},{"label":"C","html":"केवल निर्यात होते हैं","text":"केवल निर्यात होते हैं"},{"label":"D","html":"न निर्यात और न ही आयात होते हैं","text":"न निर्यात और न ही आयात होते हैं"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eन निर्यात और न ही आयात होते हैं\u003c/strong\u003e\u003c/u\u003e\u003cstrong\u003e।\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eएक बंद अर्थव्यवस्था वह है जिसमें बाहरी अर्थव्यवस्थाओं के साथ कोई व्यापारिक गतिविधि नहीं होती है।\u003c/li\u003e\n\t\u003cli\u003eबंद अर्थव्यवस्था पूरी तरह से आत्मनिर्भर होती है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eइसका अर्थ है कि कोई भी आयात देश में नहीं होता है और कोई भी निर्यात देश से बाहर नहीं जाता है।\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003eदूसरे शब्दों में, एक बंद अर्थव्यवस्था वह है जो बाहर के साथ अपने व्यापार की अदला-बदली नहीं करती है।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eखुली अर्थव्यवस्था\u003c/strong\u003e\u003cstrong\u003e:\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eएक अर्थव्यवस्था जिसमें प्रतिभागियों को अन्य देशों के साथ वस्तुओं और सेवाओं को खरीदने और बेचने की अनुमति होती है।\u003c/li\u003e\n\t\t\u003cli\u003eखुली अर्थव्यवस्थाओं के सकल घरेलू उत्पाद में \u003cstrong\u003eनिर्यात और आयात शामिल\u003c/strong\u003e होते हैं।\u003c/li\u003e\n\t\t\u003cli\u003eकुछ बहुत खुली अर्थव्यवस्थाओं में कुछ या कोई व्यापार प्रतिबंध नहीं होता है।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर न निर्यात और न ही आयात होते हैं। Key Points एक बंद अर्थव्यवस्था वह है जिसमें बाहरी अर्थव्यवस्थाओं के साथ कोई व्यापारिक गतिविधि नहीं होती है। बंद अर्थव्यवस्था पूरी तरह से आत्मनिर्भर होती है। इसका अर्थ है कि कोई भी आयात देश में नहीं होता है और कोई भी निर्यात देश से बाहर नहीं जाता है। दूसरे शब्दों में, एक बंद अर्थव्यवस्था वह है जो बाहर के साथ अपने व्यापार की अदला-बदली नहीं करती है। Additional Information खुली अर्थव्यवस्था: एक अर्थव्यवस्था जिसमें प्रतिभागियों को अन्य देशों के साथ वस्तुओं और सेवाओं को खरीदने और बेचने की अनुमति होती है। खुली अर्थव्यवस्थाओं के सकल घरेलू उत्पाद में निर्यात और आयात शामिल होते हैं। कुछ बहुत खुली अर्थव्यवस्थाओं में कुछ या कोई व्यापार प्रतिबंध नहीं होता है।","markdown":"## Q82.\n\nएक 'बंद अर्थव्यवस्था' वह अर्थव्यवस्था है, जिसमें\n\n### Options\n\nA. मुद्रा-पूर्ति पूर्ण रूप से नियंत्रित होती है\n\nB. घाटे का वित्तीयन होता है\n\nC. केवल निर्यात होते हैं\n\nD. न निर्यात और न ही आयात होते हैं\n\n**Correct Answer:** D\n\n### Solution\n\nसही उत्तर **न निर्यात और न ही आयात होते हैं****।**\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* एक बंद अर्थव्यवस्था वह है जिसमें बाहरी अर्थव्यवस्थाओं के साथ कोई व्यापारिक गतिविधि नहीं होती है।\n* बंद अर्थव्यवस्था पूरी तरह से आत्मनिर्भर होती है।\n* **इसका अर्थ है कि कोई भी आयात देश में नहीं होता है और कोई भी निर्यात देश से बाहर नहीं जाता है।**\n* दूसरे शब्दों में, एक बंद अर्थव्यवस्था वह है जो बाहर के साथ अपने व्यापार की अदला-बदली नहीं करती है।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **खुली अर्थव्यवस्था****:** \n* एक अर्थव्यवस्था जिसमें प्रतिभागियों को अन्य देशों के साथ वस्तुओं और सेवाओं को खरीदने और बेचने की अनुमति होती है।\n* खुली अर्थव्यवस्थाओं के सकल घरेलू उत्पाद में **निर्यात और आयात शामिल** होते हैं।\n* कुछ बहुत खुली अर्थव्यवस्थाओं में कुछ या कोई व्यापार प्रतिबंध नहीं होता है।\n\n---\n"}}},{"index":83,"qNo":"Question No. 83","languages":{"English":{"qNo":83,"language":"English","questionHTML":"\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e\u003cspan style=\" \"\u003eThe period of the 12\u003c/span\u003e\u003cspan style=\" \"\u003eth\u003c/span\u003e\u003cspan style=\" \"\u003e\u0026nbsp;Five-Year Plan is?\u003c/span\u003e\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","questionText":"The period of the 12th Five-Year Plan is?","options":[{"label":"A","html":"2007-2012","text":"2007-2012"},{"label":"B","html":"2012-2017","text":"2012-2017"},{"label":"C","html":"2010-2015","text":"2010-2015"},{"label":"D","html":"2006-2011","text":"2006-2011"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003e2012-2017\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eThe period of the 12th Five-Year Plan was\u0026nbsp;\u003cstrong\u003e2012-2017\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eAim -\u0026nbsp; \u003cstrong\u003eFaster, More Inclusive, and Sustainable Growth\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003e12th Five Year Plan of the Government of India (2012–17) was \u003cstrong\u003eIndia's last Five Year Plan\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003e\n\t\u003cp\u003e\u0026nbsp;Its growth rate target was \u003cstrong\u003e8%\u003c/strong\u003e.\u003c/p\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e​\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eThe NDA government has \u003cstrong\u003edissolved the Planning Commission with the NITI Aayog,\u0026nbsp;\u003c/strong\u003eThus, there will be no thirteen Five Year Plan.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eNiti Aayog \u003c/strong\u003ewas Formed on\u003cstrong\u003e\u0026nbsp;1 January 2015\u003c/strong\u003e.\u0026nbsp;\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is 2012-2017. Key Points The period of the 12th Five-Year Plan was 2012-2017. Aim - Faster, More Inclusive, and Sustainable Growth. 12th Five Year Plan of the Government of India (2012–17) was India's last Five Year Plan. Its growth rate target was 8%. ​ Additional Information The NDA government has dissolved the Planning Commission with the NITI Aayog, Thus, there will be no thirteen Five Year Plan. Niti Aayog was Formed on 1 January 2015.","markdown":"## Q83.\n\nThe period of the 12th Five-Year Plan is?\n\n### Options\n\nA. 2007-2012\n\nB. 2012-2017\n\nC. 2010-2015\n\nD. 2006-2011\n\n**Correct Answer:** B\n\n### Solution\n\nThe correct answer is **2012-2017**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* The period of the 12th Five-Year Plan was **2012-2017**.\n* Aim - **Faster, More Inclusive, and Sustainable Growth**.\n* 12th Five Year Plan of the Government of India (2012–17) was **India's last Five Year Plan**.\n* Its growth rate target was **8%**.\n \n\n​![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* The NDA government has **dissolved the Planning Commission with the NITI Aayog,**Thus, there will be no thirteen Five Year Plan.\n* **Niti Aayog**was Formed on**1 January 2015**.\n\n---\n"},"Hindi":{"qNo":83,"language":"Hindi","questionHTML":"12वीं पंचवर्षीय योजना की अवधि क्या है?","questionText":"12वीं पंचवर्षीय योजना की अवधि क्या है?","options":[{"label":"A","html":"2007-2012","text":"2007-2012"},{"label":"B","html":"2012-2017","text":"2012-2017"},{"label":"C","html":"2010-2015","text":"2010-2015"},{"label":"D","html":"2006-2011","text":"2006-2011"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eसही उत्तर \u003cu\u003e\u003cstrong\u003e2012-2017\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e12वीं पंचवर्षीय योजना की अवधि \u003cstrong\u003e2012-2017\u003c/strong\u003e थी।\u003c/li\u003e\n\t\u003cli\u003eउद्देश्य -\u003cstrong\u003e तेज़, अधिक समावेशी, और संधारणीय विकास।\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003eभारत सरकार की 12वीं पंचवर्षीय योजना (2012-17) \u003cstrong\u003eभारत की अंतिम पंचवर्षीय योजना\u003c/strong\u003e थी।\u003c/li\u003e\n\t\u003cli\u003e\n\t\u003cp\u003eइसकी वृद्धि दर लक्ष्य\u003cstrong\u003e 8%\u003c/strong\u003e थी।\u003c/p\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e​\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eएनडीए सरकार ने \u003cstrong\u003eनीति आयोग के साथ योजना आयोग को भंग कर दिया है\u003c/strong\u003e, इस प्रकार, कोई तेरहवीं पंचवर्षीय योजना नहीं होगी।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003e1 जनवरी 2015 \u003c/strong\u003eको \u003cstrong\u003eनीति अयोग\u003c/strong\u003e का गठन किया गया था।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर 2012-2017 है। Key Points 12वीं पंचवर्षीय योजना की अवधि 2012-2017 थी। उद्देश्य - तेज़, अधिक समावेशी, और संधारणीय विकास। भारत सरकार की 12वीं पंचवर्षीय योजना (2012-17) भारत की अंतिम पंचवर्षीय योजना थी। इसकी वृद्धि दर लक्ष्य 8% थी। ​ Additional Information एनडीए सरकार ने नीति आयोग के साथ योजना आयोग को भंग कर दिया है, इस प्रकार, कोई तेरहवीं पंचवर्षीय योजना नहीं होगी। 1 जनवरी 2015 को नीति अयोग का गठन किया गया था।","markdown":"## Q83.\n\n12वीं पंचवर्षीय योजना की अवधि क्या है?\n\n### Options\n\nA. 2007-2012\n\nB. 2012-2017\n\nC. 2010-2015\n\nD. 2006-2011\n\n**Correct Answer:** B\n\n### Solution\n\nसही उत्तर **2012-2017** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* 12वीं पंचवर्षीय योजना की अवधि **2012-2017** थी।\n* उद्देश्य -**तेज़, अधिक समावेशी, और संधारणीय विकास।**\n* भारत सरकार की 12वीं पंचवर्षीय योजना (2012-17) **भारत की अंतिम पंचवर्षीय योजना** थी।\n* इसकी वृद्धि दर लक्ष्य**8%** थी।\n \n\n​![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* एनडीए सरकार ने **नीति आयोग के साथ योजना आयोग को भंग कर दिया है**, इस प्रकार, कोई तेरहवीं पंचवर्षीय योजना नहीं होगी।\n* **1 जनवरी 2015**को **नीति अयोग** का गठन किया गया था।\n\n---\n"}}},{"index":84,"qNo":"Question No. 84","languages":{"English":{"qNo":84,"language":"English","questionHTML":"'India Vision 2020' has been prepared by","questionText":"'India Vision 2020' has been prepared by","options":[{"label":"A","html":"S. P. Gupta Committee","text":"S. P. Gupta Committee"},{"label":"B","html":"Pant committee","text":"Pant committee"},{"label":"C","html":"Malhotra Committee","text":"Malhotra Committee"},{"label":"D","html":"\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003eNarshima Committee\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","text":"Narshima Committee"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cu\u003e\u003cstrong\u003eS. P. Gupta Committee\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003e'India Vision 2020'\u003c/strong\u003e has been prepared by\u0026nbsp;S. P. Gupta Committee.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eTitle\u003cspan style=\"white-space: pre;\"\u003e:\u003c/span\u003e\u003c/strong\u003e\n\t\u003cul\u003e\n\t\t\u003cli\u003e\u003cspan style=\"white-space:pre\"\u003e​\u003c/span\u003eIndia Vision 2020: The Report: Report of the Committee on India Vision 2020, Planning Commission, Government of India Plus Background Papers.\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eContributors -\n\t\u003cul\u003e\n\t\t\u003cli\u003e\u003cspan style=\"white-space:pre\"\u003e​\u003c/span\u003eIndia. Planning Commission, Academic Foundation (New Delhi, India)\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\n\t\u003cdiv\u003ePublisher -\u003cspan style=\"white-space:pre\"\u003e \u003c/span\u003e\u003c/div\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003e\n\t\t\u003cdiv\u003e\u003cspan style=\"white-space:pre\"\u003e​\u003c/span\u003eAcademic Foundation, 2004\u003c/div\u003e\n\t\t\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is S. P. Gupta Committee. Key Points 'India Vision 2020' has been prepared by S. P. Gupta Committee. Title: ​India Vision 2020: The Report: Report of the Committee on India Vision 2020, Planning Commission, Government of India Plus Background Papers. Additional Information Contributors - ​India. Planning Commission, Academic Foundation (New Delhi, India) Publisher - ​Academic Foundation, 2004","markdown":"## Q84.\n\n'India Vision 2020' has been prepared by\n\n### Options\n\nA. S. P. Gupta Committee\n\nB. Pant committee\n\nC. Malhotra Committee\n\nD. Narshima Committee\n\n**Correct Answer:** A\n\n### Solution\n\nThe correct answer is **S. P. Gupta Committee**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **'India Vision 2020'** has been prepared by S. P. Gupta Committee.\n* **Title:** \n* ​India Vision 2020: The Report: Report of the Committee on India Vision 2020, Planning Commission, Government of India Plus Background Papers.\n \n\n**![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information****\n\n \n* Contributors - \n* ​India. Planning Commission, Academic Foundation (New Delhi, India)\n* Publisher -\n\n \n* ​Academic Foundation, 2004\n\n---\n"},"Hindi":{"qNo":84,"language":"Hindi","questionHTML":"'इंडिया विज़न 2020' किसके द्वारा तैयार किया गया है?","questionText":"'इंडिया विज़न 2020' किसके द्वारा तैयार किया गया है?","options":[{"label":"A","html":"एस. पी. गुप्ता समिति","text":"एस. पी. गुप्ता समिति"},{"label":"B","html":"पंत समिति","text":"पंत समिति"},{"label":"C","html":"मल्होत्रा समिति","text":"मल्होत्रा समिति"},{"label":"D","html":"नरसिम्हा समिति","text":"नरसिम्हा समिति"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eएस. पी. गुप्ता समिति\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003e'इंडिया विजन 2020'\u003c/strong\u003e एस पी गुप्ता समिति द्वारा तैयार किया गया है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eशीर्षक\u003cspan style=\"white-space: pre;\"\u003e:\u003c/span\u003e\u003c/strong\u003e\n\t\u003cul\u003e\n\t\t\u003cli\u003eइंडिया विजन 2020: द रिपोर्ट: भारत विजन 2020 पर समिति की रिपोर्ट, योजना आयोग, भारत सरकार की पृष्ठभूमि पत्र।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eयोगदानकर्ता -\n\t\u003cul\u003e\n\t\t\u003cli\u003eभारत। योजना आयोग, अकादमिक फाउंडेशन (नई दिल्ली, भारत)\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\n\t\u003cdiv\u003eप्रकाशक -\u003cspan style=\"white-space:pre\"\u003e \u003c/span\u003e\u003c/div\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003e\n\t\t\u003cdiv\u003eअकादमिक फाउंडेशन, 2004\u003c/div\u003e\n\t\t\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर एस. पी. गुप्ता समिति है। Key Points 'इंडिया विजन 2020' एस पी गुप्ता समिति द्वारा तैयार किया गया है। शीर्षक: इंडिया विजन 2020: द रिपोर्ट: भारत विजन 2020 पर समिति की रिपोर्ट, योजना आयोग, भारत सरकार की पृष्ठभूमि पत्र। Additional Information योगदानकर्ता - भारत। योजना आयोग, अकादमिक फाउंडेशन (नई दिल्ली, भारत) प्रकाशक - अकादमिक फाउंडेशन, 2004","markdown":"## Q84.\n\n'इंडिया विज़न 2020' किसके द्वारा तैयार किया गया है?\n\n### Options\n\nA. एस. पी. गुप्ता समिति\n\nB. पंत समिति\n\nC. मल्होत्रा समिति\n\nD. नरसिम्हा समिति\n\n**Correct Answer:** A\n\n### Solution\n\nसही उत्तर **एस. पी. गुप्ता समिति** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **'इंडिया विजन 2020'** एस पी गुप्ता समिति द्वारा तैयार किया गया है।\n* **शीर्षक:** \n* इंडिया विजन 2020: द रिपोर्ट: भारत विजन 2020 पर समिति की रिपोर्ट, योजना आयोग, भारत सरकार की पृष्ठभूमि पत्र।\n \n\n**![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information****\n\n \n* योगदानकर्ता - \n* भारत। योजना आयोग, अकादमिक फाउंडेशन (नई दिल्ली, भारत)\n* प्रकाशक -\n\n \n* अकादमिक फाउंडेशन, 2004\n\n---\n"}}},{"index":85,"qNo":"Question No. 85","languages":{"English":{"qNo":85,"language":"English","questionHTML":"Which one of the following pairs is not correctly matched?","questionText":"Which one of the following pairs is not correctly matched?","options":[{"label":"A","html":"First World Climate Conference - 1979","text":"First World Climate Conference - 1979"},{"label":"B","html":"First Earth Summit - Agenda 21","text":"First Earth Summit - Agenda 21"},{"label":"C","html":"Earth Summit + 5 - 1997","text":"Earth Summit + 5 - 1997"},{"label":"D","html":"Carbon Trade - Montreal Protocol","text":"Carbon Trade - Montreal Protocol"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cu\u003e\u003cstrong\u003eCarbon Trade - Montreal Protocol\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eThe \u003cstrong\u003eMontreal Protocol\u003c/strong\u003e on Substances that Deplete the \u003cstrong\u003eOzone Layer\u003c/strong\u003e is the landmark multilateral environmental agreement that regulates the production and consumption of nearly 100 man-made chemicals referred to as ozone-depleting substances (ODS).\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eMontreal Protocol was signed in 1987 and entered into force in 1989.\u003c/strong\u003e The parties to the Protocol meet once a year to make decisions aimed at ensuring the successful implementation of the agreement.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eFirst World Climate Conference - 1979\u0026nbsp;\u003c/li\u003e\n\t\u003cli\u003eFirst Earth Summit - Agenda 21\u003c/li\u003e\n\t\u003cli\u003eEarth Summit + 5 - 1997\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Carbon Trade - Montreal Protocol. Key Points The Montreal Protocol on Substances that Deplete the Ozone Layer is the landmark multilateral environmental agreement that regulates the production and consumption of nearly 100 man-made chemicals referred to as ozone-depleting substances (ODS). Montreal Protocol was signed in 1987 and entered into force in 1989. The parties to the Protocol meet once a year to make decisions aimed at ensuring the successful implementation of the agreement. Additional Information First World Climate Conference - 1979 First Earth Summit - Agenda 21 Earth Summit + 5 - 1997","markdown":"## Q85.\n\nWhich one of the following pairs is not correctly matched?\n\n### Options\n\nA. First World Climate Conference - 1979\n\nB. First Earth Summit - Agenda 21\n\nC. Earth Summit + 5 - 1997\n\nD. Carbon Trade - Montreal Protocol\n\n**Correct Answer:** D\n\n### Solution\n\nThe correct answer is **Carbon Trade - Montreal Protocol**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* The **Montreal Protocol** on Substances that Deplete the **Ozone Layer** is the landmark multilateral environmental agreement that regulates the production and consumption of nearly 100 man-made chemicals referred to as ozone-depleting substances (ODS).\n* **Montreal Protocol was signed in 1987 and entered into force in 1989.** The parties to the Protocol meet once a year to make decisions aimed at ensuring the successful implementation of the agreement.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/ad

\u003c/span\u003e\u003c/p\u003e","questionText":"भारत में नियमित और वैज्ञानिक तरीके से जनगणना किस वर्ष शुरू हुई?","options":[{"label":"A","html":"1861","text":"1861"},{"label":"B","html":"1871","text":"1871"},{"label":"C","html":"1881","text":"1881"},{"label":"D","html":"1891","text":"1891"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eसही उत्तर \u003cu\u003e\u003cstrong\u003e1881\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eप्रारंभ में, भारत में जनगणना की\u003cstrong\u003e शुरुआत 1872 \u003c/strong\u003eमें लॉर्ड मेयो की गवर्नरशिप के दौरान हुई थी, लेकिन यह \u003cstrong\u003eगैर-वैज्ञानिक तरीके\u003c/strong\u003e से किया गया था।\u003c/li\u003e\n\t\u003cli\u003e\u003cu\u003e\u003cstrong\u003eवैज्ञानिक तरीके से पहली जनगणना\u003c/strong\u003e\u003c/u\u003e \u003cstrong\u003e1881 ई\u003c/strong\u003e में \u003cstrong\u003eलॉर्ड रिपन\u003c/strong\u003e के शासनकाल के दौरान शुरू की गई थी।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eभारत में जनगणना भारत के\u003cstrong\u003e रजिस्ट्रार जनरल\u003c/strong\u003e और जनगणना आयुक्त द्वारा आयोजित की जाती है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eगृह मंत्रालय\u003c/strong\u003e के अधीन।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003e10 वर्षों के अंतराल\u003c/strong\u003e में जनगणना की जाती है।\u003c/li\u003e\n\t\u003cli\u003eभारत में जनगणना \u003cstrong\u003e2011 तक 15 बार \u003c/strong\u003eआयोजित की गई है।\u003c/li\u003e\n\t\u003cli\u003eभारत की 2021 की जनगणना, 16वीं भारतीय जनगणना भी, कम से कम अक्टूबर 2023 तक स्थगित कर दी गई है।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर 1881 है। Important Points प्रारंभ में, भारत में जनगणना की शुरुआत 1872 में लॉर्ड मेयो की गवर्नरशिप के दौरान हुई थी, लेकिन यह गैर-वैज्ञानिक तरीके से किया गया था। वैज्ञानिक तरीके से पहली जनगणना 1881 ई में लॉर्ड रिपन के शासनकाल के दौरान शुरू की गई थी। Additional Information भारत में जनगणना भारत के रजिस्ट्रार जनरल और जनगणना आयुक्त द्वारा आयोजित की जाती है। गृह मंत्रालय के अधीन। 10 वर्षों के अंतराल में जनगणना की जाती है। भारत में जनगणना 2011 तक 15 बार आयोजित की गई है। भारत की 2021 की जनगणना, 16वीं भारतीय जनगणना भी, कम से कम अक्टूबर 2023 तक स्थगित कर दी गई है।","markdown":"## Q9.\n\nभारत में नियमित और वैज्ञानिक तरीके से जनगणना किस वर्ष शुरू हुई?\n\n### Options\n\nA. 1861\n\nB. 1871\n\nC. 1881\n\nD. 1891\n\n**Correct Answer:** C\n\n### Solution\n\nसही उत्तर **1881** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* प्रारंभ में, भारत में जनगणना की**शुरुआत 1872**में लॉर्ड मेयो की गवर्नरशिप के दौरान हुई थी, लेकिन यह **गैर-वैज्ञानिक तरीके** से किया गया था।\n* **वैज्ञानिक तरीके से पहली जनगणना** **1881 ई** में **लॉर्ड रिपन** के शासनकाल के दौरान शुरू की गई थी।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* भारत में जनगणना भारत के**रजिस्ट्रार जनरल** और जनगणना आयुक्त द्वारा आयोजित की जाती है।\n* **गृह मंत्रालय** के अधीन।\n* **10 वर्षों के अंतराल** में जनगणना की जाती है।\n* भारत में जनगणना **2011 तक 15 बार**आयोजित की गई है।\n* भारत की 2021 की जनगणना, 16वीं भारतीय जनगणना भी, कम से कम अक्टूबर 2023 तक स्थगित कर दी गई है।\n\n---\n"}}},{"index":10,"qNo":"Question No. 10","languages":{"English":{"qNo":10,"language":"English","questionHTML":"\u003cspan style=\"\"\u003eWhich of the following did\u0026nbsp;\u003c/span\u003e\u003cspan style=\"font-weight: 700; \"\u003eNOT\u0026nbsp;\u003c/span\u003e\u003cspan style=\"\"\u003eparticipate\u0026nbsp;in the Second Round Table Conference?\u003c/span\u003e","questionText":"Which of the following did NOT participate in the Second Round Table Conference?","options":[{"label":"A","html":"Mahadev Desai","text":"Mahadev Desai"},{"label":"B","html":"Pyarelal Nayyar","text":"Pyarelal Nayyar"},{"label":"C","html":"Madan Mohan Malviya","text":"Madan Mohan Malviya"},{"label":"D","html":"Jawahar Lal Nehru","text":"Jawahar Lal Nehru"}],"correctIndex":3,"solutionHTML":"\u003cp\u003e\u003cu\u003e\u003cstrong\u003eJawahar Lal Nehru\u003c/strong\u003e\u003c/u\u003e\u0026nbsp;did not participate\u0026nbsp;in the Second Round Table Conference.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eThe \u003cstrong\u003eSecond Round Table Conference\u003c/strong\u003e\u0026nbsp;in November 1931.\u003c/li\u003e\n\t\u003cli\u003eIn this conference \u003cstrong\u003e31 delegates\u003c/strong\u003e including \u003cstrong\u003ePyarelal Nayyar\u003c/strong\u003e, Sarojini Naidu, Annie Besant, \u003cstrong\u003eMahadan Mohan Malviya\u003c/strong\u003e, \u003cstrong\u003eMahadev Desai\u003c/strong\u003e, B.R Ambedkar, participated.\u003c/li\u003e\n\t\u003cli\u003eBut Jawaharlal \u003cstrong\u003eNehru did not participate\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eHence the correct answer is\u0026nbsp;\u003cu\u003e\u003cstrong\u003eJawahar Lal Nehru\u003c/strong\u003e\u003c/u\u003e\u003cspan style=\"font-weight: 700;\"\u003e\u003cstrong\u003e.\u003c/strong\u003e\u003c/span\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eCongress representative\u003c/strong\u003e – Mahatma Gandhi, Rangaswami Iyengar, Madan Mohan Malviya.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eDepressed classes representative\u003c/strong\u003e – Dr. B R Ambedkar.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eWomen representative\u003c/strong\u003e\u0026nbsp;– Sarojini Naidu.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eFirst\u003c/strong\u003e Round Table Conference\u0026nbsp;in November\u003cstrong\u003e 1930\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eSecond\u003c/strong\u003e Round Table Conference in September\u0026nbsp;\u003cstrong\u003e1931.\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eThird\u003c/strong\u003e Round Table Conference in\u0026nbsp;November \u003cstrong\u003e1932\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eGandhiji and Congress\u003c/strong\u003e attended \u003cstrong\u003eonly the second\u003c/strong\u003e round table conference.\u003c/li\u003e\n\t\u003cli\u003eB R \u003cstrong\u003eAmbedkar participated in all three\u003c/strong\u003e round-table conferences.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eAll three\u003c/strong\u003e round-table conferences were held \u003cstrong\u003ein London\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"Jawahar Lal Nehru did not participate in the Second Round Table Conference. Key Points The Second Round Table Conference in November 1931. In this conference 31 delegates including Pyarelal Nayyar, Sarojini Naidu, Annie Besant, Mahadan Mohan Malviya, Mahadev Desai, B.R Ambedkar, participated. But Jawaharlal Nehru did not participate. Hence the correct answer is Jawahar Lal Nehru. Additional Information Congress representative – Mahatma Gandhi, Rangaswami Iyengar, Madan Mohan Malviya. Depressed classes representative – Dr. B R Ambedkar. Women representative – Sarojini Naidu. Important Points First Round Table Conference in November 1930. Second Round Table Conference in September 1931. Third Round Table Conference in November 1932. Gandhiji and Congress attended only the second round table conference. B R Ambedkar participated in all three round-table conferences. All three round-table conferences were held in London.","markdown":"## Q10.\n\nWhich of the following did NOT participate in the Second Round Table Conference?\n\n### Options\n\nA. Mahadev Desai\n\nB. Pyarelal Nayyar\n\nC. Madan Mohan Malviya\n\nD. Jawahar Lal Nehru\n\n**Correct Answer:** D\n\n### Solution\n\n**Jawahar Lal Nehru** did not participate in the Second Round Table Conference.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* The **Second Round Table Conference** in November 1931.\n* In this conference **31 delegates** including **Pyarelal Nayyar**, Sarojini Naidu, Annie Besant, **Mahadan Mohan Malviya**, **Mahadev Desai**, B.R Ambedkar, participated.\n* But Jawaharlal **Nehru did not participate**.\n* Hence the correct answer is **Jawahar Lal Nehru****.**\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **Congress representative** – Mahatma Gandhi, Rangaswami Iyengar, Madan Mohan Malviya.\n* **Depressed classes representative** – Dr. B R Ambedkar.\n* **Women representative** – Sarojini Naidu.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* **First** Round Table Conference in November**1930**.\n* **Second** Round Table Conference in September **1931.**\n* **Third** Round Table Conference in November **1932**.\n* **Gandhiji and Congress** attended **only the second** round table conference.\n* B R **Ambedkar participated in all three** round-table conferences.\n* **All three** round-table conferences were held **in London**.\n\n---\n"},"Hindi":{"qNo":10,"language":"Hindi","questionHTML":"\u003cdiv class=\"gtx-body\" style=\"display: inline;  margin: 5px auto; padding: 5px 0px; \"\u003eनिम्नलिखित में से किसने द्वितीय गोलमेज सम्मेलन में भाग \u003cstrong\u003eनहीं\u003c/strong\u003e लिया?\u003c/div\u003e","questionText":"निम्नलिखित में से किसने द्वितीय गोलमेज सम्मेलन में भाग नहीं लिया?","options":[{"label":"A","html":"महादेव देसाई","text":"महादेव देसाई"},{"label":"B","html":"प्योरेलाल नैय्यर","text":"प्योरेलाल नैय्यर"},{"label":"C","html":"मदन मोहन मालवीय\u0026nbsp;","text":"मदन मोहन मालवीय"},{"label":"D","html":"जवाहरलाल नेहरू","text":"जवाहरलाल नेहरू"}],"correctIndex":3,"solutionHTML":"\u003cp\u003e\u003cu\u003e\u003cstrong\u003eजवाहर लाल नेहरू\u003c/strong\u003e\u003c/u\u003e ने दूसरे गोलमेज सम्मेलन में भाग नहीं लिया।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eनवंबर 1931\u0026nbsp;में \u003cstrong\u003eदूसरा गोलमेज सम्मेलन\u003c/strong\u003e\u0026nbsp;हुआ था।\u003c/li\u003e\n\t\u003cli\u003eइस सम्मेलन में \u003cstrong\u003eप्यारेलाल नैयर\u003c/strong\u003e, सरोजिनी नायडू, एनी\u0026nbsp;बेसेंट, \u003cstrong\u003eमदन मोहन मालवीय\u003c/strong\u003e, \u003cstrong\u003eमहादेव देसाई\u003c/strong\u003e, बी.आर. अंबेडकर सहित \u003cstrong\u003e31 प्रतिनिधियों ने\u003c/strong\u003e भाग लिया।\u003c/li\u003e\n\t\u003cli\u003eलेकिन जवाहरलाल \u003cstrong\u003eनेहरू ने भाग नहीं लिया\u003c/strong\u003e।\u003c/li\u003e\n\t\u003cli\u003eअतः\u0026nbsp;सही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eजवाहर लाल नेहरू\u003c/strong\u003e\u003c/u\u003e है।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eकांग्रेस\u0026nbsp;प्रतिनिधि\u003c/strong\u003e- महात्मा गांधी, रंगास्वामी अयंगर, मदन मोहन मालवीय\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eशोषित वर्ग के प्रतिनिधि\u003c/strong\u003e - डॉ.\u0026nbsp;बी.आर. अंबेडकर\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eमहिला प्रतिनिधि\u003c/strong\u003e - सरोजिनी नायडू\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eनवंबर \u003cstrong\u003e1930\u003c/strong\u003e में \u003cstrong\u003eपहला\u003c/strong\u003e गोलमेज सम्मेलन हुआ था।\u003c/li\u003e\n\t\u003cli\u003eसितम्बर\u0026nbsp;\u003cstrong\u003e1931\u003c/strong\u003e\u0026nbsp;में \u003cstrong\u003eदूसरा\u003c/strong\u003e गोलमेज सम्मेलन हुआ था।\u003c/li\u003e\n\t\u003cli\u003eनवंबर \u003cstrong\u003e1932\u003c/strong\u003e में \u003cstrong\u003eतीसरा\u003c/strong\u003e गोलमेज सम्मेलन हुआ था।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eगांधीजी और कांग्रेस\u003c/strong\u003e ने \u003cstrong\u003eकेवल दूसरे\u003c/strong\u003e गोलमेज सम्मेलन में भाग लिया था।\u003c/li\u003e\n\t\u003cli\u003eबी.आर.\u0026nbsp;\u003cstrong\u003eअंबेडकर ने तीनों\u003c/strong\u003e गोलमेज सम्मेलनों \u003cstrong\u003eमें भाग लिया\u003c/strong\u003e था।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eसभी तीन\u003c/strong\u003e गोलमेज सम्मेलन \u003cstrong\u003eलंदन में\u003c/strong\u003e आयोजित किए गए थे।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"जवाहर लाल नेहरू ने दूसरे गोलमेज सम्मेलन में भाग नहीं लिया। Key Points नवंबर 1931 में दूसरा गोलमेज सम्मेलन हुआ था। इस सम्मेलन में प्यारेलाल नैयर, सरोजिनी नायडू, एनी बेसेंट, मदन मोहन मालवीय, महादेव देसाई, बी.आर. अंबेडकर सहित 31 प्रतिनिधियों ने भाग लिया। लेकिन जवाहरलाल नेहरू ने भाग नहीं लिया। अतः सही उत्तर जवाहर लाल नेहरू है। Additional Information कांग्रेस प्रतिनिधि- महात्मा गांधी, रंगास्वामी अयंगर, मदन मोहन मालवीय शोषित वर्ग के प्रतिनिधि - डॉ. बी.आर. अंबेडकर महिला प्रतिनिधि - सरोजिनी नायडू Important Points नवंबर 1930 में पहला गोलमेज सम्मेलन हुआ था। सितम्बर 1931 में दूसरा गोलमेज सम्मेलन हुआ था। नवंबर 1932 में तीसरा गोलमेज सम्मेलन हुआ था। गांधीजी और कांग्रेस ने केवल दूसरे गोलमेज सम्मेलन में भाग लिया था। बी.आर. अंबेडकर ने तीनों गोलमेज सम्मेलनों में भाग लिया था। सभी तीन गोलमेज सम्मेलन लंदन में आयोजित किए गए थे।","markdown":"## Q10.\n\nनिम्नलिखित में से किसने द्वितीय गोलमेज सम्मेलन में भाग **नहीं** लिया?\n\n### Options\n\nA. महादेव देसाई\n\nB. प्योरेलाल नैय्यर\n\nC. मदन मोहन मालवीय\n\nD. जवाहरलाल नेहरू\n\n**Correct Answer:** D\n\n### Solution\n\n**जवाहर लाल नेहरू** ने दूसरे गोलमेज सम्मेलन में भाग नहीं लिया।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* नवंबर 1931 में **दूसरा गोलमेज सम्मेलन** हुआ था।\n* इस सम्मेलन में **प्यारेलाल नैयर**, सरोजिनी नायडू, एनी बेसेंट, **मदन मोहन मालवीय**, **महादेव देसाई**, बी.आर. अंबेडकर सहित **31 प्रतिनिधियों ने** भाग लिया।\n* लेकिन जवाहरलाल **नेहरू ने भाग नहीं लिया**।\n* अतः सही उत्तर **जवाहर लाल नेहरू** है।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **कांग्रेस प्रतिनिधि**- महात्मा गांधी, रंगास्वामी अयंगर, मदन मोहन मालवीय\n* **शोषित वर्ग के प्रतिनिधि** - डॉ. बी.आर. अंबेडकर\n* **महिला प्रतिनिधि** - सरोजिनी नायडू\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* नवंबर **1930** में **पहला** गोलमेज सम्मेलन हुआ था।\n* सितम्बर **1931** में **दूसरा** गोलमेज सम्मेलन हुआ था।\n* नवंबर **1932** में **तीसरा** गोलमेज सम्मेलन हुआ था।\n* **गांधीजी और कांग्रेस** ने **केवल दूसरे** गोलमेज सम्मेलन में भाग लिया था।\n* बी.आर. **अंबेडकर ने तीनों** गोलमेज सम्मेलनों **में भाग लिया** था।\n* **सभी तीन** गोलमेज सम्मेलन **लंदन में** आयोजित किए गए थे।\n\n---\n"}}},{"index":11,"qNo":"Question No. 11","languages":{"English":{"qNo":11,"language":"English","questionHTML":"\u003cp\u003eWhich of the following countries does \u003cstrong\u003enot\u003c/strong\u003e border with the Caspian Sea?\u003c/p\u003e","questionText":"Which of the following countries does not border with the Caspian Sea?","options":[{"label":"A","html":"Azerbaijan","text":"Azerbaijan"},{"label":"B","html":"Iran","text":"Iran"},{"label":"C","html":"Iraq","text":"Iraq"},{"label":"D","html":"Kazakhstan","text":"Kazakhstan"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003eIraq\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eSince \u003cstrong\u003eIraq does not border the Caspian Sea\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eCaspian Sea bordered by\u0026nbsp;total of \u003cstrong\u003e5 countries\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eCountries are\u0026nbsp;\u003cstrong\u003eIran\u003c/strong\u003e,\u0026nbsp;\u003cstrong\u003eAzerbaijan, Turkmenistan,\u0026nbsp;Russia, and\u0026nbsp;Kazakhstan\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cimg alt=\"\" src=\"//storage.googleapis.com/tb-img/production/20/12/Caspian%20sea.png\" style=\"width: 280px; height: 157px;\"\u003e\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eThe Caspian Sea is located in\u003cstrong\u003e Eastern\u0026nbsp;Europe\u003c/strong\u003e\u0026nbsp;and Western Asia.\u003c/li\u003e\n\t\u003cli\u003eThe Caspian Sea is the \u003cstrong\u003eworld's largest inland water body\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eIt is the \u003cstrong\u003elargest lake in the world\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eThe\u003cstrong\u003e rivers that drain\u003c/strong\u003e into the Caspian Sea are \u003cstrong\u003eVolga River, Ural River, Mtkvari, Terek River\u003c/strong\u003e.\u0026nbsp;\u0026nbsp;\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\n\u003cp style=\" text-align: justify;\"\u003e\u003cstrong\u003eMnemonic\u003c/strong\u003e: TARIK\u0026nbsp;(Read it as a\u0026nbsp;trick)\u003c/p\u003e\n\n\u003col style=\"margin-bottom: 10px;  text-align: justify;\"\u003e\n\t\u003cli\u003eA- Azerbaijan\u003c/li\u003e\n\t\u003cli\u003eT- Turkmenistan\u003c/li\u003e\n\t\u003cli\u003eR- Russia\u003c/li\u003e\n\t\u003cli\u003eI- Iran\u003c/li\u003e\n\t\u003cli\u003eK- Kazakhstan\u003c/li\u003e\n\u003c/ol\u003e","solutionText":"The correct answer is Iraq. Since Iraq does not border the Caspian Sea. Key Points Caspian Sea bordered by total of 5 countries. Countries are Iran, Azerbaijan, Turkmenistan, Russia, and Kazakhstan. Important Points The Caspian Sea is located in Eastern Europe and Western Asia. The Caspian Sea is the world's largest inland water body. It is the largest lake in the world. The rivers that drain into the Caspian Sea are Volga River, Ural River, Mtkvari, Terek River. Mnemonic: TARIK (Read it as a trick) A- Azerbaijan T- Turkmenistan R- Russia I- Iran K- Kazakhstan","markdown":"## Q11.\n\nWhich of the following countries does **not** border with the Caspian Sea?\n\n### Options\n\nA. Azerbaijan\n\nB. Iran\n\nC. Iraq\n\nD. Kazakhstan\n\n**Correct Answer:** C\n\n### Solution\n\nThe correct answer is **Iraq**.\n\n \n* Since **Iraq does not border the Caspian Sea**.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* Caspian Sea bordered by total of **5 countries**.\n* Countries are **Iran**, **Azerbaijan, Turkmenistan, Russia, and Kazakhstan**.\n \n\n![](//storage.googleapis.com/tb-img/production/20/12/Caspian%20sea.png)\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* The Caspian Sea is located in**Eastern Europe** and Western Asia.\n* The Caspian Sea is the **world's largest inland water body**.\n* It is the **largest lake in the world**.\n* The**rivers that drain** into the Caspian Sea are **Volga River, Ural River, Mtkvari, Terek River**.\n  \n\n**Mnemonic**: TARIK (Read it as a trick)\n\n \n1. A- Azerbaijan\n2. T- Turkmenistan\n3. R- Russia\n4. I- Iran\n5. K- Kazakhstan\n\n---\n"},"Hindi":{"qNo":11,"language":"Hindi","questionHTML":"\u003cp\u003eनिम्नलिखित में से कौन-सा देश कैस्पियन सागर से\u0026nbsp;सीमा नहीं बनाता है?\u003c/p\u003e","questionText":"निम्नलिखित में से कौन-सा देश कैस्पियन सागर से सीमा नहीं बनाता है?","options":[{"label":"A","html":"अज़रबैजान","text":"अज़रबैजान"},{"label":"B","html":"ईरान\u0026nbsp;","text":"ईरान"},{"label":"C","html":"इराक","text":"इराक"},{"label":"D","html":"\u003cspan style=\"color: (37, 37, 37);  \"\u003eकजाखस्तान\u003c/span\u003e","text":"कजाखस्तान"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eसही उत्तर \u003cu\u003e\u003cstrong\u003eइराक\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eइराक कैस्पियन सागर की सीमा नहीं बनाता है।\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eकुल \u003cstrong\u003e5 देशों \u003c/strong\u003eकी सीमा कैस्पियन सागर से बनी है।\u003c/li\u003e\n\t\u003cli\u003eये देश\u003cstrong\u003e ईरान, अजरबैजान, तुर्कमेनिस्तान, रूस और कजाकिस्तान\u003c/strong\u003e हैं।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cimg alt=\"\" src=\"//storage.googleapis.com/tb-img/production/20/12/Caspian%20sea.png\" style=\"width: 280px; height: 157px;\"\u003e\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eकैस्पियन सागर \u003cstrong\u003eपूर्वी यूरोप\u003c/strong\u003e और पश्चिमी एशिया में स्थित है।\u003c/li\u003e\n\t\u003cli\u003eकैस्पियन सागर \u003cstrong\u003eदुनिया का सबसे बड़ा अंतर्देशीय जल निकाय \u003c/strong\u003eहै।\u003c/li\u003e\n\t\u003cli\u003eयह\u003cstrong\u003e दुनिया की सबसे बड़ी झील\u003c/strong\u003e है।\u003c/li\u003e\n\t\u003cli\u003eकैस्पियन सागर में जाकर \u003cstrong\u003eगिरने वाली नदियाँ वोल्गा नदी, उरल नदी, मटकवरी, तेरेक नदी \u003c/strong\u003eहैं।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\n\u003cp style=\" text-align: justify;\"\u003e\u003cstrong\u003eस्मृति सहायक\u003c/strong\u003e: TARIK\u0026nbsp;(इसे ट्रिक के रुप में पढ़िए)\u003c/p\u003e\n\n\u003col style=\"margin-bottom: 10px;  text-align: justify;\"\u003e\n\t\u003cli\u003eA- अज़रबैजान\u003c/li\u003e\n\t\u003cli\u003eT- तुर्कमेनिस्तान\u003c/li\u003e\n\t\u003cli\u003eR- रुस\u003c/li\u003e\n\t\u003cli\u003eI- ईरान\u003c/li\u003e\n\t\u003cli\u003eK- कजाखस्तान\u003c/li\u003e\n\u003c/ol\u003e","solutionText":"सही उत्तर इराक है। इराक कैस्पियन सागर की सीमा नहीं बनाता है। Key Points कुल 5 देशों की सीमा कैस्पियन सागर से बनी है। ये देश ईरान, अजरबैजान, तुर्कमेनिस्तान, रूस और कजाकिस्तान हैं। Important Points कैस्पियन सागर पूर्वी यूरोप और पश्चिमी एशिया में स्थित है। कैस्पियन सागर दुनिया का सबसे बड़ा अंतर्देशीय जल निकाय है। यह दुनिया की सबसे बड़ी झील है। कैस्पियन सागर में जाकर गिरने वाली नदियाँ वोल्गा नदी, उरल नदी, मटकवरी, तेरेक नदी हैं। स्मृति सहायक: TARIK (इसे ट्रिक के रुप में पढ़िए) A- अज़रबैजान T- तुर्कमेनिस्तान R- रुस I- ईरान K- कजाखस्तान","markdown":"## Q11.\n\nनिम्नलिखित में से कौन-सा देश कैस्पियन सागर से सीमा नहीं बनाता है?\n\n### Options\n\nA. अज़रबैजान\n\nB. ईरान\n\nC. इराक\n\nD. कजाखस्तान\n\n**Correct Answer:** C\n\n### Solution\n\nसही उत्तर **इराक** है।\n\n \n* **इराक कैस्पियन सागर की सीमा नहीं बनाता है।**\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* कुल **5 देशों**की सीमा कैस्पियन सागर से बनी है।\n* ये देश**ईरान, अजरबैजान, तुर्कमेनिस्तान, रूस और कजाकिस्तान** हैं।\n \n\n![](//storage.googleapis.com/tb-img/production/20/12/Caspian%20sea.png)\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* कैस्पियन सागर **पूर्वी यूरोप** और पश्चिमी एशिया में स्थित है।\n* कैस्पियन सागर **दुनिया का सबसे बड़ा अंतर्देशीय जल निकाय**है।\n* यह**दुनिया की सबसे बड़ी झील** है।\n* कैस्पियन सागर में जाकर **गिरने वाली नदियाँ वोल्गा नदी, उरल नदी, मटकवरी, तेरेक नदी**हैं।\n  \n\n**स्मृति सहायक**: TARIK (इसे ट्रिक के रुप में पढ़िए)\n\n \n1. A- अज़रबैजान\n2. T- तुर्कमेनिस्तान\n3. R- रुस\n4. I- ईरान\n5. K- कजाखस्तान\n\n---\n"}}},{"index":12,"qNo":"Question No. 12","languages":{"English":{"qNo":12,"language":"English","questionHTML":"What is Kayal?","questionText":"What is Kayal?","options":[{"label":"A","html":"Lowland Plain","text":"Lowland Plain"},{"label":"B","html":"Ganges Delta","text":"Ganges Delta"},{"label":"C","html":"Regur of Deccan Plateau\u0026nbsp;","text":"Regur of Deccan Plateau"},{"label":"D","html":"Kerala Lagoon","text":"Kerala Lagoon"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cb\u003e\u003cu\u003eKerela Lagoon\u003c/u\u003e\u003c/b\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eThe\u0026nbsp;\u003cspan style=\"font-weight: 700;\"\u003elagoon lakes in Kerala\u003c/span\u003e\u0026nbsp;are \u003cstrong\u003eknown as Kayal\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eWord \u003cstrong\u003eKayal\u0026nbsp;means backwater\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eKerala backwaters are a network of\u003cstrong\u003e brackish lagoons\u003c/strong\u003e and \u003cstrong\u003elakes\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cimg alt=\"\" src=\"//storage.googleapis.com/tb-img/production/20/12/kerala-backwater.png\" style=\"width: 280px; height: 186px;\"\u003e\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eVembanad Kayal\u003c/strong\u003e is the \u003cstrong\u003elongest lake in India\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eKerala's \u003cstrong\u003efamous paddy\u003c/strong\u003e cultivation \u003cstrong\u003eKuttanad farming\u003c/strong\u003e is below sea level.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eFood and Agriculture (\u003cstrong\u003eFAO\u003c/strong\u003e, UN specialized agency) has \u003cstrong\u003erecognized Kuttanad\u003c/strong\u003e as Globally Important Agriculture Heritage System(\u003cstrong\u003eGIAHS\u003c/strong\u003e).\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eCapital\u003c/strong\u003e of Kerala is\u0026nbsp;\u003cstrong\u003eThiruvananthapuram\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Kerela Lagoon. Key Points The lagoon lakes in Kerala are known as Kayal. Word Kayal means backwater. Kerala backwaters are a network of brackish lagoons and lakes. Important Points Vembanad Kayal is the longest lake in India. Kerala's famous paddy cultivation Kuttanad farming is below sea level. Additional Information Food and Agriculture (FAO, UN specialized agency) has recognized Kuttanad as Globally Important Agriculture Heritage System(GIAHS). Capital of Kerala is Thiruvananthapuram.","markdown":"## Q12.\n\nWhat is Kayal?\n\n### Options\n\nA. Lowland Plain\n\nB. Ganges Delta\n\nC. Regur of Deccan Plateau\n\nD. Kerala Lagoon\n\n**Correct Answer:** D\n\n### Solution\n\nThe correct answer is **Kerela Lagoon**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* The lagoon lakes in Kerala are **known as Kayal**.\n* Word **Kayal means backwater**.\n* Kerala backwaters are a network of**brackish lagoons** and **lakes**.\n \n\n![](//storage.googleapis.com/tb-img/production/20/12/kerala-backwater.png)\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* **Vembanad Kayal** is the **longest lake in India**.\n* Kerala's **famous paddy** cultivation **Kuttanad farming** is below sea level.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* Food and Agriculture (**FAO**, UN specialized agency) has **recognized Kuttanad** as Globally Important Agriculture Heritage System(**GIAHS**).\n* **Capital** of Kerala is **Thiruvananthapuram**.\n\n---\n"},"Hindi":{"qNo":12,"language":"Hindi","questionHTML":"कयाल क्‍या है?","questionText":"कयाल क्‍या है?","options":[{"label":"A","html":"तराई के मैदान","text":"तराई के मैदान"},{"label":"B","html":"गंगा डेल्टा","text":"गंगा डेल्टा"},{"label":"C","html":"दक्कन पठार की \u003cspan style=\"color: rgb(37, 37, 37);  \"\u003eरेगुर\u003c/span\u003e","text":"दक्कन पठार की रेगुर"},{"label":"D","html":"केरल के लैगून","text":"केरल के लैगून"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eसही उत्तर \u003cu\u003e\u003cstrong\u003eकेरल के लैगून\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eकेरल में लैगून झीलों \u003c/strong\u003eको \u003cstrong\u003eकयाल के रूप में जाना \u003c/strong\u003eजाता है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eकयाल \u003c/strong\u003eशब्द का\u003cstrong\u003e अर्थ बैकवाटर\u003c/strong\u003e है।\u003c/li\u003e\n\t\u003cli\u003eकेरल बैकवाटर \u003cstrong\u003eखारे लैगून\u003c/strong\u003e और \u003cstrong\u003eझीलों\u003c/strong\u003e का एक नेटवर्क है।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cimg alt=\"\" src=\"//storage.googleapis.com/tb-img/production/20/12/kerala-backwater.png\" style=\"width: 280px; height: 186px;\"\u003e\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eवेम्बनाड कयाल\u003c/strong\u003e \u003cstrong\u003eभारत की सबसे लंबी झील\u003c/strong\u003e है।\u003c/li\u003e\n\t\u003cli\u003eकेरल की \u003cstrong\u003eप्रसिद्ध धान \u003c/strong\u003eकी कृषि \u003cstrong\u003eकुट्टनाड कृषि\u003c/strong\u003e समुद्र तल से नीचे है।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eखाद्य और कृषि (\u003cstrong\u003eएफएओ\u003c/strong\u003e, संयुक्त राष्ट्र की विशिष्ट एजेंसी) ने \u003cstrong\u003eकुट्टनाड\u003c/strong\u003e को विश्व स्तर पर महत्वपूर्ण कृषि विरासत प्रणाली (\u003cstrong\u003eजीआईएएचएस\u003c/strong\u003e) के रूप में \u003cstrong\u003eमान्यता\u003c/strong\u003e दी है।\u003c/li\u003e\n\t\u003cli\u003eकेरल की\u003cstrong\u003e राजधानी तिरुवनंतपुरम\u003c/strong\u003e है।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर केरल के लैगून है। Key Points केरल में लैगून झीलों को कयाल के रूप में जाना जाता है। कयाल शब्द का अर्थ बैकवाटर है। केरल बैकवाटर खारे लैगून और झीलों का एक नेटवर्क है। Important Points वेम्बनाड कयाल भारत की सबसे लंबी झील है। केरल की प्रसिद्ध धान की कृषि कुट्टनाड कृषि समुद्र तल से नीचे है। Additional Information खाद्य और कृषि (एफएओ, संयुक्त राष्ट्र की विशिष्ट एजेंसी) ने कुट्टनाड को विश्व स्तर पर महत्वपूर्ण कृषि विरासत प्रणाली (जीआईएएचएस) के रूप में मान्यता दी है। केरल की राजधानी तिरुवनंतपुरम है।","markdown":"## Q12.\n\nकयाल क्‍या है?\n\n### Options\n\nA. तराई के मैदान\n\nB. गंगा डेल्टा\n\nC. दक्कन पठार की रेगुर\n\nD. केरल के लैगून\n\n**Correct Answer:** D\n\n### Solution\n\nसही उत्तर **केरल के लैगून** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **केरल में लैगून झीलों**को **कयाल के रूप में जाना**जाता है।\n* **कयाल**शब्द का**अर्थ बैकवाटर** है।\n* केरल बैकवाटर **खारे लैगून** और **झीलों** का एक नेटवर्क है।\n \n\n![](//storage.googleapis.com/tb-img/production/20/12/kerala-backwater.png)\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* **वेम्बनाड कयाल** **भारत की सबसे लंबी झील** है।\n* केरल की **प्रसिद्ध धान**की कृषि **कुट्टनाड कृषि** समुद्र तल से नीचे है।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* खाद्य और कृषि (**एफएओ**, संयुक्त राष्ट्र की विशिष्ट एजेंसी) ने **कुट्टनाड** को विश्व स्तर पर महत्वपूर्ण कृषि विरासत प्रणाली (**जीआईएएचएस**) के रूप में **मान्यता** दी है।\n* केरल की**राजधानी तिरुवनंतपुरम** है।\n\n---\n"}}},{"index":13,"qNo":"Question No. 13","languages":{"English":{"qNo":13,"language":"English","questionHTML":"\u003cp\u003eWhich one of the following pairs is \u003cstrong\u003enot\u003c/strong\u003e correctly matched?\u003c/p\u003e","questionText":"Which one of the following pairs is not correctly matched?","options":[{"label":"A","html":"Canyon - River","text":"Canyon - River"},{"label":"B","html":"Zeugen-Wind","text":"Zeugen-Wind"},{"label":"C","html":"Inselberg - Glaciers","text":"Inselberg - Glaciers"},{"label":"D","html":"Moraine - Glaciers","text":"Moraine - Glaciers"}],"correctIndex":2,"solutionHTML":"\u003cp\u003e\u003cu\u003e\u003cstrong\u003eInselberg - Glaciers\u003c/strong\u003e\u003c/u\u003e is \u003cstrong\u003enot correctly matched\u003c/strong\u003e.\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eInselberg is formed by wind, not Glacier\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eAn inselberg is an\u003cstrong\u003e isolated rock hill\u0026nbsp;or small mountain\u003c/strong\u003e that \u003cstrong\u003erises abruptly\u003c/strong\u003e from a gently sloping\u0026nbsp;surrounding plain.\u0026nbsp;\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cimg alt=\"\" src=\"//storage.googleapis.com/tb-img/production/20/12/Pilot-Mountain-North-Carolina.png\" style=\"width: 280px; height: 210px;\"\u003e\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003ctable border=\"1\" cellpadding=\"1\" cellspacing=\"1\" style=\"width:350px;\"\u003e\n\t\u003ctbody\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003e\u003cu\u003e\u003cstrong\u003eLandform Agent\u003c/strong\u003e\u003c/u\u003e\u003c/td\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003e\u003cu\u003e\u003cstrong\u003eErosional Landforms\u003c/strong\u003e\u003c/u\u003e\u003c/td\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003e\u003cu\u003e\u003cstrong\u003eDepositional Landforms\u003c/strong\u003e\u003c/u\u003e\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003eAir/Wind\u003c/td\u003e\n\t\t\t\u003ctd\u003e\u003cstrong\u003eInselberg\u003c/strong\u003e, Mushroom rock, \u003cstrong\u003eZeugen\u003c/strong\u003e, etc.\u003c/td\u003e\n\t\t\t\u003ctd\u003eSand dunes, Loess, etc.\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003eGlacier\u003c/td\u003e\n\t\t\t\u003ctd\u003eCirque, Fjords, Horns,\u0026nbsp;\u003c/td\u003e\n\t\t\t\u003ctd\u003e\u003cstrong\u003eMoraines\u003c/strong\u003e, Drumlins, Eskers, etc.\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003eRiver\u003c/td\u003e\n\t\t\t\u003ctd\u003e\u003cstrong\u003eCanyon\u003c/strong\u003e,\u0026nbsp;Valleys, Gorges,\u0026nbsp;Potholes, etc.\u003c/td\u003e\n\t\t\t\u003ctd\u003eDelta,\u0026nbsp;Meanders oxbow lakes, etc.\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\u003c/tbody\u003e\n\u003c/table\u003e","solutionText":"Inselberg - Glaciers is not correctly matched. Key Points Inselberg is formed by wind, not Glacier. An inselberg is an isolated rock hill or small mountain that rises abruptly from a gently sloping surrounding plain. Additional Information Landform Agent Erosional Landforms Depositional Landforms Air/Wind Inselberg, Mushroom rock, Zeugen, etc. Sand dunes, Loess, etc. Glacier Cirque, Fjords, Horns, Moraines, Drumlins, Eskers, etc. River Canyon, Valleys, Gorges, Potholes, etc. Delta, Meanders oxbow lakes, etc.","markdown":"## Q13.\n\nWhich one of the following pairs is **not** correctly matched?\n\n### Options\n\nA. Canyon - River\n\nB. Zeugen-Wind\n\nC. Inselberg - Glaciers\n\nD. Moraine - Glaciers\n\n**Correct Answer:** C\n\n### Solution\n\n**Inselberg - Glaciers** is **not correctly matched**.![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **Inselberg is formed by wind, not Glacier**.\n* An inselberg is an**isolated rock hill or small mountain** that **rises abruptly** from a gently sloping surrounding plain.\n \n\n![](//storage.googleapis.com/tb-img/production/20/12/Pilot-Mountain-North-Carolina.png)\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n\n| Landform Agent | Erosional Landforms | Depositional Landforms |\n| --- | --- | --- |\n| Air/Wind | Inselberg, Mushroom rock, Zeugen, etc. | Sand dunes, Loess, etc. |\n| Glacier | Cirque, Fjords, Horns, | Moraines, Drumlins, Eskers, etc. |\n| River | Canyon, Valleys, Gorges, Potholes, etc. | Delta, Meanders oxbow lakes, etc. |\n\n---\n"},"Hindi":{"qNo":13,"language":"Hindi","questionHTML":"\u003cp\u003eनिम्नलिखित में से कौन-सा युग्म सही सुमेलित \u003cstrong\u003eनहीं\u003c/strong\u003e है?\u003c/p\u003e","questionText":"निम्नलिखित में से कौन-सा युग्म सही सुमेलित नहीं है?","options":[{"label":"A","html":"\u0026nbsp;कैनियन - नदी","text":"कैनियन - नदी"},{"label":"B","html":"ज्यूजन - वायु","text":"ज्यूजन - वायु"},{"label":"C","html":"इन्सेलबर्ग - हिमनद","text":"इन्सेलबर्ग - हिमनद"},{"label":"D","html":"मोरेन - हिमनद","text":"मोरेन - हिमनद"}],"correctIndex":2,"solutionHTML":"\u003cp\u003e\u003cu\u003e\u003cstrong\u003eइन्सेलबर्ग - हिमनद\u003c/strong\u003e\u003c/u\u003e \u003cstrong\u003eसही सुमेलित नहीं है।\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eइनसेलबर्ग का निर्माण हिमनद से न होकर हवा से हुआ है।\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003eइन्सेलबर्ग एक \u003cstrong\u003eपृथक चट्टानी पहाड़ी या छोटा पर्वत \u003c/strong\u003eहै जो एक सुगम ढलान के आसपास के मैदान से \u003cstrong\u003eविषम रुप से स्थित है।\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cimg alt=\"\" src=\"//storage.googleapis.com/tb-img/production/20/12/Pilot-Mountain-North-Carolina.png\" style=\"width: 280px; height: 210px;\"\u003e\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003ctable border=\"1\" cellpadding=\"1\" cellspacing=\"1\" style=\"width:350px;\"\u003e\n\t\u003ctbody\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003e\u003cu\u003e\u003cstrong\u003eस्थालाकृति कारक\u003c/strong\u003e\u003c/u\u003e\u003c/td\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003e\u003cu\u003e\u003cstrong\u003eअपरदित भूआकृतियां\u003c/strong\u003e\u003c/u\u003e\u003c/td\u003e\n\t\t\t\u003ctd style=\"text-align: center;\"\u003e\u003cu\u003e\u003cstrong\u003eनिक्षेपित भूआकृतियां\u003c/strong\u003e\u003c/u\u003e\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003eहवा/पवन\u003c/td\u003e\n\t\t\t\u003ctd\u003e\u003cstrong\u003eइनसेलबर्ग\u003c/strong\u003e, मशरूम रॉक, \u003cstrong\u003eज्यूजन\u003c/strong\u003e, आदि।\u003c/td\u003e\n\t\t\t\u003ctd\u003eरेत के टीले, ढलान आदि।\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003eहिमनद\u003c/td\u003e\n\t\t\t\u003ctd\u003eसर्क, जोर्ड्स, हॉर्न,\u003c/td\u003e\n\t\t\t\u003ctd\u003e\u003cstrong\u003eमोरेन\u003c/strong\u003e, ड्रम्लिन, एस्कर्स, आदि।\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003eनदी\u003c/td\u003e\n\t\t\t\u003ctd\u003e\u003cstrong\u003e\u0026nbsp;कैनियन\u003c/strong\u003e, घाटियाँ, दर्रे, गड्ढे आदि।\u003c/td\u003e\n\t\t\t\u003ctd\u003eडेल्टा, मेन्डर्स ऑक्सीबो झीलें, आदि।\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\u003c/tbody\u003e\n\u003c/table\u003e","solutionText":"इन्सेलबर्ग - हिमनद सही सुमेलित नहीं है। Key Points इनसेलबर्ग का निर्माण हिमनद से न होकर हवा से हुआ है। इन्सेलबर्ग एक पृथक चट्टानी पहाड़ी या छोटा पर्वत है जो एक सुगम ढलान के आसपास के मैदान से विषम रुप से स्थित है। Additional Information स्थालाकृति कारक अपरदित भूआकृतियां निक्षेपित भूआकृतियां हवा/पवन इनसेलबर्ग, मशरूम रॉक, ज्यूजन, आदि। रेत के टीले, ढलान आदि। हिमनद सर्क, जोर्ड्स, हॉर्न, मोरेन, ड्रम्लिन, एस्कर्स, आदि। नदी कैनियन, घाटियाँ, दर्रे, गड्ढे आदि। डेल्टा, मेन्डर्स ऑक्सीबो झीलें, आदि।","markdown":"## Q13.\n\nनिम्नलिखित में से कौन-सा युग्म सही सुमेलित **नहीं** है?\n\n### Options\n\nA. कैनियन - नदी\n\nB. ज्यूजन - वायु\n\nC. इन्सेलबर्ग - हिमनद\n\nD. मोरेन - हिमनद\n\n**Correct Answer:** C\n\n### Solution\n\n**इन्सेलबर्ग - हिमनद** **सही सुमेलित नहीं है।**\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **इनसेलबर्ग का निर्माण हिमनद से न होकर हवा से हुआ है।**\n* इन्सेलबर्ग एक **पृथक चट्टानी पहाड़ी या छोटा पर्वत**है जो एक सुगम ढलान के आसपास के मैदान से **विषम रुप से स्थित है।**\n \n\n![](//storage.googleapis.com/tb-img/production/20/12/Pilot-Mountain-North-Carolina.png)\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n\n| स्थालाकृति कारक | अपरदित भूआकृतियां | निक्षेपित भूआकृतियां |\n| --- | --- | --- |\n| हवा/पवन | इनसेलबर्ग, मशरूम रॉक, ज्यूजन, आदि। | रेत के टीले, ढलान आदि। |\n| हिमनद | सर्क, जोर्ड्स, हॉर्न, | मोरेन, ड्रम्लिन, एस्कर्स, आदि। |\n| नदी | कैनियन, घाटियाँ, दर्रे, गड्ढे आदि। | डेल्टा, मेन्डर्स ऑक्सीबो झीलें, आदि। |\n\n---\n"}}},{"index":14,"qNo":"Question No. 14","languages":{"English":{"qNo":14,"language":"English","questionHTML":"\u003cp\u003eStromboli is a?\u003c/p\u003e","questionText":"Stromboli is a?","options":[{"label":"A","html":"Dormant Volcano","text":"Dormant Volcano"},{"label":"B","html":"Active Volcano","text":"Active Volcano"},{"label":"C","html":"Depleted Volcano","text":"Depleted Volcano"},{"label":"D","html":"None of these","text":"None of these"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003eActive Volcano\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eStromboli is an active volcano\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eIt is one of the three\u0026nbsp;\u003cspan style=\"font-weight: 700;\"\u003eactive volcanoes in Italy\u003c/span\u003e.\u003c/li\u003e\n\t\u003cli\u003eStromboli is a small island in the \u003cstrong\u003eTyrrhenian Sea\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eThe Tyrrhenian Sea is\u003cstrong\u003e part of\u003c/strong\u003e the Mediterranean Sea.\u003c/li\u003e\n\t\u003cli\u003eIt is also \u003cstrong\u003ecalled the Lighthouse\u003c/strong\u003e of the \u003cstrong\u003eMediterranean Sea\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eBased on eruptions,\u003c/strong\u003e volcanoes can be classified into three types \u003cstrong\u003eActive, Dormant\u003c/strong\u003e, and \u003cstrong\u003eExtinct\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eActive volcanoes\u003c/strong\u003e have \u003cstrong\u003erecent eruptions\u003c/strong\u003e,\u0026nbsp;they \u003cstrong\u003emay erupt again\u003c/strong\u003e.\u003cstrong\u003e \u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eDormant volcanoes\u003c/strong\u003e have \u003cstrong\u003enot erupted for\u0026nbsp;a long time\u003c/strong\u003e,\u0026nbsp;may erupt at a future time.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eExtinct volcanoes\u003c/strong\u003e are \u003cstrong\u003enot expected to erupt\u003c/strong\u003e in the future.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eThe molten rock \u003cstrong\u003einside is Magma\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eThe molten rock \u003cstrong\u003eoutside is Lava\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Active Volcano. Key Points Stromboli is an active volcano. It is one of the three active volcanoes in Italy. Stromboli is a small island in the Tyrrhenian Sea. The Tyrrhenian Sea is part of the Mediterranean Sea. It is also called the Lighthouse of the Mediterranean Sea. Important Points Based on eruptions, volcanoes can be classified into three types Active, Dormant, and Extinct. Active volcanoes have recent eruptions, they may erupt again. Dormant volcanoes have not erupted for a long time, may erupt at a future time. Extinct volcanoes are not expected to erupt in the future. Additional Information The molten rock inside is Magma. The molten rock outside is Lava.","markdown":"## Q14.\n\nStromboli is a?\n\n### Options\n\nA. Dormant Volcano\n\nB. Active Volcano\n\nC. Depleted Volcano\n\nD. None of these\n\n**Correct Answer:** B\n\n### Solution\n\nThe correct answer is **Active Volcano**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **Stromboli is an active volcano**.\n* It is one of the three active volcanoes in Italy.\n* Stromboli is a small island in the **Tyrrhenian Sea**.\n* The Tyrrhenian Sea is**part of** the Mediterranean Sea.\n* It is also **called the Lighthouse** of the **Mediterranean Sea**.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* **Based on eruptions,** volcanoes can be classified into three types **Active, Dormant**, and **Extinct**.\n* **Active volcanoes** have **recent eruptions**, they **may erupt again**.\n* **Dormant volcanoes** have **not erupted for a long time**, may erupt at a future time.\n* **Extinct volcanoes** are **not expected to erupt** in the future.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* The molten rock **inside is Magma**.\n* The molten rock **outside is Lava**.\n\n---\n"},"Hindi":{"qNo":14,"language":"Hindi","questionHTML":"\u003cp\u003e\u003cspan style=\"color: rgb(37, 37, 37);  \"\u003eस्ट्रोम्बोलि क्या\u0026nbsp;\u003c/span\u003eहै?\u003c/p\u003e","questionText":"स्ट्रोम्बोलि क्या है?","options":[{"label":"A","html":"\u003cspan style=\"color: rgb(37, 37, 37);  \"\u003eनिष्क्रिय\u0026nbsp;\u003c/span\u003eज्वालामुखी","text":"निष्क्रिय ज्वालामुखी"},{"label":"B","html":"सक्रिय ज्वालामुखी","text":"सक्रिय ज्वालामुखी"},{"label":"C","html":"\u003cspan style=\"color: rgb(37, 37, 37);  \"\u003eअपरदित\u0026nbsp;\u003c/span\u003eज्वालामुखी","text":"अपरदित ज्वालामुखी"},{"label":"D","html":"\u003cspan style=\"color: rgb(37, 37, 37);  \"\u003eइनमें से कोई नहीं\u003c/span\u003e","text":"इनमें से कोई नहीं"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eसक्रिय ज्वालामुखी\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eस्ट्रॉम्बोली एक सक्रिय ज्वालामुखी है।\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003eयह \u003cstrong\u003eइटली के तीन सक्रिय ज्वालामुखियों\u003c/strong\u003e में से एक है।\u003c/li\u003e\n\t\u003cli\u003eस्ट्रोमबोली\u003cstrong\u003e टायर्रियन सागर\u003c/strong\u003e में एक छोटा सा द्वीप है।\u003c/li\u003e\n\t\u003cli\u003eटायर्रियन सागर भूमध्य सागर \u003cstrong\u003eका हिस्सा\u003c/strong\u003e है।\u003c/li\u003e\n\t\u003cli\u003eइसे \u003cstrong\u003eभूमध्य सागर \u003c/strong\u003eका \u003cstrong\u003eप्रकाश स्तंभ भी कहा \u003c/strong\u003eजाता है।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eविस्फोटों के आधार पर\u003c/strong\u003e, ज्वालामुखियों को तीन प्रकारों\u003cstrong\u003e सक्रिय, निष्क्रिय\u003c/strong\u003e, और\u003cstrong\u003e विलुप्त, \u003c/strong\u003eमें वर्गीकृत किया जा सकता है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eसक्रिय ज्वालामुखियों\u003c/strong\u003e में \u003cstrong\u003eहाल ही में विस्फोट\u003c/strong\u003e हुए हैं, वे \u003cstrong\u003eफिर से फट \u003c/strong\u003eसकते हैं।\u003cstrong\u003e \u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eसुप्त ज्वालामुखी\u003c/strong\u003e \u003cstrong\u003eलंबे समय तक नहीं फटे\u003c/strong\u003e, भविष्य के समय में फट सकते हैं।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eविलुप्त ज्वाला\u003c/strong\u003e\u003cspan style=\"font-weight: 700;\"\u003eमुखियों\u003c/span\u003e के भविष्य में\u003cstrong\u003e विस्फोट की उम्मीद \u003c/strong\u003eनहीं है।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eअंदर\u003c/strong\u003e पिघली हुई चट्टान\u003cstrong\u003e मैग्मा\u003c/strong\u003e होती है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eबाहर \u003c/strong\u003eपिघली हुई चट्टान \u003cstrong\u003eलावा\u003c/strong\u003e होती है।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर सक्रिय ज्वालामुखी है। Key Points स्ट्रॉम्बोली एक सक्रिय ज्वालामुखी है। यह इटली के तीन सक्रिय ज्वालामुखियों में से एक है। स्ट्रोमबोली टायर्रियन सागर में एक छोटा सा द्वीप है। टायर्रियन सागर भूमध्य सागर का हिस्सा है। इसे भूमध्य सागर का प्रकाश स्तंभ भी कहा जाता है। Important Points विस्फोटों के आधार पर, ज्वालामुखियों को तीन प्रकारों सक्रिय, निष्क्रिय, और विलुप्त, में वर्गीकृत किया जा सकता है। सक्रिय ज्वालामुखियों में हाल ही में विस्फोट हुए हैं, वे फिर से फट सकते हैं। सुप्त ज्वालामुखी लंबे समय तक नहीं फटे, भविष्य के समय में फट सकते हैं। विलुप्त ज्वालामुखियों के भविष्य में विस्फोट की उम्मीद नहीं है। Additional Information अंदर पिघली हुई चट्टान मैग्मा होती है। बाहर पिघली हुई चट्टान लावा होती है।","markdown":"## Q14.\n\nस्ट्रोम्बोलि क्या है?\n\n### Options\n\nA. निष्क्रिय ज्वालामुखी\n\nB. सक्रिय ज्वालामुखी\n\nC. अपरदित ज्वालामुखी\n\nD. इनमें से कोई नहीं\n\n**Correct Answer:** B\n\n### Solution\n\nसही उत्तर **सक्रिय ज्वालामुखी** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **स्ट्रॉम्बोली एक सक्रिय ज्वालामुखी है।**\n* यह **इटली के तीन सक्रिय ज्वालामुखियों** में से एक है।\n* स्ट्रोमबोली**टायर्रियन सागर** में एक छोटा सा द्वीप है।\n* टायर्रियन सागर भूमध्य सागर **का हिस्सा** है।\n* इसे **भूमध्य सागर**का **प्रकाश स्तंभ भी कहा**जाता है।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* **विस्फोटों के आधार पर**, ज्वालामुखियों को तीन प्रकारों**सक्रिय, निष्क्रिय**, और**विलुप्त,**में वर्गीकृत किया जा सकता है।\n* **सक्रिय ज्वालामुखियों** में **हाल ही में विस्फोट** हुए हैं, वे **फिर से फट**सकते हैं।\n* **सुप्त ज्वालामुखी** **लंबे समय तक नहीं फटे**, भविष्य के समय में फट सकते हैं।\n* **विलुप्त ज्वाला**मुखियों के भविष्य में**विस्फोट की उम्मीद**नहीं है।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **अंदर** पिघली हुई चट्टान**मैग्मा** होती है।\n* **बाहर**पिघली हुई चट्टान **लावा** होती है।\n\n---\n"}}},{"index":15,"qNo":"Question No. 15","languages":{"English":{"qNo":15,"language":"English","questionHTML":"\u003cp\u003eIn which year was the Water Pollution Prevention and Control Act implemented?\u003c/p\u003e","questionText":"In which year was the Water Pollution Prevention and Control Act implemented?","options":[{"label":"A","html":"1980\u0026nbsp;\u0026nbsp;","text":"1980"},{"label":"B","html":"1974\u0026nbsp;\u0026nbsp;","text":"1974"},{"label":"C","html":"1981\u0026nbsp;\u0026nbsp;","text":"1981"},{"label":"D","html":"None of these","text":"None of these"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003e1974\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eThe Water (Prevention and Control of Pollution) Act of 1974\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eThe Act gives\u0026nbsp;\u003cstrong\u003eregulatory authority\u003c/strong\u003e to\u0026nbsp;State Pollution Control Boards (\u003cstrong\u003eSPCB\u003c/strong\u003e).\u003c/li\u003e\n\t\t\u003cli\u003eA Central Pollution Control Board (\u003cstrong\u003eCPCB\u003c/strong\u003e)\u003cstrong\u003e formulates\u003c/strong\u003e \u003cstrong\u003epolicies\u003c/strong\u003e.\u003c/li\u003e\n\t\t\u003cli\u003eCPCB \u003cstrong\u003ecoordinates\u003c/strong\u003e activities of different \u003cstrong\u003eState Boards\u003c/strong\u003e.\u003c/li\u003e\n\t\t\u003cli\u003eThe Act \u003cstrong\u003egrants power\u003c/strong\u003e to SPCB and CPCB.\u003c/li\u003e\n\t\t\u003cli\u003eit was \u003cstrong\u003eamended\u003c/strong\u003e in the year 1988.\u003c/li\u003e\n\t\t\u003cli\u003eThe 1988 amendment act \u003cstrong\u003eempowered\u003c/strong\u003e SPCB and CPCB to \u003cstrong\u003eclose a defaulting industrial plant\u003c/strong\u003e.\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eOther pollution control and environmental protection laws\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eThe \u003cstrong\u003eWater \u003c/strong\u003e(Prevention and Control of Pollution) Act of \u003cstrong\u003e1974\u003c/strong\u003e.\u003c/li\u003e\n\t\t\u003cli\u003eThe \u003cstrong\u003eAir\u003c/strong\u003e (Prevention and Control of Pollution) Act of \u003cstrong\u003e1981\u003c/strong\u003e.\u003c/li\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eEnvironment \u003c/strong\u003e(Protection) Act of \u003cstrong\u003e1986\u003c/strong\u003e.\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is 1974. Key Points The Water (Prevention and Control of Pollution) Act of 1974 The Act gives regulatory authority to State Pollution Control Boards (SPCB). A Central Pollution Control Board (CPCB) formulates policies. CPCB coordinates activities of different State Boards. The Act grants power to SPCB and CPCB. it was amended in the year 1988. The 1988 amendment act empowered SPCB and CPCB to close a defaulting industrial plant. Important Points Other pollution control and environmental protection laws The Water (Prevention and Control of Pollution) Act of 1974. The Air (Prevention and Control of Pollution) Act of 1981. Environment (Protection) Act of 1986.","markdown":"## Q15.\n\nIn which year was the Water Pollution Prevention and Control Act implemented?\n\n### Options\n\nA. 1980\n\nB. 1974\n\nC. 1981\n\nD. None of these\n\n**Correct Answer:** B\n\n### Solution\n\nThe correct answer is **1974**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **The Water (Prevention and Control of Pollution) Act of 1974** \n* The Act gives **regulatory authority** to State Pollution Control Boards (**SPCB**).\n* A Central Pollution Control Board (**CPCB**)**formulates** **policies**.\n* CPCB **coordinates** activities of different **State Boards**.\n* The Act **grants power** to SPCB and CPCB.\n* it was **amended** in the year 1988.\n* The 1988 amendment act **empowered** SPCB and CPCB to **close a defaulting industrial plant**.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* **Other pollution control and environmental protection laws** \n* The **Water**(Prevention and Control of Pollution) Act of **1974**.\n* The **Air** (Prevention and Control of Pollution) Act of **1981**.\n* **Environment**(Protection) Act of **1986**.\n\n---\n"},"Hindi":{"qNo":15,"language":"Hindi","questionHTML":"\u003cdiv class=\"gtx-body\" style=\"display: inline;  margin: 5px auto; padding: 5px 0px; \"\u003eजल प्रदूषण निवारण और नियंत्रण अधिनियम किस वर्ष लागू किया गया था?\u003c/div\u003e","questionText":"जल प्रदूषण निवारण और नियंत्रण अधिनियम किस वर्ष लागू किया गया था?","options":[{"label":"A","html":"1980\u0026nbsp;\u0026nbsp;","text":"1980"},{"label":"B","html":"1974\u0026nbsp;\u0026nbsp;","text":"1974"},{"label":"C","html":"1981\u0026nbsp;\u0026nbsp;","text":"1981"},{"label":"D","html":"\u003cdiv class=\"gtx-body\" style=\"display: inline;  margin: 5px auto; padding: 5px 0px; \"\u003eइनमें से कोई नहीं\u003c/div\u003e","text":"इनमें से कोई नहीं"}],"correctIndex":1,"solutionHTML":"\u003cp\u003eसही उत्तर \u003cu\u003e\u003cstrong\u003e1974\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eजल (प्रदूषण निवारण और नियंत्रण) अधिनियम 1974\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eअधिनियम राज्य प्रदूषण नियंत्रण बोर्डों \u003cstrong\u003e(एसपीसीबी) \u003c/strong\u003eको \u003cstrong\u003eनियामक प्राधिकरण \u003c/strong\u003eदेता है।\u003c/li\u003e\n\t\t\u003cli\u003eएक केंद्रीय प्रदूषण नियंत्रण बोर्ड\u003cstrong\u003e (एसपीसीबी) नीतियों का निर्माण करता\u0026nbsp;है।\u003c/strong\u003e\u003c/li\u003e\n\t\t\u003cli\u003eएसपीसीबी विभिन्न \u003cstrong\u003eराज्य बोर्डों\u003c/strong\u003e की गतिविधियों का\u003cstrong\u003e समन्वय \u003c/strong\u003eकरता है।\u003c/li\u003e\n\t\t\u003cli\u003eयह\u0026nbsp;अधिनियम एसपीसीबी और सीपीसीबी को\u003cstrong\u003e शक्ति प्रदान \u003c/strong\u003eकरता है।\u003c/li\u003e\n\t\t\u003cli\u003eइसे वर्ष 1988 में \u003cstrong\u003eसंशोधित \u003c/strong\u003eकिया गया था।\u003c/li\u003e\n\t\t\u003cli\u003e1988 के संशोधन अधिनियम ने एसपीसीबी और सीपीसीबी को एक \u003cstrong\u003eडिफ़ॉल्टिंग औद्योगिक संयंत्र को बंद\u003c/strong\u003e करने का\u003cstrong\u003e अधिकार दिया।\u003c/strong\u003e\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eअन्य प्रदूषण नियंत्रण और पर्यावरण संरक्षण कानून\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eजल\u003c/strong\u003e (प्रदूषण निवारण और नियंत्रण) अधिनियम \u003cstrong\u003e1974\u003c/strong\u003e\u003c/li\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eवायु \u003c/strong\u003e(प्रदूषण निवारण और नियंत्रण) अधिनियम \u003cstrong\u003e1981\u003c/strong\u003e\u003c/li\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eपर्यावरण\u003c/strong\u003e (संरक्षण) अधिनियम \u003cstrong\u003e1986\u003c/strong\u003e\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर 1974 है। Key Points जल (प्रदूषण निवारण और नियंत्रण) अधिनियम 1974 अधिनियम राज्य प्रदूषण नियंत्रण बोर्डों (एसपीसीबी) को नियामक प्राधिकरण देता है। एक केंद्रीय प्रदूषण नियंत्रण बोर्ड (एसपीसीबी) नीतियों का निर्माण करता है। एसपीसीबी विभिन्न राज्य बोर्डों की गतिविधियों का समन्वय करता है। यह अधिनियम एसपीसीबी और सीपीसीबी को शक्ति प्रदान करता है। इसे वर्ष 1988 में संशोधित किया गया था। 1988 के संशोधन अधिनियम ने एसपीसीबी और सीपीसीबी को एक डिफ़ॉल्टिंग औद्योगिक संयंत्र को बंद करने का अधिकार दिया। Important Points अन्य प्रदूषण नियंत्रण और पर्यावरण संरक्षण कानून जल (प्रदूषण निवारण और नियंत्रण) अधिनियम 1974 वायु (प्रदूषण निवारण और नियंत्रण) अधिनियम 1981 पर्यावरण (संरक्षण) अधिनियम 1986","markdown":"## Q15.\n\nजल प्रदूषण निवारण और नियंत्रण अधिनियम किस वर्ष लागू किया गया था?\n\n### Options\n\nA. 1980\n\nB. 1974\n\nC. 1981\n\nD. इनमें से कोई नहीं\n\n**Correct Answer:** B\n\n### Solution\n\nसही उत्तर **1974** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **जल (प्रदूषण निवारण और नियंत्रण) अधिनियम 1974** \n* अधिनियम राज्य प्रदूषण नियंत्रण बोर्डों **(एसपीसीबी)**को **नियामक प्राधिकरण**देता है।\n* एक केंद्रीय प्रदूषण नियंत्रण बोर्ड**(एसपीसीबी) नीतियों का निर्माण करता है।**\n* एसपीसीबी विभिन्न **राज्य बोर्डों** की गतिविधियों का**समन्वय**करता है।\n* यह अधिनियम एसपीसीबी और सीपीसीबी को**शक्ति प्रदान**करता है।\n* इसे वर्ष 1988 में **संशोधित**किया गया था।\n* 1988 के संशोधन अधिनियम ने एसपीसीबी और सीपीसीबी को एक **डिफ़ॉल्टिंग औद्योगिक संयंत्र को बंद** करने का**अधिकार दिया।**\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* **अन्य प्रदूषण नियंत्रण और पर्यावरण संरक्षण कानून** \n* **जल** (प्रदूषण निवारण और नियंत्रण) अधिनियम **1974**\n* **वायु**(प्रदूषण निवारण और नियंत्रण) अधिनियम **1981**\n* **पर्यावरण** (संरक्षण) अधिनियम **1986**\n\n---\n"}}},{"index":16,"qNo":"Question No. 16","languages":{"English":{"qNo":16,"language":"English","questionHTML":"\u003cp\u003eAccording to the 2011 census, population density in India is?\u003c/p\u003e","questionText":"According to the 2011 census, population density in India is?","options":[{"label":"A","html":"325\u0026nbsp;","text":"325"},{"label":"B","html":"335\u0026nbsp;","text":"335"},{"label":"C","html":"382\u0026nbsp;","text":"382"},{"label":"D","html":"385\u0026nbsp;","text":"385"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003e382\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eAccording to the 2011 census\u003c/strong\u003e, the\u0026nbsp;\u003cstrong\u003epopulation density of India is 382\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eCensus in India conducted by the\u0026nbsp;\u003cspan style=\"font-weight: 700;\"\u003eRegistrar General\u003c/span\u003e\u0026nbsp;and \u003cstrong\u003eCensus Commissioner\u003c/strong\u003e of India.\u003c/li\u003e\n\t\u003cli\u003eUnder the\u0026nbsp;\u003cspan style=\"font-weight: 700;\"\u003eMinistry of Home Affairs\u003c/span\u003e.\u003c/li\u003e\n\t\u003cli\u003eCensus conducted in a\u0026nbsp;\u003cspan style=\"font-weight: 700;\"\u003egap period of 10 years\u003c/span\u003e.\u003c/li\u003e\n\t\u003cli\u003eCensus in India has been conducted\u0026nbsp;\u003cspan style=\"font-weight: 700;\"\u003e15 times till 2011\u003c/span\u003e.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is 382. Key Points According to the 2011 census, the population density of India is 382. Important Points Census in India conducted by the Registrar General and Census Commissioner of India. Under the Ministry of Home Affairs. Census conducted in a gap period of 10 years. Census in India has been conducted 15 times till 2011.","markdown":"## Q16.\n\nAccording to the 2011 census, population density in India is?\n\n### Options\n\nA. 325\n\nB. 335\n\nC. 382\n\nD. 385\n\n**Correct Answer:** C\n\n### Solution\n\nThe correct answer is **382**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **According to the 2011 census**, the **population density of India is 382**.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* Census in India conducted by the Registrar General and **Census Commissioner** of India.\n* Under the Ministry of Home Affairs.\n* Census conducted in a gap period of 10 years.\n* Census in India has been conducted 15 times till 2011.\n\n---\n"},"Hindi":{"qNo":16,"language":"Hindi","questionHTML":"\u003cp\u003e2011\u0026nbsp;की जनगणना के अनुसार, भारत में\u0026nbsp;जनसंख्या कितना\u0026nbsp;घनत्व है?\u003c/p\u003e","questionText":"2011 की जनगणना के अनुसार, भारत में जनसंख्या कितना घनत्व है?","options":[{"label":"A","html":"325\u0026nbsp;","text":"325"},{"label":"B","html":"335\u0026nbsp;","text":"335"},{"label":"C","html":"382\u0026nbsp;","text":"382"},{"label":"D","html":"385\u0026nbsp;","text":"385"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eसही उत्तर \u003cu\u003e\u003cstrong\u003e382\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003e2011 की जनगणना के अनुसार, भारत का जनसंख्या घनत्व 382 है।\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eभारत में जनगणना भारत के\u003cspan style=\"font-weight: 700;\"\u003e\u0026nbsp;रजिस्ट्रार जनरल\u003c/span\u003e\u0026nbsp;और जनगणना आयुक्त द्वारा आयोजित की जाती है।\u003c/li\u003e\n\t\u003cli\u003e\u003cspan style=\"font-weight: 700;\"\u003eगृह मंत्रालय\u003c/span\u003e\u0026nbsp;के अधीन।\u003c/li\u003e\n\t\u003cli\u003e\u003cspan style=\"font-weight: 700;\"\u003e10 वर्षों के अंतराल\u003c/s

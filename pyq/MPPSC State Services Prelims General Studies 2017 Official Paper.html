y Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eBrahmanas are most important among several other texts, which were composed in ancient times to explain the difficult meaning and secret knowledge of the Vedic Samhitas.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eRigveda\u003c/strong\u003e :\n\n\t\u003cul\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eAitareya Brahmana\u003c/strong\u003e\u003c/li\u003e\n\t\t\u003cli\u003eKaushitaki / Sankhayana Brahmana\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003eShukla-Yajurveda :\n\t\u003cul\u003e\n\t\t\u003cli\u003eShatapatha Brahmana\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003eKrishna-Yajurveda :\n\t\u003cul\u003e\n\t\t\u003cli\u003eTaittiriya Brahmana\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003eSamaveda:\n\t\u003cul\u003e\n\t\t\u003cli\u003eTandya Brahmana,\u003c/li\u003e\n\t\t\u003cli\u003eShadvinsha Brahmana,\u003c/li\u003e\n\t\t\u003cli\u003eSamavidhana Brahmana,\u003c/li\u003e\n\t\t\u003cli\u003eArsheya Brahmana,\u003c/li\u003e\n\t\t\u003cli\u003eDaivata/ Devatadhyaya Brahmana,\u003c/li\u003e\n\t\t\u003cli\u003eUpanishad Brahmana,\u003c/li\u003e\n\t\t\u003cli\u003eSamhitopanishad Brahmana,\u003c/li\u003e\n\t\t\u003cli\u003eVamsha Brahmana,\u003c/li\u003e\n\t\t\u003cli\u003eJaiminiya Brahmana,\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003eAtharvaveda :\n\t\u003cul\u003e\n\t\t\u003cli\u003eGopatha Braman\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Aitareya Brahmin. Key Points Brahmanas are most important among several other texts, which were composed in ancient times to explain the difficult meaning and secret knowledge of the Vedic Samhitas. Additional Information Rigveda : Aitareya Brahmana Kaushitaki / Sankhayana Brahmana Shukla-Yajurveda : Shatapatha Brahmana Krishna-Yajurveda : Taittiriya Brahmana Samaveda: Tandya Brahmana, Shadvinsha Brahmana, Samavidhana Brahmana, Arsheya Brahmana, Daivata/ Devatadhyaya Brahmana, Upanishad Brahmana, Samhitopanishad Brahmana, Vamsha Brahmana, Jaiminiya Brahmana, Atharvaveda : Gopatha Braman","markdown":"## Q96.\n\nWhich of the following Brahmin text is related to Rigveda?\n\n### Options\n\nA. Aitareya Brahmin\n\nB. Gopath Brahmin\n\nC. Shatapatha Brahmin\n\nD. Taittiriya Brahmin\n\n**Correct Answer:** A\n\n### Solution\n\nThe correct answer is **Aitareya Brahmin**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* Brahmanas are most important among several other texts, which were composed in ancient times to explain the difficult meaning and secret knowledge of the Vedic Samhitas.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **Rigveda** : \n* **Aitareya Brahmana**\n* Kaushitaki / Sankhayana Brahmana\n* Shukla-Yajurveda : \n* Shatapatha Brahmana\n* Krishna-Yajurveda : \n* Taittiriya Brahmana\n* Samaveda: \n* Tandya Brahmana,\n* Shadvinsha Brahmana,\n* Samavidhana Brahmana,\n* Arsheya Brahmana,\n* Daivata/ Devatadhyaya Brahmana,\n* Upanishad Brahmana,\n* Samhitopanishad Brahmana,\n* Vamsha Brahmana,\n* Jaiminiya Brahmana,\n* Atharvaveda : \n* Gopatha Braman\n\n---\n"},"Hindi":{"qNo":96,"language":"Hindi","questionHTML":"निम्नलिखित में से कौन-सा ब्राह्मण ग्रन्थ ऋग्वेद से संबंधित है?","questionText":"निम्नलिखित में से कौन-सा ब्राह्मण ग्रन्थ ऋग्वेद से संबंधित है?","options":[{"label":"A","html":"ऐतरेय ब्राह्मण","text":"ऐतरेय ब्राह्मण"},{"label":"B","html":"गोपथ ब्राह्मण","text":"गोपथ ब्राह्मण"},{"label":"C","html":"शतपथ ब्राह्मण","text":"शतपथ ब्राह्मण"},{"label":"D","html":"तैत्तिरीय ब्राह्मण","text":"तैत्तिरीय ब्राह्मण"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eऐतरेय ब्राह्मण\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eकई अन्य ग्रंथों में ब्राह्मण सबसे महत्वपूर्ण हैं, जिन्हें प्राचीन काल में वैदिक संहिताओं के कठिन अर्थ और गुप्त ज्ञान की व्याख्या करने के लिए बनाया गया था।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eऋगवेद\u003c/strong\u003e :\n\n\t\u003cul\u003e\n\t\t\u003cli\u003e\u003cstrong\u003eऐतरेय ब्राह्मण\u003c/strong\u003e\u003c/li\u003e\n\t\t\u003cli\u003eकौशीतकी/सांख्यान ब्राह्मण\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003eशुक्ल-यजुर्वेद :\n\t\u003cul\u003e\n\t\t\u003cli\u003eशतपथ ब्राह्मण\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003eकृष्ण-यजुर्वेद :\n\t\u003cul\u003e\n\t\t\u003cli\u003eतैत्तिरीय ब्राह्मण\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003eसामवेद:\n\t\u003cul\u003e\n\t\t\u003cli\u003eताण्ड्य ब्राह्मण,\u003c/li\u003e\n\t\t\u003cli\u003eषडविंश ब्राह्मण,\u003c/li\u003e\n\t\t\u003cli\u003eसामवेदना ब्राह्मण,\u003c/li\u003e\n\t\t\u003cli\u003eआर्षेय ब्राह्मण,\u003c/li\u003e\n\t\t\u003cli\u003eदैवता/ देवताध्याय ब्राह्मण,\u003c/li\u003e\n\t\t\u003cli\u003eउपनिषद ब्राह्मण,\u003c/li\u003e\n\t\t\u003cli\u003eसंहितापनिषद् ब्राह्मण,\u003c/li\u003e\n\t\t\u003cli\u003eवमषा ब्राह्मण,\u003c/li\u003e\n\t\t\u003cli\u003eजैमिनीय ब्राह्मण,\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003eअथर्ववेद :\n\t\u003cul\u003e\n\t\t\u003cli\u003eगोपथ ब्राह्मण\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर ऐतरेय ब्राह्मण है। Key Points कई अन्य ग्रंथों में ब्राह्मण सबसे महत्वपूर्ण हैं, जिन्हें प्राचीन काल में वैदिक संहिताओं के कठिन अर्थ और गुप्त ज्ञान की व्याख्या करने के लिए बनाया गया था। Additional Information ऋगवेद : ऐतरेय ब्राह्मण कौशीतकी/सांख्यान ब्राह्मण शुक्ल-यजुर्वेद : शतपथ ब्राह्मण कृष्ण-यजुर्वेद : तैत्तिरीय ब्राह्मण सामवेद: ताण्ड्य ब्राह्मण, षडविंश ब्राह्मण, सामवेदना ब्राह्मण, आर्षेय ब्राह्मण, दैवता/ देवताध्याय ब्राह्मण, उपनिषद ब्राह्मण, संहितापनिषद् ब्राह्मण, वमषा ब्राह्मण, जैमिनीय ब्राह्मण, अथर्ववेद : गोपथ ब्राह्मण","markdown":"## Q96.\n\nनिम्नलिखित में से कौन-सा ब्राह्मण ग्रन्थ ऋग्वेद से संबंधित है?\n\n### Options\n\nA. ऐतरेय ब्राह्मण\n\nB. गोपथ ब्राह्मण\n\nC. शतपथ ब्राह्मण\n\nD. तैत्तिरीय ब्राह्मण\n\n**Correct Answer:** A\n\n### Solution\n\nसही उत्तर **ऐतरेय ब्राह्मण** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* कई अन्य ग्रंथों में ब्राह्मण सबसे महत्वपूर्ण हैं, जिन्हें प्राचीन काल में वैदिक संहिताओं के कठिन अर्थ और गुप्त ज्ञान की व्याख्या करने के लिए बनाया गया था।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **ऋगवेद** : \n* **ऐतरेय ब्राह्मण**\n* कौशीतकी/सांख्यान ब्राह्मण\n* शुक्ल-यजुर्वेद : \n* शतपथ ब्राह्मण\n* कृष्ण-यजुर्वेद : \n* तैत्तिरीय ब्राह्मण\n* सामवेद: \n* ताण्ड्य ब्राह्मण,\n* षडविंश ब्राह्मण,\n* सामवेदना ब्राह्मण,\n* आर्षेय ब्राह्मण,\n* दैवता/ देवताध्याय ब्राह्मण,\n* उपनिषद ब्राह्मण,\n* संहितापनिषद् ब्राह्मण,\n* वमषा ब्राह्मण,\n* जैमिनीय ब्राह्मण,\n* अथर्ववेद : \n* गोपथ ब्राह्मण\n\n---\n"}}},{"index":97,"qNo":"Question No. 97","languages":{"English":{"qNo":97,"language":"English","questionHTML":"The 'Goods and Services Tax' was proposed by a task force, headed by","questionText":"The 'Goods and Services Tax' was proposed by a task force, headed by","options":[{"label":"A","html":"Vijay Kelkar","text":"Vijay Kelkar"},{"label":"B","html":"Montek Singh Ahluwalia","text":"Montek Singh Ahluwalia"},{"label":"C","html":"Arun Jaitley","text":"Arun Jaitley"},{"label":"D","html":"\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003eNarasimha\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","text":"Narasimha"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cu\u003e\u003cstrong\u003eVijay Kelkar\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eThe \u003cstrong\u003e'Goods and Services Tax' \u003c/strong\u003ewas proposed by a task force, headed by \u003cstrong\u003eVijay Kelkar\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eImportant Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eMostly All the taxes mentioned earlier are proposed to be subsumed in \u003cstrong\u003ea single tax\u003c/strong\u003e called the \u003cstrong\u003eGoods and Services Tax (GST)\u003c/strong\u003e which will be levied on the supply of goods or services or both at each stage of supply chain starting from manufacture or import and till the last retail level. So basically any tax that is presently being levied by the Central or State Government on the supply of goods or services is going to be converted into GST.\u003c/li\u003e\n\t\u003cli\u003eGST is proposed to be a dual levy where the Central Government will levy and collect Central GST (\u003cstrong\u003eCGST\u003c/strong\u003e) and the State will levy and collect State GST (\u003cstrong\u003eSGST\u003c/strong\u003e) on intra-state supply of goods or services. The Centre will also levy and collect Integrated GST (\u003cstrong\u003eIGST\u003c/strong\u003e) on inter-state supply of goods or services. Thus GST is a unifier that is going to integrate various taxes being levied by the Centre and the State at present and provide a platform for forging an economic union of the country.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Vijay Kelkar. The 'Goods and Services Tax' was proposed by a task force, headed by Vijay Kelkar. Important Points Mostly All the taxes mentioned earlier are proposed to be subsumed in a single tax called the Goods and Services Tax (GST) which will be levied on the supply of goods or services or both at each stage of supply chain starting from manufacture or import and till the last retail level. So basically any tax that is presently being levied by the Central or State Government on the supply of goods or services is going to be converted into GST. GST is proposed to be a dual levy where the Central Government will levy and collect Central GST (CGST) and the State will levy and collect State GST (SGST) on intra-state supply of goods or services. The Centre will also levy and collect Integrated GST (IGST) on inter-state supply of goods or services. Thus GST is a unifier that is going to integrate various taxes being levied by the Centre and the State at present and provide a platform for forging an economic union of the country.","markdown":"## Q97.\n\nThe 'Goods and Services Tax' was proposed by a task force, headed by\n\n### Options\n\nA. Vijay Kelkar\n\nB. Montek Singh Ahluwalia\n\nC. Arun Jaitley\n\nD. Narasimha\n\n**Correct Answer:** A\n\n### Solution\n\nThe correct answer is **Vijay Kelkar**.\n\n \n* The **'Goods and Services Tax'**was proposed by a task force, headed by **Vijay Kelkar**.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/important-point-image.png)**Important Points**\n\n \n* Mostly All the taxes mentioned earlier are proposed to be subsumed in **a single tax** called the **Goods and Services Tax (GST)** which will be levied on the supply of goods or services or both at each stage of supply chain starting from manufacture or import and till the last retail level. So basically any tax that is presently being levied by the Central or State Government on the supply of goods or services is going to be converted into GST.\n* GST is proposed to be a dual levy where the Central Government will levy and collect Central GST (**CGST**) and the State will levy and collect State GST (**SGST**) on intra-state supply of goods or services. The Centre will also levy and collect Integrated GST (**IGST**) on inter-state supply of goods or services. Thus GST is a unifier that is going to integrate various taxes being levied by the Centre and the State at present and provide a platform for forging an economic union of the country.\n\n---\n"},"Hindi":{"qNo":97,"language":"Hindi","questionHTML":"'वस्तु एवं सेवा कर' एक कार्य समिति द्वारा प्रस्तावित किया गया था, जिसके अध्यक्ष थे:","questionText":"'वस्तु एवं सेवा कर' एक कार्य समिति द्वारा प्रस्तावित किया गया था, जिसके अध्यक्ष थे:","options":[{"label":"A","html":"विजय केलकर","text":"विजय केलकर"},{"label":"B","html":"मोंटेक सिंह अहलूवालिया","text":"मोंटेक सिंह अहलूवालिया"},{"label":"C","html":"अरुण जेटली","text":"अरुण जेटली"},{"label":"D","html":"नरसिम्हा","text":"नरसिम्हा"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eविजय केलकर\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e'वस्तु एवं सेवा कर' एक कार्य समिति\u0026nbsp;द्वारा प्रस्तावित किया गया था, जिसके प्रमुख \u003cstrong\u003eविजय केलकर\u003c/strong\u003e थे।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eज्यादातर सभी पहले उल्लिखित करों को \u003cstrong\u003eएक ही कर\u003c/strong\u003e में प्रस्तावित किया गया\u0026nbsp;है जिसे व\u003cstrong\u003eस्तु एवं सेवा कर (जीएसटी)\u003c/strong\u003e कहा जाता है, जो माल या सेवाओं की आपूर्ति या दोनों निर्माण या आयात से शुरू होने वाली आपूर्ति श्रृंखला के प्रत्येक चरण में और अंतिम खुदरा स्तर पर लगाया जाएगा। इसलिए मूल रूप से कोई भी कर जो वर्तमान में केंद्र या राज्य सरकार द्वारा वस्तुओं या सेवाओं की आपूर्ति पर लगाया जाता है, जीएसटी में परिवर्तित होने जा रहा है।\u003c/li\u003e\n\t\u003cli\u003eजीएसटी एक दोहरे\u0026nbsp;करारोपण\u0026nbsp;के रूप में प्रस्तावित है जहां केंद्र सरकार केंद्रीय जीएसटी (\u003cstrong\u003eसीजीएसटी\u003c/strong\u003e) लगाएगी और एकत्रित करेगी और राज्य वस्तुओं या सेवाओं की अंतर-राज्य आपूर्ति पर राज्य जीएसटी (\u003cstrong\u003eएसजीएसटी\u003c/strong\u003e) लगाएगी और एकत्र करेगी। केंद्र वस्तुओं या सेवाओं की अंतर-राज्य आपूर्ति पर एकीकृत जीएसटी (\u003cstrong\u003eआईजीएसटी\u003c/strong\u003e) भी लगाएगा और एकत्रित करेगा। इस प्रकार जीएसटी एक ऐसा एकीकरण है जो केंद्र और राज्य द्वारा वर्तमान में लगाए जा रहे विभिन्न करों को एकीकृत करने जा रहा है और देश के आर्थिक संघ बनाने के लिए एक मंच प्रदान करता है।\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर विजय केलकर है। 'वस्तु एवं सेवा कर' एक कार्य समिति द्वारा प्रस्तावित किया गया था, जिसके प्रमुख विजय केलकर थे। Key Points ज्यादातर सभी पहले उल्लिखित करों को एक ही कर में प्रस्तावित किया गया है जिसे वस्तु एवं सेवा कर (जीएसटी) कहा जाता है, जो माल या सेवाओं की आपूर्ति या दोनों निर्माण या आयात से शुरू होने वाली आपूर्ति श्रृंखला के प्रत्येक चरण में और अंतिम खुदरा स्तर पर लगाया जाएगा। इसलिए मूल रूप से कोई भी कर जो वर्तमान में केंद्र या राज्य सरकार द्वारा वस्तुओं या सेवाओं की आपूर्ति पर लगाया जाता है, जीएसटी में परिवर्तित होने जा रहा है। जीएसटी एक दोहरे करारोपण के रूप में प्रस्तावित है जहां केंद्र सरकार केंद्रीय जीएसटी (सीजीएसटी) लगाएगी और एकत्रित करेगी और राज्य वस्तुओं या सेवाओं की अंतर-राज्य आपूर्ति पर राज्य जीएसटी (एसजीएसटी) लगाएगी और एकत्र करेगी। केंद्र वस्तुओं या सेवाओं की अंतर-राज्य आपूर्ति पर एकीकृत जीएसटी (आईजीएसटी) भी लगाएगा और एकत्रित करेगा। इस प्रकार जीएसटी एक ऐसा एकीकरण है जो केंद्र और राज्य द्वारा वर्तमान में लगाए जा रहे विभिन्न करों को एकीकृत करने जा रहा है और देश के आर्थिक संघ बनाने के लिए एक मंच प्रदान करता है।","markdown":"## Q97.\n\n'वस्तु एवं सेवा कर' एक कार्य समिति द्वारा प्रस्तावित किया गया था, जिसके अध्यक्ष थे:\n\n### Options\n\nA. विजय केलकर\n\nB. मोंटेक सिंह अहलूवालिया\n\nC. अरुण जेटली\n\nD. नरसिम्हा\n\n**Correct Answer:** A\n\n### Solution\n\nसही उत्तर **विजय केलकर** है।\n\n \n* 'वस्तु एवं सेवा कर' एक कार्य समिति द्वारा प्रस्तावित किया गया था, जिसके प्रमुख **विजय केलकर** थे।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* ज्यादातर सभी पहले उल्लिखित करों को **एक ही कर** में प्रस्तावित किया गया है जिसे व**स्तु एवं सेवा कर (जीएसटी)** कहा जाता है, जो माल या सेवाओं की आपूर्ति या दोनों निर्माण या आयात से शुरू होने वाली आपूर्ति श्रृंखला के प्रत्येक चरण में और अंतिम खुदरा स्तर पर लगाया जाएगा। इसलिए मूल रूप से कोई भी कर जो वर्तमान में केंद्र या राज्य सरकार द्वारा वस्तुओं या सेवाओं की आपूर्ति पर लगाया जाता है, जीएसटी में परिवर्तित होने जा रहा है।\n* जीएसटी एक दोहरे करारोपण के रूप में प्रस्तावित है जहां केंद्र सरकार केंद्रीय जीएसटी (**सीजीएसटी**) लगाएगी और एकत्रित करेगी और राज्य वस्तुओं या सेवाओं की अंतर-राज्य आपूर्ति पर राज्य जीएसटी (**एसजीएसटी**) लगाएगी और एकत्र करेगी। केंद्र वस्तुओं या सेवाओं की अंतर-राज्य आपूर्ति पर एकीकृत जीएसटी (**आईजीएसटी**) भी लगाएगा और एकत्रित करेगा। इस प्रकार जीएसटी एक ऐसा एकीकरण है जो केंद्र और राज्य द्वारा वर्तमान में लगाए जा रहे विभिन्न करों को एकीकृत करने जा रहा है और देश के आर्थिक संघ बनाने के लिए एक मंच प्रदान करता है।\n\n---\n"}}},{"index":98,"qNo":"Question No. 98","languages":{"English":{"qNo":98,"language":"English","questionHTML":"\u003cp\u003eWhen were the fundamental duties mentioned in the constitution?\u003c/p\u003e","questionText":"When were the fundamental duties mentioned in the constitution?","options":[{"label":"A","html":"At the time of constitution-making","text":"At the time of constitution-making"},{"label":"B","html":"On 26 January 1950","text":"On 26 January 1950"},{"label":"C","html":"42\u003csup\u003end\u003c/sup\u003e Constitution Amendment","text":"42nd Constitution Amendment"},{"label":"D","html":"\u003cspan style=\" \"\u003e41\u003c/span\u003e\u003csup\u003e\u003cspan style=\" \"\u003est\u003c/span\u003e\u003c/sup\u003e\u003cspan style=\" \"\u003e\u0026nbsp;Constitutional Amendment\u003c/span\u003e\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","text":"41st Constitutional Amendment"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eThe correct answer is \u003cu\u003e\u003cstrong\u003eThe 42\u003csup\u003end\u003c/sup\u003e Constitution Amendment\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\n\t\u003cp\u003e\u003cstrong\u003eFundamental Duties\u003c/strong\u003e are the f\u003cstrong\u003eundamental obligations of the states to its citizens\u003c/strong\u003e and the duties and the rights of the citizens to the State.\u003c/p\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\n\t\u003cp\u003eThese duties set out in \u003cstrong\u003ePart IV–A\u003c/strong\u003e of the constitution.\u003c/p\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\n\t\u003cp\u003eBy the \u003cstrong\u003e42nd Constitution Amendment\u003c/strong\u003e, Fundamental Duties were added.\u003c/p\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e​\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u0026nbsp;\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003e51A\u003c/strong\u003e\u0026nbsp;\u003cstrong\u003eFundamental duties:\u003c/strong\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003e​\u003c/strong\u003eIt shall be the duty of every citizen of India:\n\t\u003cul\u003e\n\t\t\u003cli\u003eA parent or guardian should\u0026nbsp;provide opportunities for education to his child or, as the case may be, ward between the age of six and fourteen years.\u003cspan id=\"cke_bm_61550E\" style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e\u003c/li\u003e\n\t\t\u003cli\u003eTo strive towards excellence in all spheres of individual and collective activity so that the nation constantly rises to higher levels of endeavour and achievement.\u003c/li\u003e\n\t\t\u003cli\u003eTo safeguard public property and to abjure violence;\u003c/li\u003e\n\t\t\u003cli\u003eTo develop the scientific temper, humanism, and the spirit of inquiry and reform.\u003c/li\u003e\n\t\t\u003cli\u003eTo protect and improve the natural environment including forests, lakes, rivers, and wildlife, and to have compassion for living creatures.\u003c/li\u003e\n\t\t\u003cli\u003eTo value and preserve the rich heritage of our composite culture.\u003c/li\u003e\n\t\t\u003cli\u003eTo promote harmony and the spirit of common brotherhood amongst all the people of India transcending religious, linguistic, and regional or sectional diversities; to renounce practices derogatory to the dignity of women.\u003c/li\u003e\n\t\t\u003cli\u003eTo defend the country and render national service when called upon to do so.\u003c/li\u003e\n\t\t\u003cli\u003eTo uphold and protect the sovereignty, unity, and integrity of India.\u003c/li\u003e\n\t\t\u003cli\u003eTo cherish and follow the noble ideals which inspired our national struggle for freedom;\u003c/li\u003e\n\t\t\u003cli\u003eTo abide by the Constitution and respect its ideals and institutions, the National Flag and the National Anthem.\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is The 42nd Constitution Amendment. Key Points Fundamental Duties are the fundamental obligations of the states to its citizens and the duties and the rights of the citizens to the State. These duties set out in Part IV–A of the constitution. By the 42nd Constitution Amendment, Fundamental Duties were added. ​ Additional Information 51A Fundamental duties: ​It shall be the duty of every citizen of India: A parent or guardian should provide opportunities for education to his child or, as the case may be, ward between the age of six and fourteen years. To strive towards excellence in all spheres of individual and collective activity so that the nation constantly rises to higher levels of endeavour and achievement. To safeguard public property and to abjure violence; To develop the scientific temper, humanism, and the spirit of inquiry and reform. To protect and improve the natural environment including forests, lakes, rivers, and wildlife, and to have compassion for living creatures. To value and preserve the rich heritage of our composite culture. To promote harmony and the spirit of common brotherhood amongst all the people of India transcending religious, linguistic, and regional or sectional diversities; to renounce practices derogatory to the dignity of women. To defend the country and render national service when called upon to do so. To uphold and protect the sovereignty, unity, and integrity of India. To cherish and follow the noble ideals which inspired our national struggle for freedom; To abide by the Constitution and respect its ideals and institutions, the National Flag and the National Anthem.","markdown":"## Q98.\n\nWhen were the fundamental duties mentioned in the constitution?\n\n### Options\n\nA. At the time of constitution-making\n\nB. On 26 January 1950\n\nC. 42^nd^ Constitution Amendment\n\nD. 41^st^ Constitutional Amendment\n\n**Correct Answer:** C\n\n### Solution\n\nThe correct answer is **The 42^nd^ Constitution Amendment**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **Fundamental Duties** are the f**undamental obligations of the states to its citizens** and the duties and the rights of the citizens to the State.\n* These duties set out in **Part IV–A** of the constitution.\n* By the **42nd Constitution Amendment**, Fundamental Duties were added.\n \n\n​![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **51A** **Fundamental duties:**\n* **​**It shall be the duty of every citizen of India: \n* A parent or guardian should provide opportunities for education to his child or, as the case may be, ward between the age of six and fourteen years.\n* To strive towards excellence in all spheres of individual and collective activity so that the nation constantly rises to higher levels of endeavour and achievement.\n* To safeguard public property and to abjure violence;\n* To develop the scientific temper, humanism, and the spirit of inquiry and reform.\n* To protect and improve the natural environment including forests, lakes, rivers, and wildlife, and to have compassion for living creatures.\n* To value and preserve the rich heritage of our composite culture.\n* To promote harmony and the spirit of common brotherhood amongst all the people of India transcending religious, linguistic, and regional or sectional diversities; to renounce practices derogatory to the dignity of women.\n* To defend the country and render national service when called upon to do so.\n* To uphold and protect the sovereignty, unity, and integrity of India.\n* To cherish and follow the noble ideals which inspired our national struggle for freedom;\n* To abide by the Constitution and respect its ideals and institutions, the National Flag and the National Anthem.\n\n---\n"},"Hindi":{"qNo":98,"language":"Hindi","questionHTML":"\u003cp\u003eमूल कर्तव्यों का उल्लेख संविधान में कब किया गया?\u003c/p\u003e","questionText":"मूल कर्तव्यों का उल्लेख संविधान में कब किया गया?","options":[{"label":"A","html":"संविधान-निर्माण के समय","text":"संविधान-निर्माण के समय"},{"label":"B","html":"26 जनवरी, 1950 को","text":"26 जनवरी, 1950 को"},{"label":"C","html":"42वें संविधान संशोधन में","text":"42वें संविधान संशोधन में"},{"label":"D","html":"41वें संविधान संशोधन में","text":"41वें संविधान संशोधन में"}],"correctIndex":2,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003e42वें संविधान संशोधन में\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\n\t\u003cp\u003e\u003cstrong\u003eमौलिक कर्तव्य\u003c/strong\u003e राज्यों के अपने नागरिकों के लिए \u003cstrong\u003eमौलिक दायित्व हैं\u003c/strong\u003e, और राज्य के लिए नागरिकों का कर्तव्य और अधिकार है।\u003c/p\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\n\t\u003cp\u003eये कर्तव्य संविधान के\u003cstrong\u003e भाग IV-A \u003c/strong\u003eमें निर्धारित किए गए हैं।\u003c/p\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\n\t\u003cp\u003e\u003cstrong\u003e42 वें संविधान संशोधन\u003c/strong\u003e द्वारा, मूल कर्तव्यों को जोड़ा गया।\u003c/p\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e​\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u0026nbsp;\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003e51A\u003c/strong\u003e. \u003cstrong\u003eमूल कर्तव्य\u003c/strong\u003e—भारत के प्रत्येक नागरिक का कर्त्तव्य होगा कि वह—\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eसंविधान का पालन करे और उसके आदर्शों,संस्थाओं, राष्ट्र ध्वज और राष्ट्र्गान का आदर करे;\u003c/li\u003e\n\t\t\u003cli\u003eस्वतंत्रता के लिए हमारे राष्ट्रीय आन्दोलन प्रेरित करने वाले उच्च आदर्शो को हृदय में संजोए रखे व उनका पालन करे;\u003c/li\u003e\n\t\t\u003cli\u003e\u003cspan style=\"color: rgb(32, 33, 34); \"\u003eभारत की प्रभुता एकता व अखंडता की रक्षा करें और उसे अक्षुण्ण बनाये रखे\u003c/span\u003e;\u003c/li\u003e\n\t\t\u003cli\u003e\u003cspan style=\"color: rgb(32, 33, 34); \"\u003eदेश की रक्षा करे\u0026nbsp;और आवाह्न किए जाने पर राष्ट् की सेवा करे\u003c/span\u003e;\u003c/li\u003e\n\t\t\u003cli\u003eभारत के सभी लोगों में समरसता और सम्मान एवं भ्रातृत्व की भावना का निर्माण करे\u0026nbsp;जो धर्म, भाषा और प्रदेश या वर्ग के भेदभाव पर आधारित न हों, उन सभी प्रथाओं का त्याग करें जो महिलाओं के सम्मान के विरुद्ध हों;\u003c/li\u003e\n\t\t\u003cli\u003e\u003cspan style=\"color: rgb(32, 33, 34); \"\u003eहमारी सामाजिक संस्कृति की गौरवशाली परम्परा का महत्त्व समझे\u0026nbsp;और उसका परिरक्षण करे\u003c/span\u003e;\u003c/li\u003e\n\t\t\u003cli\u003e\u003cspan style=\"color: rgb(32, 33, 34); \"\u003eप्राकृतिक पर्यावरण जिसके अंतर्गत वन, झील,नदी वन्य प्राणी आदि आते हैं\u0026nbsp;की रक्षा व संवर्धन करे\u0026nbsp;तथा प्राणी मात्र के प्रति दयाभाव रखे\u003c/span\u003e;\u003c/li\u003e\n\t\t\u003cli\u003e\u003cspan style=\"color: rgb(32, 33, 34); \"\u003eवैज्ञानिक दृष्टिकोण मानवतावाद व ज्ञानार्जन तथा सुधार की भावना का विकास करे\u003c/span\u003e;\u003c/li\u003e\n\t\t\u003cli\u003e\u003cspan style=\"color: rgb(32, 33, 34); \"\u003eसार्वजनिक सम्पत्ति को सुरक्षित रखे\u0026nbsp;व हिंसा से दूर रहे\u003c/span\u003e;\u003c/li\u003e\n\t\t\u003cli\u003e\u003cspan style=\"color: rgb(32, 33, 34); \"\u003eव्यक्तिगत और सामूहिक गतिविधियों के सभी क्षेत्रों सतत उत्कर्ष की ओर बढ़ने का प्रयास करें जिससे राष्ट्र प्रगति करते हुए प्रयात्न और उपलब्धि की नई ऊँचाइयों को छू ले\u003c/span\u003e;\u003c/li\u003e\n\t\t\u003cli\u003e\u003cspan style=\"color: rgb(32, 33, 34); \"\u003eएक माता-पिता या संरक्षक हैं तो छह वर्ष से चौदह वर्ष आयु वाले अपने या प्रतिपाल्य (यथास्थिति) बच्चे को शिक्षा के अवसर प्रदान करें।\u003c/span\u003e\u003cspan id=\"cke_bm_61550E\" style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर 42वें संविधान संशोधन में है। Key Points मौलिक कर्तव्य राज्यों के अपने नागरिकों के लिए मौलिक दायित्व हैं, और राज्य के लिए नागरिकों का कर्तव्य और अधिकार है। ये कर्तव्य संविधान के भाग IV-A में निर्धारित किए गए हैं। 42 वें संविधान संशोधन द्वारा, मूल कर्तव्यों को जोड़ा गया। ​ Additional Information 51A. मूल कर्तव्य—भारत के प्रत्येक नागरिक का कर्त्तव्य होगा कि वह— संविधान का पालन करे और उसके आदर्शों,संस्थाओं, राष्ट्र ध्वज और राष्ट्र्गान का आदर करे; स्वतंत्रता के लिए हमारे राष्ट्रीय आन्दोलन प्रेरित करने वाले उच्च आदर्शो को हृदय में संजोए रखे व उनका पालन करे; भारत की प्रभुता एकता व अखंडता की रक्षा करें और उसे अक्षुण्ण बनाये रखे; देश की रक्षा करे और आवाह्न किए जाने पर राष्ट् की सेवा करे; भारत के सभी लोगों में समरसता और सम्मान एवं भ्रातृत्व की भावना का निर्माण करे जो धर्म, भाषा और प्रदेश या वर्ग के भेदभाव पर आधारित न हों, उन सभी प्रथाओं का त्याग करें जो महिलाओं के सम्मान के विरुद्ध हों; हमारी सामाजिक संस्कृति की गौरवशाली परम्परा का महत्त्व समझे और उसका परिरक्षण करे; प्राकृतिक पर्यावरण जिसके अंतर्गत वन, झील,नदी वन्य प्राणी आदि आते हैं की रक्षा व संवर्धन करे तथा प्राणी मात्र के प्रति दयाभाव रखे; वैज्ञानिक दृष्टिकोण मानवतावाद व ज्ञानार्जन तथा सुधार की भावना का विकास करे; सार्वजनिक सम्पत्ति को सुरक्षित रखे व हिंसा से दूर रहे; व्यक्तिगत और सामूहिक गतिविधियों के सभी क्षेत्रों सतत उत्कर्ष की ओर बढ़ने का प्रयास करें जिससे राष्ट्र प्रगति करते हुए प्रयात्न और उपलब्धि की नई ऊँचाइयों को छू ले; एक माता-पिता या संरक्षक हैं तो छह वर्ष से चौदह वर्ष आयु वाले अपने या प्रतिपाल्य (यथास्थिति) बच्चे को शिक्षा के अवसर प्रदान करें।","markdown":"## Q98.\n\nमूल कर्तव्यों का उल्लेख संविधान में कब किया गया?\n\n### Options\n\nA. संविधान-निर्माण के समय\n\nB. 26 जनवरी, 1950 को\n\nC. 42वें संविधान संशोधन में\n\nD. 41वें संविधान संशोधन में\n\n**Correct Answer:** C\n\n### Solution\n\nसही उत्तर **42वें संविधान संशोधन में** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **मौलिक कर्तव्य** राज्यों के अपने नागरिकों के लिए **मौलिक दायित्व हैं**, और राज्य के लिए नागरिकों का कर्तव्य और अधिकार है।\n* ये कर्तव्य संविधान के**भाग IV-A**में निर्धारित किए गए हैं।\n* **42 वें संविधान संशोधन** द्वारा, मूल कर्तव्यों को जोड़ा गया।\n \n\n​![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **51A**. **मूल कर्तव्य**—भारत के प्रत्येक नागरिक का कर्त्तव्य होगा कि वह— \n* संविधान का पालन करे और उसके आदर्शों,संस्थाओं, राष्ट्र ध्वज और राष्ट्र्गान का आदर करे;\n* स्वतंत्रता के लिए हमारे राष्ट्रीय आन्दोलन प्रेरित करने वाले उच्च आदर्शो को हृदय में संजोए रखे व उनका पालन करे;\n* भारत की प्रभुता एकता व अखंडता की रक्षा करें और उसे अक्षुण्ण बनाये रखे;\n* देश की रक्षा करे और आवाह्न किए जाने पर राष्ट् की सेवा करे;\n* भारत के सभी लोगों में समरसता और सम्मान एवं भ्रातृत्व की भावना का निर्माण करे जो धर्म, भाषा और प्रदेश या वर्ग के भेदभाव पर आधारित न हों, उन सभी प्रथाओं का त्याग करें जो महिलाओं के सम्मान के विरुद्ध हों;\n* हमारी सामाजिक संस्कृति की गौरवशाली परम्परा का महत्त्व समझे और उसका परिरक्षण करे;\n* प्राकृतिक पर्यावरण जिसके अंतर्गत वन, झील,नदी वन्य प्राणी आदि आते हैं की रक्षा व संवर्धन करे तथा प्राणी मात्र के प्रति दयाभाव रखे;\n* वैज्ञानिक दृष्टिकोण मानवतावाद व ज्ञानार्जन तथा सुधार की भावना का विकास करे;\n* सार्वजनिक सम्पत्ति को सुरक्षित रखे व हिंसा से दूर रहे;\n* व्यक्तिगत और सामूहिक गतिविधियों के सभी क्षेत्रों सतत उत्कर्ष की ओर बढ़ने का प्रयास करें जिससे राष्ट्र प्रगति करते हुए प्रयात्न और उपलब्धि की नई ऊँचाइयों को छू ले;\n* एक माता-पिता या संरक्षक हैं तो छह वर्ष से चौदह वर्ष आयु वाले अपने या प्रतिपाल्य (यथास्थिति) बच्चे को शिक्षा के अवसर प्रदान करें।\n\n---\n"}}},{"index":99,"qNo":"Question No. 99","languages":{"English":{"qNo":99,"language":"English","questionHTML":"State and central government gets authorization","questionText":"State and central government gets authorization","options":[{"label":"A","html":"From the Constitution of India","text":"From the Constitution of India"},{"label":"B","html":"From the President of India","text":"From the President of India"},{"label":"C","html":"From the Prime Minister of India","text":"From the Prime Minister of India"},{"label":"D","html":"\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e\u003cspan style=\" \"\u003eFrom the Parliament of India\u003c/span\u003e\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","text":"From the Parliament of India"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cu\u003e\u003cstrong\u003eFrom the Constitution of India\u003c/strong\u003e\u003c/u\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eThe \u003cstrong\u003eConstitution of India\u003c/strong\u003e is the \u003cstrong\u003esupreme law of India\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eIn our country, everything derives its powers from the constitution, either directly or indirectly.\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eState and the central government get authorization from the constitution of India\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u0026nbsp;\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eIndia, also known as Bharat, is a Union of States.\u003c/li\u003e\n\t\u003cli\u003eIt is a Sovereign Socialist Secular Democratic Republic with a parliamentary system of government.\u003c/li\u003e\n\t\u003cli\u003eThe Republic is governed in terms of the Constitution of India which was adopted by the Constituent Assembly on 26th November 1949 and came into force on 26th January 1950.\u0026nbsp;\u003c/li\u003e\n\t\u003cli\u003eThe Constitution provides for a Parliamentary form of government which is federal in structure with certain unitary features.\u0026nbsp;\u003c/li\u003e\n\t\u003cli\u003eThe constitutional head of the Executive of the Union is the President.\u0026nbsp;\u003c/li\u003e\n\t\u003cli\u003eAs per Article 79 of the Constitution of India, the council of the Parliament of the Union consists of the President and two Houses are known as the Council of States (Rajya Sabha) and the House of the People (Lok Sabha).\u003c/li\u003e\n\t\u003cli\u003eArticle 74(1) of the Constitution provides that there shall be a Council of Ministers with the Prime Minister as its head to aid and advise the President, who shall exercise his/her functions in accordance to the advice.\u003c/li\u003e\n\t\u003cli\u003eThe real executive power is thus vested in the Council of Ministers with the Prime Minister as its head.\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is From the Constitution of India. Key Points The Constitution of India is the supreme law of India. In our country, everything derives its powers from the constitution, either directly or indirectly. State and the central government get authorization from the constitution of India. Additional Information India, also known as Bharat, is a Union of States. It is a Sovereign Socialist Secular Democratic Republic with a parliamentary system of government. The Republic is governed in terms of the Constitution of India which was adopted by the Constituent Assembly on 26th November 1949 and came into force on 26th January 1950. The Constitution provides for a Parliamentary form of government which is federal in structure with certain unitary features. The constitutional head of the Executive of the Union is the President. As per Article 79 of the Constitution of India, the council of the Parliament of the Union consists of the President and two Houses are known as the Council of States (Rajya Sabha) and the House of the People (Lok Sabha). Article 74(1) of the Constitution provides that there shall be a Council of Ministers with the Prime Minister as its head to aid and advise the President, who shall exercise his/her functions in accordance to the advice. The real executive power is thus vested in the Council of Ministers with the Prime Minister as its head.","markdown":"## Q99.\n\nState and central government gets authorization\n\n### Options\n\nA. From the Constitution of India\n\nB. From the President of India\n\nC. From the Prime Minister of India\n\nD. From the Parliament of India\n\n**Correct Answer:** A\n\n### Solution\n\nThe correct answer is **From the Constitution of India**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* The **Constitution of India** is the **supreme law of India**.\n* In our country, everything derives its powers from the constitution, either directly or indirectly.\n* **State and the central government get authorization from the constitution of India**.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* India, also known as Bharat, is a Union of States.\n* It is a Sovereign Socialist Secular Democratic Republic with a parliamentary system of government.\n* The Republic is governed in terms of the Constitution of India which was adopted by the Constituent Assembly on 26th November 1949 and came into force on 26th January 1950.\n* The Constitution provides for a Parliamentary form of government which is federal in structure with certain unitary features.\n* The constitutional head of the Executive of the Union is the President.\n* As per Article 79 of the Constitution of India, the council of the Parliament of the Union consists of the President and two Houses are known as the Council of States (Rajya Sabha) and the House of the People (Lok Sabha).\n* Article 74(1) of the Constitution provides that there shall be a Council of Ministers with the Prime Minister as its head to aid and advise the President, who shall exercise his/her functions in accordance to the advice.\n* The real executive power is thus vested in the Council of Ministers with the Prime Minister as its head.\n\n---\n"},"Hindi":{"qNo":99,"language":"Hindi","questionHTML":"राज्य और केन्द्रीय सरकार को प्राधिकार प्राप्त होता है","questionText":"राज्य और केन्द्रीय सरकार को प्राधिकार प्राप्त होता है","options":[{"label":"A","html":"भारत के संविधान से","text":"भारत के संविधान से"},{"label":"B","html":"भारत के राष्ट्रपति से","text":"भारत के राष्ट्रपति से"},{"label":"C","html":"भारत के प्रधानमंत्री से","text":"भारत के प्रधानमंत्री से"},{"label":"D","html":"भारत की संसद से","text":"भारत की संसद से"}],"correctIndex":0,"solutionHTML":"\u003cp\u003eसही उत्तर\u0026nbsp;\u003cu\u003e\u003cstrong\u003eभारत के संविधान से\u003c/strong\u003e\u003c/u\u003e है।\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eभारत का संविधान भारत का सर्वोच्च कानून \u003c/strong\u003eहै।\u003c/li\u003e\n\t\u003cli\u003eहमारे देश में, सब कुछ सीधे या परोक्ष रूप से संविधान से अपनी शक्तियों को प्राप्त करता है।\u003c/li\u003e\n\t\u003cli\u003e\u003cstrong\u003eभारत के संविधान से राज्य और केंद्र सरकार को प्राधिकरण प्राप्त होता\u0026nbsp;है।\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u0026nbsp;\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eभारत, जिसे इंडिया के रूप में भी जाना जाता है, राज्यों का एक संघ है।\u003c/li\u003e\n\t\u003cli\u003eय‍ह संसदीय प्रणाली की सरकार वाला एक स्‍वतंत्र प्रभुसत्ता सम्‍पन्‍न समाजवादी लोकतंत्रात्‍मक गणराज्‍य है।\u003c/li\u003e\n\t\u003cli\u003e\u003cspan style=\"color: rgb(0, 0, 0);  \"\u003eयह गणराज्‍य भारत के संविधान के अनुसार शासित है जिसे संविधान सभा द्वारा 26 नवम्‍बर 1949 को ग्रहण किया गया तथा जो 26 जनवरी 1950 को प्रवृत्त हुआ।\u003c/span\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003cspan style=\"color: rgb(0, 0, 0);  \"\u003eसंविधान में सरकार के संसदीय स्‍वरूप की व्‍यवस्‍था की गई है जिसकी संरचना कतिपय एकात्‍मक विशिष्‍टताओं सहित संघीय हो।\u003c/span\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003cspan style=\"color: rgb(0, 0, 0);  \"\u003eकेन्‍द्रीय कार्यपालिका का सांविधानिक प्रमुख राष्‍ट्रपति है।\u003c/span\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003cspan style=\"color: rgb(0, 0, 0);  \"\u003eभारत के संविधान की धारा 79 के अनुसार, केन्‍द्रीय संसद की परिषद में राष्‍ट्रपति तथा दो सदन है जिन्‍हें राज्‍यों की परिषद (राज्‍य सभा) तथा लोगों का सदन (लोक सभा) के नाम से जाना जाता है।\u003c/span\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003cspan style=\"color: rgb(0, 0, 0);  \"\u003eसंविधान की धारा 74 (1) में यह व्‍यवस्‍था की गई है कि राष्‍ट्रपति की सहायता करने तथा उसे सलाह देने के लिए एक मंत्री परिषद होगी जिसका प्रमुख प्रधान मंत्री होगा, राष्‍ट्रपति सलाह के अनुसार अपने कार्यों का निष्‍पादन करेगा।\u003c/span\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003cspan style=\"color: rgb(0, 0, 0);  \"\u003eइस प्रकार वास्‍तविक कार्यकारी शक्ति मंत्रिपरिषद में निहित है जिसका प्रमुख प्रधानमंत्री है।\u003c/span\u003e\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर भारत के संविधान से है। Key Points भारत का संविधान भारत का सर्वोच्च कानून है। हमारे देश में, सब कुछ सीधे या परोक्ष रूप से संविधान से अपनी शक्तियों को प्राप्त करता है। भारत के संविधान से राज्य और केंद्र सरकार को प्राधिकरण प्राप्त होता है। Additional Information भारत, जिसे इंडिया के रूप में भी जाना जाता है, राज्यों का एक संघ है। य‍ह संसदीय प्रणाली की सरकार वाला एक स्‍वतंत्र प्रभुसत्ता सम्‍पन्‍न समाजवादी लोकतंत्रात्‍मक गणराज्‍य है। यह गणराज्‍य भारत के संविधान के अनुसार शासित है जिसे संविधान सभा द्वारा 26 नवम्‍बर 1949 को ग्रहण किया गया तथा जो 26 जनवरी 1950 को प्रवृत्त हुआ। संविधान में सरकार के संसदीय स्‍वरूप की व्‍यवस्‍था की गई है जिसकी संरचना कतिपय एकात्‍मक विशिष्‍टताओं सहित संघीय हो। केन्‍द्रीय कार्यपालिका का सांविधानिक प्रमुख राष्‍ट्रपति है। भारत के संविधान की धारा 79 के अनुसार, केन्‍द्रीय संसद की परिषद में राष्‍ट्रपति तथा दो सदन है जिन्‍हें राज्‍यों की परिषद (राज्‍य सभा) तथा लोगों का सदन (लोक सभा) के नाम से जाना जाता है। संविधान की धारा 74 (1) में यह व्‍यवस्‍था की गई है कि राष्‍ट्रपति की सहायता करने तथा उसे सलाह देने के लिए एक मंत्री परिषद होगी जिसका प्रमुख प्रधान मंत्री होगा, राष्‍ट्रपति सलाह के अनुसार अपने कार्यों का निष्‍पादन करेगा। इस प्रकार वास्‍तविक कार्यकारी शक्ति मंत्रिपरिषद में निहित है जिसका प्रमुख प्रधानमंत्री है।","markdown":"## Q99.\n\nराज्य और केन्द्रीय सरकार को प्राधिकार प्राप्त होता है\n\n### Options\n\nA. भारत के संविधान से\n\nB. भारत के राष्ट्रपति से\n\nC. भारत के प्रधानमंत्री से\n\nD. भारत की संसद से\n\n**Correct Answer:** A\n\n### Solution\n\nसही उत्तर **भारत के संविधान से** है।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* **भारत का संविधान भारत का सर्वोच्च कानून**है।\n* हमारे देश में, सब कुछ सीधे या परोक्ष रूप से संविधान से अपनी शक्तियों को प्राप्त करता है।\n* **भारत के संविधान से राज्य और केंद्र सरकार को प्राधिकरण प्राप्त होता है।**\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* भारत, जिसे इंडिया के रूप में भी जाना जाता है, राज्यों का एक संघ है।\n* य‍ह संसदीय प्रणाली की सरकार वाला एक स्‍वतंत्र प्रभुसत्ता सम्‍पन्‍न समाजवादी लोकतंत्रात्‍मक गणराज्‍य है।\n* यह गणराज्‍य भारत के संविधान के अनुसार शासित है जिसे संविधान सभा द्वारा 26 नवम्‍बर 1949 को ग्रहण किया गया तथा जो 26 जनवरी 1950 को प्रवृत्त हुआ।\n* संविधान में सरकार के संसदीय स्‍वरूप की व्‍यवस्‍था की गई है जिसकी संरचना कतिपय एकात्‍मक विशिष्‍टताओं सहित संघीय हो।\n* केन्‍द्रीय कार्यपालिका का सांविधानिक प्रमुख राष्‍ट्रपति है।\n* भारत के संविधान की धारा 79 के अनुसार, केन्‍द्रीय संसद की परिषद में राष्‍ट्रपति तथा दो सदन है जिन्‍हें राज्‍यों की परिषद (राज्‍य सभा) तथा लोगों का सदन (लोक सभा) के नाम से जाना जाता है।\n* संविधान की धारा 74 (1) में यह व्‍यवस्‍था की गई है कि राष्‍ट्रपति की सहायता करने तथा उसे सलाह देने के लिए एक मंत्री परिषद होगी जिसका प्रमुख प्रधान मंत्री होगा, राष्‍ट्रपति सलाह के अनुसार अपने कार्यों का निष्‍पादन करेगा।\n* इस प्रकार वास्‍तविक कार्यकारी शक्ति मंत्रिपरिषद में निहित है जिसका प्रमुख प्रधानमंत्री है।\n\n---\n"}}},{"index":100,"qNo":"Question No. 100","languages":{"English":{"qNo":100,"language":"English","questionHTML":"Which of the following can be considered a pressure group?","questionText":"Which of the following can be considered a pressure group?","options":[{"label":"A","html":"Members of Lok Sabha","text":"Members of Lok Sabha"},{"label":"B","html":"Members of Panchayat","text":"Members of Panchayat"},{"label":"C","html":"Cabinet members","text":"Cabinet members"},{"label":"D","html":"\u003cspan style=\" \"\u003eMembers of a Trade Union\u003c/span\u003e\u003cspan style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e","text":"Members of a Trade Union"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eThe correct answer is\u0026nbsp;\u003cspan style=\" \"\u003e\u003cu\u003e\u003cstrong\u003eMembers of a Trade Union\u003c/strong\u003e\u003c/u\u003e.\u003c/span\u003e\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eA pressure group is an organised group of people which are\u0026nbsp;active\u0026nbsp;in\u0026nbsp;pursuing common interests.\u003c/li\u003e\n\t\u003cli\u003ePressure groups try \u003cstrong\u003eto bring a change in public policy by exerting pressure on the government\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eThe pressure groups are also called \u003cstrong\u003einterest groups\u003c/strong\u003e or \u003cstrong\u003evested groups\u003c/strong\u003e.\u003c/li\u003e\n\t\u003cli\u003eThey do not have direct political party power.\u003c/li\u003e\n\t\u003cli\u003eThey are concerned with specific programs and issues and their activities are confined to the protection and promotion of the interests of their members by pressuring the government.\u003c/li\u003e\n\t\u003cli\u003eThe pressure groups influence the policy-making in the government through legal and legitimate methods like lobbying, correspondence, publicity, propagandising, petitioning, public debating, legislations, etc.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cspan id=\"cke_bm_5103S\" style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003eBusiness Groups:\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eFICCI\u003c/li\u003e\n\t\t\u003cli\u003eASSOCHAM etc\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003eTrade Unions:\n\t\u003cul\u003e\n\t\t\u003cli\u003eAITUC\u003c/li\u003e\n\t\t\u003cli\u003eINTUC\u003c/li\u003e\n\t\t\u003cli\u003eBharatiya Mazdoor Sangh (BMS)\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003eProfessional Groups:\n\t\u003cul\u003e\n\t\t\u003cli\u003eBar Council of India (BCI)\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003eAgrarian Groups-\n\t\u003cul\u003e\n\t\t\u003cli\u003eAll India Kisan Sabha\u003c/li\u003e\n\t\t\u003cli\u003eBharatiya Kisan Union\u0026nbsp;etc\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003eStudent’s Organisations:\n\t\u003cul\u003e\n\t\t\u003cli\u003eAkhila Bhartiya Vidyarthi Parishad (ABVP)\u003c/li\u003e\n\t\t\u003cli\u003eAll India Students Federation (AISF)\u003c/li\u003e\n\t\t\u003cli\u003eNational Students Union of India (NSUI)\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003eReligious Groups:\n\t\u003cul\u003e\n\t\t\u003cli\u003eRashtriya Swayam Sevak Sangh (RSS),\u003c/li\u003e\n\t\t\u003cli\u003eVishwa Hindu Parishad (VHP),\u003c/li\u003e\n\t\t\u003cli\u003eJamaat-e-Islami, etc.\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eLinguistic Groups:\n\t\u003cul\u003e\n\t\t\u003cli\u003eTamil Sangh\u003c/li\u003e\n\t\t\u003cli\u003eTribal Groups – National Socialist Council of Nagaland (NSCN)\u003c/li\u003e\n\t\t\u003cli\u003eTribal National Volunteers\u003c/li\u003e\n\t\t\u003cli\u003eTribal League of Assam, etc.\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003eIdeology based Groups:\n\t\u003cul\u003e\n\t\t\u003cli\u003eNarmada Bachao Andolan\u003c/li\u003e\n\t\t\u003cli\u003eChipko Movement.\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003eAnomic Groups:\n\t\u003cul\u003e\n\t\t\u003cli\u003eNaxalite Groups\u003c/li\u003e\n\t\t\u003cli\u003eUnited Liberation Front of Assam (ULFA)\u003cspan id=\"cke_bm_5103E\" style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u0026nbsp;\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eTypes of Pressure Groups:\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eInstitutional Interest Groups\u003c/li\u003e\n\t\t\u003cli\u003eAssociational Interest Group\u003c/li\u003e\n\t\t\u003cli\u003eNon-Associational Interest Groups\u003c/li\u003e\n\t\t\u003cli\u003eAnomic Interest Groups\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"The correct answer is Members of a Trade Union. Key Points A pressure group is an organised group of people which are active in pursuing common interests. Pressure groups try to bring a change in public policy by exerting pressure on the government. The pressure groups are also called interest groups or vested groups. They do not have direct political party power. They are concerned with specific programs and issues and their activities are confined to the protection and promotion of the interests of their members by pressuring the government. The pressure groups influence the policy-making in the government through legal and legitimate methods like lobbying, correspondence, publicity, propagandising, petitioning, public debating, legislations, etc. Key Points Business Groups: FICCI ASSOCHAM etc Trade Unions: AITUC INTUC Bharatiya Mazdoor Sangh (BMS) Professional Groups: Bar Council of India (BCI) Agrarian Groups- All India Kisan Sabha Bharatiya Kisan Union etc Student’s Organisations: Akhila Bhartiya Vidyarthi Parishad (ABVP) All India Students Federation (AISF) National Students Union of India (NSUI) Religious Groups: Rashtriya Swayam Sevak Sangh (RSS), Vishwa Hindu Parishad (VHP), Jamaat-e-Islami, etc. Linguistic Groups: Tamil Sangh Tribal Groups – National Socialist Council of Nagaland (NSCN) Tribal National Volunteers Tribal League of Assam, etc. Ideology based Groups: Narmada Bachao Andolan Chipko Movement. Anomic Groups: Naxalite Groups United Liberation Front of Assam (ULFA) Additional Information Types of Pressure Groups: Institutional Interest Groups Associational Interest Group Non-Associational Interest Groups Anomic Interest Groups","markdown":"## Q100.\n\nWhich of the following can be considered a pressure group?\n\n### Options\n\nA. Members of Lok Sabha\n\nB. Members of Panchayat\n\nC. Cabinet members\n\nD. Members of a Trade Union\n\n**Correct Answer:** D\n\n### Solution\n\nThe correct answer is **Members of a Trade Union**.\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* A pressure group is an organised group of people which are active in pursuing common interests.\n* Pressure groups try **to bring a change in public policy by exerting pressure on the government**.\n* The pressure groups are also called **interest groups** or **vested groups**.\n* They do not have direct political party power.\n* They are concerned with specific programs and issues and their activities are confined to the protection and promotion of the interests of their members by pressuring the government.\n* The pressure groups influence the policy-making in the government through legal and legitimate methods like lobbying, correspondence, publicity, propagandising, petitioning, public debating, legislations, etc.\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* Business Groups: \n* FICCI\n* ASSOCHAM etc\n* Trade Unions: \n* AITUC\n* INTUC\n* Bharatiya Mazdoor Sangh (BMS)\n* Professional Groups: \n* Bar Council of India (BCI)\n* Agrarian Groups- \n* All India Kisan Sabha\n* Bharatiya Kisan Union etc\n* Student’s Organisations: \n* Akhila Bhartiya Vidyarthi Parishad (ABVP)\n* All India Students Federation (AISF)\n* National Students Union of India (NSUI)\n* Religious Groups: \n* Rashtriya Swayam Sevak Sangh (RSS),\n* Vishwa Hindu Parishad (VHP),\n* Jamaat-e-Islami, etc.\n \n* Linguistic Groups: \n* Tamil Sangh\n* Tribal Groups – National Socialist Council of Nagaland (NSCN)\n* Tribal National Volunteers\n* Tribal League of Assam, etc.\n* Ideology based Groups: \n* Narmada Bachao Andolan\n* Chipko Movement.\n* Anomic Groups: \n* Naxalite Groups\n* United Liberation Front of Assam (ULFA)\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **Types of Pressure Groups:** \n* Institutional Interest Groups\n* Associational Interest Group\n* Non-Associational Interest Groups\n* Anomic Interest Groups\n\n---\n"},"Hindi":{"qNo":100,"language":"Hindi","questionHTML":"निम्नलिखित में से किसे एक दबाव समूह माना जा सकता है?","questionText":"निम्नलिखित में से किसे एक दबाव समूह माना जा सकता है?","options":[{"label":"A","html":"लोक सभा के सदस्य","text":"लोक सभा के सदस्य"},{"label":"B","html":"पंचायत के सदस्य","text":"पंचायत के सदस्य"},{"label":"C","html":"मंत्रिमण्डल के सदस्य","text":"मंत्रिमण्डल के सदस्य"},{"label":"D","html":"मज़दूर संघ के सदस्य","text":"मज़दूर संघ के सदस्य"}],"correctIndex":3,"solutionHTML":"\u003cp\u003eसही उत्तर \u003cu\u003e\u003cstrong\u003eमज़दूर संघ\u003c/strong\u003e\u003c/u\u003e\u003cspan style=\" \"\u003e\u003cu\u003e\u003cstrong\u003e\u003cu\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/u\u003eके सदस्य हैं\u003c/strong\u003e\u003c/u\u003e ।\u003c/span\u003e\u003c/p\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eएक दबाव समूह उन लोगों का एक संगठित समूह है जो सामान्य हितों को आगे बढ़ाने में सक्रिय हैं।\u003c/li\u003e\n\t\u003cli\u003eदबाव समूह \u003cstrong\u003eसरकार पर दबाव बढ़ाकर सार्वजनिक नीति में बदलाव लाने का\u003c/strong\u003e प्रयास \u003cstrong\u003eकरते हैं\u003c/strong\u003e ।\u003c/li\u003e\n\t\u003cli\u003eदबाव समूहों को \u003cstrong\u003eब्याज समूह\u003c/strong\u003e या \u003cstrong\u003eनिहित समूह\u003c/strong\u003e भी कहा जाता है।\u003c/li\u003e\n\t\u003cli\u003eउनके पास प्रत्यक्ष राजनीतिक दल की शक्ति नहीं है।\u003c/li\u003e\n\t\u003cli\u003eवे विशिष्ट कार्यक्रमों और मुद्दों से संबंधित हैं और उनकी गतिविधियाँ सरकार पर दबाव डालकर अपने सदस्यों के हितों के संरक्षण और संवर्धन तक सीमित हैं।\u003c/li\u003e\n\t\u003cli\u003eदबाव समूह सरकार में कानूनी और वैध तरीकों जैसे लॉबिंग, पत्राचार, प्रचार, प्रचार, याचिका, सार्वजनिक बहस, विधान, आदि के माध्यम से नीति-निर्माण को प्रभावित करते हैं।\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eKey Points\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cspan id=\"cke_bm_5103S\" style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e व्यावसायिक समूह:\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eफिक्की\u003c/li\u003e\n\t\t\u003cli\u003eASSOCHAM आदि\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003eट्रेड यूनियन:\n\t\u003cul\u003e\n\t\t\u003cli\u003eएटक\u003c/li\u003e\n\t\t\u003cli\u003eइंटक\u003c/li\u003e\n\t\t\u003cli\u003eभारतीय मजदूर संघ (BMS)\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003eपेशेवर समूह:\n\t\u003cul\u003e\n\t\t\u003cli\u003eबार काउंसिल ऑफ इंडिया (बीसीआई)\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003eकृषि समूह-\n\t\u003cul\u003e\n\t\t\u003cli\u003eअखिल भारतीय किसान सभा\u003c/li\u003e\n\t\t\u003cli\u003eभारतीय किसान यूनियन आदि\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003eछात्र संगठन:\n\t\u003cul\u003e\n\t\t\u003cli\u003eअखिल भारतीय विद्यार्थी परिषद (ABVP)\u003c/li\u003e\n\t\t\u003cli\u003eऑल इंडिया स्टूडेंट्स फेडरेशन (AISF)\u003c/li\u003e\n\t\t\u003cli\u003eभारतीय राष्ट्रीय छात्र संघ (NSUI)\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003eधार्मिक समूह:\n\t\u003cul\u003e\n\t\t\u003cli\u003eराष्ट्रीय स्वयं सेवक संघ (RSS),\u003c/li\u003e\n\t\t\u003cli\u003eविश्व हिंदू परिषद (VHP),\u003c/li\u003e\n\t\t\u003cli\u003eजमात-ए-इस्लामी, आदि।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cul\u003e\n\t\u003cli\u003eभाषाई समूह:\n\t\u003cul\u003e\n\t\t\u003cli\u003eतमिल संघ\u003c/li\u003e\n\t\t\u003cli\u003eजनजातीय समूह - नागालैंड की राष्ट्रीय समाजवादी परिषद (NSCN)\u003c/li\u003e\n\t\t\u003cli\u003eजनजातीय राष्ट्रीय स्वयंसेवक\u003c/li\u003e\n\t\t\u003cli\u003eआदिवासी लीग ऑफ असम, आदि।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003eविचारधारा आधारित समूह:\n\t\u003cul\u003e\n\t\t\u003cli\u003eनर्मदा बचाओ आंदोलन\u003c/li\u003e\n\t\t\u003cli\u003eचिपको आंदोलन।\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\t\u003cli\u003e\u003cspan style=\"color: rgb(71, 71, 71); \"\u003e\u0026nbsp;\u003c/span\u003e\u003cspan style=\"color: rgb(71, 71, 71); \"\u003eआनोमिक\u003c/span\u003e\u0026nbsp;समूह:\n\t\u003cul\u003e\n\t\t\u003cli\u003eनक्सली समूह\u003c/li\u003e\n\t\t\u003cli\u003eयूनाइटेड लिबरेशन फ्रंट ऑफ असम (उल्फा) \u003cspan id=\"cke_bm_5103E\" style=\"display: none;\"\u003e\u0026nbsp;\u003c/span\u003e\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cspan style=\"display: flex;gap: 6px;align-items: center;\"\u003e\u003cimg height=\"26px\" src=\"//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png\" width=\"26px\"\u003e\u003cstrong\u003e\u003cspan style=\"vertical-align: middle;font-size: 21px;\"\u003e\u003cu\u003eAdditional Information\u003c/u\u003e\u003c/span\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003cstrong\u003eदबाव समूहों के प्रकार:\u003c/strong\u003e\n\n\t\u003cul\u003e\n\t\t\u003cli\u003eसंस्थागत ब्याज समूह\u003c/li\u003e\n\t\t\u003cli\u003eसहयोगी हित समूह\u003c/li\u003e\n\t\t\u003cli\u003eगैर-सहयोगी हित समूह\u003c/li\u003e\n\t\t\u003cli\u003eपरमाणु ब्याज समूह\u003c/li\u003e\n\t\u003c/ul\u003e\n\t\u003c/li\u003e\n\u003c/ul\u003e","solutionText":"सही उत्तर मज़दूर संघ के सदस्य हैं । Key Points एक दबाव समूह उन लोगों का एक संगठित समूह है जो सामान्य हितों को आगे बढ़ाने में सक्रिय हैं। दबाव समूह सरकार पर दबाव बढ़ाकर सार्वजनिक नीति में बदलाव लाने का प्रयास करते हैं । दबाव समूहों को ब्याज समूह या निहित समूह भी कहा जाता है। उनके पास प्रत्यक्ष राजनीतिक दल की शक्ति नहीं है। वे विशिष्ट कार्यक्रमों और मुद्दों से संबंधित हैं और उनकी गतिविधियाँ सरकार पर दबाव डालकर अपने सदस्यों के हितों के संरक्षण और संवर्धन तक सीमित हैं। दबाव समूह सरकार में कानूनी और वैध तरीकों जैसे लॉबिंग, पत्राचार, प्रचार, प्रचार, याचिका, सार्वजनिक बहस, विधान, आदि के माध्यम से नीति-निर्माण को प्रभावित करते हैं। Key Points व्यावसायिक समूह: फिक्की ASSOCHAM आदि ट्रेड यूनियन: एटक इंटक भारतीय मजदूर संघ (BMS) पेशेवर समूह: बार काउंसिल ऑफ इंडिया (बीसीआई) कृषि समूह- अखिल भारतीय किसान सभा भारतीय किसान यूनियन आदि छात्र संगठन: अखिल भारतीय विद्यार्थी परिषद (ABVP) ऑल इंडिया स्टूडेंट्स फेडरेशन (AISF) भारतीय राष्ट्रीय छात्र संघ (NSUI) धार्मिक समूह: राष्ट्रीय स्वयं सेवक संघ (RSS), विश्व हिंदू परिषद (VHP), जमात-ए-इस्लामी, आदि। भाषाई समूह: तमिल संघ जनजातीय समूह - नागालैंड की राष्ट्रीय समाजवादी परिषद (NSCN) जनजातीय राष्ट्रीय स्वयंसेवक आदिवासी लीग ऑफ असम, आदि। विचारधारा आधारित समूह: नर्मदा बचाओ आंदोलन चिपको आंदोलन। आनोमिक समूह: नक्सली समूह यूनाइटेड लिबरेशन फ्रंट ऑफ असम (उल्फा) Additional Information दबाव समूहों के प्रकार: संस्थागत ब्याज समूह सहयोगी हित समूह गैर-सहयोगी हित समूह परमाणु ब्याज समूह","markdown":"## Q100.\n\nनिम्नलिखित में से किसे एक दबाव समूह माना जा सकता है?\n\n### Options\n\nA. लोक सभा के सदस्य\n\nB. पंचायत के सदस्य\n\nC. मंत्रिमण्डल के सदस्य\n\nD. मज़दूर संघ के सदस्य\n\n**Correct Answer:** D\n\n### Solution\n\nसही उत्तर **मज़दूर संघ****के सदस्य हैं** ।\n\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* एक दबाव समूह उन लोगों का एक संगठित समूह है जो सामान्य हितों को आगे बढ़ाने में सक्रिय हैं।\n* दबाव समूह **सरकार पर दबाव बढ़ाकर सार्वजनिक नीति में बदलाव लाने का** प्रयास **करते हैं** ।\n* दबाव समूहों को **ब्याज समूह** या **निहित समूह** भी कहा जाता है।\n* उनके पास प्रत्यक्ष राजनीतिक दल की शक्ति नहीं है।\n* वे विशिष्ट कार्यक्रमों और मुद्दों से संबंधित हैं और उनकी गतिविधियाँ सरकार पर दबाव डालकर अपने सदस्यों के हितों के संरक्षण और संवर्धन तक सीमित हैं।\n* दबाव समूह सरकार में कानूनी और वैध तरीकों जैसे लॉबिंग, पत्राचार, प्रचार, प्रचार, याचिका, सार्वजनिक बहस, विधान, आदि के माध्यम से नीति-निर्माण को प्रभावित करते हैं।\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/key-point-image.png)**Key Points**\n\n \n* व्यावसायिक समूह: \n* फिक्की\n* ASSOCHAM आदि\n* ट्रेड यूनियन: \n* एटक\n* इंटक\n* भारतीय मजदूर संघ (BMS)\n* पेशेवर समूह: \n* बार काउंसिल ऑफ इंडिया (बीसीआई)\n* कृषि समूह- \n* अखिल भारतीय किसान सभा\n* भारतीय किसान यूनियन आदि\n* छात्र संगठन: \n* अखिल भारतीय विद्यार्थी परिषद (ABVP)\n* ऑल इंडिया स्टूडेंट्स फेडरेशन (AISF)\n* भारतीय राष्ट्रीय छात्र संघ (NSUI)\n* धार्मिक समूह: \n* राष्ट्रीय स्वयं सेवक संघ (RSS),\n* विश्व हिंदू परिषद (VHP),\n* जमात-ए-इस्लामी, आदि।\n \n* भाषाई समूह: \n* तमिल संघ\n* जनजातीय समूह - नागालैंड की राष्ट्रीय समाजवादी परिषद (NSCN)\n* जनजातीय राष्ट्रीय स्वयंसेवक\n* आदिवासी लीग ऑफ असम, आदि।\n* विचारधारा आधारित समूह: \n* नर्मदा बचाओ आंदोलन\n* चिपको आंदोलन।\n* आनोमिक समूह: \n* नक्सली समूह\n* यूनाइटेड लिबरेशन फ्रंट ऑफ असम (उल्फा)\n \n\n![](//cdn.testbook.com/resources/lms_creative_elements/additional-information-image.png)**Additional Information**\n\n \n* **दबाव समूहों के प्रकार:** \n* संस्थागत ब्याज समूह\n* सहयोगी हित समूह\n* गैर-सहयोगी हित समूह\n* परमाणु ब्याज समूह\n\n---\n"}}}];
const LANGUAGES = ["English","Hindi"];
const EXPORT_TITLE = "MPPSC State Services Prelims General Studies 2017 Official Paper";
const EXPORT_TITLE_HTML = "MPPSC State Services Prelims General Studies 2017 Official Paper";
const EXPORT_FILE_BASENAME = "MPPSC State Services Prelims General Studies 2017 Official Paper";
const OPTION_LETTERS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
let currentView = "quiz";
let selectedLanguage = "English";
let answers = {};
let submitted = false;
let startedAt = Date.now();
let submittedAt = null;

const content = document.getElementById("content");
const summary = document.getElementById("summary");
const navgrid = document.getElementById("navgrid");
const languageSelect = document.getElementById("language");

function snap(q){return q.languages[selectedLanguage] || q.languages.English || q.languages.Hindi || null}
function correctIndex(q){const s=snap(q);return s ? Number(s.correctIndex) : -1}
function duration(){const end=submittedAt || Date.now();return Math.max(0, Math.round((end-startedAt)/1000))}
function fmt(seconds){const m=Math.floor(seconds/60);const s=seconds%60;return m+"m "+String(s).padStart(2,"0")+"s"}
function resultRows(){return DATA.map(q=>{const c=correctIndex(q);const a=answers[q.index];return {q,c,a,ok:c>=0&&a===c,wrong:a!==undefined&&c>=0&&a!==c,blank:a===undefined}})}
function score(){const rows=resultRows();return {total:DATA.length,attempted:rows.filter(r=>!r.blank).length,correct:rows.filter(r=>r.ok).length,wrong:rows.filter(r=>r.wrong).length,blank:rows.filter(r=>r.blank).length}}

function render(){
  document.getElementById("meta").textContent = DATA.length+" questions | Time: "+fmt(duration());
  document.querySelectorAll(".controls button[id$='Tab']").forEach(btn=>btn.classList.remove("active"));
  document.getElementById(currentView+"Tab").classList.add("active");
  renderSummary();
  renderNav();
  if(currentView==="quiz") renderQuiz();
  if(currentView==="solution") renderSolutions();
  if(currentView==="report") renderReport();
}

function renderSummary(){
  if(!submitted){summary.innerHTML="";return}
  const s=score();
  summary.innerHTML='<div class="score">'+
    '<div class="metric"><span>Score</span><b>'+s.correct+'/'+s.total+'</b></div>'+
    '<div class="metric"><span>Attempted</span><b>'+s.attempted+'</b></div>'+
    '<div class="metric"><span>Wrong</span><b>'+s.wrong+'</b></div>'+
    '<div class="metric"><span>Time</span><b>'+fmt(duration())+'</b></div>'+
  '</div>';
}

function renderNav(){
  navgrid.innerHTML = DATA.map(q=>{
    const a=answers[q.index];
    let cls = a===undefined ? "" : "answered";
    if(submitted){
      const c=correctIndex(q);
      if(a!==undefined && a===c) cls="correct";
      else if(a!==undefined) cls="wrong";
    }
    return '<button class="'+cls+'" data-jump="'+q.index+'" type="button">'+q.index+'</button>';
  }).join("");
}

function renderQuiz(){
  content.innerHTML = DATA.map(q=>{
    const s=snap(q);
    if(!s) return '<article class="card" id="q'+q.index+'"><div class="qno">'+q.qNo+'</div><p>Not captured.</p></article>';
    return '<article class="card" id="q'+q.index+'">'+
      '<div class="qhead"><div class="qno">'+q.qNo+'</div><div>'+selectedLanguage+'</div></div>'+
      '<div class="question">'+s.questionHTML+'</div>'+
      s.options.map((o,i)=>{
        const checked=answers[q.index]===i ? "checked" : "";
        let cls="option";
        if(submitted){
          const c=correctIndex(q);
          if(i===c) cls+=" correct";
          if(answers[q.index]===i && i!==c) cls+=" wrong";
        }
        return '<label class="'+cls+'"><input type="radio" name="q'+q.index+'" value="'+i+'" '+checked+' '+(submitted?"disabled":"")+'> <b>'+o.label+'.</b><span>'+o.html+'</span></label>';
      }).join("")+
      (submitted ? solutionHTML(q) : "")+
    '</article>';
  }).join("");
}

function solutionHTML(q){
  const s=snap(q);
  if(!s) return "";
  const c=correctIndex(q);
  const answer = c >= 0 ? OPTION_LETTERS[c] : "Not detected";
  return '<div class="solution"><h3>Solution</h3><p><b>Correct answer:</b> '+answer+'</p>'+(s.solutionHTML || '<p>No solution captured.</p>')+'</div>';
}

function renderSolutions(){
  content.innerHTML = DATA.map(q=>{
    const s=snap(q);
    if(!s) return '<article class="card"><div class="qno">'+q.qNo+'</div><p>Not captured.</p></article>';
    return '<article class="card" id="q'+q.index+'"><div class="qhead"><div class="qno">'+q.qNo+'</div><div>'+selectedLanguage+'</div></div><div class="question">'+s.questionHTML+'</div>'+solutionHTML(q)+'</article>';
  }).join("");
}

function renderReport(){
  const s=score();
  const rows=resultRows();
  content.innerHTML = '<article class="card"><h2>Report</h2>'+
    '<p>Score: <b>'+s.correct+'/'+s.total+'</b> | Attempted: '+s.attempted+' | Wrong: '+s.wrong+' | Blank: '+s.blank+' | Time: '+fmt(duration())+'</p>'+
    '<button class="primary" id="downloadReport" type="button">Download Report</button></article>'+
    '<table class="report-table"><thead><tr><th>Q</th><th>Your Answer</th><th>Correct</th><th>Status</th></tr></thead><tbody>'+
    rows.map(r=>'<tr><td>'+r.q.index+'</td><td>'+(r.a===undefined?"Blank":OPTION_LETTERS[r.a])+'</td><td>'+(r.c>=0?OPTION_LETTERS[r.c]:"Not detected")+'</td><td>'+(r.ok?"Correct":r.blank?"Blank":"Wrong")+'</td></tr>').join("")+
    '</tbody></table>';
  const btn=document.getElementById("downloadReport");
  if(btn) btn.addEventListener("click", downloadReport);
}

function submitQuiz(){
  if(submitted) return;
  submitted=true;
  submittedAt=Date.now();
  currentView="report";
  render();
  setTimeout(downloadReport, 300);
}

function downloadReport(){
  const s=score();
  const rows=resultRows();
  const html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+EXPORT_TITLE_HTML+' Report</title><style>body{font-family:Arial,sans-serif;padding:24px}table{border-collapse:collapse;width:100%}td,th{border:1px solid #ddd;padding:8px}th{background:#f5f5f5}</style></head><body>'+
    '<h1>'+EXPORT_TITLE_HTML+' Report</h1><p>Language: '+selectedLanguage+'</p><p>Score: '+s.correct+'/'+s.total+' | Attempted: '+s.attempted+' | Wrong: '+s.wrong+' | Blank: '+s.blank+' | Time: '+fmt(duration())+'</p>'+
    '<table><thead><tr><th>Q</th><th>Your Answer</th><th>Correct</th><th>Status</th></tr></thead><tbody>'+
    rows.map(r=>'<tr><td>'+r.q.index+'</td><td>'+(r.a===undefined?"Blank":OPTION_LETTERS[r.a])+'</td><td>'+(r.c>=0?OPTION_LETTERS[r.c]:"Not detected")+'</td><td>'+(r.ok?"Correct":r.blank?"Blank":"Wrong")+'</td></tr>').join("")+
    '</tbody></table></body></html>';
  const blob=new Blob([html],{type:"text/html;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=EXPORT_FILE_BASENAME+" - Report.html";
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

content.addEventListener("change", event=>{
  if(event.target.matches("input[type='radio']")){
    const name=event.target.name.replace("q","");
    answers[Number(name)] = Number(event.target.value);
    renderNav();
  }
});
navgrid.addEventListener("click", event=>{
  const btn=event.target.closest("[data-jump]");
  if(!btn) return;
  const target=document.getElementById("q"+btn.dataset.jump);
  if(target) target.scrollIntoView({behavior:"smooth",block:"start"});
});
languageSelect.addEventListener("change", event=>{selectedLanguage=event.target.value;render()});
document.getElementById("quizTab").addEventListener("click",()=>{currentView="quiz";render()});
document.getElementById("solutionTab").addEventListener("click",()=>{currentView="solution";render()});
document.getElementById("reportTab").addEventListener("click",()=>{currentView="report";render()});
document.getElementById("submitBtn").addEventListener("click",submitQuiz);
setInterval(()=>{if(!submitted) document.getElementById("meta").textContent = DATA.length+" questions | Time: "+fmt(duration())},1000);
render();
</script>
</body>
</html>
